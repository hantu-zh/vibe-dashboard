<!DOCTYPE html>
<!-- 强势股雷达独立页面 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>强势股雷达 | 方瑟的openclaw</title>
  <meta http-equiv="refresh" content="1800">
  <meta name="description" content="每日收盘后自动更新强势股筛选">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .header { text-align: center; padding: 20px 0; }
    .header h1 { color: #ff9800; font-size: 1.8em; margin-bottom: 8px; }
    .header p { color: #888; font-size: 0.9em; }
    .back-link { display: inline-block; margin-bottom: 16px; color: #00e5ff; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
    .legend { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-bottom: 20px; font-size: 0.85em; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    .tag-breakout { background: #1a3a5e; color: #00e5ff; padding: 2px 8px; border-radius: 6px; }
    .tag-volume { background: #1a3a1e; color: #00e676; padding: 2px 8px; border-radius: 6px; }
    .tag-resilient { background: #3a1a1a; color: #ff9800; padding: 2px 8px; border-radius: 6px; }
    .tag-newhigh { background: #3a3a1a; color: #ffd740; padding: 2px 8px; border-radius: 6px; }
    .tag-addposition { background: #1a2a3a; color: #ff6d00; padding: 2px 8px; border-radius: 6px; }
    .tag-bigfund { background: #2a1a3a; color: #ce93d8; padding: 2px 8px; border-radius: 6px; }
    .tag-yimeng { background: #1a3a3a; color: #4dd0e1; padding: 2px 8px; border-radius: 6px; }
    .tag-yimeng-hot { background: #3a1a1a; color: #ff5252; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .tab { padding: 8px 20px; border: none; border-radius: 20px; background: #1a1a3e; color: #888; cursor: pointer; font-size: 0.9em; transition: all .2s; }
    .tab:hover { background: #2a2a5e; color: #ccc; }
    .tab.active { background: #ff9800; color: #0a0a1a; font-weight: bold; }
    .tab-loading { opacity: 0.6; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    th { background: #1a1a3e; color: #ff9800; padding: 10px 8px; text-align: left; cursor: pointer; user-select: none; }
    th:hover { color: #ffb74d; }
    td { padding: 10px 8px; border-bottom: 1px solid #1a1a3e; }
    tr:hover { background: #14142e; }
    td a { color: #e0e0e0; text-decoration: none; }
    td a:hover { color: #ff9800; text-decoration: underline; }
    .up { color: #ff5252; font-weight: bold; }
    .down { color: #00e676; font-weight: bold; }
    .stars { color: #ffd740; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.8em; }
    .code { }
    .meta { text-align: center; color: #666; font-size: 0.8em; margin-bottom: 12px; }
    .meta-yimeng { display: inline-block; padding: 2px 10px; background: #1a3a3a; color: #4dd0e1; border-radius: 10px; font-size: 0.8em; margin-left: 8px; }
    .col-consec { color: #ff6d00; font-weight: bold; }
    .col-ratio { color: #4dd0e1; }
    .tooltip { position: relative; cursor: help; border-bottom: 1px dashed #4dd0e1; }
    .tooltip:hover { color: #80deea; }
    .no-data { text-align: center; color: #666; padding: 40px; font-size: 0.9em; }
    .no-data p { margin-top: 8px; }
    @media (max-width: 768px) {
      table { font-size: 0.8em; }
      th, td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← 返回首页</a>
    <div class="header">
      <h1>💪 强势股雷达</h1>
      <p>趋势 · 量能 · 价格形态 · 市场地位 · 主力资金 五维度筛选</p>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot tag-breakout"></span>🚀 突破型 - 突破半年线</div>
      <div class="legend-item"><span class="legend-dot tag-volume"></span>📈 量价齐升 - 上涨放量回调缩量</div>
      <div class="legend-item"><span class="legend-dot tag-resilient"></span>🛡️ 抗跌型 - 大盘跌时逆势抗跌</div>
      <div class="legend-item"><span class="legend-dot tag-newhigh"></span>💎 创新高 - 创阶段新高</div>
      <div class="legend-item"><span class="legend-dot tag-addposition"></span>➕ 增仓 - 连续净流入3日+</div>
      <div class="legend-item"><span class="legend-dot tag-bigfund"></span>🐷 大单 - 主力大单明显</div>
      <div class="legend-item"><span class="legend-dot tag-yimeng-hot"></span>🔥 强买 - 益盟强买信号</div>
    </div>

    <div class="meta" id="meta"></div>
    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
  </div>

  <script>
  var var _data = {"updated":"2026-07-03","stocks":[{"code":"300163","name":"先锋新材","price":7.74,"change_pct":19.63,"turnover":15.0,"change_5d":0,"volume":5.22,"tag":"newhigh","score":65,"reason":"涨幅领先，强势上攻 | 涨19.6% | 换手15.0% | 振幅13.3%"},{"code":"920510","name":"丰光精密","price":29.99,"change_pct":19.01,"turnover":10.9,"change_5d":0,"volume":2.81,"tag":"newhigh","score":64,"reason":"涨幅领先，强势上攻 | 涨19.0% | 振幅19.5%"},{"code":"300139","name":"晓程科技","price":43.58,"change_pct":11.66,"turnover":17.5,"change_5d":0,"volume":17.5,"tag":"newhigh","score":49,"reason":"涨幅领先，强势上攻 | 涨11.7% | 换手17.5% | 成交17亿 | 振幅7.7%"},{"code":"002747","name":"埃斯顿","price":44.77,"change_pct":10.0,"turnover":14.1,"change_5d":0,"volume":47.72,"tag":"breakout","score":48,"reason":"突破关键位置，放量拉升 | 涨10.0% | 成交48亿 | 振幅9.1%"},{"code":"301379","name":"天山电子","price":32.16,"change_pct":20.0,"turnover":16.2,"change_5d":0,"volume":11.02,"tag":"volume","score":68,"reason":"高换手+高成交，资金大量介入 | 涨20.0% | 换手16.2% | 成交11亿 | 振幅12.9%"},{"code":"002896","name":"中大力德","price":84.16,"change_pct":8.12,"turnover":5.9,"change_5d":0,"volume":9.64,"tag":"resilient","score":27,"reason":"逆势走强，窄幅上攻 | 涨8.1% | 振幅4.7%"},{"code":"300607","name":"拓斯达","price":50.65,"change_pct":8.6,"turnover":11.0,"change_5d":0,"volume":18.4,"tag":"resilient","score":36,"reason":"逆势走强，窄幅上攻 | 涨8.6% | 成交18亿 | 振幅6.4%"},{"code":"301261","name":"恒工精密","price":89.3,"change_pct":8.06,"turnover":6.3,"change_5d":0,"volume":2.06,"tag":"resilient","score":28,"reason":"逆势走强，窄幅上攻 | 涨8.1% | 振幅6.8%"}],"yimeng":[]};;

  var _yimengLoaded = false;

  var _sortCol = 0, _sortDir = 'desc';

  var tabs = [
    { label: '全部', sub: null },
    { label: '🚀 突破型', sub: 'breakout' },
    { label: '📈 量价齐升', sub: 'volume' },
    { label: '🛡️ 抗跌型', sub: 'resilient' },
    { label: '💎 创新高', sub: 'newhigh' },
    { label: '🔥 益盟强买', sub: 'yimeng', loading: false }
  ];

  function init() {
    renderTabs(0);
    renderTable(0);
    loadYimengData();
  }

  function loadYimengData() {
    // 动态加载 strongbuy_data.json
    fetch('strongbuy_data.json?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('not found');
        return r.json();
      })
      .then(function(data) {
        _data.yimeng = data.yimeng || [];
        _data.updated = data.updated || _data.updated;
        _yimengLoaded = true;
        // 如果当前正在看益盟强买tab，刷新表格
        var activeIdx = Array.from(document.querySelectorAll('.tab'))
          .indexOf(document.querySelector('.tab.active'));
        if (activeIdx >= 0 && tabs[activeIdx] && tabs[activeIdx].sub === 'yimeng') {
          renderTable(activeIdx);
          updateMeta();
        }
      })
      .catch(function() {
        _yimengLoaded = false;
      });
  }

  function updateMeta() {
    var meta = document.getElementById('meta');
    var base = '更新时间: ' + _data.updated + ' | 共 ' + _data.stocks.length + ' 只强势股';
    var yimengNote = _yimengLoaded && _data.yimeng.length > 0
      ? ' | 益盟强买数据已加载（' + _data.yimeng.length + '只）'
      : ' | 益盟强买: 暂无数据';
    meta.textContent = base + yimengNote;
  }

  function renderTabs(activeIdx) {
    var el = document.getElementById('tabs');
    el.innerHTML = '';
    tabs.forEach(function(t, i) {
      var btn = document.createElement('button');
      btn.className = 'tab' + (i === activeIdx ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = function() { renderTabs(i); renderTable(i); };
      el.appendChild(btn);
    });
  }

  function isYimengTab(idx) {
    return tabs[idx] && tabs[idx].sub === 'yimeng';
  }

  function renderTable(tabIdx) {
    updateMeta();
    var sub = tabs[tabIdx].sub;
    var isYimeng = isYimengTab(tabIdx);
    var stocks = isYimeng ? (_data.yimeng || []) : (sub ? _data.stocks.filter(function(s) { return s.tag === sub; }) : _data.stocks);

    if (stocks.length === 0 && isYimeng) {
      document.getElementById('content').innerHTML =
        '<div class="no-data">🔥 益盟强买暂无数据<br><p>可能原因：数据尚未更新（交易时段运行脚本后即可见）</p></div>';
      return;
    }
    if (stocks.length === 0) {
      document.getElementById('content').innerHTML = '<div class="no-data">暂无数据</div>';
      return;
    }

    stocks.sort(function(a, b) {
      var va, vb;
      if (_sortCol === 0) { va = a.code; vb = b.code; }
      else if (_sortCol === 1) { va = a.name; vb = b.name; }
      else if (_sortCol === 2) { va = parseFloat(a.price); vb = parseFloat(b.price); }
      else if (_sortCol === 3) { va = a.change_pct; vb = b.change_pct; }
      else if (_sortCol === 4) { va = a.turnover || 0; vb = b.turnover || 0; }
      else if (_sortCol === 5) { va = a.change_5d || 0; vb = b.change_5d || 0; }
      else if (_sortCol === 6) { va = a.volume; vb = b.volume; }
      else if (_sortCol === 7) { va = a.tag || ''; vb = b.tag || ''; }
      else { va = a.score || 0; vb = b.score || 0; }
      if (typeof va === 'string') return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return _sortDir === 'asc' ? va - vb : (vb - va);
    });

    var tagLabel = {
      breakout: '🚀突破', volume: '📈量价', resilient: '🛡️抗跌', newhigh: '💎新高',
      addposition: '➕增仓', bigfund: '🐷大单', yimeng: '🔥强买'
    };
    var tagClass = {
      breakout: 'tag-breakout', volume: 'tag-volume', resilient: 'tag-resilient', newhigh: 'tag-newhigh',
      addposition: 'tag-addposition', bigfund: 'tag-bigfund', yimeng: 'tag-yimeng'
    };

    var h = '<table>';

    if (isYimeng) {
      // 益盟强买专属列
      h += '<tr>';
      h += '<th>代码</th>';
      h += '<th onclick="sortBy(1)">名称</th>';
      h += '<th onclick="sortBy(2)">现价</th>';
      h += '<th onclick="sortBy(3)">涨跌幅</th>';
      h += '<th onclick="sortBy(4)">换手率</th>';
      h += '<th onclick="sortBy(8)" class="tooltip" title="主力连续净流入天数">🔴连飘</th>';
      h += '<th onclick="sortBy(9)" class="tooltip" title="主力净流入占总成交比">📊净占比</th>';
      h += '<th onclick="sortBy(10)">评分</th>';
      h += '<th>入选理由</th></tr>';

      stocks.forEach(function(s) {
        var chgClass = s.change_pct >= 0 ? 'up' : 'down';
        var chgSign = s.change_pct >= 0 ? '+' : '';
        var fullCode = s.code.startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
        var consecClass = s.consec_days >= 3 ? 'col-consec' : '';
        var ratioClass = 'col-ratio';
        h += '<tr>';
        h += '<td>' + s.code + '</td>';
        h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + s.name + '</a></td>';
        h += '<td>' + s.price + '</td>';
        h += '<td class="' + chgClass + '">' + chgSign + s.change_pct.toFixed(2) + '%</td>';
        h += '<td>' + (s.turnover ? s.turnover.toFixed(2) + '%' : '-') + '</td>';
        h += '<td class="' + consecClass + '">' + (s.consec_days || 0) + '日</td>';
        h += '<td class="' + ratioClass + '">' + (s.main_ratio ? s.main_ratio.toFixed(1) + '%' : '-') + '</td>';
        h += '<td class="stars">' + '★'.repeat(Math.max(1, Math.round((s.score || 0) / 20))) + ' ' + (s.score || 0) + '</td>';
        h += '<td style="font-size:0.8em;color:#aaa;">' + (s.reason || '') + '</td>';
        h += '</tr>';
      });
    } else {
      // 强势股雷达原有列
      h += '<tr>';
      h += '<th>代码</th>';
      h += '<th onclick="sortBy(1)">名称</th>';
      h += '<th onclick="sortBy(2)">现价</th>';
      h += '<th onclick="sortBy(3)">涨跌幅</th>';
      h += '<th onclick="sortBy(4)">换手率</th>';
      h += '<th onclick="sortBy(5)">5日涨幅</th>';
      h += '<th onclick="sortBy(6)">成交额</th>';
      h += '<th onclick="sortBy(7)">信号</th>';
      h += '<th onclick="sortBy(8)">评分</th>';
      h += '<th>入选理由</th></tr>';

      stocks.forEach(function(s) {
        var chgClass = s.change_pct >= 0 ? 'up' : 'down';
        var chgSign = s.change_pct >= 0 ? '+' : '';
        var fullCode = s.code.startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
        h += '<tr>';
        h += '<td>' + s.code + '</td>';
        h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + s.name + '</a></td>';
        h += '<td>' + s.price + '</td>';
        h += '<td class="' + chgClass + '">' + chgSign + s.change_pct.toFixed(2) + '%</td>';
        h += '<td>' + (s.turnover ? s.turnover.toFixed(1) + '%' : '-') + '</td>';
        h += '<td class="' + (s.change_5d >= 0 ? 'up' : 'down') + '">' + (s.change_5d >= 0 ? '+' : '') + s.change_5d.toFixed(1) + '%</td>';
        h += '<td>' + (s.volume >= 1 ? s.volume.toFixed(1) + '亿' : (s.volume * 10000).toFixed(0) + '万') + '</td>';
        var allTags = s.tag ? '<span class="tag ' + (tagClass[s.tag]||'') + '">' + (tagLabel[s.tag]||s.tag) + '</span>' : '';
        h += '<td>' + allTags + '</td>';
        h += '<td class="stars">' + '★'.repeat(Math.max(1, Math.round((s.score || 0) / 20))) + ' ' + (s.score || 0) + '</td>';
        h += '<td style="font-size:0.8em;color:#888;">' + s.reason + '</td>';
        h += '</tr>';
      });
    }
    h += '</table>';
    document.getElementById('content').innerHTML = h;
  }

  function sortBy(col) {
    if (_sortCol === col) { _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; }
    else { _sortCol = col; _sortDir = 'desc'; }
    var activeIdx = Array.from(document.querySelectorAll('.tab')).indexOf(document.querySelector('.tab.active'));
    renderTable(activeIdx >= 0 ? activeIdx : 0);
  }

  init();
  </script>
</body>
</html>
