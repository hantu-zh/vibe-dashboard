<!DOCTYPE html>
<!-- 强势股雷达独立页面 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>强势股雷达 | 方瑟的openclaw</title>
  <meta http-equiv="refresh" content="1800">
  <meta name="description" content="每日收盘后自动更新强势股筛选">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .header { text-align: center; padding: 20px 0; }
    .header h1 { color: #ff9800; font-size: 1.8em; margin-bottom: 8px; }
    .header p { color: #888; font-size: 0.9em; }
    .back-link { display: inline-block; margin-bottom: 16px; color: #00e5ff; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
    .legend { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-bottom: 20px; font-size: 0.85em; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    .tag-breakout { background: #1a3a5e; color: #00e5ff; padding: 2px 8px; border-radius: 6px; }
    .tag-volume { background: #1a3a1e; color: #00e676; padding: 2px 8px; border-radius: 6px; }
    .tag-resilient { background: #3a1a1a; color: #ff9800; padding: 2px 8px; border-radius: 6px; }
    .tag-newhigh { background: #3a3a1a; color: #ffd740; padding: 2px 8px; border-radius: 6px; }
    .tag-addposition { background: #1a2a3a; color: #ff6d00; padding: 2px 8px; border-radius: 6px; }
    .tag-bigfund { background: #2a1a3a; color: #ce93d8; padding: 2px 8px; border-radius: 6px; }
    .tag-yimeng { background: #1a3a3a; color: #4dd0e1; padding: 2px 8px; border-radius: 6px; }
    .tag-yimeng-hot { background: #3a1a1a; color: #ff5252; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .tab { padding: 8px 20px; border: none; border-radius: 20px; background: #1a1a3e; color: #888; cursor: pointer; font-size: 0.9em; transition: all .2s; }
    .tab:hover { background: #2a2a5e; color: #ccc; }
    .tab.active { background: #ff9800; color: #0a0a1a; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    th { background: #1a1a3e; color: #ff9800; padding: 10px 8px; text-align: left; cursor: pointer; user-select: none; }
    th:hover { color: #ffb74d; }
    td { padding: 10px 8px; border-bottom: 1px solid #1a1a3e; }
    tr:hover { background: #14142e; }
    td a { color: #e0e0e0; text-decoration: none; }
    td a:hover { color: #ff9800; text-decoration: underline; }
    .up { color: #ff5252; font-weight: bold; }
    .down { color: #00e676; font-weight: bold; }
    .stars { color: #ffd740; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.8em; }
    .meta { text-align: center; color: #666; font-size: 0.8em; margin-bottom: 12px; }
    .meta-yimeng { display: inline-block; padding: 2px 10px; background: #1a3a3a; color: #4dd0e1; border-radius: 10px; font-size: 0.8em; margin-left: 8px; }
    .col-consec { color: #ff6d00; font-weight: bold; }
    .col-ratio { color: #4dd0e1; }
    .tooltip { position: relative; cursor: help; border-bottom: 1px dashed #4dd0e1; }
    .tooltip:hover { color: #80deea; }
    .no-data { text-align: center; color: #666; padding: 40px; font-size: 0.9em; }
    .loading { text-align: center; color: #888; padding: 40px; font-size: 0.9em; }
    @media (max-width: 768px) {
      table { font-size: 0.8em; }
      th, td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← 返回首页</a>
    <div class="header">
      <h1>💪 强势股雷达</h1>
      <p>趋势 · 量能 · 价格形态 · 市场地位 · 主力资金 五维度筛选</p>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot tag-breakout"></span>🚀 突破型 - 突破半年线</div>
      <div class="legend-item"><span class="legend-dot tag-volume"></span>📈 量价齐升 - 上涨放量回调缩量</div>
      <div class="legend-item"><span class="legend-dot tag-resilient"></span>🛡️ 抗跌型 - 大盘跌时逆势抗跌</div>
      <div class="legend-item"><span class="legend-dot tag-newhigh"></span>💎 创新高 - 创阶段新高</div>
      <div class="legend-item"><span class="legend-dot tag-addposition"></span>➕ 增仓 - 连续净流入3日+</div>
      <div class="legend-item"><span class="legend-dot tag-bigfund"></span>🐷 大单 - 主力大单明显</div>
      <div class="legend-item"><span class="legend-dot tag-yimeng-hot"></span>🔥 强买 - 益盟强买信号</div>
    </div>

    <div class="meta" id="meta"><span class="loading">加载中...</span></div>
    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
  </div>

  <script>
  var _data = {"updated":"2026-07-03","stocks":[{"code":"920096","name":"嘉晨智能","price":49.23,"change_pct":15.08,"turnover":17.7,"change_5d":0,"volume":1.34,"tag":"newhigh","score":63,"reason":"涨幅领先，强势上攻 | 涨15.1% | 换手17.7% | 振幅20.2%"},{"code":"300129","name":"泰胜风能","price":10.43,"change_pct":17.72,"turnover":10.0,"change_5d":0,"volume":7.15,"tag":"newhigh","score":62,"reason":"涨幅领先，强势上攻 | 涨17.7% | 振幅22.0%"},{"code":"300139","name":"晓程科技","price":44.01,"change_pct":12.76,"turnover":24.6,"change_5d":0,"volume":24.75,"tag":"newhigh","score":61,"reason":"涨幅领先，强势上攻 | 涨12.8% | 换手24.6% | 成交25亿 | 振幅10.2%"},{"code":"920011","name":"晨光电机","price":23.99,"change_pct":10.81,"turnover":17.3,"change_5d":0,"volume":0.75,"tag":"breakout","score":49,"reason":"突破关键位置，放量拉升 | 涨10.8% | 换手17.3% | 振幅13.8%"},{"code":"300607","name":"拓斯达","price":51.73,"change_pct":10.91,"turnover":18.3,"change_5d":0,"volume":31.12,"tag":"breakout","score":51,"reason":"突破关键位置，放量拉升 | 涨10.9% | 换手18.3% | 成交31亿 | 振幅8.5%"},{"code":"301232","name":"飞沃科技","price":180.41,"change_pct":10.71,"turnover":13.8,"change_5d":0,"volume":14.93,"tag":"breakout","score":50,"reason":"突破关键位置，放量拉升 | 涨10.7% | 成交15亿 | 振幅17.1%"},{"code":"002747","name":"埃斯顿","price":44.77,"change_pct":10.0,"turnover":15.9,"change_5d":0,"volume":53.92,"tag":"volume","score":51,"reason":"高换手+高成交，资金大量介入 | 涨10.0% | 换手15.9% | 成交54亿 | 振幅9.1%"},{"code":"002896","name":"中大力德","price":85.62,"change_pct":9.99,"turnover":9.8,"change_5d":0,"volume":16.13,"tag":"resilient","score":36,"reason":"逆势走强，窄幅上攻 | 涨10.0% | 成交16亿 | 振幅5.7%"},{"code":"603286","name":"日盈电子","price":56.96,"change_pct":10.0,"turnover":6.0,"change_5d":0,"volume":3.83,"tag":"resilient","score":32,"reason":"逆势走强，窄幅上攻 | 涨10.0% | 振幅6.8%"}],"yimeng":[]};
  var _loaded = false;
  var _sortCol = 0, _sortDir = 'desc';

  var tabs = [
    { label: '全部', sub: null },
    { label: '🚀 突破型', sub: 'breakout' },
    { label: '📈 量价齐升', sub: 'volume' },
    { label: '🛡️ 抗跌型', sub: 'resilient' },
    { label: '💎 创新高', sub: 'newhigh' },
    { label: '🔥 益盟强买', sub: 'yimeng' }
  ];

  function init() {
    renderTabs(0);
    loadData();
  }

  function loadData() {
    fetch('strongbuy_data.json?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        _data.updated = data.updated || '';
        _data.stocks = data.stocks || [];
        _data.yimeng = data.yimeng || [];
        _loaded = true;
        renderTable(0);
        updateMeta();
      })
      .catch(function(err) {
        document.getElementById('meta').textContent = '加载失败: ' + err.message + '（请刷新重试）';
        document.getElementById('content').innerHTML = '<div class="no-data">数据加载失败<br><p>' + err.message + '</p></div>';
      });
  }

  function updateMeta() {
    var meta = document.getElementById('meta');
    if (!meta) return;
    var parts = ['更新时间: ' + (_data.updated || '—')];
    if (_data.stocks.length > 0) {
      parts.push('强势股 ' + _data.stocks.length + ' 只');
    }
    if (_data.yimeng.length > 0) {
      parts.push('益盟强买 ' + _data.yimeng.length + ' 只');
    }
    meta.textContent = parts.join(' | ');
  }

  function renderTabs(activeIdx) {
    var el = document.getElementById('tabs');
    el.innerHTML = '';
    tabs.forEach(function(t, i) {
      var btn = document.createElement('button');
      btn.className = 'tab' + (i === activeIdx ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = function() {
        renderTabs(i);
        renderTable(i);
      };
      el.appendChild(btn);
    });
  }

  function getStocks(tabIdx) {
    var sub = tabs[tabIdx].sub;
    if (sub === 'yimeng') return _data.yimeng;
    if (!sub) return _data.stocks;
    return _data.stocks.filter(function(s) { return s.tag === sub; });
  }

  function renderTable(tabIdx) {
    if (!_loaded) {
      document.getElementById('content').innerHTML = '<div class="loading">加载数据中...</div>';
      return;
    }
    updateMeta();
    var stocks = getStocks(tabIdx);

    if (stocks.length === 0) {
      var msg = tabs[tabIdx].sub === 'yimeng'
        ? '🔥 益盟强买暂无数据（脚本运行后可见）'
        : '暂无数据';
      document.getElementById('content').innerHTML = '<div class="no-data">' + msg + '</div>';
      return;
    }

    stocks.sort(function(a, b) {
      var va, vb;
      if (_sortCol === 0) { va = a.code || ''; vb = b.code || ''; }
      else if (_sortCol === 1) { va = a.name || ''; vb = b.name || ''; }
      else if (_sortCol === 2) { va = parseFloat(a.price) || 0; vb = parseFloat(b.price) || 0; }
      else if (_sortCol === 3) { va = a.change_pct || 0; vb = b.change_pct || 0; }
      else if (_sortCol === 4) { va = a.turnover || 0; vb = b.turnover || 0; }
      else if (_sortCol === 5) { va = a.change_5d || 0; vb = b.change_5d || 0; }
      else if (_sortCol === 6) { va = a.volume || 0; vb = b.volume || 0; }
      else if (_sortCol === 7) { va = a.tag || ''; vb = b.tag || ''; }
      else { va = a.score || 0; vb = b.score || 0; }
      if (typeof va === 'string') return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return _sortDir === 'asc' ? va - vb : vb - va;
    });

    var tagLabel = {
      breakout: '🚀突破', volume: '📈量价', resilient: '🛡️抗跌', newhigh: '💎新高',
      addposition: '➕增仓', bigfund: '🐷大单', yimeng: '🔥强买'
    };
    var tagClass = {
      breakout: 'tag-breakout', volume: 'tag-volume', resilient: 'tag-resilient', newhigh: 'tag-newhigh',
      addposition: 'tag-addposition', bigfund: 'tag-bigfund', yimeng: 'tag-yimeng'
    };

    var isYimeng = tabs[tabIdx].sub === 'yimeng';
    var h = '<table>';

    if (isYimeng) {
      h += '<tr>';
      h += '<th>代码</th><th onclick="sortBy(1)">名称</th><th onclick="sortBy(2)">现价</th>';
      h += '<th onclick="sortBy(3)">涨跌幅</th><th onclick="sortBy(4)">换手率</th>';
      h += '<th onclick="sortBy(5)" class="tooltip" title="主力连续净流入天数">连飘</th>';
      h += '<th onclick="sortBy(6)" class="tooltip" title="主力净流入占总成交比">净占比</th>';
      h += '<th onclick="sortBy(7)">评分</th><th>入选理由</th></tr>';

      stocks.forEach(function(s) {
        var chg = s.change_pct || 0;
        var chgClass = chg >= 0 ? 'up' : 'down';
        var chgSign = chg >= 0 ? '+' : '';
        var fullCode = (s.code || '').startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
        var consecClass = (s.consec_days || 0) >= 3 ? 'col-consec' : '';
        h += '<tr>';
        h += '<td>' + esc(s.code) + '</td>';
        h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + esc(s.name) + '</a></td>';
        h += '<td>' + esc(s.price) + '</td>';
        h += '<td class="' + chgClass + '">' + chgSign + chg.toFixed(2) + '%</td>';
        h += '<td>' + (s.turnover != null ? s.turnover.toFixed(2) + '%' : '-') + '</td>';
        h += '<td class="' + consecClass + '">' + (s.consec_days || 0) + '日</td>';
        h += '<td class="col-ratio">' + (s.main_ratio != null ? s.main_ratio.toFixed(1) + '%' : '-') + '</td>';
        h += '<td class="stars">' + stars(s.score || 0) + ' ' + (s.score || 0) + '</td>';
        h += '<td style="font-size:0.8em;color:#aaa;">' + esc(s.reason || '') + '</td>';
        h += '</tr>';
      });
    } else {
      h += '<tr>';
      h += '<th>代码</th><th onclick="sortBy(1)">名称</th><th onclick="sortBy(2)">现价</th>';
      h += '<th onclick="sortBy(3)">涨跌幅</th><th onclick="sortBy(4)">换手率</th>';
      h += '<th onclick="sortBy(5)">5日涨幅</th><th onclick="sortBy(6)">成交额</th>';
      h += '<th onclick="sortBy(7)">信号</th><th onclick="sortBy(8)">评分</th><th>入选理由</th></tr>';

      stocks.forEach(function(s) {
        var chg = s.change_pct || 0;
        var chgClass = chg >= 0 ? 'up' : 'down';
        var chgSign = chg >= 0 ? '+' : '';
        var chg5 = s.change_5d || 0;
        var chg5Class = chg5 >= 0 ? 'up' : 'down';
        var fullCode = (s.code || '').startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
        var vol = s.volume || 0;
        var volStr = vol >= 1 ? vol.toFixed(1) + '亿' : (vol * 10000).toFixed(0) + '万';
        var tag = s.tag || '';
        var tagHtml = tagLabel[tag]
          ? '<span class="tag ' + (tagClass[tag] || '') + '">' + tagLabel[tag] + '</span>'
          : '';
        h += '<tr>';
        h += '<td>' + esc(s.code) + '</td>';
        h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + esc(s.name) + '</a></td>';
        h += '<td>' + esc(s.price) + '</td>';
        h += '<td class="' + chgClass + '">' + chgSign + chg.toFixed(2) + '%</td>';
        h += '<td>' + (s.turnover != null ? s.turnover.toFixed(1) + '%' : '-') + '</td>';
        h += '<td class="' + chg5Class + '">' + (chg5 >= 0 ? '+' : '') + chg5.toFixed(1) + '%</td>';
        h += '<td>' + volStr + '</td>';
        h += '<td>' + tagHtml + '</td>';
        h += '<td class="stars">' + stars(s.score || 0) + ' ' + (s.score || 0) + '</td>';
        h += '<td style="font-size:0.8em;color:#888;">' + esc(s.reason || '') + '</td>';
        h += '</tr>';
      });
    }
    h += '</table>';
    document.getElementById('content').innerHTML = h;
  }

  function sortBy(col) {
    if (_sortCol === col) { _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; }
    else { _sortCol = col; _sortDir = 'desc'; }
    var activeIdx = 0;
    var activeBtns = document.querySelectorAll('.tab');
    for (var i = 0; i < activeBtns.length; i++) {
      if (activeBtns[i].classList.contains('active')) { activeIdx = i; break; }
    }
    renderTable(activeIdx >= 0 ? activeIdx : 0);
  }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function stars(score) {
    var n = Math.max(1, Math.round(score / 20));
    return '\u2605'.repeat(n);
  }

  init();
  </script>
</body>
</html>
