      stocks.forEach(function(s) {
        var chg = Number(s.change_pct) || 0;
        var chgClass = chg >= 0 ? 'up' : 'down';
        var chgSign = chg >= 0 ? '+' : '';
        var fullCode = String(s.code || '').startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
        var vol = Number(s.volume) || 0;
        var chg5 = Number(s.change_5d) || 0;
        h += '<tr>';
        h += '<td>' + (s.code || '') + '</td>';
        h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + (s.name || '') + '</a></td>';
        h += '<td>' + (s.price != null ? s.price : '-') + '</td>';
        h += '<td class="' + chgClass + '">' + chgSign + chg.toFixed(2) + '%</td>';
        h += '<td class="col-turnover">' + (s.turnover ? Number(s.turnover).toFixed(1) + '%' : '-') + '</td>';
        h += '<td class="' + (chg5 >= 0 ? 'up' : 'down') + '">' + (chg5 >= 0 ? '+' : '') + chg5.toFixed(1) + '%</td>';
        h += '<td>' + (vol >= 1 ? vol.toFixed(1) + '亿' : (vol * 10000).toFixed(0) + '万') + '</td>';
        var allTags = s.tag ? '<span class="tag ' + (tagClass[s.tag]||'') + '">' + (tagLabel[s.tag]||s.tag) + '</span>' : '';
        h += '<td>' + allTags + '</td>';
        h += '<td class="stars">' + '★'.repeat(Number(s.score) || 1) + '</td>';
        h += '<td style="font-size:0.8em;color:#888;">' + (s.reason || '') + '</td>';
        h += '</tr>';
      });
    }
    h += '</table>';
    document.getElementById('content').innerHTML = h;
  }

  function sortBy(col) {
    if (_sortCol === col) { _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; }
    else { _sortCol = col; _sortDir = 'desc'; }
    var activeIdx = Array.from(document.querySelectorAll('.tab')).indexOf(document.querySelector('.tab.active'));
    renderTable(activeIdx >= 0 ? activeIdx : 0);
  }

  init();
  </script>
</body>
</html>
