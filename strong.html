  var _sortCol = 0, _sortDir = 'desc';

  var tabs = [
    { label: '全部', sub: null },
    { label: '🚀 突破型', sub: 'breakout' },
    { label: '📈 量价齐升', sub: 'volume' },
    { label: '🛡️ 抗跌型', sub: 'resilient' },
    { label: '💎 创新高', sub: 'newhigh' }
  ];

  function init() {
    document.getElementById('meta').textContent = '更新时间: ' + _data.updated + ' | 共 ' + _data.stocks.length + ' 只强势股';
    renderTabs(0);
    renderTable(0);
  }

  function renderTabs(activeIdx) {
    var el = document.getElementById('tabs');
    el.innerHTML = '';
    tabs.forEach(function(t, i) {
      var btn = document.createElement('button');
      btn.className = 'tab' + (i === activeIdx ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = function() { renderTabs(i); renderTable(i); };
      el.appendChild(btn);
    });
  }

  function renderTable(tabIdx) {
    var sub = tabs[tabIdx].sub;
    var stocks = sub ? _data.stocks.filter(function(s) { return s.tags && s.tags.includes(sub); }) : _data.stocks;

    stocks.sort(function(a, b) {
      var va, vb;
      if (_sortCol === 0) { va = a.code; vb = b.code; }
      else if (_sortCol === 1) { va = a.name; vb = b.name; }
      else if (_sortCol === 2) { va = parseFloat(a.price); vb = parseFloat(b.price); }
      else if (_sortCol === 3) { va = a.change_pct; vb = b.change_pct; }
      else if (_sortCol === 4) { va = a.turnover || 0; vb = b.turnover || 0; }
      else if (_sortCol === 5) { va = a.change_5d || 0; vb = b.change_5d || 0; }
      else if (_sortCol === 6) { va = a.volume; vb = b.volume; }
      else if (_sortCol === 7) { va = a.tags[0]; vb = b.tags[0]; }
      else { va = a.score || 0; vb = b.score || 0; }
      if (typeof va === 'string') return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return _sortDir === 'asc' ? va - vb : (vb - va);
    });

    var tagLabel = { breakout: '🚀突破', volume: '📈量价', resilient: '🛡️抗跌', newhigh: '💎新高' };
    var tagClass = { breakout: 'tag-breakout', volume: 'tag-volume', resilient: 'tag-resilient', newhigh: 'tag-newhigh' };

    var h = '<table><tr>';
    h += '<th>代码</th>';
    h += '<th onclick="sortBy(1)">名称</th>';
    h += '<th onclick="sortBy(2)">现价</th>';
    h += '<th onclick="sortBy(3)">涨跌幅</th>';
    h += '<th onclick="sortBy(4)">换手率</th>';
    h += '<th onclick="sortBy(5)">5日涨幅</th>';
    h += '<th onclick="sortBy(6)">成交额</th>';
    h += '<th onclick="sortBy(7)">信号</th>';
    h += '<th onclick="sortBy(8)">评分</th>';
    h += '<th>入选理由</th></tr>';

    stocks.forEach(function(s) {
      var chgClass = s.change_pct >= 0 ? 'up' : 'down';
      var chgSign = s.change_pct >= 0 ? '+' : '';
      var fullCode = s.code.startsWith('6') ? 'sh' + s.code : 'sz' + s.code;
      h += '<tr>';
      h += '<td>' + s.code + '</td>';
      h += '<td><a href="https://quote.eastmoney.com/' + fullCode + '.html" target="_blank">' + s.name + '</a></td>';
      h += '<td>' + s.price + '</td>';
      h += '<td class="' + chgClass + '">' + chgSign + s.change_pct.toFixed(2) + '%</td>';
      h += '<td>' + (s.turnover ? s.turnover.toFixed(1) + '%' : '-') + '</td>';
      h += '<td class="' + (s.change_5d >= 0 ? 'up' : 'down') + '">' + (s.change_5d >= 0 ? '+' : '') + s.change_5d.toFixed(1) + '%</td>';
      h += '<td>' + (s.volume >= 1 ? s.volume.toFixed(1) + '亿' : (s.volume * 10000).toFixed(0) + '万') + '</td>';
      var allTags = s.tags.map(function(t) { return '<span class="tag ' + tagClass[t] + '">' + tagLabel[t] + '</span>'; }).join('');
      h += '<td>' + allTags + '</td>';
      h += '<td class="stars">' + '★'.repeat(Math.min(s.score, 5)) + '</td>';
      h += '<td style="font-size:0.8em;color:#888;">' + s.reason + '</td>';
      h += '</tr>';
    });
    h += '</table>';
    document.getElementById('content').innerHTML = h;
  }

  function sortBy(col) {
    if (_sortCol === col) { _sortDir = _sortDir === 'asc' ? 'desc' : 'asc'; }
    else { _sortCol = col; _sortDir = 'desc'; }
    var activeIdx = Array.from(document.querySelectorAll('.tab')).indexOf(document.querySelector('.tab.active'));
    renderTable(activeIdx >= 0 ? activeIdx : 0);
  }
