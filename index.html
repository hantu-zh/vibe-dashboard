  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>鏂圭憻鐨刼penclaw A鑲℃儏缁浄杈?/title>


  <style>

    :root {

      --neon-pink: #ff2d6a;

      --neon-cyan: #00fff2;

      --neon-purple: #b829ff;

      --neon-green: #39ff14;

      --neon-red: #ff2d2d;

      --neon-orange: #ff6b35;

      --dark-bg: #0a0a0f;

      --card-bg: rgba(15, 15, 25, 0.85);

      --border-glow: rgba(255, 45, 106, 0.3);

    }


    * { margin: 0; padding: 0; box-sizing: border-box; }


    body {

      font-family: 'Noto Sans SC', sans-serif;

      background: var(--dark-bg);

      color: #e0e0e0;

      min-height: 100vh;

      overflow-x: hidden;

      position: relative;

    }


    body::before {

      content: '';

      position: fixed;

      top: 0; left: 0;

      width: 100%; height: 100%;

      background: 

        linear-gradient(90deg, rgba(255,45,106,0.03) 1px, transparent 1px),

        linear-gradient(rgba(0,255,242,0.03) 1px, transparent 1px);

      background-size: 50px 50px;

      animation: gridMove 20s linear infinite;

      pointer-events: none;

      z-index: 0;

    }


    @keyframes gridMove {

      0% { transform: translate(0, 0); }

      100% { transform: translate(50px, 50px); }

    }


    body::after {

      content: '';

      position: fixed;

      top: 0; left: 0;

      width: 100%; height: 4px;

      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);

      animation: scanLine 4s ease-in-out infinite;

      pointer-events: none;

      z-index: 1000;

      opacity: 0.5;

    }


    @keyframes scanLine {

      0%, 100% { top: -10px; opacity: 0; }

      50% { opacity: 0.7; }

      100% { top: 100%; }

    }


    .container {

      position: relative;

      z-index: 1;

      max-width: 1800px;

      margin: 0 auto;

      padding: 20px;

    }


    .header {

      text-align: center;

      margin-bottom: 25px;

      padding: 15px;

    }


    .logo {

      font-family: 'Noto Sans SC', sans-serif;

      font-size: 2.5rem;

      font-weight: 900;

      letter-spacing: 6px;

      background: linear-gradient(135deg, var(--neon-red), var(--neon-orange), var(--neon-pink));

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

      background-clip: text;

      animation: logoPulse 2s ease-in-out infinite;

    }


    @media (max-width: 768px) {

      .logo { font-size: 1.3rem; letter-spacing: 2px; }

      .tagline { font-size: 0.65rem; letter-spacing: 1px; }

    }


    @keyframes logoPulse {

      0%, 100% { filter: brightness(1); }

      50% { filter: brightness(1.2); }

    }


    .tagline {

      font-family: 'Noto Sans SC', sans-serif;

      font-size: 0.85rem;

      color: var(--neon-cyan);

      letter-spacing: 3px;

      margin-top: 8px;

    }


    .status-bar {

      display: flex;

      justify-content: center;

      gap: 25px;

      margin-top: 15px;

      font-family: 'Noto Sans SC', sans-serif;

      font-size: 0.7rem;

    }


    .status-item {

      display: flex;

      align-items: center;

      gap: 6px;

    }


    .status-dot {

      width: 8px; height: 8px;

      border-radius: 50%;

      animation: blink 1.5s ease-in-out infinite;

    }


    .status-dot.active { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

    .status-dot.warning { background: var(--neon-orange); box-shadow: 0 0 10px var(--neon-orange); }

    .status-dot.error { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }


    @keyframes blink {

      0%, 100% { opacity: 1; }

      50% { opacity: 0.4; }

    }


    .dashboard-grid {

      display: grid;

      grid-template-columns: 280px 1fr 320px;

      grid-template-rows: auto auto auto auto auto auto;

      gap: 18px;

    }


    .card {

      background: var(--card-bg);

      border: 1px solid var(--border-glow);

      border-radius: 10px;

      padding: 18px;

      position: relative;

      overflow: hidden;

      backdrop-filter: blur(10px);

      transition: all 0.3s ease;

    }


    .card::before {

      content: '';

      position: absolute;

      top: 0; left: 0; right: 0;

      height: 2px;

      background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);

    }


    .card:hover {

      border-color: var(--neon-pink);

      box-shadow: 0 0 25px rgba(255, 45, 106, 0.15);

    }


    
    .title-icon {
      font-size: 1.1em;
      margin-right: 8px;
    }
    .title-hint {
      font-size: 0.6em;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }

    
    /* RPS 鑽у厜鏍峰紡 */

    .rps-stat {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .rps-stat.strong {
      background: rgba(255, 0, 40, 0.2);
      color: #ff0028;
      box-shadow: 0 0 10px rgba(255, 0, 40, 0.3);
    }
    .rps-stat.weak {
      background: rgba(57, 255, 20, 0.15);
      color: #39ff14;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }
    .rps-divider {
      color: rgba(255,255,255,0.3);
      margin: 0 8px;
    }
    .rps-formula {
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
    }


    .rps-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }
    .rps-table {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      overflow: hidden;
    }
    .rps-table th {
      background: linear-gradient(90deg, rgba(255,0,40,0.15) 0%, rgba(255,0,146,0.15) 100%);
      color: rgba(255,255,255,0.8);
      padding: 10px 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .rps-table td {
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.75rem;
    }
    .rps-table tr:hover {
      background: rgba(255,0,146,0.08);
    }
    .rps-bar {
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      position: relative;
    }
    .rps-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
      animation: rps-shine 2s infinite;
    }
    @keyframes rps-shine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .rps-num {
      font-weight: 600;
      text-shadow: 0 0 8px currentColor;
    }
    .rps-strength {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
    }
    .rps-sector-name {
      font-weight: 500;
    }

    .card-title {

      font-family: 'Noto Sans SC', sans-serif;

      font-size: 0.75rem;

      letter-spacing: 2px;

      color: var(--neon-cyan);

      margin-bottom: 12px;

      text-transform: uppercase;

      display: flex;

      align-items: center;

      gap: 8px;

    }


    .card-title::before { content: '>'; color: var(--neon-pink); }


    /* Sentiment Meter */

    .sentiment-meter {

      grid-column: 1;

      grid-row: 1;

    }


    .slowrise-panel { display: none; }


    .sector-panel {

      grid-column: 2;

      grid-row: 1;

      width: 100%;

      min-width: 0;

    }


    .stock-panel {

      grid-column: 1 / -1;

      grid-row: 2;

    }


    .alert-panel {

      grid-column: 3;

      grid-row: 2;

      overflow: visible !important;

    }

/* US Stock Picks Panel - 鏀惧湪寮傚姩闈㈡澘涓嬫柟 */
    .us-stock-panel {
      grid-column: 1 / -1;
      grid-row: 4;
    }

.source-panel {

      grid-column: 1 / -1;

      grid-row: 5;

    }


    .rps-panel {

      grid-column: 1 / -1;

      grid-row: 6;

      min-width: 0;
      overflow-x: auto;
    }



    .rps-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }
    .rps-table {

      width: 100%;

      min-width: 500px;

      table-layout: auto;

      border-collapse: collapse;

      font-family: 'Noto Sans SC', sans-serif;

      font-size: 0.8rem;

    }


    .rps-table th {

      text-align: left;

      padding: 8px 12px;

      border-bottom: 1px solid rgba(255,45,106,0.3);

      color: var(--neon-cyan);

      font-size: 0.7rem;

      letter-spacing: 1px;

      text-transform: uppercase;

    }


    .rps-table td {

      padding: 6px 12px;

      border-bottom: 1px solid rgba(255,255,255,0.05);

    }


    .rps-table tr:hover {

      background: rgba(255,45,106,0.08);

    }


    .rps-bar {

      height: 6px;

      border-radius: 3px;

      transition: width 0.8s ease;

      min-width: 2px;

    }


    .rps-cell {

      display: flex;

      align-items: center;

      gap: 8px;

    }


    .rps-num {

      font-weight: 700;

      min-width: 32px;

      text-align: right;

    }


    .rps-sector-name {

      font-family: 'Noto Sans SC', sans-serif;

      font-weight: 600;

      font-size: 0.85rem;

    }


    .rps-strength {

      font-size: 0.7rem;

      padding: 2px 6px;

      border-radius: 3px;

      font-weight: 600;

      white-space: nowrap;

    }


    .rps-trend {

      font-size: 0.9rem;

    }

    .rps-trend.up {

      color: var(--neon-red) !important;

    }

    .rps-trend.down {

      color: var(--neon-green) !important;

    }


    .meter-container {

    function processStocks() {
      // Returns a Promise 鈥?caller handles async
      return loadDailyPicks().then(todayData => {
        if (!todayData) { console.error('[VIBE] processStocks: todayData is null, returning []'); return []; }

        const now = new Date();
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentTimeStr = currentHour * 60 + currentMinute; // minutes since midnight

        const result = [];

        // Build task order from TASK_SCHEDULE (scheduled) + any extra tasks in data
        const scheduledNames = TASK_SCHEDULE.map(t => t.name);
        const dataTaskNames = Object.keys(todayData);
        const taskOrder = [...new Set([...scheduledNames, ...dataTaskNames])];

        for (const task of taskOrder) {
          const taskData = todayData[task];
          const picks = taskData && taskData.picks ? taskData.picks : (Array.isArray(taskData) ? taskData : null);
          const taskTime = taskData && taskData.time ? taskData.time : '';
          const taskDate = taskData && taskData._date ? taskData._date : '';

          // Get expected time from schedule
          const schedule = TASK_SCHEDULE.find(s => s.name === task);
          const expectedTime = schedule ? schedule.expectedTime : null;

          // Check if task should have run by now (compare expected time with current time)
          let status = 'ok';
          let delayMinutes = 0;

          if (expectedTime) {
            const [expHour, expMin] = expectedTime.split(':').map(Number);
            const expectedMinutes = expHour * 60 + expMin;
            const timeDiff = currentTimeStr - expectedMinutes;

            if (!picks || picks.length === 0) {
              // No data yet
              if (timeDiff > 30) {
                status = 'delayed'; // More than 30 min late
                delayMinutes = timeDiff;
              } else if (timeDiff > 0) {
                status = 'waiting'; // Still within tolerance
              } else {
                status = 'pending'; // Not yet scheduled
              }
            }
          }

          if (picks && Array.isArray(picks) && picks.length > 0) {
            result.push({ task, time: taskTime, picks: picks.slice(0, 10), status, expectedTime, date: taskDate });
          } else {
            // Show empty task with status
            result.push({ task, time: taskTime, picks: [], status, expectedTime, delayMinutes, date: taskDate });
          }
        }

        return result;
      });
    }

      const up = sectors.filter(s => s.change > 0).length;

      const total = sectors.length;

        overall: Math.round(bullish - bearish + 50)

    function computeSlowRise(sectors, tradingDate) {

      if (!tradingDate) return [];


      const history = loadTrendHistory();

      let todayRanks = {};


      // If we have live sector data, record today's rankings

      if (sectors && sectors.length > 0) {

        sectors.forEach((s, i) => { todayRanks[s.name] = i + 1; });

        history[tradingDate] = todayRanks;

      }


      // Clean up history older than 30 days

      const cutoff = new Date(tradingDate);

      cutoff.setDate(cutoff.getDate() - 30);

      const cutoffStr = localDateStr(cutoff);

      for (const key of Object.keys(history)) {

        if (key < cutoffStr) delete history[key];

      }


      saveTrendHistory(history);


      // Find sectors with consecutive rank improvement

      const sortedDates = Object.keys(history).sort();

      const slowRise = [];


      // Collect all sector names from the most recent date in history

      const latestDate = sortedDates[sortedDates.length - 1];

      const latestRanks = history[latestDate] || {};

      const allNames = Object.keys(todayRanks).length > 0 ? Object.keys(todayRanks) : Object.keys(latestRanks);


      for (const name of allNames) {

        let streak = 0;

        let prevRank = null;

        let consecutive = true;


        // Walk forward through dates (oldest 鈫?newest)

        for (let i = 0; i < sortedDates.length; i++) {

          const d = sortedDates[i];

          const ranks = history[d];

          if (ranks && ranks[name] !== undefined) {

            if (prevRank === null) {

              prevRank = ranks[name];

            } else if (ranks[name] < prevRank) {

              // Rank number decreased = position improved

              streak++;

              prevRank = ranks[name];

            } else {

              consecutive = false;

              break;

            }

          }

        }


        if (consecutive && streak >= 2) {

          const latestRank = latestRanks[name];

          slowRise.push({ name, streak, today_rank: latestRank, days: streak });

        }

      }


      slowRise.sort((a, b) => b.streak - a.streak);

      return slowRise;

    function computeRPS(sectors, tradingDate) {

      if (!sectors || sectors.length === 0) return [];


      const N = sectors.length;

      // Sort by change descending for today's RPS

      const sorted = [...sectors].sort((a, b) => b.change - a.change);

      const rankMap = {};

      sorted.forEach((s, i) => { rankMap[s.name] = i + 1; });


      const todayRPS = {};

      for (const s of sectors) {

        todayRPS[s.name] = Math.round((1 - rankMap[s.name] / N) * 100);

      }


      // Load and update history

      const history = loadRpsHistory();

      history[tradingDate] = todayRPS;


      // Clean up history older than 180 days

      const cutoff = new Date(tradingDate);

      cutoff.setDate(cutoff.getDate() - 180);

      const cutoffStr = localDateStr(cutoff);

      for (const key of Object.keys(history)) {

        if (key < cutoffStr) delete history[key];

      }

      saveRpsHistory(history);


      // Calculate RPS20/RPS60/RPS120 from history

      const sortedDates = Object.keys(history).sort();

      const rpsData = [];


      for (const s of sectors) {

        const rps60Values = [];

        const rps20Values = [];

        const rps120Values = [];


        // Last 120 trading days

        const recent120 = sortedDates.slice(-120);

        const recent60 = sortedDates.slice(-60);

        const recent20 = sortedDates.slice(-20);


        for (const d of recent60) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps60Values.push(history[d][s.name]);

          }

        }

        for (const d of recent20) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps20Values.push(history[d][s.name]);

          }

        }

        for (const d of recent120) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps120Values.push(history[d][s.name]);

          }

        }


        const avg = arr => arr.length > 0 ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : null;


        const rps20 = rps20Values.length >= 5 ? avg(rps20Values) : todayRPS[s.name];

        const rps60 = rps60Values.length >= 10 ? avg(rps60Values) : todayRPS[s.name];

        const rps120 = rps120Values.length >= 20 ? avg(rps120Values) : todayRPS[s.name];


        // Trend: compare recent 3 days vs prior 3 days

        const recent3 = sortedDates.slice(-3);

        const prev3 = sortedDates.slice(-6, -3);

        let trend = '鈫?;

        if (recent3.length >= 2 && prev3.length >= 2) {

          const recentAvg = avg(recent3.map(d => history[d]?.[s.name]).filter(v => v != null));

          const prevAvg = avg(prev3.map(d => history[d]?.[s.name]).filter(v => v != null));

          if (recentAvg != null && prevAvg != null) {

            if (recentAvg - prevAvg > 3) trend = '鈫?;

            else if (recentAvg - prevAvg < -3) trend = '鈫?;

          }

        }


        rpsData.push({

          name: s.name,

          change: s.change,

          rps20, rps60, rps120, trend,

          strength: rpsLabel(rps20)

        });

      }


      // Sort by RPS descending

      rpsData.sort((a, b) => b.rps20 - a.rps20);

      rpsData.forEach((d, i) => { d.rank = i + 1; });

      return rpsData;

    }

        const match = title.match(/([+-]?[\d.]+)%/);

          if (pct > 0) return `<span style="color:var(--neon-red);text-shadow:0 0 4px var(--neon-red);">+${pct.toFixed(2)}%</span>`;

          if (pct < 0) return `<span style="color:var(--neon-green);">${pct.toFixed(2)}%</span>`;

          return `<span style="color:var(--neon-cyan);">${pct.toFixed(2)}%</span>`;

        }

        return null;

        const changeSpan = parseChange(a.title);

        let namePart = a.title.replace(/\[.*?\]\s*/, '').replace(/[+-]?[\d.]+%/, '').trim();

        return `<div class="alert-item alert-${a.type}">

      try {
        loadUSPicks();
      } catch (e) {
        console.warn('[VIBE] loadUSPicks failed:', e);
      }

      // 1. 鍔犺浇鏈嶅姟绔參鐑巻鍙叉暟鎹紙棣栨璁块棶 localStorage 涓虹┖鏃堕渶瑕侊級

      try {

        await loadTrendHistoryFromServer();

      } catch (e) {

        console.warn('[VIBE] loadTrendHistoryFromServer failed:', e);

      }


      // 1. 鑵捐 API 鏁版嵁锛堟澘鍧?+ 姒傚康锛?

      try {

        const sectorCodes = [...new Set(Object.values(SECTOR_REPRESENTATIVES).flat())];

        const conceptCodes = [...new Set(Object.values(CONCEPT_CODES).flat())];

        const [s, c] = await Promise.all([

          fetchTencentData(sectorCodes),

          fetchTencentData(conceptCodes)

        ]);

        sectorRaw = s;

        conceptRaw = c;

      } catch (e) {

        console.error('[VIBE] fetchTencentData failed:', e);

      }


      // 2. 姣忔棩閫夎偂鏁版嵁

      try {

        stocks = await processStocks();

      } catch (e) {

        console.error('[VIBE] processStocks failed:', e);

      }


      // 3. 澶勭悊鏁版嵁锛堝け璐ヤ笉褰卞搷娓叉煋锛?

      let sectors = [], concepts = [], sentiment = null, alerts = [], slowRise = [], rpsData = null;

      let tradingDate = localDateStr();

      try {

        const sectorStockData = sectorRaw ? parseStockData(sectorRaw) : {};

        const conceptStockData = conceptRaw ? parseStockData(conceptRaw) : {};

        sectors = processSectors(sectorStockData);

        concepts = processConcepts(conceptStockData);

        sentiment = calculateSentiment(sectors);

        alerts = generateAlerts(sectors, concepts);

        slowRise = computeSlowRise(sectors, tradingDate);

        rpsData = computeRPS(sectors, tradingDate);
        // === Overlay sector_rankings from daily_picks.json if available ===
        try {
          let srData = null;
          // Try window._dailyPicksData first (set by loadDailyPicks)
          // Priority 1: sector-rankings-embed (works on file:// protocol)
          try {
            const srEmbed = document.getElementById('sector-rankings-embed');
            if (srEmbed) {
              const srParsed = JSON.parse(srEmbed.textContent);
              if (srParsed && Object.keys(srParsed).length > 0 && !srParsed.__placeholder__) {
                srData = srParsed;
                console.log('[VIBE-RPS] Using sector-rankings-embed, dates:', Object.keys(srData).length);
              }
            }
          } catch(esr) { console.warn('[VIBE-RPS] sector-rankings-embed parse failed:', esr.message); }
          // Priority 2: window._dailyPicksData (set by loadDailyPicks)
          if (!srData && window._dailyPicksData && window._dailyPicksData.sector_rankings) {
            srData = window._dailyPicksData.sector_rankings;
          }
          // Priority 3: fetch daily_picks.json directly (fails on file:// due to CORS)
          if (!srData) {
            try {
              const resp = await fetch('daily_picks.json', { cache: 'no-store' });
              if (resp.ok) {
                const dp = await resp.json();
                if (dp.sector_rankings) srData = dp.sector_rankings;
              }
            } catch(ef) { console.warn('[VIBE-RPS] fallback fetch failed:', ef.message); }
          }
          if (srData) {
            const srKeys = Object.keys(srData).sort().reverse();
            const latestSRKey = srKeys[0];
            if (latestSRKey) {
              const srEntries = srData[latestSRKey];
              if (srEntries && srEntries.length > 0) {
                rpsData = srEntries.map(s => ({
                  name: s.name,
                  change: s.change_pct || 0,
                  rank: s.rank,
                  rps20: s.rps || 0,
                  trend: s.trend || '-',
                  strength: s.strength || ''
                }));
                console.log('[VIBE-RPS] Using sector_rankings from', latestSRKey, '- count:', srEntries.length);
                // Store RPS data date for updateRPS()
                window._rpsDataDate = latestSRKey;
                // Update RPS date display with refresh time
                const rpsTimeEl = document.getElementById('rps-update-time');
                if (rpsTimeEl) {
                  const refreshTime = new Date().toLocaleTimeString('zh-CN', {hour12: false});
                  rpsTimeEl.textContent = '鉀?姣忔棩10:00鏇存柊 | ' + latestSRKey + ' ' + refreshTime + ' | v0.0.42';
                }
              }
            }
          }
        } catch(e3) { console.warn('[VIBE-RPS] sector_rankings overlay failed:', e3.message); }

        // Fallback: ensure date is always shown
        const rpsTimeEl2 = document.getElementById('rps-update-time');
        if (rpsTimeEl2 && !rpsTimeEl2.textContent.includes('|')) {
          rpsTimeEl2.textContent = '鉀?姣忔棩10:00鏇存柊 | ' + localDateStr() + ' | v0.0.42';
        }
        console.log('[VIBE-RPS] final rpsData count:', rpsData ? rpsData.length : 'null');


        cachedData = { sectors, stocks, concepts, sentiment, alerts, slowRise, rpsData, tradingDate };

        setStatus(true);

      } catch (e) {

        console.error('[VIBE] processData failed:', e);

      }


      // 4. 鍚?UI 闈㈡澘鐙珛鏇存柊锛堟瘡涓嫭绔?try-catch锛屼竴涓け璐ヤ笉褰卞搷鍏朵粬锛?

      try { if (sentiment !== null) updateSentiment(sentiment); } catch(e) { console.error('[VIBE] updateSentiment:', e); }

      try {
        if (currentTab === 'slowrise') updateSlowRise(slowRise);
        else if (currentTab === 'concept') updateConcepts(concepts);
        else updateSectors(sectors);
      } catch(e) { console.error('[VIBE] updateSectors:', e); }

      try { updateStocks(stocks); } catch(e) { console.error('[VIBE] updateStocks:', e); }

      // concepts already rendered in tab logic above, skip duplicate
      // try { updateConcepts(cachedData?.concepts || concepts); } catch(e) { console.error('[VIBE] updateConcepts:', e); }

      try { updateAlerts(alerts); } catch(e) { console.error('[VIBE] updateAlerts:', e); }

      try { updateSourceBars(cachedData?.sectors || sectors); } catch(e) { console.error('[VIBE] updateSourceBars:', e); }

      try { updateRPS(cachedData?.rpsData || rpsData); } catch(e) { console.error('[VIBE] updateRPS:', e); }


      // 鏇存柊鏃堕棿
      const timeEl = document.getElementById('update-time');
      if (timeEl) timeEl.textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false});



    }


    // Tab switching

    document.querySelectorAll('.tab-btn').forEach(btn => {

      btn.addEventListener('click', () => {

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        btn.classList.add('active');

        currentTab = btn.dataset.type;

        if (cachedData) {
          try {


          if (currentTab === 'slowrise') {

            updateSlowRise(cachedData?.slowRise || []);

          } else if (currentTab === 'concept') {

            updateConcepts(cachedData?.concepts || []);

          } else {

            updateSectors(cachedData?.sectors || []);

          }

                  } catch(e) {
            console.error('[VIBE] tab click:', e);
          }
        } else {
          refreshAll();
        }
      });

    });


    // Initialize

    refreshAll();


    // Auto refresh every 30 seconds

    setInterval(refreshAll, 30000);

  </script>

<script>
// Fear & Greed Index Auto-Update
(function() {
  const FEAR_GREED_API = 'https://api.alternative.me/fng/';
  
  function updateFearGreed(data) {
    const valueEl = document.getElementById('fear-greed-value');
    if (!valueEl) return;
    
    // API returns: {"data":[{"value":"30","value_classification":"Extreme Fear","timestamp":"..."}]}
    try {
      const json = typeof data === 'string' ? JSON.parse(data) : data;
      const fgi = json.data && json.data[0];
      if (fgi) {
        const rawVal = parseInt(fgi.value);
        const val = isNaN(rawVal) ? 30 : rawVal;  // Fix: handle value=0 correctly
        console.log('Fear-Greed API value:', fgi.value, '-> parsed:', rawVal, '-> display:', val);
        valueEl.textContent = val;
        
        // Update needle rotation: 0=extreme fear(far left), 50=neutral(center/up), 100=extreme greed(far right)
        // Map 0-100 to -90 to +90 degrees (180-degree gauge arc)
        const needle = document.getElementById('fear-greed-needle');
        if (needle) {
          const angle = -90 + (val / 100) * 180;  // 0->-90(left), 50->0(center), 100->+90(right)
          console.log('Fear-Greed needle angle:', angle, 'for value:', val);
          needle.setAttribute('transform', `rotate(${angle} 190 165)`);
        } else {
          console.error('Fear-Greed: needle element not found!');
        }
        
        // Update color based on value 鈥?match the 4-color gauge image zones
        // Image layout (left鈫抮ight): 鏋佸害鎭愭儳(缁? 鈫?鎭愭儳(姗? 鈫?璐┆(榛? 鈫?鏋佸害璐┆(绾?
        let color = '#ffaa33';
        if (val <= 25) color = '#33aa44';      // 鏋佸害鎭愭儳 Extreme Fear 鈥?green (left zone)
        else if (val <= 50) color = '#ffcc11';  // 鎭愭儳 Fear 鈥?yellow-orange (mid-left)
        else if (val <= 75) color = '#ff9922';  // 璐┆ Greed 鈥?orange (mid-right)
        else color = '#ee3333';                // 鏋佸害璐┆ Extreme Greed 鈥?red (right zone)
        
        valueEl.style.color = color;
        valueEl.style.textShadow = `0 0 10px ${color}80`;
      }
    } catch(e) {
      console.log('Fear-Greed parse error:', e);
    }
  }
  
  function fetchFearGreed() {
    fetch(FEAR_GREED_API)
      .then(r => r.text())
      .then(updateFearGreed)
      .catch(e => console.log('Fear-Greed fetch error:', e));
  }
  
  // Fetch on load
  fetchFearGreed();
  
  // Refresh every 5 minutes
  setInterval(fetchFearGreed, 5*60*1000);
})();
</script>
