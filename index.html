<!DOCTYPE html>

<!--

  方瑟的openclaw - A股情绪雷达（版本）

  

  部署方式：

  1. GitHub Pages: 创建仓库 → 推送此文件 → 启用 Pages

  2. Vercel: 拖拽此文件到 vercel.com

  3. Netlify: 拖拽此文件到 netlify.com  

  4. Surge: npx surge . --domain vibe-trading.surge.sh

  5. 本地使用: 直接用浏览器打开

<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>方瑟的openclaw A股情绪雷达</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">

  <style>

    :root {

      --neon-pink: #ff2d6a;

      --neon-cyan: #00fff2;

      --neon-purple: #b829ff;

      --neon-green: #39ff14;

      --neon-red: #ff2d2d;

      --neon-orange: #ff6b35;

      --dark-bg: #0a0a0f;

      --card-bg: rgba(15, 15, 25, 0.85);

      --border-glow: rgba(255, 45, 106, 0.3);

    }



    * { margin: 0; padding: 0; box-sizing: border-box; }



    body {

      font-family: 'Noto Sans SC', sans-serif;

      background: var(--dark-bg);

      color: #e0e0e0;

      min-height: 100vh;

      overflow-x: hidden;

      position: relative;

    }



    body::before {

      content: '';

      position: fixed;

      top: 0; left: 0;

      width: 100%; height: 100%;

      background: 

        linear-gradient(90deg, rgba(255,45,106,0.03) 1px, transparent 1px),

        linear-gradient(rgba(0,255,242,0.03) 1px, transparent 1px);

      background-size: 50px 50px;

      animation: gridMove 20s linear infinite;

      pointer-events: none;

      z-index: 0;

    }



    @keyframes gridMove {

      0% { transform: translate(0, 0); }

      100% { transform: translate(50px, 50px); }

    }



    body::after {

      content: '';

      position: fixed;

      top: 0; left: 0;

      width: 100%; height: 4px;

      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);

      animation: scanLine 4s ease-in-out infinite;

      pointer-events: none;

      z-index: 1000;

      opacity: 0.5;

    }



    @keyframes scanLine {

      0%, 100% { top: -10px; opacity: 0; }

      50% { opacity: 0.7; }

      100% { top: 100%; }

    }



    .container {

      position: relative;

      z-index: 1;

      max-width: 1800px;

      margin: 0 auto;

      padding: 20px;

    }



    .header {

      text-align: center;

      margin-bottom: 25px;

      padding: 15px;

    }



    .logo {

      font-family: 'Orbitron', monospace;

      font-size: 2.5rem;

      font-weight: 900;

      letter-spacing: 6px;

      background: linear-gradient(135deg, var(--neon-red), var(--neon-orange), var(--neon-pink));

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

      background-clip: text;

      animation: logoPulse 2s ease-in-out infinite;

    }



    @media (max-width: 768px) {

      .logo { font-size: 1.3rem; letter-spacing: 2px; }

      .tagline { font-size: 0.65rem; letter-spacing: 1px; }

    }



    @keyframes logoPulse {

      0%, 100% { filter: brightness(1); }

      50% { filter: brightness(1.2); }

    }



    .tagline {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.85rem;

      color: var(--neon-cyan);

      letter-spacing: 3px;

      margin-top: 8px;

    }



    .status-bar {

      display: flex;

      justify-content: center;

      gap: 25px;

      margin-top: 15px;

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.7rem;

    }



    .status-item {

      display: flex;

      align-items: center;

      gap: 6px;

    }



    .status-dot {

      width: 8px; height: 8px;

      border-radius: 50%;

      animation: blink 1.5s ease-in-out infinite;

    }



    .status-dot.active { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

    .status-dot.warning { background: var(--neon-orange); box-shadow: 0 0 10px var(--neon-orange); }

    .status-dot.error { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }



    @keyframes blink {

      0%, 100% { opacity: 1; }

      50% { opacity: 0.4; }

    }



    .dashboard-grid {

      display: grid;

      grid-template-columns: 280px 1fr 320px;

      grid-template-rows: auto auto auto auto;

      gap: 18px;

    }



    .card {

      background: var(--card-bg);

      border: 1px solid var(--border-glow);

      border-radius: 10px;

      padding: 18px;

      position: relative;

      overflow: hidden;

      backdrop-filter: blur(10px);

      transition: all 0.3s ease;

    }



    .card::before {

      content: '';

      position: absolute;

      top: 0; left: 0; right: 0;

      height: 2px;

      background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);

    }



    .card:hover {

      border-color: var(--neon-pink);

      box-shadow: 0 0 25px rgba(255, 45, 106, 0.15);

    }



    .card-title {

      font-family: 'Orbitron', monospace;

      font-size: 0.75rem;

      letter-spacing: 2px;

      color: var(--neon-cyan);

      margin-bottom: 12px;

      text-transform: uppercase;

      display: flex;

      align-items: center;

      gap: 8px;

    }



    .card-title::before { content: '>'; color: var(--neon-pink); }



    /* Sentiment Meter */

    .sentiment-meter {

      grid-column: 1;

      grid-row: 1;

    }



    .slowrise-panel { display: none; }



    .sector-panel {

      grid-column: 2;

      grid-row: 1;

    }



    .stock-panel {

      grid-column: 1 / -1;

      grid-row: 2;

    }



    .alert-panel {

      grid-column: 3;

      grid-row: 1;

    }

.source-panel {

      grid-column: 1 / -1;

      grid-row: 3;

    }



    .rps-panel {

      grid-column: 1 / -1;

      grid-row: 4;

    }



    .rps-table {

      width: 100%;

      border-collapse: collapse;

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.8rem;

    }



    .rps-table th {

      text-align: left;

      padding: 8px 12px;

      border-bottom: 1px solid rgba(255,45,106,0.3);

      color: var(--neon-cyan);

      font-size: 0.7rem;

      letter-spacing: 1px;

      text-transform: uppercase;

    }



    .rps-table td {

      padding: 6px 12px;

      border-bottom: 1px solid rgba(255,255,255,0.05);

    }



    .rps-table tr:hover {

      background: rgba(255,45,106,0.08);

    }



    .rps-bar {

      height: 6px;

      border-radius: 3px;

      transition: width 0.8s ease;

      min-width: 2px;

    }



    .rps-cell {

      display: flex;

      align-items: center;

      gap: 8px;

    }



    .rps-num {

      font-weight: 700;

      min-width: 32px;

      text-align: right;

    }



    .rps-sector-name {

      font-family: 'Noto Sans SC', sans-serif;

      font-weight: 600;

      font-size: 0.85rem;

    }



    .rps-strength {

      font-size: 0.7rem;

      padding: 2px 6px;

      border-radius: 3px;

      font-weight: 600;

      white-space: nowrap;

    }



    .rps-trend {

      font-size: 0.9rem;

    }



    .meter-container {

      height: 200px;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

    }



    .gauge { width: 160px; height: 160px; position: relative; }



    .gauge-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; }



    .gauge-fill {

      fill: none;

      stroke-width: 12;

      stroke-linecap: round;

      transition: stroke-dashoffset 1s ease;

      filter: drop-shadow(0 0 8px currentColor);

    }



    .gauge-text {

      position: absolute;

      top: 50%; left: 50%;

      transform: translate(-50%, -50%);

      text-align: center;

    }



    .gauge-score {

      font-family: 'Orbitron', monospace;

      font-size: 2.5rem;

      font-weight: 900;

      color: #fff;

    }



    .gauge-label {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.6rem;

      color: var(--neon-cyan);

      letter-spacing: 1px;

    }



    .sentiment-breakdown { margin-top: 15px; width: 100%; }



    .breakdown-item {

      display: flex;

      justify-content: space-between;

      align-items: center;

      padding: 6px 0;

      border-bottom: 1px solid rgba(255,255,255,0.05);

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.75rem;

    }



    .breakdown-bar {

      flex: 1;

      height: 4px;

      background: rgba(255,255,255,0.1);

      margin: 0 12px;

      border-radius: 2px;

      overflow: hidden;

    }



    .breakdown-fill {

      height: 100%;

      border-radius: 2px;

      transition: width 0.8s ease;

    }



    /* Sector Panel - grid position defined above */



    .sector-tabs {

      display: flex;

      gap: 10px;

      margin-bottom: 12px;

    }



    .tab-btn {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.7rem;

      padding: 6px 12px;

      border: 1px solid var(--border-glow);

      background: transparent;

      color: var(--neon-cyan);

      border-radius: 4px;

      cursor: pointer;

      transition: all 0.3s ease;

    }



    .tab-btn:hover, .tab-btn.active {

      background: var(--neon-pink);

      border-color: var(--neon-pink);

      color: #fff;

    }



    .tab-btn[data-type="slowrise"] {

      border-color: rgba(57, 255, 20, 0.5);

      color: var(--neon-green);

    }



    .tab-btn[data-type="slowrise"]:hover,

    .tab-btn[data-type="slowrise"].active {

      background: var(--neon-green);

      color: #000;

      border-color: var(--neon-green);

    }



    .tab-btn[data-type="concept"] {

      border-color: rgba(184, 41, 255, 0.5);

      color: var(--neon-purple);

    }



    .tab-btn[data-type="concept"]:hover,

    .tab-btn[data-type="concept"].active {

      background: var(--neon-purple);

      color: #fff;

      border-color: var(--neon-purple);

    }



    .sector-grid {

      display: grid;

      grid-template-columns: repeat(5, 1fr);

      gap: 10px;

    }



    .sector-item {

      background: rgba(255,255,255,0.02);

      border-radius: 6px;

      padding: 10px 8px;

      text-align: center;

      transition: all 0.3s ease;

      cursor: pointer;

      border-left: 2px solid transparent;

    }



    .sector-item:hover {

      background: rgba(255,45,106,0.1);

      transform: translateY(-2px);

    }



    .sector-item.up { border-left-color: var(--neon-red); }

    .sector-item.down { border-left-color: var(--neon-green); }



    .sector-name {

      font-size: 0.8rem;

      font-weight: 500;

      margin-bottom: 4px;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;

    }



    .sector-change {

      font-family: 'Orbitron', monospace;

      font-size: 0.9rem;

      font-weight: 700;

    }



    .up { color: var(--neon-red); }

    .down { color: var(--neon-green); }



    /* Stock Panel */

    .stock-list {

      display: grid;

      grid-template-columns: repeat(3, 1fr);

      gap: 8px;

      max-height: 300px;

      overflow-y: auto;

    }



    .stock-item {

      display: flex;

      align-items: center;

      gap: 10px;

      padding: 10px 12px;

      background: rgba(255,255,255,0.02);

      border-radius: 6px;

      transition: all 0.3s ease;

      cursor: pointer;

    }



    .stock-item:hover { background: rgba(255,45,106,0.1); }



    .stock-rank {

      font-family: 'Orbitron', monospace;

      font-size: 0.9rem;

      font-weight: 700;

      color: var(--neon-purple);

      min-width: 22px;

    }



    .stock-info { flex: 1; }



    .stock-name { font-size: 0.85rem; font-weight: 500; }



    .stock-code {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.65rem;

      color: rgba(255,255,255,0.4);

    }



    .stock-price {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.75rem;

      color: rgba(255,255,255,0.6);

    }



    .stock-change {

      font-family: 'Orbitron', monospace;

      font-size: 0.9rem;

      font-weight: 700;

    }



    /* Alert Panel */

    .alert-panel {

      grid-column: 3;

      grid-row: 1;

    }



    .alert-list {

      display: flex;

      flex-direction: column;

      gap: 8px;

    }



    .alert-item {

      display: flex;

      align-items: flex-start;

      gap: 10px;

      padding: 10px;

      border-radius: 6px;

      font-size: 0.8rem;

      animation: alertFadeIn 0.5s ease;

    }



    @keyframes alertFadeIn {

      from { opacity: 0; transform: translateX(-10px); }

      to { opacity: 1; transform: translateX(0); }

    }



    .alert-hot { background: rgba(255,45,45,0.15); border-left: 3px solid var(--neon-red); }

    .alert-warning { background: rgba(255,107,53,0.15); border-left: 3px solid var(--neon-orange); }

    .alert-info { background: rgba(0,255,242,0.1); border-left: 3px solid var(--neon-cyan); }



    .alert-time {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.6rem;

      color: rgba(255,255,255,0.4);

      margin-top: 2px;

    }



    /* Concept Panel *//* Slow Rise */

    .slowrise-empty {

      text-align: center;

      padding: 20px;

      color: rgba(255,255,255,0.3);

      font-size: 0.8rem;

    }



    /* Source Monitor */

    .source-bar {

      display: flex;

      align-items: center;

      gap: 15px;

      padding: 12px 0;

      border-bottom: 1px solid rgba(255,255,255,0.05);

    }



    .source-bar:last-child { border-bottom: none; }



    .source-label {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.75rem;

      color: rgba(255,255,255,0.6);

      min-width: 100px;

    }



    .source-progress {

      flex: 1;

      height: 8px;

      background: rgba(255,255,255,0.1);

      border-radius: 4px;

      overflow: hidden;

    }



    .source-fill {

      height: 100%;

      border-radius: 4px;

      transition: width 0.8s ease;

    }



    .source-value {

      font-family: 'Orbitron', monospace;

      font-size: 0.85rem;

      font-weight: 700;

      min-width: 60px;

      text-align: right;

    }



    .loading {

      display: flex;

      align-items: center;

      justify-content: center;

      height: 100px;

      color: var(--neon-cyan);

      font-family: 'JetBrains Mono', monospace;

    }



    .error-msg {

      color: var(--neon-red);

      text-align: center;

      padding: 20px;

    }



    /* Responsive */

    @media (max-width: 1400px) {

      .dashboard-grid { grid-template-columns: 260px 1fr 280px; }

      .sector-grid { grid-template-columns: repeat(4, 1fr); }

      .stock-list { grid-template-columns: repeat(2, 1fr); }

    }



    @media (max-width: 1100px) {

      .dashboard-grid { grid-template-columns: 1fr 1fr; }

      .sentiment-meter { grid-column: 1; grid-row: 1; }

      .sector-panel { grid-column: 2; grid-row: 1; }

      .stock-panel { grid-column: 1 / -1; grid-row: 2; }

      .alert-panel { grid-column: 2; }

      .source-panel { grid-column: 1 / -1; grid-row: 4; }

      .rps-panel { grid-column: 1 / -1; grid-row: 5; }

      .sector-grid { grid-template-columns: repeat(3, 1fr); }

    }



    @media (max-width: 768px) {

      /* Enable horizontal scroll on small screens */

      html, body {

        overflow-x: auto;

        min-width: 100vw;

      }

      .dashboard-grid {

        display: flex;

        flex-direction: column;

        min-width: 100vw;

        width: max-content;

        padding-right: 20px;

      }

      .sentiment-meter, .sector-panel, .stock-panel, .alert-panel, .source-panel, .rps-panel {

        min-width: 90vw;

        width: 90vw;

        flex-shrink: 0;

      }

      .sector-grid { grid-template-columns: repeat(2, 1fr); }

      .stock-list { grid-template-columns: 1fr; }

      

      /* Mobile optimization */

      body { font-size: 14px; padding: 8px; }

      .card { padding: 12px; margin: 8px 0; border-radius: 8px; }

      .card-title { font-size: 16px; margin-bottom: 8px; }

      .sector-item { padding: 8px 10px; font-size: 13px; }

      .sector-name { font-size: 13px; }

      .sector-change { font-size: 12px; }

      .tab-btn { padding: 6px 12px; font-size: 13px; }

      .stock-item { padding: 10px; font-size: 13px; }

      .stock-rank { width: 24px; height: 24px; font-size: 11px; }

      .stock-name { font-size: 13px; }

      .stock-code { font-size: 11px; }

      .stock-change { font-size: 13px; }

      .stock-price { font-size: 12px; }

      .alert-item { padding: 10px; font-size: 13px; }

      .loading, .error-msg { padding: 20px; font-size: 13px; }

      .toolbar { padding: 8px; }

      .toolbar-btn { padding: 8px 12px; font-size: 13px; }

      #status-text { font-size: 11px; }

      .picks-section { margin: 8px 0; padding: 8px; background: rgba(255,255,255,0.04); border-radius: 6px; }

      .picks-header { font-size: 13px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 6px; }

      .picks-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }

      .picks-code { flex: 1; font-size: 12px; }

      .picks-price { margin: 0 8px; font-size: 12px; }

      .picks-change { margin-left: 8px; font-size: 12px; min-width: 60px; text-align: right; }

      .picks-level { margin-left: 6px; font-size: 10px; padding: 1px 5px; }

      .picks-count { font-size: 11px; margin-left: 6px; opacity: 0.7; }

      .picks-time { font-size: 11px; margin-left: 8px; color: var(--neon-cyan); opacity: 0.8; }

      .rps-table { font-size: 11px; display: block; overflow-x: auto; white-space: nowrap; }

      .rps-table th, .rps-table td { padding: 5px 8px; white-space: nowrap; }

      .rps-cell { flex-direction: column; gap: 2px; }

      .rps-cell .rps-num { font-size: 12px; }

    }



    @media (max-width: 480px) {

      .sector-grid { grid-template-columns: 1fr 1fr; gap: 6px; }

      .stock-list { gap: 6px; }

      .sector-tabs { gap: 4px; }

      .tab-btn { padding: 5px 10px; font-size: 12px; }

    }



    /* Bottom toolbar */

    .toolbar {

      position: fixed;

      bottom: 0;

      left: 0;

      right: 0;

      background: rgba(10,10,15,0.95);

      border-top: 1px solid var(--border-glow);

      padding: 10px 20px;

      display: flex;

      align-items: center;

      justify-content: space-between;

      z-index: 999;

      backdrop-filter: blur(10px);

    }



    .toolbar-left {

      display: flex;

      align-items: center;

      gap: 15px;

    }



    .toolbar-info {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.7rem;

      color: var(--neon-cyan);

      display: flex;

      align-items: center;

      gap: 8px;

    }



    .toolbar-badge {

      background: rgba(0,255,242,0.1);

      border: 1px solid rgba(0,255,242,0.3);

      border-radius: 4px;

      padding: 3px 8px;

      color: var(--neon-cyan);

    }



    .refresh-btn {

      font-family: 'JetBrains Mono', monospace;

      font-size: 0.7rem;

      padding: 7px 16px;

      border: 1px solid var(--neon-orange);

      background: transparent;

      color: var(--neon-orange);

      border-radius: 4px;

      cursor: pointer;

      transition: all 0.3s ease;

    }



    .refresh-btn:hover {

      background: var(--neon-orange);

      color: #000;

    }



    .refresh-btn.running {

      border-color: var(--neon-green);

      color: var(--neon-green);

    }



    .refresh-btn.running::before {

      content: '';

      display: inline-block;

      width: 6px; height: 6px;

      border-radius: 50%;

      background: var(--neon-green);

      box-shadow: 0 0 6px var(--neon-green);

      margin-right: 6px;

      vertical-align: middle;

    }



    /* 访问计数器样式 */

    .visit-counter {

      text-align: center;

      padding: 20px;

      margin-top: 30px;

      color: var(--text-secondary);

      font-size: 0.85rem;

      opacity: 0.7;

    }



    .visit-counter .counter-value {

      display: inline-block;

      background: rgba(0, 255, 136, 0.1);

      color: var(--neon-green);

      padding: 4px 12px;

      border-radius: 12px;

      margin-left: 8px;

      font-weight: 600;

      font-family: 'JetBrains Mono', monospace;

    }



    .visit-counter .counter-note {

      font-size: 12px;

      color: rgba(255, 255, 255, 0.6);

      margin-left: 12px;

    }

  </style>

    //  script 标签不受 CORS 限制，浏览器直连

    // ============================================================

    let _fetchCounter = 0;



    function fetchTencentData(codes) {

      return new Promise((resolve, reject) => {

        const batchId = 'tcb_' + (++_fetchCounter) + '_' + Date.now();

        const script = document.createElement('script');

        script.charset = 'gbk';

        script.id = batchId;

        script.src = 'https://qt.gtimg.cn/q=' + codes.join(',');



        const timeout = setTimeout(() => {

          cleanup();

          reject(new Error('Timeout'));

        }, 10000);



        function cleanup() {

          clearTimeout(timeout);

          if (script.parentNode) script.parentNode.removeChild(script);

        }



        script.onload = () => {

          const results = {};

          codes.forEach(code => {

            const varName = 'v_' + code;

            if (window[varName] !== undefined && window[varName] !== '') {

              results[code] = window[varName];

            }

            // Clean up global variable

            delete window[varName];

          });

          cleanup();

          resolve(results);

        };



        script.onerror = () => {

          cleanup();

          reject(new Error('Network error'));

        };



        document.head.appendChild(script);

      });

    }



    // ============================================================

    //  格式: "1~名称~代码~现价~昨收~...~成交量~...~日期~...~最高~最低"

    // ============================================================

    function parseStockData(rawData) {

      const result = {};

      for (const [code, dataStr] of Object.entries(rawData)) {

        const parts = dataStr.split('~');

        if (parts.length >= 35) {

          try {

            const name = (parts[1] || '').trim();

            const stockCode = (parts[2] || '').trim();

            const price = parseFloat(parts[3]) || 0;

            const yesterday = parseFloat(parts[4]) || price;

            const volume = parseInt(parts[6]) || 0;

            const change = yesterday > 0 ? Math.round((price - yesterday) / yesterday * 10000) / 100 : 0;

            const high = parseFloat(parts[33]) || price;

            const low = parseFloat(parts[34]) || price;

            const tradeDate = parts[30] || '';



            if (name && price > 0) {

              result[code] = {

                name, code: stockCode, price, yesterday, change, volume, high, low,

                date: tradeDate.substring(0, 8)

              };

            }

          } catch (e) { /* skip malformed entries */ }

        }

      }

      return result;

    }

      }

      sectors.sort((a, b) => Math.abs(b.change) - Math.abs(a.change));

      return sectors;

    //  loadDailyPicks — 加载 daily_picks.json 后用腾讯API刷新实时价格

    // ============================================================

    async function loadDailyPicks() {

      try {

        const today = new Date().toISOString().split('T')[0];

        // Try fetch first (works on http/https), then fall back to embedded data (for file:///)

        let data = null;

        try {

          const resp = await fetch('daily_picks.json');

          if (resp.ok) data = await resp.json();

        } catch(e) {

          // fetch blocked by CORS on file:/// — try embedded data

          const embedEl = document.getElementById('daily-picks-embed');

          if (embedEl) {

            try { data = JSON.parse(embedEl.textContent); } catch(e2) {}

          }

        }

        if (!data) return null;

        const todayData = data[today] || null;

        if (!todayData) return null;



        // Collect all stock codes from all strategies

        const allCodes = new Set();

        const taskOrder = [

          '高欣资金净流入', '高欣季度环比增长', '杰克船长',

          '高欣唯科科技形态', '陈小群战法', '大力水手下午'

        ];

        for (const task of taskOrder) {

          const picks = todayData[task];

          if (picks && picks.picks) {

            for (const p of picks.picks) {

              if (p.code) {

                const prefix = p.code.startsWith('6') ? 'sh' : 'sz';

                allCodes.add(prefix + p.code);

              }

            }

          }

        }



        // Fetch real-time prices from Tencent API

        if (allCodes.size > 0) {

          try {

            const codeList = [...allCodes];

            console.log('[VIBE] Fetching real-time prices for', codeList.length, 'stocks');

            const raw = await fetchTencentData(codeList);

            const parsed = parseStockData(raw);



            // Build a lookup: '600398' -> {price, change, ...}

            const priceLookup = {};

            for (const [tencentCode, info] of Object.entries(parsed)) {

              priceLookup[info.code] = info;  // info.code is the 6-digit code

            }



            // Overwrite price/change in todayData with real-time data

            for (const task of taskOrder) {

              const picks = todayData[task];

              if (picks && picks.picks) {

                for (const p of picks.picks) {

                  const rt = priceLookup[p.code];

                  if (rt) {

                    p.price = rt.price;

                    p.change = rt.change;

                    p._realtime = true;

                  }

                }

              }

            }

            console.log('[VIBE] Real-time prices updated for', Object.keys(priceLookup).length, 'stocks');

          } catch (e) {

            console.warn('[VIBE] Real-time price fetch failed, using daily_picks data:', e);

          }

        }



        return todayData;

      } catch (e) {

        console.warn('[VIBE] loadDailyPicks failed:', e);

        return null;

      }

    }

    function calculateSentiment(sectors) {

      if (!sectors || sectors.length === 0) {

        return { bullish: 50, neutral: 30, bearish: 20, overall: 50 };

      }

      const up = sectors.filter(s => s.change > 0).length;

      const total = sectors.length;

      const ratio = up / total;



      const bullish = Math.min(70, Math.max(20, ratio * 100));

      const bearish = Math.min(50, Math.max(10, (1 - ratio) * 100));

      const neutral = 100 - bullish - bearish;



      return {

        bullish: Math.round(bullish * 10) / 10,

        neutral: Math.round(neutral * 10) / 10,

        bearish: Math.round(bearish * 10) / 10,

        overall: Math.round(bullish - bearish + 50)

      };

    }

    // ============================================================

    //  SLOW RISE — 连续排名递进板块（慢热板块）

    //  使用 localStorage 存储历史排名

    // ============================================================

    const SLOWRISE_KEY = 'vibe_trend_history';



    function loadTrendHistory() {

      try {

        const data = localStorage.getItem(SLOWRISE_KEY);

        return data ? JSON.parse(data) : {};

      } catch { return {}; }

    }



    // Load pre-seeded history from server-side JSON (localStorage is empty for first-time visitors)

    async function loadTrendHistoryFromServer() {

      try {

        const resp = await fetch('vibe_trend_history.json');

        if (!resp.ok) return;

        const serverData = await resp.json();

        const existing = loadTrendHistory();

        // Merge: server data as base, localStorage overwrites (more recent)

        const merged = { ...serverData, ...existing };

        saveTrendHistory(merged);

        console.log('[SlowRise] Loaded', Object.keys(serverData).length, 'days of history from server');

      } catch (e) {

        console.warn('[SlowRise] Failed to load server history:', e);

      }

    }



    function saveTrendHistory(history) {

      try {

        localStorage.setItem(SLOWRISE_KEY, JSON.stringify(history));

      } catch (e) { console.warn('localStorage save failed:', e); }

    }



    function computeSlowRise(sectors, tradingDate) {

      if (!tradingDate) return [];



      const history = loadTrendHistory();

      let todayRanks = {};



      // If we have live sector data, record today's rankings

      if (sectors && sectors.length > 0) {

        sectors.forEach((s, i) => { todayRanks[s.name] = i + 1; });

        history[tradingDate] = todayRanks;

      }



      // Clean up history older than 30 days

      const cutoff = new Date(tradingDate);

      cutoff.setDate(cutoff.getDate() - 30);

      const cutoffStr = cutoff.toISOString().split('T')[0];

      for (const key of Object.keys(history)) {

        if (key < cutoffStr) delete history[key];

      }



      saveTrendHistory(history);



      // Find sectors with consecutive rank improvement

      const sortedDates = Object.keys(history).sort();

      const slowRise = [];



      // Collect all sector names from the most recent date in history

      const latestDate = sortedDates[sortedDates.length - 1];

      const latestRanks = history[latestDate] || {};

      const allNames = Object.keys(todayRanks).length > 0 ? Object.keys(todayRanks) : Object.keys(latestRanks);



      for (const name of allNames) {

        let streak = 0;

        let prevRank = null;

        let consecutive = true;



        // Walk forward through dates (oldest → newest)

        for (let i = 0; i < sortedDates.length; i++) {

          const d = sortedDates[i];

          const ranks = history[d];

          if (ranks && ranks[name] !== undefined) {

            if (prevRank === null) {

              prevRank = ranks[name];

            } else if (ranks[name] < prevRank) {

              // Rank number decreased = position improved

              streak++;

              prevRank = ranks[name];

            } else {

              consecutive = false;

              break;

            }

          }

        }



        if (consecutive && streak >= 2) {

          const latestRank = latestRanks[name];

          slowRise.push({ name, streak, today_rank: latestRank, days: streak });

        }

      }



      slowRise.sort((a, b) => b.streak - a.streak);

      return slowRise;

    }



    // ============================================================

    //  RPS — 相对强弱排名 (Relative Price Strength)

    //  RPS = (1 - 排名/N) × 100，基于板块当日涨跌幅排名

    //  同时追踪 RPS20/RPS60/RPS120 历史（localStorage）

    // ============================================================

    const RPS_HISTORY_KEY = 'vibe_rps_history';



    function loadRpsHistory() {

      try {

        const data = localStorage.getItem(RPS_HISTORY_KEY);

        return data ? JSON.parse(data) : {};

      } catch { return {}; }

    }



    function saveRpsHistory(history) {

      try {

        localStorage.setItem(RPS_HISTORY_KEY, JSON.stringify(history));

      } catch (e) { console.warn('RPS history save failed:', e); }

    }



    function computeRPS(sectors, tradingDate) {

      if (!sectors || sectors.length === 0) return [];



      const N = sectors.length;

      // Sort by change descending for today's RPS

      const sorted = [...sectors].sort((a, b) => b.change - a.change);

      const rankMap = {};

      sorted.forEach((s, i) => { rankMap[s.name] = i + 1; });



      const todayRPS = {};

      for (const s of sectors) {

        todayRPS[s.name] = Math.round((1 - rankMap[s.name] / N) * 100);

      }



      // Load and update history

      const history = loadRpsHistory();

      history[tradingDate] = todayRPS;



      // Clean up history older than 180 days

      const cutoff = new Date(tradingDate);

      cutoff.setDate(cutoff.getDate() - 180);

      const cutoffStr = cutoff.toISOString().split('T')[0];

      for (const key of Object.keys(history)) {

        if (key < cutoffStr) delete history[key];

      }

      saveRpsHistory(history);



      // Calculate RPS20/RPS60/RPS120 from history

      const sortedDates = Object.keys(history).sort();

      const rpsData = [];



      for (const s of sectors) {

        const rps60Values = [];

        const rps20Values = [];

        const rps120Values = [];



        // Last 120 trading days

        const recent120 = sortedDates.slice(-120);

        const recent60 = sortedDates.slice(-60);

        const recent20 = sortedDates.slice(-20);



        for (const d of recent60) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps60Values.push(history[d][s.name]);

          }

        }

        for (const d of recent20) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps20Values.push(history[d][s.name]);

          }

        }

        for (const d of recent120) {

          if (history[d] && history[d][s.name] !== undefined) {

            rps120Values.push(history[d][s.name]);

          }

        }



        const avg = arr => arr.length > 0 ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : null;



        const rps20 = rps20Values.length >= 5 ? avg(rps20Values) : todayRPS[s.name];

        const rps60 = rps60Values.length >= 10 ? avg(rps60Values) : todayRPS[s.name];

        const rps120 = rps120Values.length >= 20 ? avg(rps120Values) : todayRPS[s.name];



        // Trend: compare recent 3 days vs prior 3 days

        const recent3 = sortedDates.slice(-3);

        const prev3 = sortedDates.slice(-6, -3);

        let trend = '→';

        if (recent3.length >= 2 && prev3.length >= 2) {

          const recentAvg = avg(recent3.map(d => history[d]?.[s.name]).filter(v => v != null));

          const prevAvg = avg(prev3.map(d => history[d]?.[s.name]).filter(v => v != null));

          if (recentAvg != null && prevAvg != null) {

            if (recentAvg - prevAvg > 3) trend = '↑';

            else if (recentAvg - prevAvg < -3) trend = '↓';

          }

        }



        rpsData.push({

          name: s.name,

          change: s.change,

          rps20, rps60, rps120, trend,

          strength: rpsLabel(rps60)

        });

      }



      // Sort by RPS60 descending

      rpsData.sort((a, b) => b.rps60 - a.rps60);

      rpsData.forEach((d, i) => { d.rank = i + 1; });

      return rpsData;

    }



    function rpsLabel(v) {

      if (v >= 90) return '极强';

      if (v >= 80) return '强势';

      if (v >= 70) return '偏强';

      if (v >= 50) return '中等';

      if (v >= 40) return '偏弱';

      return '弱势';

    }



    function rpsColor(v) {

      if (v >= 90) return '#ff2d2d';

      if (v >= 80) return '#ff6b35';

      if (v >= 70) return '#ffb333';

      if (v >= 50) return '#39ff14';

      if (v >= 40) return '#22bbaa';

      return '#4488cc';

    }



    function rpsBgColor(v) {

      if (v >= 90) return 'rgba(255,45,45,0.15)';

      if (v >= 80) return 'rgba(255,107,53,0.12)';

      if (v >= 70) return 'rgba(255,179,51,0.1)';

      if (v >= 50) return 'rgba(57,255,20,0.08)';

      if (v >= 40) return 'rgba(34,187,170,0.06)';

      return 'rgba(68,136,204,0.05)';

    }



    function rpsStrengthBg(v) {

      if (v >= 90) return 'rgba(255,45,45,0.3)';

      if (v >= 80) return 'rgba(255,107,53,0.25)';

      if (v >= 70) return 'rgba(255,179,51,0.2)';

      if (v >= 50) return 'rgba(57,255,20,0.15)';

      if (v >= 40) return 'rgba(34,187,170,0.12)';

      return 'rgba(68,136,204,0.1)';

    }



    function updateRPS(rpsData) {

      const container = document.getElementById('rps-content');

      if (!rpsData || rpsData.length === 0) {

        container.innerHTML = '<div class="error-msg">暂无数据</div>';

        return;

      }



      const trendIcon = { '↑': '🔺', '↓': '🔻', '→': '➡️' };

      const strongCount = rpsData.filter(d => d.rps60 >= 80).length;

      const weakCount = rpsData.filter(d => d.rps60 < 40).length;



      let html = `<div style="margin-bottom:12px;color:rgba(255,255,255,0.6);font-size:0.8rem;">

        <span style="color:var(--neon-red);font-weight:700;">强势 ${strongCount}</span> 个 &nbsp;|&nbsp; 

        <span style="color:var(--neon-green);font-weight:700;">弱势 ${weakCount}</span> 个 &nbsp;|&nbsp; 

        RPS = (1 - 排名/N) × 100

      </div>`;



      html += `<table class="rps-table">

        <thead><tr>

          <th>排名</th><th>行业板块</th><th>涨跌</th>

          <th>RPS20</th><th>RPS60</th><th>RPS120</th>

          <th>趋势</th><th>强度</th>

        </tr></thead><tbody>`;



      for (const d of rpsData) {

        const color = rpsColor(d.rps60);

        const barW = d.rps60 + '%';

        html += `<tr style="background:${rpsBgColor(d.rps60)};">

          <td style="color:${color};font-weight:700;">${d.rank}</td>

          <td><span class="rps-sector-name" style="color:${color};">${d.name}</span></td>

          <td style="color:${d.change >= 0 ? 'var(--neon-red)' : 'var(--neon-green)'};">${d.change >= 0 ? '+' : ''}${d.change.toFixed(2)}%</td>

          <td>

            <div class="rps-cell">

              <span class="rps-num" style="color:${rpsColor(d.rps20)};">${d.rps20}</span>

              <div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">

                <div class="rps-bar" style="width:${d.rps20}%;background:${rpsColor(d.rps20)};"></div>

              </div>

            </div>

          </td>

          <td>

            <div class="rps-cell">

              <span class="rps-num" style="color:${color};">${d.rps60}</span>

              <div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">

                <div class="rps-bar" style="width:${barW};background:${color};"></div>

              </div>

            </div>

          </td>

          <td>

            <div class="rps-cell">

              <span class="rps-num" style="color:${rpsColor(d.rps120)};">${d.rps120}</span>

              <div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">

                <div class="rps-bar" style="width:${d.rps120}%;background:${rpsColor(d.rps120)};"></div>

              </div>

            </div>

          </td>

          <td class="rps-trend">${trendIcon[d.trend] || d.trend}</td>

          <td><span class="rps-strength" style="color:${color};background:${rpsStrengthBg(d.rps60)};">${d.strength}</span></td>

        </tr>`;

      }



      html += '</tbody></table>';

      container.innerHTML = html;

    }



    // ============================================================

    //  UI UPDATE FUNCTIONS

    // ============================================================

    let currentTab = 'industry';

    let cachedData = null;



    function setStatus(connected) {

      // No visible status indicator — just log

      console.log('[VIBE] Status:', connected ? 'connected' : 'disconnected');

    }



    function updateSentiment(data) {

      if (!data) return;

      const circumference = 2 * Math.PI * 85;

      const offset = circumference - (data.overall / 100) * circumference;

      document.getElementById('gauge-arc').style.strokeDashoffset = offset;

      document.getElementById('sentiment-value').textContent = data.overall;

      document.getElementById('bullish-bar').style.width = data.bullish + '%';

      document.getElementById('neutral-bar').style.width = data.neutral + '%';

      document.getElementById('bearish-bar').style.width = data.bearish + '%';

      document.getElementById('bullish-pct').textContent = data.bullish.toFixed(0) + '%';

      document.getElementById('neutral-pct').textContent = data.neutral.toFixed(0) + '%';

      document.getElementById('bearish-pct').textContent = data.bearish.toFixed(0) + '%';

    }



    function updateSlowRise() {

      const grid = document.getElementById('sector-grid');



      // Use SLOWRISE_SEED directly as the only data source (ignore localStorage)

      const history = typeof SLOWRISE_SEED !== 'undefined' ? SLOWRISE_SEED : {};



      const dates = Object.keys(history).sort();

      if (dates.length < 2) {

        grid.innerHTML = '<div class="slowrise-empty">历史数据不足（需至少2天）</div>';

        return;

      }



      // Only look at the last 3-4 days to avoid interference from old localStorage data

      const recentDates = dates.slice(-4);

      

      // Collect all sector names from recent dates

      const allNames = new Set();

      for (const d of recentDates) {

        for (const name of Object.keys(history[d])) allNames.add(name);

      }



      // Compute consecutive rank improvement streak

      const results = [];

      for (const name of allNames) {

        let streak = 0;

        let consecutive = true;

        let prevRank = null;



        for (let i = 0; i < recentDates.length; i++) {

          const ranks = history[recentDates[i]];

          if (ranks && ranks[name] !== undefined) {

            if (prevRank === null) {

              prevRank = ranks[name];

            } else if (ranks[name] < prevRank) {

              // Rank number decreased = position improved (e.g. 14→8→4)

              streak++;

              prevRank = ranks[name];

            } else {

              consecutive = false;

              break;

            }

          } else {

            consecutive = false;

            break;

          }

        }



        if (consecutive && streak >= 2) {

          const latestRank = history[recentDates[recentDates.length - 1]][name];

          results.push({ name, streak, today_rank: latestRank, days: streak });

        }

      }



      results.sort((a, b) => b.streak - a.streak);



      if (results.length === 0) {

        grid.innerHTML = '<div class="slowrise-empty">近3天无连续递进板块</div>';

      } else {

        grid.innerHTML = results.slice(0, 15).map(s => {

          let color, glow;

          if (s.days >= 5) { color = '#00e5ff'; glow = 'text-shadow:0 0 8px #00e5ff,0 0 16px #00e5ff;'; }

          else if (s.days >= 4) { color = '#39ff14'; glow = 'text-shadow:0 0 6px #39ff14;'; }

          else { color = '#ffd700'; glow = 'text-shadow:0 0 4px #ffd700;'; }

          return `<div class="sector-item" style="border-left:4px solid ${color};background:rgba(0,0,0,0.3);">

            <div class="sector-name" style="color:${color};${glow}font-weight:600;">${s.name}</div>

            <div class="sector-change" style="color:${color};font-family:'JetBrains Mono',monospace;font-size:1rem;${glow}">🔥 ${s.days}天↑</div>

          </div>`;

        }).join('');

      }

    }



    function updateSectors(sectors) {

      const grid = document.getElementById('sector-grid');

      if (!sectors || sectors.length === 0) {

        grid.innerHTML = '<div class="error-msg">暂无数据</div>';

        return;

      }



      if (currentTab === 'concept') {

          updateConcepts(cachedData.concepts);

        } else if (currentTab === 'slowrise') {

          updateSlowRise();

          return;

      }



      grid.innerHTML = sectors.slice(0, 15).map(s => `

        <a href="${s.link}" target="_blank" class="sector-item ${s.change >= 0 ? 'up' : 'down'}" style="text-decoration:none;color:inherit;display:block;">

          <div class="sector-name">${s.name}</div>

          <div class="sector-change ${s.change >= 0 ? 'up' : 'down'}">

            ${s.change >= 0 ? '+' : ''}${s.change.toFixed(2)}%

          </div>

        </a>

      `).join('');

    }



    

    function updateConcepts(concepts) {

      const grid = document.getElementById('sector-grid');

      if (!concepts || concepts.length === 0) {

        grid.innerHTML = '<div class="error-msg">暂无数据</div>';

        return;

      }

      grid.innerHTML = concepts.slice(0, 12).map(c => `

        <a href="${c.link}" target="_blank" class="sector-item ${c.change >= 0 ? 'up' : 'down'}" style="border-left:4px solid ${c.change >= 0 ? 'var(--neon-red)' : 'var(--neon-green)'}; text-decoration:none; color:inherit;">

          <div class="sector-name">${c.name}</div>

          <div class="sector-change ${c.change >= 0 ? 'up' : 'down'}">

            ${c.change >= 0 ? '+' : ''}${c.change.toFixed(2)}%

          </div>

        </a>

      `).join('');

    }



    function updateAlerts(alerts) {

      const list = document.getElementById('alert-list');

      if (!alerts || alerts.length === 0) {

        list.innerHTML = '<div class="loading">暂无异动</div>';

        return;

      }

      const parseChange = (title) => {

        const match = title.match(/([+-]?[\d.]+)%/);

        if (match) {

          const pct = parseFloat(match[0]);

          if (pct > 0) return `<span style="color:var(--neon-red);text-shadow:0 0 4px var(--neon-red);">+${pct.toFixed(2)}%</span>`;

          if (pct < 0) return `<span style="color:var(--neon-green);">${pct.toFixed(2)}%</span>`;

          return `<span style="color:var(--neon-cyan);">${pct.toFixed(2)}%</span>`;

        }

        return null;

      };

      list.innerHTML = alerts.map(a => {

        const changeSpan = parseChange(a.title);

        let namePart = a.title.replace(/\[.*?\]\s*/, '').replace(/[+-]?[\d.]+%/, '').trim();

        return `<div class="alert-item alert-${a.type}">

          <div style="display:flex;justify-content:space-between;width:100%;">

            <span style="flex:1;">${namePart}</span>

            <span style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;min-width:60px;text-align:right;">${changeSpan || ''}</span>

          </div>

          <div class="alert-time" style="margin-top:4px;">${a.time}</div>

        </div>`;

      }).join('');

    }



    function updateSourceBars(sectors) {

      const container = document.getElementById('source-bars');

      if (!sectors || sectors.length === 0) {

        container.innerHTML = '<div class="error-msg">暂无数据</div>';

        return;

      }

      const upCount = sectors.filter(s => s.change > 0).length;

      const downCount = sectors.filter(s => s.change < 0).length;

      const avgChange = sectors.reduce((a, b) => a + b.change, 0) / sectors.length;

      const maxUp = Math.max(...sectors.map(s => s.change));

      const maxDown = Math.min(...sectors.map(s => s.change));



      const metrics = [

        { label: '上涨板块', value: upCount, max: sectors.length, color: 'var(--neon-red)' },

        { label: '下跌板块', value: downCount, max: sectors.length, color: 'var(--neon-green)' },

        { label: '平均涨跌', value: avgChange * 10 + 50, max: 100, color: avgChange >= 0 ? 'var(--neon-red)' : 'var(--neon-green)', suffix: `${avgChange.toFixed(2)}%` },

        { label: '最大涨幅', value: Math.max(0, maxUp) * 5, max: 100, color: 'var(--neon-red)', suffix: `${maxUp.toFixed(2)}%` },

        { label: '最大跌幅', value: Math.abs(maxDown) * 5, max: 100, color: 'var(--neon-green)', suffix: `${maxDown.toFixed(2)}%` }

      ];



      container.innerHTML = metrics.map(m => `

        <div class="source-bar">

          <span class="source-label">${m.label}</span>

          <div class="source-progress">

            <div class="source-fill" style="width:${Math.min(100, Math.max(0, m.value))}%;background:${m.color}"></div>

          </div>

          <span class="source-value" style="color:${m.color}">${m.suffix || m.value}</span>

        </div>

      `).join('');

    }

    async function refreshAll() {



      // 各数据源独立加载，失败不影响其他数据源

      let sectorRaw = null;

      let conceptRaw = null;

      let stocks = null;



      // 0. 加载服务端慢热历史数据（首次访问 localStorage 为空时需要）

      try {

        await loadTrendHistoryFromServer();

      } catch (e) {

        console.warn('[VIBE] loadTrendHistoryFromServer failed:', e);

      }



      // 1. 腾讯 API 数据（板块 + 概念）

      try {

        const sectorCodes = [...new Set(Object.values(SECTOR_REPRESENTATIVES).flat())];

        const conceptCodes = [...new Set(Object.values(CONCEPT_CODES).flat())];

        const [s, c] = await Promise.all([

          fetchTencentData(sectorCodes),

          fetchTencentData(conceptCodes)

        ]);

        sectorRaw = s;

        conceptRaw = c;

      } catch (e) {

        console.error('[VIBE] fetchTencentData failed:', e);

      }



      // 2. 每日选股数据

      try {

        stocks = await processStocks();

      } catch (e) {

        console.error('[VIBE] processStocks failed:', e);

      }



      // 3. 处理数据（失败不影响渲染）

      let sectors = [], concepts = [], sentiment = null, alerts = [], slowRise = [], rpsData = null;

      let tradingDate = new Date().toISOString().split('T')[0];

      try {

        const sectorStockData = sectorRaw ? parseStockData(sectorRaw) : {};

        const conceptStockData = conceptRaw ? parseStockData(conceptRaw) : {};

        sectors = processSectors(sectorStockData);

        concepts = processConcepts(conceptStockData);

        sentiment = calculateSentiment(sectors);

        alerts = generateAlerts(sectors, concepts);

        slowRise = computeSlowRise(sectors, tradingDate);

        rpsData = computeRPS(sectors, tradingDate);

        cachedData = { sectors, stocks, concepts, sentiment, alerts, slowRise, rpsData, tradingDate };

        setStatus(true);

      } catch (e) {

        console.error('[VIBE] processData failed:', e);

      }



      // 4. 各 UI 面板独立更新（每个独立 try-catch，一个失败不影响其他）

      try { if (sentiment !== null) updateSentiment(sentiment); } catch(e) { console.error('[VIBE] updateSentiment:', e); }

      try {

        if (currentTab === 'slowrise') updateSlowRise();

        else if (currentTab === 'concept') updateConcepts(cachedData?.concepts || []);

        else updateSectors(cachedData?.sectors || sectors);

      } catch(e) { console.error('[VIBE] updateSectors:', e); }

      try { updateStocks(stocks); } catch(e) { console.error('[VIBE] updateStocks:', e); }

      try { updateConcepts(cachedData?.concepts || concepts); } catch(e) { console.error('[VIBE] updateConcepts:', e); }

      try { updateAlerts(alerts); } catch(e) { console.error('[VIBE] updateAlerts:', e); }

      try { updateSourceBars(cachedData?.sectors || sectors); } catch(e) { console.error('[VIBE] updateSourceBars:', e); }

      try { updateRPS(cachedData?.rpsData || rpsData); } catch(e) { console.error('[VIBE] updateRPS:', e); }



      // 更新时间

      const timeEl = document.getElementById('update-time');

      if (timeEl) timeEl.textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false});

      const btn = document.getElementById('refresh-btn');

      if (btn) { btn.classList.add('running'); btn.textContent = '数据已更新'; }

    }



    // Tab switching

    document.querySelectorAll('.tab-btn').forEach(btn => {

      btn.addEventListener('click', () => {

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        btn.classList.add('active');

        currentTab = btn.dataset.type;

        if (cachedData) {

          if (currentTab === 'slowrise') {

            updateSlowRise();

          } else if (currentTab === 'concept') {

            updateConcepts(cachedData.concepts);

          } else {

            updateSectors(cachedData.sectors);

          }

        }

      });

    });



    // Initialize

    refreshAll();



    // Auto refresh every 30 seconds

    setInterval(refreshAll, 30000);

  </script>

      }

      

      // 如果日期不同或不存在，重置计数

      if (data.date !== today) {

        data = { date: today, count: 1 };

      } else {

        // 日期相同，计数+1

        data.count = (data.count || 0) + 1;

      }

      

      // 保存到 localStorage

      localStorage.setItem(storageKey, JSON.stringify(data));

      

      // 更新显示

      const counterEl = document.getElementById('visit-count');

      if (counterEl) {

        counterEl.textContent = data.count;

      }

    }

    

    // 页面加载时更新计数器

    updateVisitCounter();

  </script>



</body>

</html>
