<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻汇总 | 方瑟的openclaw</title>
  <meta http-equiv="refresh" content="600">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; width: 100%; }
    a { color: #00e5ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back-link { display: inline-block; margin-bottom: 16px; color: #00e5ff; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }

    .header { text-align: center; padding: 16px 0; }
    .header h1 { color: #4fc3f7; font-size: 1.6em; margin-bottom: 6px; }
    .header p { color: #888; font-size: 0.85em; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 10px 16px;
      margin-bottom: 12px;
      background: rgba(79,195,247,0.06);
      border: 1px solid rgba(79,195,247,0.15);
      border-radius: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    .stats-bar span { color: #4fc3f7; font-weight: 600; }

    /* Category tabs */
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 16px; }
    .tab {
      padding: 7px 18px;
      border: none;
      border-radius: 20px;
      background: #1a1a3e;
      color: #888;
      cursor: pointer;
      font-size: 0.85em;
      transition: all .2s;
    }
    .tab:hover { background: #2a2a5e; color: #ccc; }
    .tab.active { background: #4fc3f7; color: #0a0a1a; font-weight: bold; }
    .tab .count { margin-left: 4px; opacity: 0.7; font-size: 0.9em; }

    /* News list */
    .news-list { width: 100%; }
    .news-item {
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background .15s;
    }
    .news-item:hover { background: rgba(79,195,247,0.04); }
    .news-item:last-child { border-bottom: none; }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .news-time { font-size: 11px; color: rgba(255,255,255,0.35); min-width: 65px; }
    .news-cat {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .cat-fast { background: rgba(79,195,247,0.15); color: #4fc3f7; }
    .cat-ann { background: rgba(255,183,77,0.15); color: #ffb74d; }
    .cat-macro { background: rgba(129,199,132,0.15); color: #81c784; }
    .cat-industry { background: rgba(206,147,216,0.15); color: #ce93d8; }
    .news-source { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: auto; }
    .news-title {
      font-size: 13.5px;
      line-height: 1.55;
      color: #c8d6e5;
    }
    .news-item:hover .news-title { color: #e8f4fd; }
    .news-title-link {
      font-size: 13.5px;
      line-height: 1.55;
      color: #c8d6e5;
      text-decoration: none;
    }
    .news-title-link:hover { color: #4fc3f7; text-decoration: underline; }
    .external-icon { font-size: 10px; opacity: 0.5; }
    .news-stock {
      font-size: 11px;
      color: rgba(255,183,77,0.75);
      margin-top: 3px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.3);
    }
    .empty-state .emo { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    .meta { text-align: center; color: #666; font-size: 0.8em; margin-bottom: 10px; }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .news-item { padding: 9px 10px; }
      .news-title { font-size: 12.5px; }
    }
  </style>
</head>
<body>
<div class="container">

<a href="index.html" class="back-link">← 返回首页</a>

<div class="header">
  <h1>📰 市场快讯汇总</h1>
  <p id="last-update">加载中...</p>
</div>

<div class="stats-bar" id="stats-bar">
  <div>总条数: <span id="stat-total">-</span></div>
  <div>快讯: <span id="stat-fast">-</span></div>
  <div>公告: <span id="stat-ann">-</span></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="news-list" id="news-list"></div>

</div><!-- end .container -->

<script>
// ============ 数据（由 news_update.py 自动注入） ============
var _rawData = []; // will be loaded from news_data.json
</script>

<script>
function formatTs(ts) {
  if (!ts) return '';
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  var d = new Date(s * 1000);
  return (d.getMonth()+1) + '-' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}

var _activeCat = 'all';
var _activeTab = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

function countByCat(cat) {
  if (cat === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.category === cat; }).length;
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = _activeCat === null ? _rawData : _rawData.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '雪球';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = '';
    if (cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (cat === 'fast') {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-source">' + source + '</span>';
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var fast = _rawData.filter(function(x){ return x.category === 'fast'; }).length;
  var ann = _rawData.filter(function(x){ return x.category === 'ann'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-fast').textContent = fast;
  document.getElementById('stat-ann').textContent = ann;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  // Try remote JSON first (GitHub Pages), then local fallback
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
})();
</script>

</body>
</html>
