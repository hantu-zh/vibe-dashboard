 2.0时刻？GLM-5.2刷屏华尔街，智谱收涨15%，市值突破万亿港元。\n宁德时代许金梅：今年9月开始交付首批钠离子电池解决方案，2026年底实现GWh级出货量。\n斡旋方发布美伊谈判联合声明：各方达成路线图，力争60天内达成最终协议，建立技术谈判机制及沟通热线，专设“冲突降级小组”；美国60天内暂时放松伊朗石油交易限制；万斯称伊朗同意国际原子能机构核查人员入伊，特朗普：伊朗将同意接受重大武器的核查，确保长期保持“核诚信”；伊朗称谈判未涉核问题，未接受任何新承诺。\n斯塔默宣布辞职，英国首相再换人，十年迎第七任首相，工党将7月启动候选人提名，预计9月前产生新党首。\n前美联储主席格林斯潘去世，享年100岁。\nIPO之后借债，SpaceX首发投资级债券，融资200亿美元押注AI未来。\n报道：美光与Anthropic达成协议，锁定内存长期供应协议⑪目标1nm制程！“马桶大王”TOTO投资800亿日元押注半导体材料。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123071","time":1782169441000,"title":"个别产品年化收益率近140%，银行理财指数化投资受青睐","text":"当前银行理财市场指数化投资热度持续走高。资管服务平台联合智评数据显示，今年以来，挂钩人工智能（AI）算力、存储芯片、量子科技等热门赛道的理财产品收益亮眼，超六成产品年化收益率在同类指数理财中位居前列，个别产品年化收益率逼近140%。受访人士表示，在理财全面净值化转型背景下，指数化产品已成为理财公司突破收益瓶颈的重要路径。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1634262712461","time":1782169428000,"title":"算力租赁“众生相”：行业龙头、跨界新手业绩冷暖两重天","text":"算力租赁“众生相”：行业龙头、跨界新手业绩冷暖两重天","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L03DJ52J053469RG.html","importance":""},{"id":"wscn3123070","time":1782169377000,"title":"小金属锆供需关系生变，A股相关个股受资金追捧","text":"6月22日，小金属锆概念板块热度攀升，截至当日收盘，该板块三祥新材股份有限公司、广东东方锆业股份有限公司等核心龙头股价悉数涨停，其余多只股票涨幅超过5%。市场消息显示，受海外氧化锆粉体龙头供给收缩等因素影响，国内龙头企业已跟进调价，东方锆业自6月18日起上调氧氯化锆、二氧化锆等产品价格。6月22日，东方锆业证券部相关人士表示，上述涨价内容属实，本轮涨价主要受成本上涨与供需格局变化双重驱动。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123069","time":1782169165000,"title":"报道：韩国总统李在明将与三星讨论区域投资计划","text":"据每日经济援引政界及业界未具名消息人士的话报道称，韩国总统李在明将于6月25日会见三星电子执行会长李在镕（Jay Y. Lee），讨论区域投资计划。\n李在明已于6月19日会见了SK集团会长崔泰源。外界猜测，三星和SK海力士可能会在韩国西南部的全罗道地区进行芯片相关的投资。\n三星、SK海力士及其他公司可能会在6月29日举行的总统府会议上宣布区域投资计划。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123068","time":1782169139000,"title":"年内FOF发行规模创历史新高","text":"FOF（基金中基金）市场规模持续扩容。Wind数据显示，截至6月22日，全市场存续公募FOF产品已达615只（仅统计主份额），总规模达3692.07亿元，较五年前（2021年6月22日）的1250.55亿元增长195.24%。仅年内就新成立FOF产品88只，合计发行规模1137.69亿元，不仅超过2025年全年发行水平，也刷新了此前2021年的发行纪录。值得关注的是，与2021年主要由养老目标FOF扩容带动市场增长不同，今年FOF规模增长呈现出更加鲜明的资产配置特征。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123067","time":1782168977000,"title":"A股上市银行2025年年度分红已派现超1460亿元","text":"Wind数据显示，截至6月22日，已有16家A股上市银行的2025年年度分红实施完成，包括2家国有大行、3家股份行、4家城商行和7家农商行，现金分红总额达1461.91亿元。此外，兰州银行、青岛银行、苏州银行、厦门银行、沪农商行、浙商银行也将在6月30日之前完成2025年年度分红，上述银行现金分红总额达76.48亿元。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123066","time":1782168908000,"title":"进攻、防御两手抓，年内红利ETF资金净流入超270亿元","text":"今年以来，权益市场波动加大，行情结构性特征突出。在此背景下，市场资金兼顾收益弹性与组合安全垫，采取“进攻+防御”并行配置思路，成长板块热度不减，红利赛道也迎来持续资金流入。红利指数、红利低波、中证红利等红利指数对应的ETF（交易型开放式指数基金）产品，近一个月合计资金净流入最高突破百亿元。整体来看，年内红利ETF合计资金净流入超270亿元。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123065","time":1782168805000,"title":"6月份以来核心城市楼市延续修复态势","text":"6月份以来，核心城市二手房市场延续修复态势。中指研究院最新数据显示，6月1日至20日，20个重点城市二手住宅成交8.8万套，同比增长10.9%。与此同时，端午假期期间，京沪深等核心城市二手房市场仍保持较高活跃度。不少城市挂牌量较前期高点持续回落，市场供需关系出现边际改善。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123064","time":1782168348000,"title":"伊朗副外长披露伊美谈判后续技术层面磋商机制","text":"当地时间23日，伊朗外交部副部长、伊方技术谈判代表团团长加里巴巴迪披露了接下来伊朗与美国之间技术层面磋商的安排机制。根据瑞士四方会谈达成的共识，接下来的谈判将在高级别委员会的监督下进行，成员包括伊朗议长、伊朗外交部长、美国副总统以及巴基斯坦总理和卡塔尔首相。同时决定设立四个工作组，分别负责：解除制裁、核问题、重建与经济发展、监督与执行。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123063","time":1782168077000,"title":"超1600亿元“红包”本周派发，红利资产配置价值仍获看好","text":"本周将有超过280家上市公司派发2025年年度现金红利，派现总金额超过1600亿元，中国石油、贵州茅台这样的分红“大户”，本周计划派现规模均在350亿元以上。从二级市场表现看，中证红利指数近几个月有所调整，在6月22日盘中还创出年内新低。在业内人士看来，具备稀缺性的红利资产有望在调整后获得保险资金的进一步增配，考虑到外部不确定性风险仍存，建议关注银行、煤炭、交通运输、家电等具有业绩改善预期、分红稳定可持续且具备较强分红能力的红利资产。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123062","time":1782168024000,"title":"算力光纤需求共振，高纯四氯化硅景气度上行","text":"受算力基建、通信网络升级带动，今年以来，高纯四氯化硅市场需求持续回暖。高纯四氯化硅下游主要应用于光纤预制棒、合成石英玻璃的生产。据了解，受益于全球光纤高景气，高纯四氯化硅同步进入紧缺导致的涨价周期。一位行业知情人士透露，目前市场高纯四氯化硅销售多为长协锁价销售模式，去年以来，长协价格已出现大幅上涨。2025年底，光纤用9N级高纯四氯化硅长协成交参考价约2.5万元/吨，今年一季度对应的长协参考价上行至约4.5万元/吨，阶段性价格涨幅约80%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123061","time":1782167907000,"title":"砂中沥金，高端产品吃紧吃香，高纯石英砂身价水涨船高","text":"受AI数据中心及算力网络建设推动，光纤产业链全线“吃紧”，其中高纯石英砂的身价也水涨船高，成了名副其实的 “砂中黄金”。行业数据显示，当前光纤用高纯石英砂主流报价已涨至每吨4.8万元至5.5万元，其中纯度6N级以上的高端产品更是“一砂难求”，由于国产自给率有待提升，行业供需偏紧格局不断加剧。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123060","time":1782167719000,"title":"黑石集团总裁Jon Gray：投资日本（多个）数据中心。（日经新闻）\n","text":"黑石集团总裁Jon Gray：投资日本（多个）数据中心。（日经新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123059","time":1782167639000,"title":"稀有“味精” 供需错配加剧，锗价半年涨逾八成","text":"截至6月18日，锗锭已攀升至25000元/千克，较2025年末涨逾83%。驱动这一轮价格飙升的，主要是AI算力基础设施等领域对光纤的旺盛需求。在光纤制造中，四氯化锗扮演着“味精”般的关键角色。它是光纤预制棒纤芯掺杂的核心原料，主要作用是提高纤芯折射率等，让光纤的传输性能更“能打”。“在光纤预制棒的原材料成本里，锗的占比很低，但由于下游对锗材料的纯度要求高，加上国内锗供给较为集中、材料不可替代性强，相比其他材料，锗的供需矛盾会更为明显。”一家头部光纤预制棒生产商介绍。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123058","time":1782167562000,"title":"芝商所CME Direct平台恢复交易，早前出现连接中断情况","text":"据交易员表示，美国芝商所旗下CME Direct平台在周一因技术故障短暂中断后，目前已恢复交易。“由于第三方网络问题，部分CME Direct客户在中部时间下午1点左右遇到连接中断情况。部分受影响的客户在重新连接时也遇到了延迟。CME Globex未受影响，”芝商所一位代表在电子邮件声明中表示。据交易员表示，此次事件影响了石油、天然气、铜、黄金和白银等交易。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1634427319156","time":1782167403000,"title":"特朗普政府加码量子战略！设定2028年科研级量子计算机突破目标","text":"特朗普政府加码量子战略！设定2028年科研级量子计算机突破目标","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L03BLC4505198CJN.html","importance":"important"},{"id":"wscn3123056","time":1782167401000,"title":"光棒之渴：个别类型较年初涨价逾五倍，供应紧缺或将延续至2027年","text":"受益于AI算力网络建设带来的巨量光纤光缆需求，作为光纤制造“母体”的光纤预制棒（下称“光棒”）价格较2025年初快速上涨：通用G.652D光棒报价涨幅超过180%；用于数据中心高密度布线的G.657.A2类光棒，每等效芯公里报价则由22元至30元涨到160元，涨幅近550%。多家上市公司表示，本轮光棒价格上涨与供需失衡以及上游原材料涨价传导等因素共同导致，预计紧缺状态将持续到2027年。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123053","time":1782167369000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 08:30 日本6月制造业、服务业、综合PMI初值；\n② 时间待定 “夏季达沃斯论坛”在大连开幕（6月23-25日），字节跳动旗下云与AI服务平台2026火山引擎原动力大会（FORCE）开幕（6月23-34日）；\n③ 13:00 印度6月制造业、服务业、综合PMI初值；\n④ 15:15 法国6月制造业、服务业、综合PMI初值；\n⑤ 15:30 德国6月制造业、服务业、综合PMI初值；\n⑥ 16:00 欧元区6月制造业、服务业、综合PMI初值，欧洲央行管委Kazimir讲话；\n⑦ 16:30 英国6月制造业、服务业、综合PMI初值，欧洲央行首席经济学家Lane在欧洲议会讲话；\n⑧ 21:00 加拿大央行行长Tiff Macklem在法国巴黎讲话；\n⑨ 21:45 美国6月标普全球服务业、制造业、综合PMI初值；\n⑩ 21:55 英国央行货币政策委员会（MPC）成员Alan Taylor，欧洲央行副主席Boris Vujcic在英国伦敦出席2026年货币政策论坛并讲话；\n⑪ 22:00 美国6月里士满联储制造业指数；\n⑫ 次日01:30 英国央行货币政策委员会（MPC）成员Swati Dhingra讲话；\n⑬ 时间待定 明晟公司（MSCI）将公布年度市场分类评审结果，韩国有望进入发达市场观察名单；\n⑭ 美股盘后 联邦快递发布业绩报告；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123055","time":1782167220000,"title":"点心债持续扩容，离岸人民币市场融资加速","text":"工商银行首尔分行、交通银行香港分行等五家银行6月22日共发行规模为27.74亿元点心债。今年以来，点心债市场发行规模超8000亿元，远高于去年同期。专家认为，2026年以来，点心债发行规模持续扩容，首要原因是人民币资产吸引力增强、离岸人民币流动性改善，叠加中美利率分化带来融资成本优势。未来，境内企业“走出去”步伐加快、境外机构对人民币融资需求上升、离岸市场基准利率曲线的建立与完善，都将推动点心债发行规模稳步增长。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123054","time":1782167172000,"title":"券商分类评价考核将启，“功能发挥”成加分关键","text":"从业内获悉，2026年券商分类评价自评材料报送临近截止日期，各家券商须于6月底前完成提交。对券商来说，这是《证券公司分类评价规定》自2025年8月修订实施以来的又一次“大考”。从今年的工作底稿来看，加分项与扣分项均有细化调整，“功能发挥”成为加分关键。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123052","time":1782167058000,"title":"AI飞轮驱动加速，半导体更多领域进入上行周期","text":"存储芯片的供需关系，要到2027年才会有改善迹象；AI带动的需求正在扩散，下半年功率、模拟芯片的供应会持续紧张……展望下半年半导体产业发展趋势，多位业内人士表示，AI给半导体带来的成长动力愈发强劲，并持续辐射到更多的细分领域。随着AI发展提速，半导体产业对于新材料、新技术的需求也在持续增强，超高密度高速互联、玻璃基板封装、碳化硅和金刚石散热等技术加速突破，成为半导体板块的另一条投资主线。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1637091599595","time":1782166929000,"title":"磷化工赛道成长空间打开 4股市盈率不足12倍","text":"磷化工赛道成长空间打开 4股市盈率不足12倍","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L03B6T77053469RG.html","importance":""},{"id":"wscn3123051","time":1782166886000,"title":"二季度北交所过会企业扫描：业绩真实性与可持续性成问询“标配”","text":"2026年二季度，北交所上市审核保持常态化发行节奏，过会企业数量稳步增长。数据显示，截至6月22日，二季度北交所过会企业达26家，今年以来累计过会企业超过60家。从上市委问询情况来看，经营业绩的真实性与可持续性成为审核问询的核心关注点，收入确认、毛利率变动、客户稳定性等问题被频繁提及。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123050","time":1782166257000,"title":"科技链从“数字”升级为“数智”，第四届链博会折射AI产业重心跃迁","text":"第四届中国国际供应链促进博览会6月22日在北京开幕。本届链博会设置“6链1展区”，共吸引来自85个国家、地区和国际组织的676家企业参展。记者走访多家展位后发现，今年最密集的驻足与快门声，出现在首次亮相的人工智能专区。此外，展商谈及最多的不是AI有多强，而是能在哪些场景中解决什么样的问题，产业链对AI的期待从过去的“炫技”逐步走向“落地”。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123049","time":1782165724000,"title":"甲骨文一年裁员2.1万人，称AI已取代部分岗位","text":"甲骨文公司（Oracle Corp.）在过去12个月内裁员2.1万人，规模超出此前的预期，其中包括因人工智能（AI）应用而被裁减的岗位。\n甲骨文周一在年度财务监管文件中表示：“我们在各项业务中采用并部署AI技术，已经导致且未来可能继续导致员工人数减少。”\n甲骨文表示，截至5月31日的财年末，公司全球全职员工总数已缩减至14.1万人，而一年前为16.2万人。此次裁员导致了约18亿美元的重组费用。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123047","time":1782165327000,"title":"120亿美元？伊朗否认将用解冻资金买美农产品","text":"美国副总统万斯6月22日在瑞士就伊朗资产解冻问题表示，美方已建立相关流程，确保未来任何解冻资金将用于支持伊朗民众，而非“资助恐怖主义”。据万斯称，被解冻的伊朗资金将用于购买美国大豆、玉米和小麦等农产品，该机制将由美国与卡塔尔方面共同审批。不过据伊朗塔斯尼姆通讯社随后援引一名接近伊美谈判的消息人士的话报道称，“伊朗被冻结资金将被用于购买粮食”的说法并不属实，在任何协议中都没有这样的表述。\n这位消息人士表示，万斯之所以提出这类说法，“主要是出于美国国内政治因素的考虑——出于什么逻辑伊朗会拿120亿美元去购买美国农产品呢？”（CCTV国际时讯）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123043","time":1782163793000,"title":"美副总统万斯结束出席美伊瑞士谈判启程返美","text":"美国副总统万斯22日结束出席美国和伊朗在瑞士比尔根山进行的谈判，登上飞机启程返美。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123042","time":1782163753000,"title":"百度ADR盘后上涨，花旗对其开启30天的看涨催化观察","text":"百度在美国上市的ADR盘后交易上涨1.5%，此前花旗对这家中国互联网搜索引擎巨头开启30天的看涨催化观察。\n分析师Alicia Yap写道，百度“芯片和云业务的内在实力可能成为推动股价上涨的催化因素。”\n“虽然难以判断整体市场情绪何时会发生转变，但我们相信，一旦百度芯片业务分拆时间表及市场兴趣变得明朗，仍存在释放价值的机会。”\n花旗给予百度“买入”评级。\n该公司股价今年以来下跌逾14%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123041","time":1782162934000,"title":"富时A50期指连续夜盘收跌0.01%，报16003点。\n","text":"富时A50期指连续夜盘收跌0.01%，报16003点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1638603807691","time":1782155170000,"title":"罕见！保荐券商单方面“强撤”上市材料，东实环境闯关北交所将败","text":"罕见！保荐券商单方面“强撤”上市材料，东实环境闯关北交所将败","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L02VN5IQ0519WTTG.html","importance":""},{"id":"1637798363158","time":1782153061000,"title":"发生了什么？半夏私募单周净值暴跌15%！李蓓：撤离AI的最好窗口","text":"发生了什么？半夏私募单周净值暴跌15%！李蓓：撤离AI的最好窗口","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L02TVLQI05566UTE.html","importance":"important"},{"id":"1636179163503","time":1782153018000,"title":"雷军押注！广州企业大模型公司要IPO了","text":"雷军押注！广州企业大模型公司要IPO了","source":"网易财经","catego <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
  
  // Auto-refresh news data every 5 minutes
  setInterval(function() {
    console.log('[NEWS] Auto-refreshing data...');
    tryFetch(remoteUrl);
  }, 5 * 60 * 1000);
})();
</script>
