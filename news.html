局在北京组织召开国家数据要素综合试验区现场会（医疗数据流通利用专题），总结...","text":"【国家数据要素综合试验区医疗数据流通利用专题现场会在北京召开】7月2日至3日，国家数据局在北京组织召开国家数据要素综合试验区现场会（医疗数据流通利用专题），总结和交流国家数据要素综合试验区建设经验，推动医疗领域数据资源安全合规高效流通利用，推动数字中国与健康中国建设深度融合。会议强调，各地要注重学习借鉴和复制推广，把好经验好做法带回去、用起来，全面释放医疗行业数据要素价值。一是要进一步强化顶层设计和机制创新。地方实践表明，地方越是重视、加强组织保障，跨部门协同做得越好，医疗数据流通利用效果就越好。各地要加强数据管理部门和卫生健康部门协同，完善激励机制，调动医院、医生、市场经营主体等的积极性主动性，形成医疗数据流通正向循环。二是要进一步细化制度规则。各地要聚焦医疗领域数据确权授权、流通交易、收益分配、安全治理等关键环节，借鉴先进经验，打通堵点卡点，深化落实落地，打通医疗数据流通利用的闭环。三是要进一步打造一批示范标杆。通过政策试点、示范项目、典型案例等，总结可复制可推广的典型经验，发挥标杆带动作用。四是要进一步提炼一批标准规范。进一步提炼各试验区典型经验，推动将“一地创新”变成“全国经验”，让后来者有章可循，更好推动实践落地。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/398566827","importance":"important"},{"id":"wscn3129100","time":1783303299000,"title":"韩国首尔综指盘中转跌，现跌0.4%，此前一度涨近3%。\n","text":"韩国首尔综指盘中转跌，现跌0.4%，此前一度涨近3%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"xq4750054","time":1783303204000,"title":"【PCB成关键瓶颈？ 机构爆料：制造工艺面临挑战，英伟达Kyber机架或遇延迟】半导体行业研究机构SemiAnalysis北京时间今日上午在社交平台发布一系列文...","text":"【PCB成关键瓶颈？ 机构爆料：制造工艺面临挑战，英伟达Kyber机架或遇延迟】半导体行业研究机构SemiAnalysis北京时间今日上午在社交平台发布一系列文章，指出英伟达Kyber NVL144机架架构或将遭遇延迟。该机构表示：“就在黄仁勋于GTC展示Kyber NVL144仅三个月后，该产品就遭遇了重大挫折，并被延迟超过12个月，推迟至2028年。”关于产品延迟的原因，该机构将其归结为“PCB中板的制造工艺仍面临重大挑战”。SemiAnalysis指出：“英伟达目前没有经过验证的解决方案来扩展Rubin Ultra的规模扩展域，这为AMD MI500X或TPUv8i Broadfly等竞争对手在规模扩展能力上超越Rubin Ultra留下了空间。”","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/398566563","importance":""},{"id":"sinacomos:nifvqsf1797323","time":1783303185000,"title":"野村谈人形机器人：数据是关键瓶颈和核心护城河，灵巧手决定商业化进程","text":"来源：华尔街见闻 数据采集正在取代硬件成为人形机器人产业化的核心制约，而灵巧手的技术成熟度则直接决定商业化落地的时间表。 据追风交易台...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/t/2026-07-06/doc-inifvqsf1797323.shtml","importance":""},{"id":"sinacomos:nifvkke2077972","time":1783303014000,"title":"通胀隐忧下美股迎来“平静周”：服务业PMI与消费巨头财报接棒登场，SK海力士周五 IPO 成全场焦点","text":" 在经历了一个充斥着大量劳动力市场数据和令人意外的非农就业报告、且因假期而缩短的交易周之后，投资者将在接下来的一周迎来 tle":"中信证券：底部期待黄金板块估值与盈利的双击","text":"中信证券指出，美伊冲突以来的金价和黄金股严重超跌，当前黄金股在PE和资源比价方面均具备极强的安全边际。预计2026年三季度金价运行范围4000—4500美元/盎司，若加息预期交易全面修正，金价有望回归至4500—5000美元/盎司。黄金板块则将受益于盈利预期和估值水平的共振修复。重视黄金板块的全面配置机遇。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129056","time":1783297623000,"title":"韩国首尔综指日内涨幅扩大至2.9%。\n","text":"韩国首尔综指日内涨幅扩大至2.9%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129055","time":1783297584000,"title":"东方财富策略陈果团队：A股再平衡继续，关注业绩超预期","text":"东方财富策略陈果团队研报指出，随着中报窗口期的到来，认为市场可放下“硅基碳基之争”，以开放的心态，全面考察各行业景气度和重点公司业绩是否超越市场预期。纵观申万二级行业，我们将景气度向上行业分为四类：第一类，兼具高利润体量和高预期增速的半导体、通信设备、化学制品；第二类，利润体量不大但增速预期大幅上修的饲料、能源金属等；第三类，利润体量较大因此资金容量大、增速预期尚可的工业金属、炼化及贸易、证券、城商行、电池、煤炭开采等；第四类，利润体量不大但增速预期相对匹配的偏稳健增长行业，如电网设备、化学制药、其他电源设备、元件、物流、航运港口等。总的来说，我们认为中报以及下半年基本面，能超越市场预期的，并非只有前期最热门的AI上游赛道。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1636964373455","time":1783297416000,"title":"一瓶啤酒动辄百元，超高端的辛巴赫谁在喝？","text":"一瓶啤酒动辄百元，超高端的辛巴赫谁在喝？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1513BLU0519C95F.html","importance":""},{"id":"wscn3129054","time":1783297386000,"title":"中信证券：下半年建议重点配置中国创新药，聚焦三类公司","text":"中信证券研报认为，2026年下半年建议重点配置中国创新药，聚焦三类公司：一是创新药收入占比持续提升、商业化和盈利兑现能力较强的龙头Pharma/Biopharma；二是核心管线具备全球BIC/FIC潜力、已进入全球注册或后期临床阶段、未来数据和BD催化密集的创新平台；三是产品机制差异化明确、具备成长弹性和后续催化剂的成长型biotech。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1637164355302","time":1783297383000,"title":"“最懂苹果分析师”郭明錤：折叠屏iPhone或“联合发布但推迟上市，年底前供货紧张”","text":"“最懂苹果分析师”郭明錤：折叠屏iPhone或“联合发布但推迟上市，年底前供货紧张”","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1519HRC05198NMR.html","importance":""},{"id":"wscn3129052","time":1783297042000,"title":"天问二号探测器抵达目标小行星 开始科学探测","text":"从国家航天局获悉，天问二号探测器历 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
