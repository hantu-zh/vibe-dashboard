ina.com.cn/money/future/fmnews/2026-06-24/doc-inienawc8367649.shtml","importance":"hot"},{"id":"wscn3123694","time":1782255522000,"title":"印度反对党给印美贸易协议泼冷水","text":"印度国大党领导人拉梅什23日在社交媒体上抨击印美贸易协议，声称这一协议是“明抢”，严重损害印度利益，警告印度总理莫迪不要一味讨好美国，仓促签署这一协议。拉梅什称，年初的印美贸易框架已为随后的美国最高法院判决所削弱，印度在关税上对美让步的基础已经不存在了，美国当前以所谓不公平贸易为由对印度进行调查，就是为了威胁印度正式签署2月的贸易协议，美国没有作出任何实质性承诺，而印度却需要将目前每年自美进口规模扩大三倍。（环球时报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123693","time":1782255418000,"title":"英国拟强制社媒优先推送可靠新闻","text":"英国政府部门22日表示，正考虑强制社交媒体平台优先推送政府认定的“可靠新闻”。该国文化、媒体和体育部表示，正考虑要求脸书（Facebook）、优兔（YouTube）等主流社交媒体平台，在用户信息流和搜索结果中优先推送政府认定的可靠新闻，提升其曝光权重。报道称，“可靠新闻来源”包括英国广播公司（BBC）、独立电视台（ITV）、第四频道（Channel 4）等公共服务媒体，以及其他经认定的可靠新闻提供者。这一提议距英国禁止16岁以下人群使用一系列社交媒体应用程序仅过去一周。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606243780167698","time":1782255270000,"title":"巴方称伊美谅解备忘录谈判未涉及弹道导弹议题","text":"【巴方称伊美谅解备忘录谈判未涉及弹道导弹议题】巴基斯坦总理夏巴兹23日说，伊朗和美国此前围绕谅解备忘录的谈判并未涉及弹道导弹议题。夏巴兹在和到访的伊朗总统佩泽希齐扬共同出席记者会时说，在伊美这一谈判过程中，弹道导弹议题“从未摆上谈判桌”，也“从未被列入议程”，伊方从未同意对此进行任何讨论。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606243780167698.html","importance":""},{"id":"wscn3123692","time":1782255260000,"title":"经济日报金观平：减量提质推进村镇银行改革","text":"文章指出，作为小法人机构，村镇银行规模偏小、抗风险能力弱，在涉农服务过程中也逐渐暴露出不少问题与风险。面对经济波动和信用风险时缓冲空间有限，不良资产攀升、资金流动性紧张，对区域金融稳定构成潜在威胁。在治理机制方面，个别机构存在股东关系复杂、主发起行管理缺位、内控体系薄弱等现象。叠加行业净息差持续收窄，改革重组村镇银行尤为急迫。推动村镇银行改革要分类施策，不能搞一刀切。推动村镇银行改革要压实主发起行的管理责任。改革的目的是推动村镇银行稳健运行，降低重点领域风险。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nienawk3154807","time":1782255170000,"title":"国际黄金期价持续走低 相关资产配置价值显现","text":"本报记者王宁 北京时间6月23日，纽约商品交易所（COMEX）黄金期货8月合约已连续多日走低，截至记者发稿，该合约报价4133美元/盎司。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/jjxw/2026-06-24/doc-inienawk3154807.shtml","importance":""},{"id":"wscn3123691","time":1782255086000,"title":"多地中小银行宣布常态化清理“沉睡账户”","text":"今年以来，多地中小银行集中清理“沉睡账户”。记者梳理发现，年内已有青海银行、合江农商银行、平和农商银行等十余家中小银行陆续发布长期不动户、闲置借记卡集中清理公告。本轮清理主力军为中小银行，多家机构在公告中明确建立年度常态化账户清理机制。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"xq4727052","time":1782255069000,"title":"【模块化设计的纳米递药机器人能自行组装】瑞士巴塞尔大学科学家研制出一款多功能纳米递药机器人，由推进模块和有效载荷模块构成，两种模块可重复使用，并能够自行组装。试...","text":"【模块化设计的纳米递药机器人能自行组装】瑞士巴塞尔大学科学家研制出一款多功能纳米递药机器人，由推进模块和有效载荷模块构成，两种模块可重复使用，并能够自行组装。试验结果显示，该机器人可靶向癌细胞并降低其活性，有望在医学、工业等领域大显身手。相关论文发表于最新一期《先进功能材料》杂志。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/396288082","importance":""},{"id":"xq4727051","time":1782255035000,"title":"【新型深脑刺激系统改善帕金森患者步态】美国加州大学旧金山分校开发出一种新型深脑刺激系统，能够“读懂”帕金森患者行走时的每一步并实时调整刺激强度，帮助改善步态、减...","text":"【新型深脑刺激系统改善帕金森患者步态】美国加州大学旧金山分校开发出一种新型深脑刺激系统，能够“读懂”帕金森患者行走时的每一步并实时调整刺激强度，帮助改善步态、减少跌倒。这项发表于最新《自然·医学》期刊的研究首次证明，植入式脑刺激器可以检测与每个步伐相关的神经信号，并在几分之一秒内自动作出调整。该成果通过改善帕金森患者最难治疗的行走障碍，开启了个性化神经调控新篇章。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/396288074","importance":""},{"id":"wscn3123690","time":1782254950000,"title":"民调显示：美国超半数民众不认可对伊动武","text":"路透社和益普索集团23日公布的一项民意调查显示，超过半数美国民众认为美国2月底发动的对伊朗军事行动“不值得”，美国总统特朗普的支持率再次跌至34%，为其第二个总统任期以来的最低水平。根据民调结果，52%的受访者认为这场军事冲突“不值得”。此外，约35%的受访者认为，与战前相比，美国在应对伊朗问题上的地位受到削弱。（新华社）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123689","time":1782254884000,"title":"二季度“长钱”调仓动向初显","text":"近期，多家A股公司因回购或筹划重大资产重组等事项更新了前十大股东名单，“剧透”了二季度“长钱”调仓情况。据不完全统计，截至6月23日，二季度以来，全国社保基金、基本养老保险基金两大“长钱”增持或新进14只个股，增持个股多为细分行业龙头，布局赛道高度集中于医药生物板块。银河证券首席策略分析师杨超表示，二季度社保基金、养老基金的整体配置呈现三大鲜明特征：逆势温和加仓、结构聚焦高质量实体、高低估值均衡布局。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123688","time":1782254687000,"title":"港股市场谨慎情绪蔓延，机构建议把握三条主线","text":"今年以来，港股整体震荡走弱，行业板块表现分化，截至6月23日收盘，恒生指数累计跌近9%，恒生科技指数累计跌逾20%，工业、综合企业、金融业等传统行业板块领涨。资金表现相对谨慎，南向资金净流入额和上市公司回购金额均同比减少。机构人士认为，本轮港股下跌的主要驱动因素或来自沽空力量的抬升，而并非多头的抛压，中枢反转仍要看大厂AI进展和消费修复催化，当前尚未到合适时机。投资应把握三条主线，包括超跌板块，高股息、红利资产，科技板块。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123687","time":1782254589000,"title":"A股定增结构性活跃，新兴产业获资本青睐","text":"近期，多家上市公司披露定增方案，其中涉及半导体、生物医药等新兴产业数量较多。从定增认购机构的结构看，国家大基金、地方国资、社保、险资等长线资金频频出现。相比之下，牛散、私募依托定增进行短线套利的行为明显降温。业内人士表示，定增市场投机属性减弱、产业投资属性正在增强。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123686","time":1782254584000,"title":"美国三大股指期货转跌。\n","text":"美国三大股指期货转跌。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123685","time":1782254520000,"title":"期货行业监管加码，双罚机制压实合规主体责任","text":"期货行业的监管风向，正在从“提醒”变成“动真格”。过去，期货公司分支机构出现员工管理不到位、居间合作不规范、互联网营销留痕缺失等问题，往往以警示函、责令改正、监管谈话为主。但从2026年以来，监管力度明显升级。中国证券报记者梳理各地证监局（监管局）及中国期货业协会公开信息发现，上半年，期货行业处罚不仅覆盖机构本身，还进一步追责至公司总部高管和分支机构负责人，处罚手段也扩展至暂停经纪业务新开户、暂停新增居间合同、暂停资产管理业务等经营限制措施。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123684","time":1782254507000,"title":"周二（6月23日），美股AI软件先驱指数跌0.20%，报103.52点，成分股中，甲骨文收跌5.66%，铿腾电子跌2.57%，Palantir跌2.34%跌幅第","text":"周二（6月23日），美股AI软件先驱指数跌0.20%，报103.52点，成分股中，甲骨文收跌5.66%，铿腾电子跌2.57%，Palantir跌2.34%跌幅第三大，Salesforce、ServiceNOW、GitLab涨2.20%-4.53%领跑。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123683","time":1782254503000,"title":"周二（6月23日），美股人工智能（AI）赢家指数跌6.74%，报431.58点，跳空低开后持续低位窄幅震荡，成分股Fluence Energy、闪迪、美光跌15","text":"周二（6月23日），美股人工智能（AI）赢家指数跌6.74%，报431.58点，跳空低开后持续低位窄幅震荡，成分股Fluence Energy、闪迪、美光跌15.80%-13.18%领跌，在收涨的四只成分股中，微软涨1.8%，戴尔科技涨2.17%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123682","time":1782254498000,"title":"周二（6月23日），美股信息科技指数跌6.14%，报444.11点，跳空低开后持续低位窄幅震荡，成分股闪迪、美光、安森美半导体、高意公司Coherent、Cre","text":"周二（6月23日），美股信息科技指数跌6.14%，报444.11点，跳空低开后持续低位窄幅震荡，成分股闪迪、美光、安森美半导体、高意公司Coherent、Credo跌13.64%-10.09%领跌，IBM涨5%领跑。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123681","time":1782254426000,"title":"港股新股市场火热态势延续，上半年“吸金”有望超2000亿港元","text":"2026年上半年行情接近尾声。就港股而言，尽管二级市场表现难言出彩，但一级市场仍然延续了2025年以来的火热态势：Wind数据显示，本周将有10家企业密集登陆港股，2026年上半年预计有83家企业完成IPO上市，募资总额有望超过2000亿港元，上市企业数量及募资规模均较上年同期大幅增长。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123680","time":1782254318000,"title":"投行业务“马太效应”加剧，头部券商主导股权承销市场","text":"截至6月23日，2026年以来A股市场券商股权承销金额排名中，中信证券以1382.48亿元、32.88%的市场份额断层领先，前五名券商合计承销金额约3304亿元，占全市场总额的78.58%，前十名券商合计市场份额超87%，而其余40余家券商合计市场份额约为12.74%。分析人士认为，头部券商因在承销保荐收入和跟投收益两方面均能获取较好回报，带动资源进一步向其集中；中小券商在项目储备、资金实力和跟投能力方面与头部机构的差距仍在拉大，投行业务强者愈强的格局短期内难以改变。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606243780164759","time":1782254288000,"title":"港股市场谨慎情绪蔓延 机构建议把握三条主线","text":"【港股市场谨慎情绪蔓延 机构建议把握三条主线】近期，港股市场持续调整。今年以来，港股整体震荡走弱，行业板块表现分化，截至6月23日收盘，恒生指数累计跌近9%，恒生科技指数累计跌逾20%，工业、综合企业、金融业等传统行业板块领涨。资金表现相对谨慎，南向资金净流入额和上市公司回购金额均同比减少。Wind数据显示，截至6月23日，今年以来南向资金累计净流入超3000亿港元；截至6月22日，港股上市公司回购金额超850亿港元。机构人士认为，本轮港股下跌的主要驱动因素或来自沽空力量的抬升，而并非多头的抛压，中枢反转仍要看大厂AI进展和消费修复催化，当前尚未到合适时机。投资应把握三条主线，包括超跌板块，高股息、红利资产，科技板块。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606243780164759.html","importance":"hot"},{"id":"em202606243780165275","time":1782254260000,"title":"中国成功发射通信技术试验卫星二十六号A星","text":"【中国成功发射通信技术试验卫星二十六号A星】6月23日10时10分，中国在文昌航天发射场使用长征七号改运载火箭，成功将通信技术试验卫星二十六号A星发射升空，卫星顺利进入预定轨道，发射任务取得圆满成功。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606243780165275.html","importance":""},{"id":"wscn3123679","time":1782254249000,"title":"周二（6月23日），美股存储芯片与硬件供应链指数跌10.07%，报247.26点，跳空低开之后低位窄幅震荡。\n成分股全线溃败，闪迪收跌13.6%，美光科技跌13","text":"周二（6月23日），美股存储芯片与硬件供应链指数跌10.07%，报247.26点，跳空低开之后低位窄幅震荡。\n成分股全线溃败，闪迪收跌13.6%，美光科技跌13.2%，拉姆研究跌9.3%，Rambus、应用材料、西部数据、泰瑞达至多跌8.6%，希捷科技跌5.1%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123678","time":1782254198000,"title":"告别3%以上利率“躺赚”时代，一批储户正经历收益落差","text":"2026年海量中长期定期存款将集中到期，多年前锁定3%以上利率的储户们需直面利率接近腰斩的现实落差。随着存款利率持续走低，当前多数银行各期限存款利率进入“1字头”区间，大额存单额度收紧、长期限存款产品不断缩减，储户不得不向高息存款“躺赚”时代说再见。业内人士表示，规模庞大的存款集中到期，既推动居民调整资金配置、切换风险偏好，配置重心由单一追逐保本高息转向统筹平衡安全、收益与流动性，也倒逼银行加速财富管理业务转型。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123677","time":1782254132000,"title":"美股七巨头收盘播报｜周二（6月23日），美国科技股七巨头（Magnificent 7）指数跌1.44%，报205.68点，特斯拉收跌5.79%。\n“超大”市值科","text":"美股七巨头收盘播报｜周二（6月23日），美国科技股七巨头（Magnificent 7）指数跌1.44%，报205.68点，特斯拉收跌5.79%。\n“超大”市值科技股指数跌2.53%，报423.41点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nienawk3138067","time":1782254124000,"title":"古巴外长批评美国收紧对古制裁","text":"△古巴外长罗德里格斯（资料图）古巴外长罗德里格斯23日批评美国国务卿鲁比奥进一步收紧对古巴制裁，称驱使其采取相关行动的“是一种犯罪行为”。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/jjxw/2026-06-24/doc-inienawk3138067.shtml","importance":"hot"},{"id":"wscn3123676","time":1782254101000,"title":"从“找竹竿”到“挖短板”，基金经理直面AI“缩圈”","text":"5月以来，AI行情正经历一场剧烈的“缩圈”阵痛。在不少基金经理看来，当下的策略已然不再是广撒网，而是深耕耘——紧盯头部产业链迭代带来的新增需求，坚守国产化进程中供不应求的短板环节。在业绩验证期的大考面前，只有那些能真正兑现订单、填补产能缺口的龙头企业，才能在“缩圈”行情中脱颖而出。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123675","time":1782253990000,"title":"“小微盘基”知名产品开门迎客，左侧资金埋伏反弹窗口","text":"6月23日，A股科技板块回调，小微盘板块出现“跷跷板”反弹行情，万得微盘股指数收涨1.81%，今年以来的表现“由负转正”。此前，科技单边行情给市场带来显著的虹吸效应，使得小微盘、红利等风格显著承压，主打小微盘策略的公募基金今年表现整体不尽如人意。值得注意的是，知名小微盘基金诺安多策略已解除大额限购，宣告开门迎客。在近期逆风表现下，虽然部分投资小微盘基金的资金选择离场，但同时亦有资金把握估值回落窗口，陆续左侧布局。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nienawh6368514","time":1782253976000,"title":"联邦快递上季度货运业务盈利强劲 营收、利润均超预期","text":"联邦快递周二公布的财报显示，营收和利润均超出华尔街预期。 此次财报是该公司最后一个包含货运业务的财季报告——其货运业务已于6月1日分拆为一家独立的上市公司...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-24/doc-inienawh6368514.shtml","importance":""},{"id":"em202606243780164119","time":1782253958000,"title":"周三你需要知道的隔夜全球要闻","text":"周三你需要知道的隔夜全球要闻：芯片股遭抛售，纳斯达克100指数重挫3.3%；SpaceX拟发债250亿美元用于偿债及公司用途；C罗打破进球荒，独中两元带队大胜。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606243780164119.html","importance":""},{"id":"xq4727046","time":1782253824000,"title":"【告别3%以上利率“躺赚”时代 一批储户正经历收益落差】2026年海量中长期定期存款将集中到期，多年前锁定3%以上利率的储户们需直面利率接近腰斩的现实落差。随着...","text":"【告别3%以上利率“躺赚”时代 一批储户正经历收益落差】2026年海量中长期定期存款将集中到期，多年前锁定3%以上利率的储户们需直面利率接近腰斩的现实落差。随着存款利率持续走低，当前多数银行各期限存款利率进入“1字头”区间，大额存单额度收紧、长期限存款产品不断缩减，储户不得不向高息存款“躺赚”时代说再见。业内人士表示，规模庞大的存款集中到期，既推动居民调整资金配置、切换风险偏好，配置重心由单一追逐保本高息转向统筹平衡安全、收益与流动性，也倒逼银行加速财富管理业务转型。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/396287262","importance":"hot"},{"id":"wscn3123673","time":1782253768000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 时间待定 日本央行副行长冰见野良三发表讲话；\n② 07:50 日本央行公布6月货币政策会议审议委员意见摘要；\n③ 时间待定 2026上海世界移动通信大会开幕；\n④ 09:30 澳大利亚5月CPI；\n⑤ 14:30 澳洲联储助理主席Hauser讲话；\n⑥ 15:00 泰国央行公布利率决议，瑞士央行理事Martin讲话；\n⑦ 16:00 德国6月IFO商业景气指数；\n⑧ 17:00 欧洲央行管委兼德国央行行长Nagel讨论数字欧元；\n⑨ 19:15 加拿大央行高级副行长Rogers在苏黎世讲话；\n⑩ 19:20 英国央行副行长Breeden在苏黎世讲话；\n⑪ 20:30 美国一季度经常帐；\n⑫ 21:35 欧洲央行执行委员会成员Piero Cipollone通过线上方式参与一场炉边闲聊；\n⑬ 22:00 美国5月新屋销售；\n⑭ 22:30 美国能源信息署（EIA）发布政府版原油库存周报；\n⑮ 23:00 英国央行货币政策委员会（MPC）成员Swati Dhingra讲话；\n⑯ 23:30 法国央行行长Emmanuel Moulin讲话；\n⑰ 次日01:30 加拿大央行公布两周前货币政策会议的摘要；\n⑱ 次日02:00 美联储理事库克讲话（为开场白预先录制）；\n⑲ 次日04:00 美联储公布年度银行压   var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
  
  // Auto-refresh news data every 5 minutes
  setInterval(function() {
    console.log('[NEWS] Auto-refreshing data...');
    tryFetch(remoteUrl);
  }, 5 * 60 * 1000);
})();
</script>
