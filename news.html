涨科技股曝光","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14U16RA0517BMJU.html","importance":""},{"id":"wscn3129039","time":1783293318000,"title":"科技基金交易拥挤风险增加 洼地资产有望逐步成为公募布局方向","text":"今年上半年，全市场200多只科技主题基金净值翻倍，这在历史上极为少见。在科技基金交易拥挤风险增加之际，资金止盈兑现与赎回的压力开始增大。在此背景下，公募赛道切换节奏也顺势加速。随着二季度结束、三季度开启，公募基金的季度调仓窗口期来临，公募资金开始自高位拥挤的AI赛道向外分流，消费、医药等前期超跌板块与被公募减持的港股成为新的承接方向。多家基金公司也提示，科技板块短期波动风险加大，低估的洼地资产有望逐步成为公募布局的重要方向。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1635740016371","time":1783292994000,"title":"A股再融资新规落地，盘点历次再融资松紧对A股行情的影响","text":"A股再融资新规落地，盘点历次再融资松紧对A股行情的影响","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14T1O9L051983MB.html","importance":""},{"id":"wscn3129038","time":1783292716000,"title":"华尔街见闻早餐 | 2026年7月5日","text":"美股上周五休市，泛欧股指收创新高，芯片股ASML收涨3.6%、Aixtron涨6%；现货黄金盘中涨近2%，全周扭转四周连跌；周一亚市盘初，纳斯达克100指数期货涨逾1%。\nOPEC+同意8月上调配额18.8万桶/日，美伊战争爆发以来累计上调已近百万桶。\n与特朗普通话85分钟，普京称“俄军正全线进攻”，此前威胁夺乌克兰更多土地建安全区。俄乌互相发动大规模袭击。\n特朗普：哈梅内伊葬礼上一次攻击就能全部干掉伊朗高层，但不会这么做，这样就没人谈判了。沙特媒体：美伊新一轮会谈11日将在巴基斯坦举行。\n韩国政府：拟使用半导体税收红利设立“未来应对基金”，规模最高100万亿韩元。\nSK海力士料于周五登陆纳斯达克，有望成为有史以来最大外国公司赴美上市案。\nOpenAI计划于7月7日发布GPT-5.6，精准卡点Claude Fable 5限额方案失效日。\nHBM竞赛升级！美光日本90亿美元扩建项目开工，预计2028年出货。\n鸿海二季度营收同比增长近40%，AI业务驱动三季度有望持续高增长。\n中际旭创：“公司上游物料炫光片被封锁”的市场传言不符合事实。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1634580859439","time":1783292570000,"title":"国际油价下挫，黄金逼近4200美元，比特币涨破63000美元","text":"国际油价下挫，黄金逼近4200美元，比特币涨破63000美元","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14SMNU505199NPP.html","importance":""},{"id":"1639900058166","time":1783292438000,"title":"盯上AI基建“卖铲人”，泡沫说来就来？","text":"盯上AI基建“卖铲人”，泡沫说来就来？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0TSF7JA0539LXZQ.html","importance":""},{"id":"cls2417464","time":1783292400000,"title":"【早报】A股交易新规，今起正式施行；多家A股公司，业绩大幅预增；哈兰德双响，挪威2-1巴西","text":"①沪深北交易所新版交易规则今起施行②三部门调整节能汽车、新能源汽车车船税优惠政策③多款固态硬盘、内存条价格上涨④华为发布V2版“韬定律”论文⑤多家A股公司业绩大幅预增。","source":"财联社","category":"fast","stock":"","url":"https://www.cls.cn/detail/2417464","importance":"important"},{"id":"wscn3129035","time":1783292292000,"title":"电子布价格连涨，产业链上游高端织机紧缺","text":"“现在高端电子布专用喷气织机需求异常火爆。日本丰田织机占据全球90%以上的市场份额。如果现在下单丰田织机，预计要到2029年才能交货。”一位电子布上游相关从业者称。从业内获悉，丰田织机的交付时间长达18个月至24个月，这或导致电子布企业的新增产能无法释放。中国玻璃纤维工业协会秘书长刘长雷此前表示，实现高端织机国产替代至少需要2年以上。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129034","time":1783291791000,"title":"三季度公募基金调查显示：科技成长仍是“心头好”，极致分化后打法生变","text":"近日，上证报联合天天基金进行了三季度公募基金调查，南方、鹏华等多家基金公司的基金经理参与，从调查结果中可以一窥公募基金配置偏好与调仓思路。调查显示，高景气、科技成长赛道仍是三季度公募基金最为看好的方向，获票数超过七成，远超其他板块。排名第二的为低估值蓝筹、高股息类价值资产，关注度较上次调查显著提升，占比近三成。具体而言，算力、CPO、机器人板块关注度显著领先，但非银金融等方向也获得了较大关注。黄金、油气资源等板块关注度较低。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129033","time":1783291506000,"title":"注销式回购引关注，上市公司打出“组合拳”","text":"截至7月5日19时，剔除定向回购影响，今年以来A股共有297家上市公司对外披露回购方案，拟回购金额约为1113.97亿元。从回购目的看，约六成公司用于实施股权激励或员工持股计划，其余公司基本用于市值管理、维护公司价值及股东权益。不少上市公司近期将回购用途更改为注销。除了回购外，不少上市公司重要股东出手增持，引发市场关注。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129032","time":1783291427000,"title":"一批ST公司“摘帽”，年报问询紧盯新增业务可持续性","text":"数据显示，今年以来，已有61家A股公司成功撤销退市风险警示或其他风险警示，其中6月以来就有35家公司顺利“摘帽”。记者发现，从“摘帽”基本条件来看，大部分公司系“组合类”财务指标达标，尤其是借助营业收入指标“过线”而“脱险”，但此类公司净利润基本仍处于亏损状态，交易所年报问询也对其后续盈利能力、持续经营能力予以重点关注。目前，不少公司已启动资本运作，或借力并购谋求业务转型，或筹划易主注入发展新动能。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129031","time":1783291345000,"title":"A股交易新规今起施行，券商配套更新风险揭示书","text":"沪深北交易所新版交易规则今日正式施行。为匹配新版交易规则，券商发布公告，同步修订风险揭示书，新版文件7月6日正式启用。公告明确，存量已开通对应板块权限的投资者无须重新签署，新开通权限投资者必须签署新版文件方可参与交易。多家券商提醒投资者，在参与股票投资前，仔细阅读交易所规则、券商新版风险揭示书，合理调整交易策略，规避因规则不熟悉引发的操作风险与投资亏损。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129030","time":1783291312000,"title":"上周逾百亿资金回流股票ETF，硬科技板块热度居高不下","text":"在A股近期的震荡调整行情中，资金借道ETF逆势布局。上周股票型ETF获得资金净流入超过110亿元。从资金流向看，资金大举加仓以半导体为代表的硬科技板块，同时部分资金减持了消费电子等赛道。在业内人士看来，近期科技板块成交热度持续攀升，交易拥挤度较高，资金正在从“泛科技”向“AI业绩兑现”集中。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1636032027202","time":1783290754000,"title":"科技部部长阴和俊：建设科技强国 支撑高质量发展","text":"科技部部长阴和俊：建设科技强国 支撑高质量发展","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14QVA0O05346936.html","importance":""},{"id":"wscn3129028","time":1783290628000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 15:00 瑞士6月失业率；\n② 16:30 欧元区7月Sentix投资者信心指数；\n③ 17:00 欧元区5月PPI，欧元区5月零售销售；\n④ 21:45 美国6月标普全球服务业PMI终值；\n⑤ 22:00 美国6月ISM非制造业指数；\n⑥ 23:00 美联储理事沃勒等发表讲话；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129027","time":1783290531000,"title":"韩国拟设“未来应对基金”，以半导体税收支持未来增长","text":"据韩联社报道，韩国将利用半导体热潮带来的税收收入设立一项“未来应对基金”，将资金投入未来的增长引擎，并努力缓解日益加剧的不平等现象。据报道，韩国总统秘书室室长姜勳植在一次政府会议上表示，该基金还将支持住房建设和初创企业，并为20多岁和30多岁的人群创造就业机会。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129022","time":1783289376000,"title":"芬兰总统斯图布会见王毅","text":"据央视新闻，当地时间7月5日，芬兰总统斯图布在图尔库会见中共中央政治局委员、外交部长王毅。斯图布称，芬方期待同中国加强高层交往，拓展绿色经济、人工智能等新兴领域合作，深化多边协作，携手应对全球性挑战。王毅称，中国将继续做当今世界重要的和平力量、稳定力量和发展力量，愿同芬方坚持面向未来的新型合作伙伴关系定位，遵循两国元首的战略引领，加强协作、分享机遇、共迎挑战。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129021","time":1783289285000,"title":"委内瑞拉地震死亡人数升至3342人","text":"委内瑞拉全国代表大会主席豪尔赫·罗德里格斯5日通过社交媒体发文称，该国近日发生的两次强震已造成3342人死亡、16740人受伤。委官方最新统计数据显示，截至目前已有6462人获救，仍有17345人无家可归。自6月24日强震发生以来，已记录到995次余震。（新华社）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129020","time":1783289107000,"title":"纳指期货周一亚市盘初涨逾1%","text":"美股期货亚市盘初走高，标普500指数期货涨0.4%，纳斯达克100指数期货涨1.2%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607063794350536","time":1783288996000,"title":"7月6日国内四大证券报纸、重要财经媒体头版头条内容精华摘要","text":"【四大证券报纸、重要财经媒体头版头条摘要】1、A股交易新规今起施行，投资者需注意三大变化。2、央行今日开展1万亿元买断式逆回购操作，期限为3个月。3、车船税调整拉开“油电同权”大幕，新能源汽车进入市场驱动新阶段。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794350536.html","importance":"important"},{"id":"em202607053794319895","time":1783288840000,"title":"东方财富财经早餐 7月6日周一","text":"【东方财富财经早餐 7月6日周一】1、证监会修改再融资规则，定增、小额融资全面松绑。2、华为何庭波发布V2版“韬定律”论文补充工程细节和实测数据。3、央行今日开展10000亿买断式逆回购操作。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607053794319895.html","importance":"important"},{"id":"em202607063794344467","time":1783284057000,"title":"电子布价格连涨 产业链上游高端织机紧缺","text":"【电子布价格连涨 产业链上游高端织机紧缺】如果说PCB（印制电路板）是AI芯片等电子元件的“神经系统”，那么电子布就是为PCB提供强度的“骨架”。东吴证券研究所研报称，铜箔、电子布和树脂三种材料共同构成PCB的物理基础。其中，电子布由极细的玻璃纤维编织而成，主要为电路板提供机械强度和刚性，防止PCB出现弯曲与形变。近期，随着下游AI需求爆发，国内电子纱市场主流产品G75及7628型号电子布的价格再次上行，涨幅明显。卓创资讯数据显示，月初电子纱平均涨幅为2500元/吨，电子布价格上涨1.2元/米左右，细纱、超细纱价格亦有明显提涨。现阶段供需错配格局暂难缓解，电子布货源紧俏仍将持续。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794344467.html","importance":"hot"},{"id":"1639485898545","time":1783280701000,"title":"“Token第一股”迅策科技股价高点回撤70%，2025年营收12亿仍亏损","text":"“Token第一股”迅策科技股价高点回撤70%，2025年营收12亿仍亏损","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14HBHSM0531MMSF.html","importance":""},{"id":"em202607063794344993","time":1783274936000,"title":"提升融资效率 收紧套利通道 再融资新规打出“一松一紧”两张“牌”","text":"【提升融资效率 收紧套利通道 再融资新规打出“一松一紧”两张“牌”】上市公司再融资规则迎来系统性优化。中国证监会近日就完善上市公司再融资规则公开征求意见，对储架发行、小额快速融资、发行定价、控股股东定增、可转债及募资投向等六方面规则进行了修改。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794344993.html","importance":"important"},{"id":"em202607063794341918","time":1783274392000,"title":"车船税调整拉开“油电同权”大幕 新能源汽车进入市场驱动新阶段","text":"【车船税调整拉开“油电同权”大幕 新能源汽车进入市场驱动新阶段】自2027年1月1日起，节能汽车减半征收车船税政策，以及纯电动商用车、插电式（含增程式）混合动力汽车、燃料电池商用车车船税免征优惠将取消。这意味着，实施15年的新能源汽车车船税优惠政策，正式进入退出倒计时。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794341918.html","importance":"important"},{"id":"em202607063794343079","time":1783274377000,"title":"央行今日开展1万亿元买断式逆回购操作 期限为3个月","text":"【央行今日开展1万亿元买断式逆回购操作 期限为3个月】中国人民银行近日发布公告称，将在7月6日以固定数量、利率招标、多重价位中标方式开展1万亿元买断式逆回购操作，期限为3个月（91天）。鉴于该期限品种当月有8000亿元到期量，此次3个月期买断式逆回购操作将实现加量续作，结束了该期限品种连续3个月的缩量进程。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794343079.html","importance":"important"},{"id":"1631167908934","time":1783274084000,"title":"别问AI像不像人了，先问它在灾难里能不能逃命","text":"别问AI像不像人了，先问它在灾难里能不能逃命","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L14B21MC051188EA.html","importance":""},{"id":"wscn3129023","time":1783273620000,"title":"伊朗最高领袖任命埃杰伊继续担任司法总监","text":"据伊朗最高领袖办公室当地时间5日消息，伊朗最高领袖穆杰塔巴·哈梅内伊发布任免令，再次任命穆赫辛尼·埃杰伊为伊朗司法总监。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129024","time":1783270800000,"title":"以军称已全面控制黎巴嫩南部博福特岭","text":"5日，以色列国防军总参谋长扎米尔前往黎巴嫩南部的博福特岭。扎米尔说，在攻占博福特岭后，目前以军已全面控制了这一地区的地面部分及地下隧道网络。他还表示，以军将继续采取行动消除来自黎巴嫩的威胁。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607053794298783","time":1783268950000,"title":"2天28家企业！科创板IPO受理数量迎高峰 半导体公司占比超七成","text":"【2天28家企业！科创板IPO受理数量迎高峰 半导体公司占比超七成】今年6月末，A股IPO市场迎来一波受理高峰。据统计，仅6月最后三个交易日，沪深北交易所合计受理企业达113家。其中，科创板表现尤为亮眼——今年6月29日至6月30日，共有28家企业集中获受理，拟募资总额超280亿元，半导体企业占比高达75%，覆盖设备、材料、芯片设计等产业链关键环节。","source":"东方财富","category":" 五”规划》出炉！设置18项具体指标】7月3日，据中国政府网消息，日前，国务院印发《美丽中国建设“十五五”规划》（以下简称《规划》），明确了“十五五”时期全面推进美丽中国建设的总体要求、目标指标、重点任务和重大工程。《规划》提出，到2030年，生态环境质量全面改善，美丽中国建设取得新的重大进展。绿色生产生活方式基本形成，碳达峰目标如期实现，主要污染物排放总量持续减少，固体废物综合治理能力和水平显著提升，城乡人居环境显著改善。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607053794324467.html","importance":"important"},{"id":"163556537131","time":1783267959000,"title":"花14亿买了家顺风车公司，同程到底图什么？","text":"花14亿买了家顺风车公司，同程到底图什么？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1457LEB051196HN.html","importance":""},{"id":"em202607053794292740","time":1783267929000,"title":"这些银行股估值低位、高管及股东真金表态！普通投资者能抄作业吗？","text":"【这些银行股估值低位、高管及股东真金表态！普通投资者能抄作业吗？】多家上市银行再迎股东大手笔增持，传递出明确的长期看好信号。7月，常熟农商行连发两则公告，两家地方国资股东合计增持股份超3000万股；在此之前，该行高管团队也曾以自有资金增持，累计增持55万股。放眼整个A股银行板块，年内邮储银行、成都银行、重庆农商行、苏州农商行、瑞丰农商行等多家上市银行，均披露股东或管理层在二级市场的加仓动作。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607053794292740.html","importance":""},{"id":"em202607053794311043","time":1783267860000,"title":"全市场规模最大ETF易主 黄金ETF华安登顶","text":"【全市场规模最大ETF易主 黄金ETF华安登顶】全市场规模最大ETF正式易主。资讯显示，截至7月3日，ETF总规模为4.67万亿元。其中，黄金ETF华安规模超过沪深300ETF华泰柏瑞，成为全市场规模最大的ETF。沪深300ETF华泰柏瑞此前多年位居ETF规模榜首，规模最高时超过4300亿元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607053794311043.html","importance":""},{"id":"em202607053794292640","time":1783267800000,"title":"凯瑞德拟投资艾可萨科技 公告前一个交易日股价涨停","text":"【凯瑞德拟投资艾可萨科技 公告前一个交易日股价涨停】7月5日晚间，凯瑞德发布公告称，公司以自有资金8000万元认购艾可萨科技（成都）有限公司（以下简称艾可萨科技）新增注册资本，对应艾可萨科技增资后11.7647%的股权。公告显示，目前，凯瑞德已经签订了《投资合同书》，并支付了8000万元增资款。本次股权变更对应的工商变更登记已办理完成。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607053794292640.html","importance":"important"},{"id":"1639391859483","time":1783267793000,"title":"中国历史中的货币竞争","text":"中国历史中的货币竞争","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1450KH805199DKK.html","importance":""},{"id":"em2026070537943103 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
