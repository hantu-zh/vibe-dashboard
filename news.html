方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787304792.html","importance":""},{"id":"em202606303787301570","time":1782777873000,"title":"鼎泰高科：H股发行价格不超过每股380港元","text":"【鼎泰高科：H股发行价格不超过每股380港元】鼎泰高科(301377)6月30日早间公告，6月30日，公司按照有关规定在香港联交所网站刊登并派发本次发行上市H股招股说明书。公司本次全球发售H股基础发行股数为1263.2万股。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787301570.html","importance":""},{"id":"wscn3126365","time":1782777717000,"title":"韩国首尔综指盘初涨幅扩大至1.1%。\n","text":"韩国首尔综指盘初涨幅扩大至1.1%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3126364","time":1782777697000,"title":"日经225指数高开1%，韩国首尔综指高开0.3%。\n","text":"日经225指数高开1%，韩国首尔综指高开0.3%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787301413","time":1782777659000,"title":"日韩股市高开","text":"【日韩股市高开】韩国KOSPI指数开盘上涨0.3%至8416.70点；日经225指数高开0.89%报70085.60点。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787301413.html","importance":""},{"id":"1635423792347","time":1782777622000,"title":"新能源车逆市涨价，燃油车持续降价，车市怎么突然分化了？","text":"新能源车逆市涨价，燃油车持续降价，车市怎么突然分化了？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0HC1I600519A56K.html","importance":""},{"id":"wscn3126363","time":1782777617000,"title":"齐云山食品香港IPO拟筹资不超过2亿港元","text":"根据呈交香港交易所的公告，齐云山食品在香港发售2500万股股票，发行价区间为每股5港元至8港元。预计7月9日上市交易。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1632526188262","time":1782777610000,"title":"奔驰停发9万人年终奖：德国工业4.0梦碎启示录","text":"奔驰停发9万人年终奖：德国工业4.0梦碎启示录","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0KKAD6T0519S08H.html","importance":""},{"id":"em202606303787108338","time":1782777606000,"title":"怀旧经济要有新体验","text":"【怀旧经济要有新体验】近期，“父母的青春也很新潮”“故地重游，是为了接回自己”“你终于醒啦，现在是2000年一 活跃在朋友圈和社交平台。对消费者来说，此次调整会否如保险营销文案所说，需要欲购从速、赶紧上车？演示利率上限的下调，是否意味着消费者实际收益的缩水？记者调研发现，此次调整，并不影响分红险的合同约定利率，所以未必会影响消费者的实际收益，更多是压缩了画饼式销售的空间。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1632492872359","time":1782774683000,"title":"四个月上涨近90%！这个行业，超预期！","text":"四个月上涨近90%！这个行业，超预期！","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LEPNUO0519DKT1.html","importance":""},{"id":"wscn3126348","time":1782774395000,"title":"摩根士丹利下调油价预测，因霍尔木兹海峡重开速度快于预期","text":"摩根士丹利称，由于霍尔木兹海峡的重开速度快于预期，加之美国出口依然居于高位、中国进口处于低位，该行下调布伦特原油价格预测。将2026年第三季度油价预测下调15美元至75美元/桶；第四季度下调5美元至75美元；2027年第一和第二季度下调5美元至75美元；2027年第三和第四季度下调10美元至70美元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787120226","time":1782774372000,"title":"三环集团：拟全球发售7136.43万股H股 发售价不超100.30港元","text":"【三环集团：拟全球发售7136.43万股H股 发售价不超100.30港元】6月30日早间，三环集团在港交所公告，公司拟全球发售71,364,300股H股，香港发售股份7,136,500股H股，国际发售股份64,227,800股H股，另有15%的超额配股权；发售价不超每股100.30港元；预期股份将于2026年7月9日开始在香港联交所买卖。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606303787120226.html","importance":"hot"},{"id":"1637098828805","time":1782774263000,"title":"强势美元回归？黄金、港股应声大跌，对投资有何影响","text":"强势美元回归？黄金、港股应声大跌，对投资有何影响","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LED8IT05199NPP.html","importance":""},{"id":"wscn3126347","time":1782774060000,"title":"英国6月BRC商店价格指数同比 1.2%，预期 1.3%，前值 1.2%。\n","text":"英国6月BRC商店价格指数同比 1.2%，预期 1.3%，前值 1.2%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1632126467369","time":1782773761000,"title":"美股半导体深V大反弹，西部数据涨超11%，光通信集体大涨，中国资产走强","text":"美股半导体深V大反弹，西部数据涨超11%，光通信集体大涨，中国资产走强","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LDTU7S05199NPP.html","importance":"important"},{"id":"wscn3126346","time":1782773698000,"title":"中国商务部部长王文涛会见德国联邦经济和能源部部长赖歇","text":"6月28日，商务部部长王文涛在布鲁塞尔会见德国联邦经济和能源部部长赖歇，双方就中德、中欧经贸关系坦诚、深入交换了意见。双方一致同意，重启中德经济合作联委会机制，并就尽早召开联委会下一次会议保持沟通。双方将在联委会框架下成立贸易投资工作组和产业合作工作组，分别以政策沟通和政企对话为工作重点。此外，双方同意立即启动出口管制技术层面磋商，以平衡解决各自关切。（中国商务部网站）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126345","time":1782773581000,"title":"美国总统特朗普：提名Keith E. Sonderling为劳工部长。\n","text":"美国总统特朗普：提名Keith E. Sonderling为劳工部长。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3126344","time":1782773458000,"title":"报道：SpaceX与美国讨论捐赠股票给“特朗普账户”","text":"特朗普政府和SpaceX讨论了向特朗普账户（Trump Accounts）捐赠股票的可能性，特朗普账户是政府支持的儿童储蓄账户。目前还不清楚马斯克是否同意捐赠。（Semafor）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3126342","time":1782773276000,"title":"二级市场收票证，海外融资送方案，半年末银行贷款加速冲刺","text":"临近上半年末的关键节点，银行在贷款业务上加速冲刺。二级市场上，票证转贴现利率快速下行，反映出银行加快收购票证的步伐。为了争夺优质客户，银行协调各种资源，推出特色化、低成本融资方案。为了与大型企业建立合作关系，一些银行的境内分行与境外分行密切联动，为企业提供低成本融资方案。种种举措折射出银行根据市场节奏灵活摆布信贷资产的经营思路。专家认为，面对传统贷款业务的低增速，银行业宜深挖客户需求、发展多项业务，从规模导向转向质量与效率驱动。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1632885712127","time":1782773231000,"title":"存储三巨头在美遭遇集体诉讼，集体诉讼对三巨头股价影响有多大？","text":"存储三巨头在美遭遇集体诉讼，集体诉讼对三巨头股价影响有多大？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LDBBEA051983MB.html","importance":""},{"id":"wscn3126341","time":1782772961000,"title":"谷歌母公司支持旨在助推太空产业的金融科技公司","text":"谷歌母公司Alphabet Inc.旗下风投部门GV主导了一轮融资，为太空金融科技公司Nebex提供3000万美元的种子资金。Nebex由Axiom Space Inc.前首席执行官Tejpaul Bhatia创立。Nebex将作为一个在线平台，连接美国太空公司、外国政府和投资者，并从平台上达成的任何交易中抽取佣金。该公司的目标是促成足够大规模的交易，使得尽管面临进出口限制、关税和采购规则等障碍，国际业务依然有利可图。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126340","time":1782772628000,"title":"首次隔夜逆回购操作落地，央行呵护短期流动性","text":"6月29日人民银行开展了3000亿元隔夜逆回购操作。专家表示，隔夜逆回购加强了对短端流动性的精细化管理，也体现了人民银行呵护季末流动性的政策意图。此次操作未披露隔夜逆回购利率。东方金诚首席宏观分析师王青认为，当前隔夜逆回购主要是对7天期逆回购的补充，操作模式有待逐步成熟。未来隔夜逆回购有望常态化操作，利率水平会适时公布。在中信证券首席经济学家明明看来，这意味着，7天期逆回购政策利率定位依然明确。虽然当下隔夜逆回购工具作为短端流动性管理工具创新被投入使用，但7天期逆回购利率作为主要政策利率的定位仍是关键基准。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126339","time":1782772385000,"title":"迎接2026年下半场，分化环境下公私募调整配置思路","text":"当前，在不少公私募机构看来，市场驱动力已从单纯的估值修复全面转向业绩兑现。机构纷纷调整针对下半年的战术，试图在科技主线与价值防御之间寻找新的平衡点。一方面，市场关于AI赛道的分歧显现，越来越多资金聚焦涨价持续、景气度高企以及能够兑现业绩的方向；另一方面，“资金再平衡”焦虑升温，前期受科技主线挤压持续下跌，又有业绩支撑的核心资产（如新能源、创新药等）开始活跃，即便是偏左侧的消费板块也有机构逆势布局，等待承接科技板块溢出的资金。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3126336","time":1782772249000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 07:30 澳洲联储助理主席肯特讲话，日本5月求才求职比与失业率；\n② 07:50 日本5月工业产出初值；\n③ 时间待定 2026中国智算产业生态发展年会，聚焦GW级Token工厂建设；\n④ 09:30 中国6月官方制造业、非制造业、综合PMI，澳洲联储发布6月份货币政策会议的纪要文件；\n⑤ 14:00 英国一季度GDP终值；\n⑥ 15:40 欧洲央行副行长Vujcic主持一场会议（6月29日至7月1日，欧洲央行在葡萄牙Sintra举办中央银行论坛）；\n⑦ 15:55 德国6月失业人数与失业率；\n⑧ 16:40 欧洲央行执委Elderson主持一场会议；\n⑨ 18:40 欧洲央行执委Schnabel主持一场会议，英国央行副行长Breeden将在该场合谈论人工智能（AI）；\n⑩ 20:00 德国6月CPI初值，欧洲央行执委Cipollone讲话；\n⑪ 20:30 加拿大4月GDP；\n⑫ 21:00 美国4月FHFA房价指数，S&P/CS20座大城市房价指数；\n⑬ 21:30 欧洲央行首席经济学家Philip Lane与OpenAI首席分析师Chatterji对话；\n⑭ 22:00 美国5月JOLTS职位空缺，6月谘商会消费者信心指数；\n⑮ 美股盘后 耐克发布业绩报告；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126338","time":1782772213000,"title":"美国贸易办公室（USTR）：正致力于敲定瑞士贸易协议。\n对瑞士方面取得的进展表示欢迎。\n","text":"美国贸易办公室（USTR）：正致力于敲定瑞士贸易协议。\n对瑞士方面取得的进展表示欢迎。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126337","time":1782772042000,"title":"3家公司告别A股，最后交易日收盘价均不足1元","text":"6月29日晚，3家沪市公司同时披露股票终止上市暨摘牌公告。退市太和（原“*ST太和”）、退市沪科（原“*ST沪科”）股票将于7月3日终止上市并摘牌；退市创兴（原“*ST创兴”）股票将于7月6日终止上市暨摘牌。3家公司均因2025年年报财务指标“不达标”而触及终止上市情形。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126335","time":1782771716000,"title":"热点概念炒作频频引发股价异动，A股公司密集提示风险厘清业务边界","text":"6月17日以来，A股已有50多家公司针对AI服务器、光模块、人形机器人、可控核聚变等热点概念炒作发布股价异动公告或风险提示公告，主动回应市场关切、厘清业务边界和提示投资风险。专家表示，投资者须警惕相关公司的“三无”信号，即无核心技术迭代、无规模化订单、无现金流支撑，方能规避概念炒作陷阱。从中长期看，产业估值将逐渐从“叙事驱动”转向“业绩验证”逻辑，真正具备技术壁垒与订单转化能力的企业将获得估值溢价。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787109564","time":1782771352000,"title":"中欧贸易投资磋商机制联合声明","text":"【中欧贸易投资磋商机制联合声明】2026年6月29日，中华人民共和国商务部部长王文涛与欧盟委员会贸易和经济安全及机构间关系和透明度委员马罗什·谢夫乔维奇在布鲁塞尔举行中欧贸易投资磋商机制首次会议。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787109564.html","importance":"hot"},{"id":"wscn3126332","time":1782771352000,"title":"立讯精密：拟全球发售约3.83亿股H股，发售价不超63.28港元","text":"Luxshare Precision（立讯精密）申请通过香港IPO发行3.83亿股股票。\n发行价指导区间上限为每股63.28港元。\n预计股票将于7月7日定价，将从7月9日开始交易。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3126331","time":1782771313000,"title":"分红险演示利率上限调降在即，营销端现“倒计时”式炒作","text":"近日调研获悉，随着分红险演示利率上限调降临近，在保险营销圈，以分红险“利率下调”为噱头的炒作式营销开始上演，营销员试图通过“倒计时”等话术吸引消费者投保。有业内人士认为，相较以往保险产品预定利率调整，这一轮演示利率调整对产品实际收益率影响并不大，保险营销员制造“利率下降”的焦虑，意在诱导消费者尽快购买产品。消费者应对此保持谨慎，避免冲动投保。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202606303787109870","time":1782771296000,"title":"立讯精密在港交所公告：在港上市拟发行3.834亿股H股 定价不高于63.28港元/股","text":"【立讯精密在港交所公告：在港上市拟发行3.834亿股H股 定价不高于63.28港元/股】立讯精密在港交所公告，在港上市拟发行3.834亿股H股（视乎超额配股权行使与否而定），定价不高于63.28港元/股，预期7月7日开始交易。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606303787109870.html","importance":""},{"id":"wscn3126330","time":1782771058000,"title":"相关主题ETF上周“吸金”超过250亿元，A股半导体板块高景气下波动加大","text":"据Choice测算，上周，半导体相关主题ETF合计资金净流入258.87亿元。具体来看，科创芯片ETF嘉实净流入37.81亿元，半导体设备ETF国泰净流入29.18亿元，科创半导体ETF华夏净流入28.52亿元。此外，芯片ETF华夏、半导体设备ETF易方达、半导体设备ETF广发、科创芯片ETF汇添富等净流入均超过16亿元。百亿级半导体主题ETF批量涌现。截至6月26日，有7只半导体主题ETF规模超过百亿元。而在2025年底仅有3只。不过，由于短期涨幅较大，部分基金经理认为，半导体板块后续波动会加大。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1632273145473","time":1782770703000,"title":"华尔街正为一场不会到来的加息买单，预期差酝酿利率敏感行业反转机会","text":"华尔街正为一场不会到来的加息买单，预期差酝酿利率敏感行业反转机会","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LB0HR705198NMR.html","importance":"important"},{"id":"em202606303787109457","time":1782770631000,"title":"6月30日国内四大证券报纸、重要财经媒体头版头条内容精华摘要","text":"【四大证券报纸、重要财经媒体头版头条摘要】1、国务院：深入实施“人工智能+”行动，促进智能产品和服务规模化商业应用。2、“十五五”新型能源体系规划落地，20万亿投资释放多元产业机遇。3、驱车200公里抢货！中国空调欧洲“爆单”，美的回应：已加班加点排产。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787109457.html","importance":"important"},{"id":"wscn3126329","time":1782770583000,"title":"周二亚太盘初，美国股指期货走低，纳斯达克100指数跌0.2%。\n","text":"周二亚太盘初，美国股指期货走低，纳斯达克100指数跌0.2%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293787066265","time":1782770452000,"title":"东方财富财经早餐 6月30日周二","text":"【东方财富财经早餐 6月30日周二】1、国常会听取人工智能发展情况汇报：要加力推进人工智能创新突破。2、三星正式宣布2655万亿韩元的投资计划，涉及半导体、AI算力数据中心等。3、涉嫌操纵DRAM价格及供应，三星、SK海力士和美光在美遭集体诉讼。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293787066265.html","importance":"important"},{"id":"wscn3126343","time":1782769824000,"title":"中欧贸易投资磋商机制联合声明发布","text":"在中欧贸易投资磋商机制首次会议中，双方均指出，妥善处理影响双边经贸关系的挑战具有重要意义，并同意寻求切实可行的解决方案。中欧贸易投资磋商机制初步下设四个工作板块：贸易和投资平衡，出口管制，知识产权，世贸组织改革。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"w <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
