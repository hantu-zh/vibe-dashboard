信我们能维持停火状态。\n最终结果如何将取决于伊朗。\n我们将在伊朗谈判方面提供机会。\n以色列在许多方面都是美国的好伙伴。（福克斯新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606203776952590","time":1781959930000,"title":"携宠出行成航司竞争新赛道","text":"【携宠出行成航司竞争新赛道】节假日出游出行，宠物谁来照顾？这是很多养宠家庭的难题。近两年，随着铁路民航相继出台宠物托运等相关措施，“携宠出行”越来越便捷。近期，带着自家“毛孩子”一同乘坐飞机出行，也成了养宠家庭的一个新选择。据了解，目前国内已有10余家航空公司推出“宠物进客舱”运输服务，其中南航“宠物进客舱”服务已经累计覆盖35个国内机场站，辐射760条航线。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606203776952590.html","importance":""},{"id":"wscn3122259","time":1781959843000,"title":"伊朗外交部长会见巴基斯坦内政部长。（伊朗SNN新闻社）\n","text":"伊朗外交部长会见巴基斯坦内政部长。（伊朗SNN新闻社）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3122258","time":1781959781000,"title":"投降的艺术：全球市场在美国-伊朗签署谅解备忘录后大涨，平静可能是暂时的","text":"受美国与伊朗达成停火协议的消息提振，全球金融市场本周大幅上涨，市场对中东地区爆发更广泛冲突的担忧得以缓解。然而，在题为《投降的艺术》（The Art of Capitulation）的报告中，Jefferies（杰富瑞）策略师Christopher Wood认为，尽管市场反应积极，但Jefferies并不认为停火协议将是可持续的。报告认为，任何被视为对伊朗过分有利的协议都可能遭到华盛顿国家安全机构部分人士的抵制。这种阻力可能会使实施工作复杂化，并破坏该协议的长期可行性。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3122257","time":1781959306000,"title":"端午当天深圳铁路多项数据刷新历史纪录","text":"深圳铁路部门20日发布的统计数据显示，6月19日端午当天，深圳铁路迎来客流高峰，多项数据刷新历史纪录。据统计，6月19日当天，深圳铁路累计发送旅客56.18万人，较去年同期增幅高达14.44%。光明城站当日发送旅客0.83万人次，到达旅客0.89万人次，到发旅客合计1.72万人次，三项指标均创历史纪录。深圳坪山站发送旅客2.53万人次，同样刷新了单日发送量的历史纪录。（中新网）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1637743553445","time":1781959271000,"title":"世界酒庄联盟即将扩容！郎酒向世界级名酒再进一步","text":"世界酒庄联盟即将扩容！郎酒向世界级名酒再进一步","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/KVT50KQC051986UM.html","importance":""},{"id":"wscn3122256","time":1781959214000,"title":"美伊达成协议重开霍尔木兹海峡后，澳大利亚逐步缩减燃油税减免","text":"本周早些时候，美国和伊朗同意重新开放霍尔木兹海峡，澳大利亚政府随即宣布，将把临时燃油税减免的幅度缩减一半。\n自3月起实施、原定于本月到期的该补贴方案，其汽油和柴油每升0.32澳元（约合0.22美元）的降幅，将在7月份缩减至每升0.16澳元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3122255","time":1781958701000,"title":"英媒：伊朗或向霍尔木兹海峡通行船只收“保险费”","text":"英国媒体19日披露，伊朗波斯湾海峡管理局发布文件，要求所有船只必须持有该机构批准的保险，才能通过霍尔木兹海峡。这项保险在美国与伊朗谅解备忘录所规定的期限内免费，后续可能收费。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3122254","time":1781958296000,"title":"育碧联合创始人克劳德·吉约莫遭遇空难身亡，享年69岁","text":"据公司方面证实，1986年与兄弟们共同创立法国电子游戏发行商育碧娱乐公司（Ubisoft Entertainment SA）的克劳德·吉约莫（Claude Guillemot）不幸去世，享年69岁。\n育碧在一份声明中表示：“得知集团联合创始人兼吉约莫集团（Guillemot Corp.）董事长克劳德·吉约莫在事故中丧生，育碧深感悲痛。在这段艰难时期，我们的心与他的家人和亲友同在。目前暂无进一步声明。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"163601067530","time":1781958150000,"title":"巴奴火锅“死磕”上市：去年赚了2亿，但仍欠缴80万社保和公积金","text":"巴奴火锅“死磕”上市：去年赚了2亿，但仍欠缴80万社保和公积金","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/KVT430NG0519APGA.html","importance":""},{"id":"1632494107754","time":1781958001000,"title":"轻烃化工第一股，打破垄断！","text":"轻烃化工第一股，打破垄断！","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/KVT2NI0F0539IMJ0.html","importance":""},{"id":"em202606203776951190","time":1781957951000,"title":"天华新能：硫化物固态电解质及富锂锰基正极材料研发获进展","text":"【天华新能：硫化物固态电解质及富锂锰基正极材料研发获进展】天华新能6月20日在互动平台表示，公司硫化物固态电解质及超纯硫化锂已形成工艺包及核心专利，部分样品已送客户测试并获得合格评价。富锂锰基正极材料已完成部分产品定型，可适配固态、液态及固液混合电池体系，宜兴基地在建生产线可满足其规模化生产需求。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606203776951190.html","importance":""},{"id":"1639971348077","time":1781957917000,"title":"比亚迪大唐：我要打十个|CDM新经典系列","text":"比亚迪大唐：我要打十个|CDM新经典系列","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/KVT3RD8U051188EA.html","importance":""},{"id":"sinacomos:nieakfq1756514","time":1781957797000,"title":"磷酸铁锂行业高端突围战打响，德方纳米持续“失血”中仍大手笔扩产","text":"锂电正极材料行业当前正处于低端产能总量过剩、同质化竞争激烈，高端高性能产品有效供给则持续紧缺的结构性分化格局。能否实现高端产品稳定、大规模供货...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/jjxw/2026-06-20/doc-inieakfq1756514.shtml","importance":""},{"id":"em202606203776950796","time":1781957610000,"title":"外资机构：越来越开放的中国市场 越来越有吸引力","text":"【外资机构：越来越开放的中国市场 越来越有吸引力】《新闻联播》今日播出的一则报道用时1分53秒介绍了外资机构看好中国市场的报道。报道称，今年以来，我国制度型开放持续推进，为深耕中国的跨国企业带来更多机遇。就在前两天举行的陆家嘴论坛上，多位外国嘉宾表示，在当前世界充满不确定性的大背景下，中国经济持续向好，让深耕中国市场的外资企业信心倍增。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776950796.html","importance":""},{"id":"wscn3122252","time":1781957355000,"title":"伊拉克国家石油营销组织（SOMO）负责人Ali Nizar：目前有两艘船正在该国南部码头装载原油，但需要更多船只进入霍尔木兹海峡，产量才能继续上升。（伊拉克24","text":"伊拉克国家石油营销组织（SOMO）负责人Ali Nizar：目前有两艘船正在该国南部码头装载原油，但需要更多船只进入霍尔木兹海峡，产量才能继续上升。（伊拉克24电视台）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3122251","time":1781957312000,"title":"美伊达成协议后，伊拉克要求油田开始提高产量","text":"在旨在全面重新开放霍尔木兹海峡的美伊协议达成后，伊拉克已要求五大主要油田的运营商将产量提升至战前水平，目标产量超过每天300万桶。\n一份日期为6月19日的文件显示，巴士拉石油公司（Basra Oil Co.）已要求将鲁迈拉（Rumaila）、西古尔纳-1（West Qurna-1）、西古尔纳-2（West Qurna-2）、祖拜尔（Zubair）和阿塔维（Artawi）油田的产量提升至最大可用产能。伊拉克石油部发言人萨利姆·里卡比（Salim Al-Rikabi）说，产量的恢复将是渐进式的，具体取决于运营状况以及买方安排油轮进行装载的情况。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1639451686437","time":1781957283000,"title":"纸尿裤危机：4家企业资本运作受影响，婴童产品安全国标亟待提高","text":"纸尿裤危机：4家企业资本运作受影响，婴童产品安全国标亟待提高","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/KVSFIMHT0519875F.html","importance":"important"},{"id":"wscn3122250","time":1781957015000,"title":"刚果（金）难民营至少30人死亡，显示埃博拉病毒或正快速蔓延","text":"自5月初以来，在刚果（金）东北部一个流离失所者营地中，至少有30人死亡。营地官员称这一死亡率史无前例，部分死者已被确认死于埃博拉，这表明该疾病可能正在当地迅速蔓延。目前尚无法确认所有死者的具体死因。营地发言人及援助组织明爱会（Caritas）表示，直到周四，在布尼亚（刚果民主共和国埃博拉疫情的中心）的基贡泽（Kigonze）难民营中，患者或其亲属一直拒绝接受检测。\n","source":"华 ://www.163.com/dy/article/KVSO534H0541B741.html","importance":""},{"id":"wscn3122236","time":1781947228000,"title":"黎政府军谴责以军野蛮袭击","text":"黎巴嫩军方今天（6月20日）在社交媒体上发文说，以色列对黎巴嫩的“野蛮袭击”仍在继续，持续的袭击旨在阻挠任何能恢复黎巴嫩稳定的解决方案。文中说，此前最新一轮冲突升级已波及黎南部大部分地区，直至贝卡谷地，造成更多人员伤亡和财产损失。其中，一名黎巴嫩政府军人员在以色列20日对黎南部的空袭中死亡。（CCTV国际时讯）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606203776939846","time":1781947210000,"title":"消费龙头们跨界半导体、算力赛道 多家公司出现股价异动","text":"【消费龙头们跨界半导体、算力赛道 多家公司出现股价异动】近日，保健品行业龙头汤臣倍健（300146.SZ）发布投资半导体公司的公告。事实上，近期还有其他消费上市公司，主营“果汁”的安德利（605198.SH）、主营“味精”的莲花控股（600186.SH）宣布投资半导体、算力等热门科技赛道，主营“玩具”的高乐股份（002348.SZ）公告算力相关业务的进展。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606203776939846.html","importance":""},{"id":"em202606203776938378","time":1781946132000,"title":"从手机到电脑，新一轮涨价来了？","text":"【从手机到电脑，新一轮涨价来了？】从手机到电脑，新一轮“消费电子涨价潮”全面扩散。据央视财经，日前，苹果公司首席执行官蒂姆·库克在采访中透露，受存储芯片成本飙升冲击，苹果计划上调旗下产品售价以对冲成本压力。事实上，苹果并非唯一面临成本压力的品牌。今年已有多家手机厂商宣布涨价，OPPO、一加、vivo自3月份开启调价，小米、荣耀多款机型也相继上调售价。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776938378.html","importance":""},{"id":"wscn3122235","time":1781945931000,"title":"电脑用内存、固态硬盘货源紧张、成本大涨 部分机型较年初涨幅已超过20%","text":"近期电脑市场多个热门品类价格均出现上涨，不仅游戏本价格持续走高，部分高性能轻薄本和创作本也出现不同程度的涨价，虽然目前处于6月的品牌大促期间，但是部分机型较年初涨幅已超过20%。有电脑经销商表示，近期不少畅销本价格普遍上涨数百元至千元不等，目前品牌关注点已经从“抢销量”逐渐转向“保利润”。随着核心零部件成本持续上涨，后续整机价格仍存在进一步上涨的可能。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3122234","time":1781945280000,"title":"美国电网扛不住AI热潮","text":"近来，AI热潮使得美国各地数据中心用电需求猛增，导致多地电价持续走高，部分地区还发布了停电预警。为缓解供电困境，美国联邦能源管制委员会18日要求各区域电网运营商考虑新的协议，加快数据中心等大型用电主体的并网速度。该委员会还表示，今后制定规则时将不再依据美国《国家环境政策法》主动考量对环境的影响。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3122233","time":1781945221000,"title":"腾讯：微信正在灰度测试 AI助手“小微”", <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var sina = _rawData.filter(function(x){ return x.source === '新浪财经'; }).length;
  var ntes = _rawData.filter(function(x){ return x.source === '网易财经'; }).length;
  var xq = _rawData.filter(function(x){ return x.source === '雪球'; }).length;
  var cls = _rawData.filter(function(x){ return x.source === '财联社'; }).length;
  var wscn = _rawData.filter(function(x){ return x.source === '华尔街见闻'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-sina').textContent = sina;
  document.getElementById('stat-163').textContent = ntes;
  document.getElementById('stat-xq').textContent = xq;
  document.getElementById('stat-cls').textContent = cls;
  document.getElementById('stat-wscn').textContent = wscn;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
  
  // Auto-refresh news data every 5 minutes
  setInterval(function() {
    console.log('[NEWS] Auto-refreshing data...');
    tryFetch(remoteUrl);
  }, 5 * 60 * 1000);
})();
</script>
