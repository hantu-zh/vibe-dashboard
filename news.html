来的第三轮集中调价。这轮涨价的原因是什么？会持续多久？相关方面将如何应对挑战？就此，记者近日展开走访调查。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785634553.html","importance":"hot"},{"id":"wscn3125707","time":1782668201000,"title":"轻量化AI设备需求激增，分析师：AI眼镜正加速迎来规模化拐点","text":"市场研究机构Counterpoint Research最新报告显示，2026年一季度全球智能头戴设备市场同比增长高达83%。其中，AR（增强现实）眼镜和无显示屏智能眼镜两大品类成为最强引擎，同比增速分别达到136%和210%。行业向更轻薄、更集成AI能力的方向演进。 国泰海通科技资深分析师李轩表示，今年以来，智能眼镜品类保持强劲增长势头，消费者对轻量化AI可穿戴设备的需求持续旺盛。随着市场走向细分，AI眼镜正加速迎来规模化拐点，从而快速拉动整条产业链的投资与重构。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125706","time":1782668014000,"title":"国内首个千站级5G-A超级上行网络落地应用，新一代通信网数万亿元赛道启航","text":"在2026年上海世界移动通信大会（MWC上海）期间，记者走进上海图书馆（简称“上图”），见证国内首个千站级5G-A超级上行商用网络如何落地，体验5G-A大上行网络赋能的沉浸式AI业务，感受科技如何切实改变文化与日常生活。\n当下，移动通信网络的发展正从面向人快速拓展到智能体，并拉动巨大的产业空间。行业数据印证了这一趋势。中国互联网新闻中心数据显示，未来五年，我国将建成50万座5G-A基站，6G有望2030年商用，预计带动上下游总产出约7万亿元，拉动GDP增长1.5个百分点。新一代通信网撬动数万亿元市场。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125704","time":1782667561000,"title":"券商“把脉”下半年可转债市场投资主线，看好科技板块机遇","text":"今年以来，可转债市场交投升温。Wind数据显示，截至6月28日，可转债市场成交额已达9.42万亿元，同比增长25.46%。展望下半年，分析师普遍认为，虽然当前可转债市场估值处于较高水平，不过下半年仍有结构性机会，投资者可关注科技、产业链“出海”等领域的收益弹性，预计景气成长风格仍为投资主线。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293785641431","time":1782667515000,"title":"普京召开保障国内市场燃料供应的会议","text":"【普京召开保障国内市场燃料供应的会议】俄罗斯总统普京召开保障国内市场燃料供应的会议。他说：“我提议考虑采取更多措施来保障向公民、企业、公司和社会重要组织提供不间断、稳定的燃料供应并讨论如何实施已做出的这方面的决定。”他说，此前储备的燃料已进入国内市场。储备为170万吨，与去年同期基本持平。此外，大型炼油厂的产能已达到满负荷运转，主要燃料的产量在7月份应该超过6月份的水平。政府还设立了一个专门的监测市场情况的指挥部，这个指挥部24小时工作。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785641431.html","importance":""},{"id":"em202606283785625817","time":1782667206000,"title":"渠道涨价、终端稳价 娃哈哈、怡宝上调供货价 瓶装水价格战压力给到经销商","text":"【渠道涨价、终端稳价 娃哈哈、怡宝上调供货价 瓶装水价格战压力给到经销商】6月以来，多位经销商陆续在社交媒体平台发文，称自7月1日起，娃哈哈纯净水(596ml×24瓶)每箱供应价上调0.5-1元；同样是自7月1日起，华润怡宝桶装水（18.9L）每桶供应价上调1元。若以上述涨价幅度计算，对经销商而言，娃哈哈纯净水596ml/瓶的涨价约0.02元至0.04元。中国食品产业分析师朱丹蓬向红星资本局分析称，饮用水企业此次调价主要指向PET塑料包材等原材料成本的大幅上涨。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785625817.html","importance":"hot"},{"id":"wscn3125701","time":1782666869000,"title":"机构：证券行业并购整合仍具备较大空间","text":"今年以来，除中金公司、东吴证券两起已进入审核通道的券商并购项目外，行业内的并购动作也在持续落地。4月份，东方证券公告称，正在筹划通过发行A股股份及支付现金的方式收购上海证券100%股权，5月份交易细节正式对外披露，股份发行价格按照定价基准日前120个交易日上市公司A股股份的交易均价10.49元/股确定，各项筹备工作正在稳步推进。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293785639738","time":1782666826000,"title":"布局万亿新赛道 共织算力“一张网”","text":"【布局万亿新赛道 共织算力“一张网”】需求“上不言顶”,算力“一机难求”,投资“快马加鞭”……面向算力千倍级的增长，我国算力网建设正跑出“加速度”。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785639738.html","importance":""},{"id":"em202606293785638996","time":1782666032000,"title":"中国地震局对四川宜宾市高县地震启动三级应急响应","text":"【中国地震局对四川宜宾市高县地震启动三级应急响应】据中国地震台网正式测定，2026年6月29日0时12分，在四川宜宾市高县（北纬28.50度，东经104.69度）发生5.5级地震，震源深度6公里。中国地震局启动三级应急响应。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785638996.html","importance":"hot"},{"id":"wscn3125700","time":1782666012000,"title":"中小银行资本补充渠道亟待拓展","text":"梳理国家金融监督管理总局官网公开信息发现，截至6月28日，6月份已有浙江浦江农村商业银行、舟山定海海洋农村商业银行等超20家中小银行变更注册资本事项获批。不同类型银行资本补充渠道畅通度分化明显，这一现象已受到监管层高度关注。当前全行业资本充足率呈下滑态势，搭建多元、可持续的资本补充机制，已成为银行业尤其是中小银行亟待破解的核心课题。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125699","time":1782665050000,"title":"美国和伊朗即将举行的谈判已被取消。（以色列i24NEWS）\n","text":"美国和伊朗即将举行的谈判已被取消。（以色列i24NEWS）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293785638255","time":1782664398000,"title":"四川宜宾市高县发生5.5级地震 震源深度6公里","text":"【四川宜宾市高县发生5.5级地震 震源深度6公里】中国地震台网正式测定：6月29日0时12分，在四川宜宾市高县（北纬28.50度，东经104.69度）发生5.5级地震，震源深度6公里。据网友反映，成都、重庆等地震感明显。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785638255.html","importance":"hot"},{"id":"wscn3125698","time":1782664268000,"title":"四川宜宾高县5.5级地震，中国地震局启动三级应急响应","text":"中国地震台网正式测定：6月29日00时12分，在四川宜宾市高县(北纬28.50度，东经104.69度)发生5.5级地震，震源深度6公里。中国地震局启动三级应急响应。\n从四川省消防救援总队了解到，地震发生后，四川省消防救援总队已启动应急响应，调派宜宾支队赴震中侦察灾情。截至29日1时，首批救援力量已抵达震中沙河镇，暂无房屋倒塌、人员被困情况报告。此外，四川省地震局已派出现场工作队赶赴震区，协助开展应急处置工作。（新华社，央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125697","time":1782662715000,"title":"伊拉克在反腐行动中拘留的官员包括负责分销事务的副石油部长，美以发动伊朗战争后曾制裁该官员","text":"伊拉克政府发言人表示，伊拉克安全部队于当地时间周日清晨逮捕了多名政客和高级官员，这是由总理阿里·扎伊迪下令开展的更大规模反腐行动的一部分。\n法律和安全消息人士称，精锐的反恐特种部队（CTS）连夜突袭了巴格达戒备森严的“绿区”内的多处住宅，拘留了多名嫌疑人。\n伊拉克国家通讯社（INA）援引一名高级官员的话称，共有47名嫌疑人被拘留，其中包括议员和政府官员\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202606283785628126","time":1782661212000,"title":"协转易主“变频加速”：有公司30天内完成过户 有公司时隔一周快速终止","text":"【协转易主“变频加速”：有公司30天内完成过户 有公司时隔一周快速终止】从协议签署到合规确认到最终过户，无论成功失败，这些协转易主“变频加速”案例所用时间都较其他案例普遍耗时数月乃至大半年大为缩短，使上市公司控制权转移的效率明显提升。针对协转易主“变频加速”，一位资深投行人士对财联社记者表示：“（协转）主要还是看买方资质，能向监管证明自己资金实力和未来改善上市公司业绩的能力。而（上市公司）跨界（并购）需要标的质量比较好，上市公司也比较规范才能批。”","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785628126.html","importance":"hot"},{"id":"wscn3125696","time":1782660619000,"title":"德国连续三天刷新本国最高气温纪录","text":"根据德国气象局当地时间6月28日发布的初步数据，当天下午4时左右，德国勃兰登堡州的科申气象站测得41.7摄氏度高温。这是德国连续第三天刷新最高气温纪录。此前，德国气象局26日在西部城市萨尔布吕肯测得41.3摄氏度高温，27日在东部默肯-德雷维茨地区测得41.5摄氏度高温。德国气象局预计，气温将从28日晚间开始逐渐下降，并伴有雷暴等恶劣天气。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nieyrik3569802","time":1782660314000,"title":"突然，热门赛道遭抛售！华尔街，重大警告","text":"美股“AI交易”出现裂痕。 据美银证 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
