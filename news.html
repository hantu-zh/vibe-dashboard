le":"华灿光电：正积极推进Micro LED技术产业化落地 但目前尚未产生收入","text":"【华灿光电：正积极推进Micro LED技术产业化落地 但目前尚未产生收入】7月2日，华灿光电在接待机构调研时表示，京东方华灿作为京东方体系内Mini/MicroLED业务的核心承载平台，是集团打通从LED芯片到显示终端全链条的关键布局。在MicroLED赛道，公司持续强化领先优势，已实现6英寸MicroLED规模化量产产线投产，巨量转移与MPD封装工艺成熟，量产良率突破90%，大尺寸晶圆路线显著降低芯片制造成本，","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792521540.html","importance":"important"},{"id":"em202607033792516869","time":1783036327000,"title":"微软考虑合并消费版和企业版AI聊天机器人","text":"【微软考虑合并消费版和企业版AI聊天机器人】据报道，内部备忘录显示，微软计划将旗下Copilot AI聊天机器人的消费版和企业版合并为一个单一应用程序。这款应用程序还将包含AI编码工具和新的AI代理，但客户需要额外付费才能使用。知情人士称，微软计划在8月发布升级后的Copilot。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792516869.html","importance":""},{"id":"wscn3128285","time":1783036267000,"title":"中信建投：全球半导体设备2028市场规模有望较2025翻倍","text":"根据对全球31家半导体制造公司资本开支和25家半导体设备企业增长预期的统计，中信建投研报预测：（1）2028年全球半导体制造企业资本开支有望达到3417亿美元，较2025年的1681亿美元大幅增长103.3%，实现翻倍。资本开支的大幅上调直接传导至设备端；（2）2028年全球前道半导体设备市场（WFE）规模达到2414亿美元，较2025年增长约108%；（3）2028年全球后道半导体设备市场规模约383亿美元，较2025年的161.6亿美元大幅增长136.9%，按下游需求排序，存储（+150%）> 晶圆代工（+91.4%）。中国市场在经历了2025/2026年去库存以后，2027年有望恢复强劲增长。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607023792063318","time":1783036080000,"title":"涨跌幅限制放宽背后：影响百只个股 为何切忌“搏一搏”？","text":"【涨跌幅限制放宽背后：影响百只个股 为何切忌“搏一搏”？】7月6日起，主板ST/*ST个股涨跌幅限制将“松绑”，由5%调整为10%。此次调整涉及个股150余只。多家机构提醒，投资相关个股切勿抱有“跌多了必反弹”“等摘帽就翻身”“便宜搏一下”等侥幸心理。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023792063318.html","importance":"important"},{"id":"1638680945678","time":1783036065000,"title":"超级利好，太猛了！这次我真准备满仓干！","text":"超级利好，太猛了！这次我真准备满仓干！","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T82DBG0519B7K0.html","importance":"important"},{"id":"wscn3128307","time":1783036015000,"title":"随着USMCA贸易谈判重启，福特CEO希望与丰田、通用进口车公平竞争","text":"随着《美国墨西哥加拿大贸易协议》（USMCA）谈判重新开启，福特汽车CEO Jim Farley表示，他希望为汽车制造商创造一个更公平的竞争环境。他认为像福特这样大部分车辆在国内生产的汽车制造商应该得到奖励，而那些依赖进口的其他制造商则应面临惩罚或限制。\n福特报告称，去年在美国组装了超过200万辆汽车，超过任何其他汽车制造商，其中包括出口到60多个国际市场的31.1万辆。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1634719026827","time":1783036001000,"title":"中国快递一哥，到底是谁？","text":"中国快递一哥，到底是谁？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T75MHI0519C95F.html","importance":""},{"id":"wscn3128284","time":1783035782000,"title":"报道：韩国考虑动用5万亿韩元增量税收推进自主AI模型开发，正在讨论购买约1万个英伟达Vera Rubin GPU模块","text":"韩国经济日报报道称，韩国正考虑利用半导体繁荣带来的约5万亿韩元增量税收，为自主人工智能(AI)模型开发提供资金。韩国科技信息通信部正在讨论利用增量税收购买约1万个英伟达Vera Rubin GPU模块，并招募AI人才。为了与全球模型竞争，科技信息通信部考虑将约1万个GPU分配给一个团队，用于构建前沿AI模型，而不是把资源拆分给多家研发机构。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128305","time":1783035720000,"title":"印度警示网络安全风险后，Meta回应称WhatsApp用户名功能已设置多重防诈骗防护机制","text":"在印度政府周三表示，Meta旗下即时通讯平台推出用户名功能可能导致网络犯罪激增后，这家美国社交媒体巨头对此进行了辩护。Meta发言人表示：“用户仍然需要绑定手机号码才能使用WhatsApp，并且我们在用户名功能中构建了多层防御机制来防范诈骗。”这家科技公司表示，它将限制单个账户能够联系的新用户数量，阻止反复猜测用户名的行为，并启用系统来检测和移除表现出常见冒充或滥用模式的活动。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128283","time":1783035674000,"title":"中信建投：关注粉体材料和含氟高分子材料国内标的的成长速度和进口替代加速的机会","text":"中信建投指出，当前AI通胀来到了材料端，而材料环节的标的更加分散，而且多数强势公司在日本，2025年下半年以来双边关系的紧张更有加速迹象。供给端“去日化”，需求端AI通胀成为几乎完美的组合。中信建投判断，“去日化”主题会有更多演绎空间，继续关注“去日化”交易，关注粉体材料和含氟高分子材料国内标的的成长速度和进口替代加速的机会。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128282","time":1783035648000,"title":"京东方Ａ：已成立Micro LED光互连系统及玻璃载板CPO技术攻关项目组 加快技术攻关","text":"京东方Ａ 7月2日在机构调研时表示，在光互连方面，公司在显示产业长期积累的相关技术、玻璃基加工能力及大规模智能制造能力将有效赋能公司光互连技术与玻璃载板CPO技术研发。目前公司已成立Micro LED光互连系统及玻璃载板CPO技术攻关项目组，和生态伙伴进行前瞻技术预研，加快技术攻关。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607033792448362","time":1783035607000,"title":"特斯拉据悉将员工每周AI工具使用费用上限定为200美元","text":"【特斯拉据悉将员工每周AI工具使用费用上限定为200美元】据报道，内部备忘录显示，特斯拉上月告知全体员工，自7月6日起将员工的AI使用支出上限设定为每周200美元。这一举措释放出明确信号：即便那些全力推进AI技术落地、试图用其改造运营模式与产品体系的企业，如今也不得不开始严格管控相关成本。此前一段时间，特斯拉一直在内部大力推广各类AI工具的使用，鼓励员工将其融入日常工作流程。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792448362.html","importance":""},{"id":"wscn3128281","time":1783035551000,"title":"韩国将向受韩元疲软影响的小型企业提供14.9万亿韩元援助。\n韩国将扩大对贸易保险及外汇相关举措的支持。\n","text":"韩国将向受韩元疲软影响的小型企业提供14.9万亿韩元援助。\n韩国将扩大对贸易保险及外汇相关举措的支持。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607033792361056","time":1783035492000,"title":"碳纤维产业迈向高端化规模化","text":"【碳纤维产业迈向高端化规模化】中国建材集团有限公司近日宣布，3条世界级高性能碳纤维生产线在中复神鹰碳纤维股份有限公司连云港基地集中投产，核心装备国产化率达95%以上。本次投产的3条产线覆盖通用、高强、高模三大主流碳纤维品类，应用领域涵盖航空航天、新能源、高端体育、3C电子等。这是继今年3月份我国在全球首次实现SYT80（T1200级）超高强度碳纤维规模化量产后，碳纤维产业发展的又一里程碑。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792361056.html","importance":""},{"id":"em202607033792429132","time":1783035487000,"title":"AI基建遇阻 黑石旗下QTS据悉放弃美弗吉尼亚州数据中心项目","text":"【AI基建遇阻 黑石旗下QTS据悉放弃美弗吉尼亚州数据中心项目】据报道，黑石集团旗下QTS房地产信托公司决定放弃在美国弗吉尼亚州建设数据中心园区的计划。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792429132.html","importance":""},{"id":"1632215367040","time":1783035387000,"title":"券商7月金股转向成长风格：非银增配居前，中际旭创最热","text":"券商7月金股转向成长风格：非银增配居前，中际旭创最热","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T7E3ND0514R9P4.html","importance":""},{"id":"em202607033792395419","time":1783035247000,"title":"Meta首席执行官扎克伯格称AI智能体开发未达预期","text":"【Meta首席执行官扎克伯格称AI智能体开发未达预期】据报道，Meta首席执行官马克·扎克伯格表示，过去四个月AI的智能体开发“并未以我们预期的方式加速”。扎克伯格称，包含大规模裁员在内的重组工作本可以更“干净利落”，公司对新架构的押注“目前还没有取得成效”。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792395419.html","importance":""},{"id":"em2026 :"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792381452.html","importance":"important"},{"id":"em202607033792381188","time":1783034767000,"title":"著名投资人、“大空头”迈克尔·伯里做空美光股票 加仓房利美和房地美等","text":"【著名投资人、“大空头”迈克尔·伯里做空美光股票 加仓房利美和房地美等】著名投资者、“大空头”迈克尔·伯里（MichaelBurry）当地时间7月2日发文称，他已做空美光股票，表示其“最能体现周期性……美光股票是美国主要交易所中唯一纯粹的动态随机存取内存（DRAM）标的，景气时期股价会被过度炒作，不景气时又会被过度抛售”。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792381188.html","importance":""},{"id":"wscn3128279","time":1783034546000,"title":"加拿大Pembina推进燃气数据中心项目","text":"加拿大Pembina Pipeline Corp.将推进一座价值46亿加元（折合32亿美元）的燃气发电厂建设，该电厂将为阿尔伯塔省（石油重镇）的一个数据中心项目供电。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607033792338938","time":1783034402000,"title":"芯原股份董事长戴伟民：端侧AI芯片将是下一个风口","text":"【芯原股份董事长戴伟民：端侧AI芯片将是下一个风口】近日，由证券时报社主办的第十七届上市公司投资者关系管理论坛在深圳举办。芯原股份（688521）董事长戴伟民在会上表示，在大模型、AI基建兴起之后，端侧AI以及相应的ASIC（专用人工智能芯片）将是下一个风口。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792338938.html","importance":""},{"id":"wscn3128278","time":1783034402000,"title":"印度降雨量不足，白糖价格升至10个月高点","text":"由于担忧降雨量低于正常水平可能削减产量，白糖期货价格攀升至去年9月以来的最高水平。印度是仅次于巴西的全球第二大食糖生产国。\n周四在伦敦市场，白糖最活跃合约涨幅一度达到1.4%，但随后回吐了大部分涨幅。纽约市场的原糖期货涨幅一度达到1.2%，随后同样抹去了涨幅。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128276","time":1783034127000,"title":"券商跟投科创板浮盈推至近年高点 红利高度集中头部券商","text":"上半年，半导体等科技板块表现强势，带动券商大投行业务链价值重估，尤其是将券商跟投科创板的浮盈推至近年高点。统计数据显示，截至7月2日，保荐机构跟投限售期未满的科创板上市公司共有38家，为跟投券商带来合计105亿元的账面浮盈。不过，跟投红利高度集中于10家券商，以头部券商居多。有分析师研判，跟投项目为券商带来了可观的账面浮盈，将显著放大券商中期业绩的弹性。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"1633270142689","time":1783034066000,"title":"深圳楼市半年报：一二手住宅合计网签成交超4.7万套，4000万豪宅项目开盘再现日光","text":"深圳楼市半年报：一二手住宅合计网签成交超4.7万套，4000万豪宅项目开盘再现日光","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T65PQ70514R9P4.html","importance":""},{"id":"em202607033792340083","time":1783033980000,"title":"Meta商业模式调整“惊吓”全球科技股 业内人士：算力过剩？没那回事！","text":"【Meta商业模式调整“惊吓”全球科技股 业内人士：算力过剩？没那回事！】天风证券提出，Meta做AI云并不代表GPU全面过剩，而更可能是在把不同代际的AI算力放到不同经济用途上。比如最新的GB200/GB300/Rubin等资源优先服务下一代模型训练；上一代H100/H200则更多转向推理和外部算力销售。算力产业业内人士近期向记者反映，随着AI推理应用爆发，算力租赁市场火热，从去年下半年以来基本处于“卖方市场”，在手订单充沛。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033792340083.html","importance":""},{"id":"1633533726497","time":1783033931000,"title":"道指涨近600点创新高，芯片股大跌，闪迪重挫超14%，热门中概股普跌，霸王茶姬跌逾8%","text":"道指涨近600点创新高，芯片股大跌，闪迪重挫超14%，热门中概股普跌，霸王茶姬跌逾8%","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T61MQT05199NPP.html","importance":""},{"id":"1639034108948","time":1783033743000,"title":"向下兼容，才是财富密码","text":"向下兼容，才是财富密码","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T5RJOC0519DKT1.html","importance":""},{"id":"em202607033792342866","time":1783033551000,"title":"核电小型堆发展提速 算力中心供电或有新突破","text":"【核电小型堆发展提速 算力中心供电或有新突破】在近日举行的先进核能产业研讨会上，多位能源、核能领域专家围绕小型堆配套AI算力中心的发展路径展开研判。上海证券报记者还从业内获悉，近期能源主管部门召开会议研讨小型堆发展事宜，相关部门负责人要求快速推进研发示范。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033792342866.html","importance":"important"},{"id":"em202607033792374528","time":1783033512000,"title":"江西生物：获得兽用破伤风抗毒素批准文号批件","text":"【江西生物：获得兽用破伤风抗毒素批准文号批件】7月3日早间，江西生物在港交所公告，公司旗下全资子公司赤峰博恩药业有限公司近期成功取得兽用破伤风抗毒素产品《兽药产品批准文号批件》。兽用破伤风抗毒素主要用于预防及治疗动物破伤风感染，通过中和破伤风毒素，为存在破伤风感染风险的动物提供被动免疫保护。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792374528.html","importance":""},{"id":"1634547785608","time":1783033502000,"title":"跟投科创板赚翻了 头部券商成最大赢家","text":"跟投科创板赚翻了 头部券商成最大赢家","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T5KJO5053469RG.html","importance":"hot"},{"id":"em202607033792374855","time":1783033500000,"title":"五一视界：拟配售546.56万新H股 每股配售价73.20港元","text":"【五一视界：拟配售546.56万新H股 每股配售价73.20港元】五一视界（06651.HK）公告，公司于2026年7月3日与配售代理订立配售协议，拟按每股73.20港元的价格配售546.56万股新H股，预计所得款项总额约4.00亿港元，扣除佣金及开支后所得款项净额约3.94亿港元，每股净价约72.17港元。配售股份占现有已发行H股总数（39492.20万股）的约1.4%，占配售完成后已发行股份总数的约1.3%。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607033792374855.html","importance":"hot"},{"id":"wscn3128272","time":1783033485000,"title":"中央气象台7月3日06时继续发布台风蓝色预警","text":"中央气象台：南海热带低压已于今天（3日）凌晨加强为今年第10号台风“美莎克”（热带风暴级；英文名称：Maysak；名字来源：柬埔寨；名称意义：一种树），早晨5点钟其中心位于海南省陵水县南偏东约155公里的南海中西部海面，就是北纬17.2度、东经110.5度，中心附近最大风力有8级（18米/秒），中心最低气压为998百帕，七级风圈半径90-110公里。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1632295521831","time":1783033207000,"title":"涉10亿追偿案，广州银行的“雷”还没停","text":"涉10亿追偿案，广州银行的“雷”还没停","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0O8R5TR0539LXZQ.html","importance":""},{"id":"wscn3128271","time":1783033061000,"title":"美国贸易办公室（USTR）将于7月6日针对巴西301调查举行听证会。\n","text":"美国贸易办公室（USTR）将于7月6日针对巴西301调查举行听证会。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3128270","time":1783033055000,"title":"关停“杠杆炒金”通道，银行拧紧个人贵金属业务风险阀门","text":"6月以来，包括交通银行、招商银行、工商银行在内的多家国有大行、股份制银行密集“踩刹车”——宣布将于7月停办代理上海黄金交易所个人贵金属交易业务。在业内人士看来，这是银行主动进行风险管理的举措，通过提前压缩高风险投机业务，防范极端行情下的客户违约风险、声誉风险，同时帮助投资者规避贵金属价格波动带来的资金损失。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128269","time":1783032859000,"title":"科技板块遭遇深度调整，机构建议聚焦细分龙头","text":"7月2日，A股市场迎来大幅调整，前期强势领涨的科技板块首当其冲，半导体、存储芯片、通信设备等热门方向集体重挫。分析人士认为，本轮调整并非基本面逻辑的逆转，而是上半年科技板块极致分化行情下交易拥挤、筹码结构脆弱等风险因素的集中释放。经历半年大幅上涨后，部分高位品种估值与预期透支较为严重，短期回调具有一定的合理性。但从中长期维度来看，AI产业趋势并未改变，机构普遍建议投资者在调整过程中保持定力，关注具备核心竞争力的细分龙头，同时适度配置高股息资产以平滑组合波动。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128268","time":1783032442000,"title":"首批REITs指数基金发行火热，短期回调后配置价值凸显","text":"7月1日，易方达基金、南方基金、华夏基金、中金基金旗下首批中证REITs全收益指数基金同步发行。南方基金旗下产品当日募超3亿元上限，提前结束募集。如顶格募集，四只产品将为REITs市场带来12亿元增量资金。不过，今年以来中证REITs全收益指数已累计下跌逾4%，6月24日更一度跌破1000点关口，部分产业园区类REITs近60个交易日跌幅超30%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128267","time":1783032369000,"title":"科技行情行至十字路口，公募推敲“业绩验证”逻辑","text":"7月初，A股与海外市场半导体板块共振回调，多只龙头股放量下跌。然而，拉长时间轴来看，半导体领域依然是年内最亮眼的投资主线，相关ETF及主动权益基金业绩领跑全市场。短期波动加大背景下，记者采访多家公募机构后发现，在全球半导体景气度超预期及AI算力建设刚需支撑下，机构普遍认为科技板块短期仍处于右侧布局阶段，投资逻辑正从“主题炒作”向“业绩验证”切换。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128266","time":1783032202000,"title":"特朗普称沃什面临“有点敌意”的美联储理事会，重申将推动罢免库克","text":"美国总统唐纳德·特朗普表示，美联储主席凯文·沃什可能无法强迫央行其他官员按照他的意愿制定货币政策。\n特朗普表示：“他面对的理事会可能有点敌意，而且，你知道，很遗憾，也许是一个想做错事的理事会。”\n特朗普这番表态似乎为沃什在利率政策上留出一定回旋余地。此前数月，特朗普一直敦促沃什的前任杰罗姆·鲍威尔降息。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1632030524433","time":1783032201000,"title":"SK海力士单日市值蒸发1万亿元，全球AI故事讲不下去了吗？","text":"SK海力士单日市值蒸发1万亿元，全球AI故事讲不下去了吗？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0T49J1Q051983MB.html","importance":""},{"id":"wscn3128265","time":1783032100000,"title":"多只ETF拆分份额，公募产品普惠性凸显","text":"近期泛AI行情强势演绎，相关基金净值也水涨船高。在此情形下，多只产品选择拆分份额。7月3日，半导体ETF国联安按1∶2的比例进行份额拆分除权，人工智能ETF华夏、半导体设备ETF华夏、科创半导体ETF华夏、通信ETF国泰以当天为权益登记日对登记在册的基金份额进行拆分。Wind数据显示，按权益登记日计算，6月以来约一个月时间，已有18只ETF拆分份额，几乎是今年前五个月的总和。业内人士分析，降低投资门槛、活跃场内流动性、降低基金做市成本是份额拆分背后的主要考量。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128264","time":1783032002000,"title":"京瓷株式会社（Kyocera）未来七年将投资1000亿日元到MLCC（片式多层陶瓷电容器）产品。（日经新闻）\n","text":"京瓷株式会社（Kyocera）未来七年将投资1000亿日元到MLCC（片式多层陶瓷电容器）产品。（日经新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128263","time":1783031851000,"title":"市场供需两旺，磷酸铁锂头部企业量价齐升","text":"“今年二季度，受成本上涨叠加旺季补库需求影响，磷酸铁锂价格再度集中上调，且头部企业持续满产，高端产品供不应求，加速步入高景气周期。”7月2日，一家磷酸铁锂头部企业相关人士表示。今年一季度，受磷酸铁锂价格大幅上涨推动，磷酸铁锂龙头企业盈利普遍大增，湖南裕能同比增长约13倍。有机构预测，行业盈利在二季度有望进一步提升。隆众资讯提供的数据显示，2026年6月磷酸铁锂的月均价为61113.33元/吨，较今年初的月均价51209.52元/吨上涨19.34%，与去年同期33802.08元/吨的月均价相比，涨幅超过80%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3128262","time":1783031743000,"title":"在委内瑞拉中资企业已向委方捐赠物资超120吨","text":"记者从中国驻委内瑞拉大使馆了解到，据初步统计，截至7月2日，在委中资企业已向委方捐赠物资超120吨。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128261","time":1783031645000,"title":"王毅同丹麦外交大臣拉斯穆森会谈","text":"7月2日，中共中央政治局委员、外交部长王毅在哥本哈根同丹麦外交大臣拉斯穆森举行会谈。\n王毅表示，当前两国关系保持健康稳定发展。中国是丹麦在亚洲的最大贸易伙伴，多年来两国经贸合作成果丰硕。中方愿同丹方进一步扩大贸易投资合作，启动商谈新版绿色联合工作方案，以绿色合作为引领，深化科研创新、绿色航运、卫生医疗等领域合作，拓展教育、文化、旅游、青年、体育等领域交流，增进两国人民相互了解与友谊，为中丹全面战略伙伴关系增添新的时代内涵。希望丹麦企业坚定信心，继续投资中国，也希望丹方为中国企业在丹投资兴业提供开放、公平、可预期营商环境。双方应共同维护好双边关系的政治基础，中方赞赏丹方恪守一个中国原则，支持丹麦维护国家主权和领土完整，这符合联合国宪章和国际关系基本准则。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607023792329673","time":1783031618000,"title":"供需紧平衡格局不变 电子布价格“一月一调”","text":"【供需紧平衡格局不变 电子布价格“一月一调”】今年上半年，电子级玻璃纤维布（以下简称“电子布”）价格已历经多轮上调，“一月一调”成为行业常态。进入7月份，已有电子布龙头企业再度宣布涨价。机构调研后普遍预计，这一涨价节奏或将延续至年底。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023792329673.html","importance":""},{"id":"wscn3128260","time":1783031520000,"title":"提醒：淡水河谷将于7月21日披露（矿石）销售数据，将于7月30日发布二季度业绩报告。\n","text":"提醒：淡水河谷将于7月21日披露（矿石）销售数据，将于7月30日发布二季度业绩报告。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1637159867736","time":1783030868000,"title":"五大维度透视传统蓝筹   var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
