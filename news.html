金发行规模突破千亿元。从新发基金特点看，权益基金、“固收+”、FOF三类产品最受资金青睐。与此同时，有逾120只基金正在或即将发行，其中权益类基金担当主力军。在业内人士看来，近期新基金密集发行，尤其是权益类基金加速推出，反映基金公司对后市乐观的态度。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125506","time":1782521219000,"title":"上下游扩产忙，半导体设备迎来增长大年","text":"今年以来，A股已有长电科技、通富微电、华天科技、深科技、诚邦股份等半导体封测及存储模组厂商，芯联集成、民德电子等晶圆制造厂商披露扩产项目，总投资金额近450亿元。究其原因，AI算力需求爆发式增长，对先进AI芯片、存储芯片、高端功率器件（如电源IC）、互连芯片等需求大增，先进制程晶圆制造、先进封装产能持续供不应求。有半导体业内人士表示，半导体晶圆制造和先进封装扩产，叠加存储芯片扩产，给半导体设备、材料厂商带来巨大增长机遇。 (上证报)\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125505","time":1782521185000,"title":"险资机构“组队”投资不动产新范式","text":"在北京中关村，承载了一代人记忆的地标建筑鼎好DH3大厦，近期悄然易主，接盘方包括通过私募股权基金“组队”而来的险资机构。记者了解到，此次险资的投资方式打破了常规，采取“多家险企联合出资、专业机构操盘分工”的创新模式。多位受访业内人士表示，这种联合投资的新模式正在保险行业内快速普及，不仅有利于应对“资产荒”、匹配长久期负债、对冲长期利率下行风险，还能通过专业分工实现优势互补。过去，部分险资更偏好通过二级市场重仓地产股参与地产行业投资；如今，其投资重心逐渐转向实体商业地产，收购单体优质项目公司股权、借道私募股权基金投资等方式更为常见。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606263785174765","time":1782521174000,"title":"“蹭热点”翻车！巨力索具因涉商业航天误导性陈述 公司+高管拟被罚合计950万元","text":"【“蹭热点”翻车！巨力索具因涉商业航天误导性陈述 公司+高管拟被罚合计950万元】6月26日，巨力索具公告披露，公司及相关责任人员已收到中国证监会河北监管局下发的《行政处罚事先告知书》。记者注意到，巨力索具刻意隐瞒了“商业航天”相关业务占2025年收入比例低于0.50%的核心数据。面对市场上“中标4.58亿元项目”等虚假传闻，公司迟迟不作澄清，直至监管督促才对外发布公告，随后公司股价连续跌停。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606263785174765.html","importance":"important"},{"id":"wscn3125504","time":1782521159000,"title":"有券商新客理财约定年化收益率高达8.18%","text":"近期，券商竞相入驻网络平台，通过专属佣金费率、专属理财产品、智能工具体验等吸引新客，其中，高收益的新客理财产品最具吸引力。记者梳理发现，目前多家券商均针对新开股票账户投资者提供购买高收益理财产品的资格，多数产品约定年化收益率在6%以上，最高年化收益率更是达到8.18%。需要注意的是，各家券商的新客理财产品，具有不同的期限、认购额度限制。例如，推出上述约定年化收益率8.18%新客理财产品的券商称，该理财产品为R1等级（低风险），适合C1（保守型）及以上客户，期限30天，1000元起投，最高认购额度为5万元。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nieutzh1746612","time":1782521119000,"title":"万斯谈美军打击伊朗：暴力必将遭到暴力回应","text":"美国副总统JD·万斯在X发帖，援引美国中央司令部关于打击伊朗的声明称“暴力必将遭到暴力回应”。 “伊朗签署了停火协议，我们也遵守了。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-27/doc-inieutzh1746612.shtml","importance":"important"},{"id":"wscn3125503","time":1782521112000,"title":"量子科技迎三重积极变化，产业发展直面长周期考验","text":"近日，上交所发布《上海证券交易所科创板企业发行上市申报及推荐暂行规定（征求意见稿）》。暂行规定修订主要调整更新第五条规定的战略性新兴产业领域二级行业。其中，新一代信息技术领域，新增“量子”。 记者采访获悉，当前量子科技产业正进入产业化节奏加快、资本可投资可退出性预期增强、政策支持逐步细化的新阶段。不过，面对行业共性问题以及与海外同行的差距，行业参与者应秉持耐心和决心。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125502","time":1782521067000,"title":"多国救援队伍抵达委内瑞拉，协助进行震后搜救","text":"当地时间6月26日，德国、瑞士和西班牙的救援队伍抵达委内瑞拉，协助委内瑞拉进行震后搜救行动。此外，秘鲁和约旦的救援队伍于26日启程前往委内瑞拉，巴西、英国等多国也向委内瑞拉派遣了救援队伍。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606263785073287","time":1782520905000,"title":"滔搏否认耐克终止线上授权 但耐克确实有调整渠道规划","text":"【滔搏否认耐克终止线上授权 但耐克确实有调整渠道规划】6月25日，滔搏公告称，截至公告日，公司并未接到耐克就终止于中国内地线上经销安排而发出的任何正式通知。另据记者多方了解，耐克确实有调整渠道规划，甚至此种规划有着一以贯之的脉络。但鉴于滔搏等渠道商的重要地位，具体如何落地双方还在博弈中。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606263785073287.html","importance":""},{"id":"sinacomos:nieuyia4858979","time":1782520878000,"title":"五大行AIC持久战 穿越硬科技周期","text":"硬科技怎么投？我们对话五家大行旗下AIC，复盘这场贯穿存储芯片周期的耐心资本持久战。时间拉回到2023年下半年，全球DRAM（内存芯片）价格跌穿成本线...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-06-27/doc-inieuyia4858979.shtml","importance":""},{"id":"sinacomos:nieuyie1634664","time":1782520866000,"title":"左手倒右手，倒出近6000万罚单 玖瀛资产、腾创投资玩利益输送游戏被重罚","text":"罚没近6000万元！国内私募机构史上最大金额罚单来了。深圳证监局6月26日一则行政处罚决定书，让深圳前海玖瀛资产管理有限公司（以下简称“玖瀛资产”）与深圳市前海腾创投资...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-06-27/doc-inieuy ext":"【Anthropic：MYTHOS 5可重新部署至一批美国机构】人工智能公司Anthropic表示，美国政府批准将Mythos 5系统重新部署至部分美国机构。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606273785396878.html","importance":"hot"},{"id":"xq4734992","time":1782520431000,"title":"Anthropic表示，今日收到美国政府通知，公司最强大的网络安全模型MYTHOS 5可重新部署至一批美国机构。","text":"Anthropic表示，今日收到美国政府通知，公司最强大的网络安全模型MYTHOS 5可重新部署至一批美国机构。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/397098289","importance":"hot"},{"id":"wscn3125501","time":1782520409000,"title":"Anthropic：Mythos 5可重新部署至一批美国机构","text":"Anthropic：自6月12日起，我们一直与美国政府密切合作，以恢复对Claude Mythos 5和Fable 5的访问权限。\n今天政府通知我们，我们最强的网络安全模型Mythos 5可以重新部署给一批美国组织。\n恢复对组织的访问权限，继续与政府合作扩大Mythos 5的访问范围，并让Fable 5再次可供公众使用。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606273785396234","time":1782520396000,"title":"首只新能源领域国家民企联合基金（宁德时代）启动","text":"【首只新能源领域国家民企联合基金（宁德时代）启动】26日，记者从福建省科技厅获悉，新能源龙头企业宁德时代新能源科技股份有限公司入列国家自然科学基金民营企业创新发展联合基金，成为全国新能源领域首家入列该基金的民营企业。日前，2026年度国家民企联合基金（宁德时代）项目指南发布，该基金正式启动。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606273785396234.html","importance":""},{"id":"em202606273785395680","time":1782520335000,"title":"2026国际无人机应用及防控大会在北京举行","text":"【2026国际无人机应用及防控大会在北京举行】6月25日至27日，2026国际无人机应用及防控大会在北京国家会议中心二期举行。大会以“低空智创新擎腾飞”为主题，包括高端行业论坛、前沿技术研讨与装备展览。大会围绕无人机安防防控、空域管理、场景应用，以及海陆空智能无人系统技术展开深度交流，集中展示无人机整机、反制设备、各类无人装备与低空配套设施等方面的新技术及新产品。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606273785395680.html","importance":""},{"id":"sinacomos:nieuyhx7044320","time":1782520272000,"title":"SpaceX即将入选纳斯达克100指数 为被动买入潮铺平道路","text":" 纳斯达克交易所周五确认，SpaceX将于7月7日被纳入科技股占比较高的纳斯达克100指数，这为埃隆·马斯克旗下的这家火箭与人工智能巨头吸引被动投资铺平了道路。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-27/doc-inieuyhx7044320.shtml","importance":"hot"},{"id":"em202606263785171021" ance":""},{"id":"em202606273785395420","time":1782519992000,"title":"世界第一高坝 大渡河双江口水电站首台机组并网发电","text":"【世界第一高坝 大渡河双江口水电站首台机组并网发电】6月26日，历经11年建设，国家能源集团大渡河双江口水电站首台机组实现并网发电，为西南地区清洁能源供应体系建设和“双碳”目标实现再添重要支撑。双江口水电站位于阿坝州马尔康市、金川县境内，是大渡河上游控制性水库和“龙头”电站。工程以发电为主，兼顾防洪，总装机容量200万千瓦，设计年均发电量约77亿千瓦时。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606273785395420.html","importance":"hot"},{"id":"xq4734984","time":1782519992000,"title":"【世界第一高坝 大渡河双江口水电站首台机组并网发电】6月26日，历经11年建设，国家能源集团大渡河双江口水电站首台机组实现并网发电，为西南地区清洁能源供应体系建...","text":"【世界第一高坝 大渡河双江口水电站首台机组并网发电】6月26日，历经11年建设，国家能源集团大渡河双江口水电站首台机组实现并网发电，为西南地区清洁能源供应体系建设和“双碳”目标实现再添重要支撑。双江口水电站位于阿坝州马尔康市、金川县境内，是大渡河上游控制性水库和“龙头”电站。工程以发电为主，兼顾防洪，总装机容量200万千瓦，设计年均发电量约77亿千瓦时。双江口大坝为砾石土心墙堆石坝，最大坝高315米，是目前世界第一高坝，大坝总填筑方量超4600万立方米。此外，双江口水库具备年调节能力，设计总库容为29亿立方米。随着双江口水电站首台机组并网发电，国家能源集团在大渡河流域已投运的水电及新能源装机规模合计接近1500万千瓦，年输送清洁能源超过600亿千瓦时，可节约燃煤约1700万吨，减排二氧化碳约4600万吨。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/397097717","importance":"hot"},{"id":"sinacomos:nieuyia4902748","time":1782519940000,"title":"在罗素指数重新权重前 SpaceX股价小幅上涨","text":"在即将被纳入罗素指数之际，SpaceX股价周五微涨0.15%。追踪这些基准指数的被动型基金必须将这家由马斯克（Elon Musk）创立的互联网和火箭公司纳入持仓...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-27/doc-inieuyia4902748.shtml","importance":""},{"id":"em202606273785198262","time":1782519655000,"title":"点咖啡送Token券 词元经济成多地招商引资新引擎","text":"【点咖啡送Token券 词元经济成多地招商引资新引擎】今年以来，多地将词元经济作为招商引资新引擎，通过“政策＋词元”新模式，吸引外地企业落户本地投资兴业。在多位地方政府招商部门负责人看来，中西部地区地方政府通过算力、词元资源以及政策支持，将会承接京津冀、长三角、粤港澳大湾区数字产业的外溢产能，创新招商引资新模式。记者注意到，目前，已经有武汉、贵阳、庆阳等地推出优惠政策，吸引人工智能大模型企业进驻本地。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606273785198262.html","importance":"important"},{"id":"em202606273785212972","time":1782519369000,"title":"美债跌下“王座”","text":"【美债跌下“王座”】在全球央行的储备资产清单里，美国国债长期稳坐头把交椅，这几乎是过去近30年间国际金融圈心照不宣的共识。然而，欧洲央行近日发布的年度报告，悄然改写了这份延续多年的座次表。截至2025年末，黄金在全球官方储备资产总额中的占比升至27%，美国国债占比则从20 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
