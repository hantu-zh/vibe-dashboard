，全市场新成立基金共计883只...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-07-02/doc-inifkcsh5996219.shtml","importance":""},{"id":"em202607023790665730","time":1782948840000,"title":"1.3万亿元超长期特别国债发行即将过半","text":"【1.3万亿元超长期特别国债发行即将过半】财政部日前发布通知称，7月3日，财政部将招标发行800亿元超长期特别国债，期限为30年。这将是三季度发行的首只超长期特别国债。同时，根据财政部发布的第三季度国债发行有关安排，三季度财政部将发行11期超长期特别国债，7月份、8月份、9月份分别发行3期、4期、4期。整体看，三季度发行期次比二季度（9期）多两期。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790665730.html","importance":"hot"},{"id":"em202607023790665480","time":1782948840000,"title":"AI设备运输需求驱动航空货运行业多维变革","text":"【AI设备运输需求驱动航空货运行业多维变革】AI（人工智能）浪潮下，服务器、半导体、算力设备等AI硬件设备的跨境流通需求爆发，持续推动航空货运行业发生结构性变革。国际航空运输协会公布的数据显示，2025年，AI相关贸易货值的三分之二以上由航空货运承担，数据存储单元和服务器等关键产品分别有68%和56%的贸易量依赖航空货运。从数量看，AI相关货物仅占航空货运总量的7%，但从货物价值看，其占航空运输贸易总货值的53.5%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790665480.html","importance":""},{"id":"em202607023790655674","time":1782948769000,"title":"创新药赛道回暖 相关ETF获资金积极布局","text":"【创新药赛道回暖 相关ETF获资金积极布局】近期，在政策优化、产业催化以及资金回流等多重因素推动下，创新药板块表现活跃。机构认为，随着行业基本面持续改善、创新成果加快兑现，创新药板块有望迎来新一轮估值修复机会。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790655674.html","importance":"important"},{"id":"sinacomos:nifkiye5881249","time":1782948722000,"title":"历史性热浪来袭 美国将迎“炙烤版”独立日","text":"当地时间周三，创纪录高温从美国中西部蔓延至东部地区，数千万民众处于高温预警之下。预计这轮热浪将持续到7月4日独立日假期长周末，届时美国民众将庆祝建国250周年。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-02/doc-inifkiye5881249.shtml","importance":""},{"id":"1634022059129","time":1782948678000,"title":"美伊举行间接会谈 美称进展顺利 伊指责美违反备忘录承诺","text":"美伊举行间接会谈 美称进展顺利 伊指责美违反备忘录承诺","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0QKNV6V053469LG.html","importance":"hot"},{"id":"em202607023790725636","time":1782948663000,"title":"A股限售股解禁一览：8.69亿元市值限售股今日解禁","text":"【A股限售股解禁一览：8.69亿元市值限售股今 37.html","importance":""},{"id":"wscn3127654","time":1782946945000,"title":"韩国6月CPI环比上升0.1%，符合预期。\n6月CPI同比上升3.2%，符合预期。\n6月剔除食品与能源的CPI同比上升2.5%。\n","text":"韩国6月CPI环比上升0.1%，符合预期。\n6月CPI同比上升3.2%，符合预期。\n6月剔除食品与能源的CPI同比上升2.5%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3127653","time":1782946857000,"title":"Palantir首席执行官Alex Karp猛烈抨击Anthropic和 OpenAI使用的Token计费结构。\nPalantir与英伟达的开源模型是那些希望拥","text":"Palantir首席执行官Alex Karp猛烈抨击Anthropic和 OpenAI使用的Token计费结构。\nPalantir与英伟达的开源模型是那些希望拥有自己数据所有权的企业和政府寻求的解决方案。\nAI Token 成本的飙升让各大企业的首席执行官（CEO）们感到沮丧，这促使他们纷纷转向封闭模型之外的其他选择。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127652","time":1782946644000,"title":"据了解讨论人工智能（AI）标准的知情人士透露，美国最快将于下周宣布所谓的自愿AI制度。（英国金融时报）\n","text":"据了解讨论人工智能（AI）标准的知情人士透露，美国最快将于下周宣布所谓的自愿AI制度。（英国金融时报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127651","time":1782946615000,"title":"上半年券商金股指数逾八成上涨","text":"A股2026年上半年行情日前收官，券商金股指数整体表现也随之呈现在投资者面前。Wind数据显示，其收录的35只券商金股指数上半年有29只实现正收益，涨幅最高的平安证券金股指数上半年累计上涨46.51%，招商证券金股指数、东兴证券金股指数、浙商证券金股指数等涨幅相对靠前。\n展望7月行情，业内人士认为，科技板块内部业绩分化将进一步放大行情波动，但市场并无系统性风险，布局建议聚焦“成长扩散+大盘价值”两大方向，一端关注AI主线引领下的成长扩散行情，另一端关注性价比较高的大盘价值风格。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifkcsa0503783","time":1782946507000,"title":"7月2日隔夜要闻：美股周三收跌 存储、半导体板块大跌 特朗普积极评价美伊多哈间接会谈 原油继续下跌","text":"市场 7月2日收盘：美股周三收跌 芯片股拖累纳指走低 7月2日美股成交额前20：Meta筹划进军云计算，股价应声大涨 7月2日热门中概股多数上涨 拼多多涨8.18%，台积电跌6...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-02/doc-inifkcsa0503783.shtml","importance":"hot"},{"id":"1631821988739","time":1782946432000,"title":"机构抛售散户接盘！美银：机构客户抛售科技股，连续四周成为美股净卖方","text":"机构抛售散户接盘！美银：机构客户抛售科技股，连续四周成为美股净卖方","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0QIJE0605198NMR.html","importance":""},{"id":"wscn3127649","time":1782946142000,"title":"同业股权扫货热度升温，中小银行改革成重要推手","text":"近日，宁夏银行受让宁夏黄河农商银行7.635%股权事项获批准，成为后者第三大股东。这并非孤例。今年以来，厦门国际银行增持廊坊银行、中信银行竞得云南红塔银行股权等案例接连落地。业内人士表示，从入股异地银行实现跨区展业、主发起行增持村镇银行，到战略投资同业股权，银行参股同业情形日趋多元，此举已成为银行主动优化资产配置、完善区域战略布局、拓展业务版图的重要手段。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127648","time":1782946098000,"title":"超微电脑（SMCI）美股盘后涨幅迅速扩大至超过1.9%，该公司发布客户告知书。\n7月1日，该公司股价收跌5.73%，报27.65美元。\n","text":"超微电脑（SMCI）美股盘后涨幅迅速扩大至超过1.9%，该公司发布客户告知书。\n7月1日，该公司股价收跌5.73%，报27.65美元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127646","time":1782945901000,"title":"新西兰5月营建许可环比 -4%，前值 10.9%。\n","text":"新西兰5月营建许可环比 -4%，前值 10.9%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127645","time":1782945900000,"title":"西班牙6月高温 相关死亡人数达十余年来最高","text":"按照西班牙有关机构7月1日发布的估算，6月西班牙与高温 相关的死亡人数超千人，是2015年有可比记录以来当月的最高值。西班牙国家气象局在社交媒体上发文说，2026年6月成为1961年有相关气象记录以来第二热的6月，仅次于2025年6月。据西班牙国家气象局发布的初步数据，西班牙本土6月的平均气温较常年同期偏高约3.2摄氏度。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127644","time":1782945730000,"title":"葡萄牙发布高温预警，最高气温或达47摄氏度","text":"葡萄牙政府1日发布高温预警，强化山火防控，加大对弱势群体的保障力度，以应对即将到来的极端热浪天气。\n葡萄牙海洋和大气研究所表示，自2日起，葡萄牙本土18个地区中的12个地区将进入红色高温预警状态，预计至少持续至4日。其余6个地区将处于橙色高温预警状态。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127643","time":1782945723000,"title":"一级半市场成超额“富矿”，公募定增策略浮盈分化","text":"一级半市场正在成为公募机构重要的超额收益来源。从公募机构定增的“半年考”成绩来看，不少基金公司浮盈颇丰，传统定增大户、头部基金公司在定增方面收益率居前，还有一些中型机构凭借“少而精”定增策略赚得盆满钵满，但也有少数机构旗下产品被个股表现所拖累，定增项目处于浮亏状态。公募排排网数据显示，截至6月25日，公募机构今年以来参与A股定增获配金额已超过330亿元，较去年同期增长超200%，整体浮盈超过80亿元。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3127642","time":1782945653000,"title":"德国执政联盟围绕大范围改革议程达成共识。\n","text":"德国执政联盟围绕大范围改革议程达成共识。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127641","time":1782945412000,"title":"“翻倍基”全面爆发，卡位科技投资各显神通","text":"在2026年上半年的科技单边行情下，公募基金业绩迎来大面积爆发。Wind数据显示，上半年回报率超100%的“翻倍基”数量达240只以上（仅统计主份额），创历年之最。此前，在上半年出现“翻倍基”的年份还是2015年和2007年。结合持仓来看，算力、半导体等AI硬件板块是上半年公募机构投资的制胜关键。业内人士表示，公募机构普遍前瞻布局AI、半导体等高景气细分赛道，从均衡泛权益转向赛道精细化卡位，依靠细分产业研究打造业绩亮点，形成多点开花的投研布局转变。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3127640","time":1782945047000,"title":"在SpaceX获巨额回报，报道称马斯克盟友Gracias瞄准AI与能源领域投资","text":"在对马斯克旗下太空探索公司SpaceX的投资为其基金带来近1000亿美元收益后，格拉西亚斯（Antonio Gracias）正寻求在人工智能（AI）、能源和太空领域进行更多投资。格拉西亚斯告诉投资者，他宁愿不出售SpaceX的股份来向投资者支付回报，而是更倾向于以“实物分配”的方式分发SpaceX的投资，即直接向投资者分发这家火箭公司的股份，而非现金。\n多年来，Valor Equity Partners已在SpaceX上投资了58亿美元。格拉西亚斯计划“只要可以”就一直持有自己的SpaceX股份，他表示自己看好这项业务，并希望在未来继续参与其中。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127639","time":1782945012000,"title":"成本上涨与市场需求双轮驱动，半导体开启年内第二轮涨价","text":"近日，芯联集成、斯达半导、扬杰科技、聚辰股份等多家半导体公司向客户发出了涨价函，价格上调幅度为15%至25%。据不完全统计，超过20家国内外半导体公司在上半年发布了第一轮涨价函。目前，相关公司均宣布了新一轮涨价通知。细看各家公司的涨价通知函，成本上涨、AI需求爆发是调价的核心诱因。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3127638","time":1782944906000,"title":"科技主题表现突出，约七成权益类保险资管产品上半年实现正回报","text":"2026年上半年，科技板块表现强势，带动A股市场走强。受此推动，约七成权益类保险资管产品实现正投资回报。但在结构性行情演绎下，权益类保险资管产品投资回报呈现分化态势，科技主题产品表现亮眼，而红利类主题产品表现相对黯淡。Wind数据显示，2026年上半年，在有年化回报数据的约180只权益类保险资管产品中，实现正投资回报的超过120只，占比约七成。从年化回报排行榜来看，科技主题产品明显跑赢其他类型。 （上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127633","time":178   {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
