模最大的一笔交易。福泰将以每股85美元现金收购Crinetics，较Crinetics周一收盘价溢价102%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795575113.html","importance":""},{"id":"em202607073795539650","time":1783379643000,"title":"A股进入半年度业绩验证期 科技主线内部显著分化","text":"【A股进入半年度业绩验证期 科技主线内部显著分化】7月6日，A股市场高位调整，热门科技板块整体回落，医药等相对低位品种震荡走强，盘面风格高低切换。截至收盘，上证指数报4041.24点，跌0.06%；深证成指报15416.80点，跌1.16%；创业板指报3948.86点，跌1.77%；科创综指报2319.72点，跌0.79%。沪深两市合计成交30911亿元，较上一交易日缩量913亿元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795539650.html","importance":""},{"id":"wscn3129606","time":1783379564000,"title":"摩根大通、美国银行及其他银行探讨在支付领域的交易，其探讨收购Fiserv旗下的支付网络的交易，正与Fiserv举行初步谈判。（华尔街日报）\n","text":"摩根大通、美国银行及其他银行探讨在支付领域的交易，其探讨收购Fiserv旗下的支付网络的交易，正与Fiserv举行初步谈判。（华尔街日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607073795539321","time":1783379506000,"title":"新版交易规则施行首日 ST板块表现分化 业内人士：有助于提升定价效率和价格公允性","text":"【新版交易规则施行首日 ST板块表现分化 业内人士：有助于提升定价效率和价格公允性】针对此次涨跌幅调整，市场人士认为，此前5%的窄幅限制虽然初衷是保护投资者，但在实际运行中产生了一些“副作用”。由于波动空间过窄，重大消息落地后股价往往需要连续多日“一字涨停”或“一字跌停”才能消化完毕，既造成了价格信号失真，也阻碍了流动性的正常释放。放宽至10%后，股价能够在更充裕的定价空间内消化多空信息，有利于反映市场预期，有助于提升定价效率和价格公允性。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795539321.html","importance":"hot"},{"id":"em202607073795573675","time":1783379404000,"title":"王毅同挪威外交大臣艾德会谈","text":"【王毅同挪威外交大臣艾德会谈】当地时间7月6日，中共中央政治局委员、外交部长王毅在奥斯陆同挪威外交大臣艾德举行会谈。王毅说，挪威是最早承认新中国的西方国家之一，长期以来中挪关系保持稳定、可持续发展，为两国人民带来重要利益。近年来，在双方努力下，两国政治互信不断增强，互利合作向深向实、向绿向新拓展，中挪绿色转型对话机制已成为新时期两国合作的重要平台。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795573675.html","importance":"important"},{"id":"em202607073795540527","time":1783379393000,"title":"ETF竞争格局生变：最大规模产品易主，相关公司排名易位","text":"【ETF竞争格局生变：最大规模产品易主，相关公司排名易位】ETF市场格局悄然生变——全市场规模最大ETF的宝座易主，行业前四名的席位争夺日趋激烈。Choice数据显示，截至7月3日，ETF总规模为4.67万亿元。其中，黄金ETF华安规模超过沪深300 ETF华泰柏瑞，成为全市场规模最大的ETF。后者此前多年位居ETF规模榜首，规模最高时曾超过4300亿元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795540527.html","importance":""},{"id":"em202607073795573893","time":1783379354000,"title":"水利部：台风“美莎克”影响预计仍将维持两天","text":"【水利部：台风“美莎克”影响预计仍将维持两天】受台风“美莎克”影响，广西中部、南部降下暴雨到大暴雨、局部特大暴雨。水利部密切监视台风“美莎克”行进路径和可能影响，滚动会商研判，预计本轮台风影响仍将维持两天。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795573893.html","importance":"hot"},{"id":"em202607073795539875","time":1783379256000,"title":"银价大幅波动 产业链企业如何“接招”","text":"【银价大幅波动 产业链企业如何“接招”】专家表示，短期资金离场、宏观政策预期改变等是这轮银价下跌主因。银价剧烈波动下，下游需求分化明显，光伏领域少银化仍在推进，银饰需求承压；AI等新兴领域则带来新的增量。面对银价“过山车”式行情，产业链企业“各显神通”，对冲银价波动风险。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795539875.html","importance":"important"},{"id":"em202607073795540149","time":1783379160000,"title":"五年仍净值腰斩 这些基金怎么了","text":"【五年仍净值腰斩 这些基金怎么了】从公募基金整体业绩表现来看，行业呈现极致的业绩分化格局。过去5年，不少精准把握科技成长核心赛道的基金斩获亮眼收益，部分产品实现翻倍乃至数倍的超额回报。与此同时，大量基金却深陷长期亏损困境，部分产品五年运行下来，净值近乎腰斩，更有甚者亏损幅度超过70%，与大盘向好走势形成鲜明反差。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795540149.html","importance":""},{"id":"1633069257654","time":1783379150000,"title":"万亿大单的背后，藏着繁荣之下的隐忧","text":"万亿大单的背后，藏着繁荣之下的隐忧","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L17F8IME0519DKT1.html","importance":""},{"id":"em202607073795572389","time":1783379133000,"title":"三星电子股价在Nextrade盘前交易中下跌4.5%","text":"三星电子股价在Nextrade盘前交易中下跌4.5%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795572389.html","importance":"hot"},{"id":"wscn3129602","time":1783379107000,"title":"三星电子股价在Nextrade盘前交易中下跌4.5%，此前发布第二季度业绩报告。\n","text":"三星电子股价在Nextrade盘前交易中下跌4.5%，此前发布第二季度业绩报告。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129601","time":1783379038000,"title":"环球影业最新《小黄人》首周末斩获6200万美元票房","text":"在为期四天的美国“独立日”长周末（7月2-5日）假期期间，《小黄人与大怪兽》（Minions & Monsters）以6200万美元的票房成绩登顶美国和加拿大影院票房榜首，不过这一成绩仍不及该七部曲系列中早期作品的表现。2015年上映的《小黄人》以首周末三天1.157亿美元的票房成绩，保持着该系列最强首映纪录。尽管最新一部的票房远不及这一水平，但这并未削弱照明娱乐作为最成功动画电影制作力量之一的整体地位。在流媒体服务竞争日益激烈的背景下，动画电影类型在票房上面临着诸多挑战。\n《玩具总动员5》（Toy Story 5）位列周末票房榜第二，而Angel Studios Inc.的新片《Young Washington》则排名第三。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607073795540379","time":1783379034000,"title":"全球经济分化 AI重塑增长底层逻辑","text":"【全球经济分化 AI重塑增长底层逻辑】步入2026年，世界经济正经历一场深刻的结构性重塑。中东地缘冲突引发的能源供应紧张与价格飙升，令全球经济运行面临严峻考验。与此同时，人工智能（AI）热潮的纵深推进，强势带动半导体等核心领域的投资、生产和贸易活动，为全球经济注入了关键对冲动能。在这两股力量的角力下，今年以来世界经济运行展现出较强的韧性，整体增长形势好于预期，但冷热不均的结构性分化态势也更加明显。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795540379.html","importance":"hot"},{"id":"wscn3129599","time":1783378611000,"title":"资本市场“应退尽退”生态日趋成熟，年内22家公司已摘牌或锁定退市","text":"7月6日，上海创兴资源开发股份有限公司摘牌退市。至此，今年以来，已有16家公司摘牌退市，退市类型覆盖财务类退市、重大违法强制退市、交易类退市、主动退市等情形。梳理上市公司公告发现，还有6家公司已锁定退市。其中，5家A股公司触及财务类退市指标，将于7月份集中摘牌退市；B股公司瓦房店轴承股份有限公司私有化退市正在流程中。综合来看，年内已摘牌退市和锁定退市公司的数量达到22家。此外，还有多家公司因涉嫌严重财务造假、未按期披露定期报告等原因面临退市风险。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129598","time":1783378504000,"title":"三星电子将于7月30日发布二季度业绩报告（最终数据）。\n","text":"三星电子将于7月30日发布二季度业绩报告（最终数据）。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifxpif8290599","time":1783378042000,"title":"三星预计第二季度营业利润将增长18倍，超出市场预期","text":"三星电子周二预测，受人工智能驱动的需求持续推高内存芯片价格的影响，其第二季度营业利润将较去年同期激增1810%。 这家全球最大的内存芯片制造商在监管文件中表示...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-07/doc-inifxpif8290599.shtml","importance":"hot"},{"id":"wscn3129596","time":1783377791000,"title":"中报预增公司占比走高，新兴产业助力业绩增长","text":"截至7月6日17时，A股共有72家上市公司对外披露2026年半年度业绩预告，64家预增，预增比例约为88.89%。已披露业绩预告的上市公司整体保持了较好的盈利能力。从发布业绩预告的上市公司所属行业看，生物医药、化工、半导体等行业上市公司大幅预增数量较多。部分公司在业绩预告中表示，通过AI赋能业务转型，提升了运营效率，带动业绩提升。不少上市公司发布业绩预告后，获机构密集调研。机构普遍对上市公司业绩未来的增长点、下半年业绩展望等内容较为关注。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129594","time":1783377736000,"title":"上半年IPO申报放量升温，科创赛道扩容与从严审核并行","text":"2026年上半年的IPO市场，在6月迎来了集中交卷。Wind数据显示，上半年三大交易所合计新增受理IPO企业242家，同比增长37%。其中，仅6月单月就贡献了198家。分板块看，6月受理的198家中，北交所95家、创业板51家、科创板36家、上交所主板8家、深交所主板8家。人工智能、商业航天、脑机接口等新兴产业企业明显增多，成为本轮申报中较为突出的特征。6月最后三个交易日——26日、29日、30日，沪深北交易所合计受理企业达113家，呈现逐日放量之势。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607073795566998","time":1783377647000,"title":"三星电子二季度营业利润同比猛增18倍 销售额增长129%","text":"【三星电子预计第二季度营业利润同比暴增1810%】三星电子第二季度销售额171.00万亿韩元（约7592.4亿人民币），预估169.23万亿韩元（约7513.8亿人民币）；第二季度营业利润89.40万亿韩元（约3969.36亿人民币），同比增长1810%，预估84.2万亿韩元（约3738.48亿人民币）。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795566998.html","importance":"hot"},{"id":"wscn3129593","time":1783377622000,"title":"三星二季度运营利润同比激增超1800%，AI需求继续提振存储芯片价格","text":"三星电子二季度销售额初步估算为171万亿韩元，分析师预期169.23万亿韩元。\n二季度营业利润初步估算为89.40万亿韩元（折合584.4亿美元），同比增幅1810%，接受彭博访问的分析师预期84.20万亿韩元、LSEG SmartEstimate预期87.3万亿韩元；上年同期4.7万亿韩元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129592","time":1783377314000,"title":"低估值遇上高分红，银行板块估值修复窗口正在打开","text":"今年以来，A股银行板块维持“低估值、高分红”特征，截至7月6日收盘，申万银行指数跌超9%，42家上市银行全部“破净”，仅9家银行股价上涨。与二级市场走势形成反差的是，银行股分红保持稳健，多家上市银行的动态股息率超过5%。这引发了市场对于银行股配置价值的讨论。业内人士认为，低利率环境下，银行股类固收属性凸显，板块估值修复窗口正在打开。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129433","time":1783377262000,"title":"高盛：AI投资重心迈向实体产业，未来6年资本开支或达7.6万亿美元","text":"高盛在最新报告中称，人工智能(AI)投资的重心已开始向更广阔的实体经济延伸，算力、电力和数据中心仍在高速建设之际，AI已同步进入制造、能源、物流、国防、生命科学和机器人等现实场景。2026-31年，全球围绕计算、数据中心和电力的AI资本开支将达到约7.6万亿美元，年度投入将从2026年的7650亿美元升至2031年的1.64万亿美元。超大规模云厂商（Hyperscalers）到2030年的AI投资或超过6万亿美元。未来竞争的关键不只是模型或芯片，而是资本结构、能源供给、产业数据、工程能力和部署能力。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129591","time":1783377229000,"title":"前5月机器人规上企业营收超900亿元","text":"7月6日，2026世界机器人大会新闻发布会召开。工信部装备工业一司副司长郝立顺介绍，今年1至5月，我国机器人规模以上企业营业收入突破900亿元，同比增长26.9%，近五年年均增速超20%，较“十三五”时期年均增速提升约5个百分点。当前，人形机器人逐步从展示性演示转向实用性落地，产业商业化进程持续提速。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129590","time":1783377064000,"title":"玻璃基板进入关键验证期，良率决定产业化拐点","text":"玻璃基板大消息不断。三星电机于7月2日宣布，公司已与日本住友化学集团全资子公司东宇精细化学签署主合同，共同成立一家名为“Glassem”的合资企业，用于生产玻璃基板的关键材料“玻璃芯”（Glass Core）。同日，在2026年投资日活动上，京东方玻璃基封装载板业务首次面向市场公开亮相。受访人士表示，在传统有机基板逐渐逼近性能与可靠性边界的背景下，玻璃基板产业化进程明显加快。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129589","time":1783377050000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 08:55 中国央行行长潘功胜将出席香港固定收益及货币论坛；\n② 10:00 上海市政府举行发布会，介绍2026世界人工智能大会筹备进展；\n③ 时间待定 中国6月外汇储备；\n④ 14:00 德国5月工业产出；\n⑤ 时间待定 欧洲首届物理AI峰会MACHINA Summit；\n⑥ 15:30 欧洲央行管委Fabio Panetta在“变化世界中货币政策传导机制面临的挑战”（ChaMP）会议闭幕式讲话；\n⑦ 17:30 英国央行发布金融稳定性报告；\n⑧ 18:15 欧洲央行管理委员会成员Martin Kocher在意大利罗马讲话；\n⑨ 19:00 美联储理事、负责金融监管事务的副主席鲍曼在金融稳定性委员会线上活动发表开场白讲话；\n⑩ 时间待定 美国贸易代表办公室举行听证会，审议对60个经济体加征关税；\n⑪ 20:30 美国5月贸易帐，加拿大5月贸易帐；\n⑫ 时间待定 太阳谷年度峰会，OpenAI、苹果、Meta等CEO出席；\n⑬ 次日00:00 美国能源信息署（EIA）发布月度短期能源展望报告（STEO）\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129588","time":1783376864000,"title":"内存价格一路上涨，硬盘价格水涨船高","text":"在被誉为“中国电子第一街”的深圳华强北，游戏发烧友徐绍安最近准备玩一款3A游戏，计划升级一下电脑，他咨询发现，一套32GB的DDR5内存套装目前已经涨到近4000元，比去年贵了三四倍，于是他决定降低配置，改用24GB配置，等以后价格下降再做升级。 记者调查了解到，除了内存价格一路上涨以外，硬盘价格同样水涨船高，以某款1TB固态硬盘为例，目前已经涨到900多元，不少电脑装机商表示，目前零部件和整机的价格处于高位，导致不少装机客户选择观望。 记者统计发现，跟去年对比，主流型号的存储产品价格涨幅皆超过100%。其中：1TB固态硬盘去年410元，（央视财经）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129587","time":1783376616000,"title":"新版交易规则施行首日，ST板块表现分化","text":"7月6日，沪深北交易所新版交易规则正式施行。其中，最受市场关注的变化之一，是沪深市主板风险警示股票（ST、*ST）涨跌幅限制从5%放宽至10%，与主板其他股票实现统一。新规实施首日，ST板块（包括ST、*ST股）表现分化。截至当日收盘，东财编制的ST板块指数收跌1.31%，ST星农、ST海王、ST瑞茂等个股收获10%涨停。记者注意到，新规落地前，ST板块已经历了一轮“先抑后扬”的走势：板块指数自4月底持续回调，6月29日触及近一年新低，随后开启反弹，最近5个交易日累计涨幅超过5%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129586","time":1783376040000,"title":"A股市场重要股东减持渠道“一降两升”","text":"基于最新统计分析发现，A股市场重要股东减持渠道呈现“一降两升”态势：曾经作为主要退出路径的协议转让交易规模大幅萎缩，而市场化与透明度更佳的大宗交易和询价转让渠道快速崛起。据统计，截至2026年6月30日，A股市场年内重要股东累计减持金额为4894.47亿元。与上年同期相比：协议转让交易规模占比由51.56%降至24.45%；大宗交易占比由17.79%升至20.63%，同比增长51.35%；询价转让占比由5%升至11.83%，同比增长209%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129585","time":1783375930000,"title":"秘鲁（当选总统）Fujimori：Velarde将继续担任央行行长。\n","text":"秘鲁（当选总统）Fujimori：Velarde将继续担任央行行长。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1636064117391","time":1783375536000,"title":"广州富豪怒了！为了1500万，自曝有100多个孩子","text":"广州富豪怒了！为了1500万，自曝有100多个孩子","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L17BQ7SL0552K0CA.html","importance":""},{"id":"em202607073795564618","time":1783375407000,"title":"7月7日国内四大证券报纸、重要财经媒体头版头条内容精华摘要","text":"【四大证券报纸、重要财经媒体头版头条摘要】1、美股芯片股强势反弹，一系列重磅事件将陆续登场。2、深交所对中公教育异常交易投资者采取暂停交易措施。3、2026世界机器人大会将于8月在京举行，报名通道已于7月6日开启。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795564618.html","importance":""},{"id":"wscn3129583","time":1783375334000,"title":"淡水河谷董事长斯蒂勒在股东罢免投票前辞职","text":"在淡水河谷最大投资者之一施压要求重组这家全球最大铁矿石生产商的高管团队后，公司董事长丹尼尔·斯蒂勒（Daniel Stieler）宣布辞职。\n斯蒂勒担任该职位已有三年，其任期原定于2027年4月届满。淡水河谷在周一的一份声明中感谢了他任职期间对公司的贡献。\n上个月，在持有该矿企7%股份的养老基金Previ呼吁召开特别投票以罢免董事长后，淡水河谷董事会内部的紧张局势不断升级。\n据Valor Economico报道，在包含财务补偿方案的谈判后，斯蒂勒同意辞职。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607063795501436","time":1783375242000,"title":"东方财富财经早餐 7月7日周二","text":"【东方财富财经早餐 7月7日周二】1、英伟达回应AI服务器架构延后的报道：公司路线图保持不变。2、内存硬盘涨价凶猛，1TB固态硬盘从500涨至1000元。3、深交所：对中公教育相关投资者采取暂停交易等监管措施。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795501436.html","importance":""},{"id":"1634761690116","time":1783375150000,"title":"Meta算力租赁首落印度：168兆瓦数据中心破局数据主权，加剧富豪基建暗战","text":"Meta算力租赁首落印度：168兆瓦数据中心破局数据主权，加剧富豪基建暗战","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L17BERVP05198NMR.html","importance":""},{"id":"em202607073795555795","time":1783375118000,"title":"曾参与“924行情”的华尔街明星基金经理 又在存储板块大赚一笔","text":"【曾参与“924行情”的华尔街明星基金经理 又在存储板块大赚一笔】两年前在“924行情”期间高喊“买入一切中国资产”而声名大噪的明星对冲基金经理大卫·泰珀（David Tepper），今年又在存储板块收益颇丰。周一的最新消息称，泰珀的阿帕卢萨管理公司（Appaloosa Management）在今年上半年取得32%的投资回报。知情人士称，这家管理规模约230亿美元的对冲基金，今年的所有收益都是在二季度获得的。作为取得该投资业绩的背景，泰珀今年还采取了偏保守风格的投资策略，其现金持仓比例平均高达40%。据悉，阿帕卢萨投资组合中表现最出色的个股包括美光科技、三星电子、SK海力士、铠侠控股以及闪迪公司。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795555795.html","importance":""},{"id":"wscn3129581","time":1783374601000,"title":"美国专利局撤销“和平委员会”商标申请","text":"美国专利商标局（USPTO）撤销了针对总统特朗普发起的“和平委员会”（Board of Peace）项目的商标申请，该申请原本试图获取“Board of Peace”一词及一款风格化标志的品牌权。\n相关申请由专利商标局局长约翰·斯夸尔斯（John Squires）亲自提交。他表示此举是为了应对针对该项目域名的“抢注圈地”行为，但这些申请被指可能违反商标法而备受批评。\n众议员杰米·拉斯金（Jamie Raskin）将撤销申请称为“值得欢迎且必要的纠偏”，同时继续对“和平委员会”项目及其资金来源缺乏透明度提出质疑。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129579","time":1783373936000,"title":"美国两年期国债收益率跌约3个基点","text":"周一（7月6日）纽约尾盘， function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>

</body>
