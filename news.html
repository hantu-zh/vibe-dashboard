607063794391742.html","importance":"important"},{"id":"1637921551498","time":1783298977000,"title":"近距离观察沃什后，大摩首席经济学家坚称：美联储今年不会加息","text":"近距离观察沃什后，大摩首席经济学家坚称：美联储今年不会加息","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L152Q66505198NMR.html","importance":"important"},{"id":"1639040112582","time":1783298941000,"title":"AI行情持续狂欢，860亿紫光股份，为何“滞涨”？","text":"AI行情持续狂欢，860亿紫光股份，为何“滞涨”？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L152D1AG05390H81.html","importance":""},{"id":"wscn3129062","time":1783298856000,"title":"两市融资余额减少196.66亿元","text":"截至7月3日，上交所融资余额报15017.64亿元，较前一交易日减少132.00亿元；深交所融资余额报14697.07亿元，较前一交易日减少64.66亿元；两市合计29714.71亿元，较前一交易日减少196.66亿元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129061","time":1783298815000,"title":"日本东证指数日内涨幅扩大至1%。\n","text":"日本东证指数日内涨幅扩大至1%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607063794386863","time":1783298746000,"title":"诺诚健华靶向CDH17的新型ADC创新药ICP-B208完成首例患者给药","text":"【诺诚健华靶向CDH17的新型ADC创新药ICP-B208完成首例患者给药】诺诚健华宣布，公司自主研发的靶向CDH17的新型ADC创新药ICP-B208完成首例患者给药。基于诺诚健华自主研发的ADC技术平台，ICP-208由人源化抗CDH17抗体通过蛋白酶可裂解连接子与公司自主开发的强效有效载荷偶联而成，可精准靶向肿瘤细胞，同时最大限度减少脱靶效应。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607063794386863.html","importance":"hot"},{"id":"sinacomos:nifvkkk8625641","time":1783298660000,"title":"高伟电子授出合共1292.9万份奖励股份","text":" 高伟电子（01415）公布，于2026年7月3日，董事会已根据股份奖励计划的规则向若干选定僱员授出合共1292.9万份奖励，惟须待接纳后方可作实。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/hkstock/ggscyd/2026-07-06/doc-inifvkkk8625641.shtml","importance":""},{"id":"sinacomos:nifvkkf8839206","time":1783298655000,"title":"随着投资者缩减对美联储加息的押注 金价走高","text":"亚洲交易时段，金价小幅走高。大华全球经济与市场研究团队在一份报告中表示，疲软的美国就业数据和较低的能源价格可能正促使投资者缩减对美联储加息的押注。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-06/doc-inifvkkf8839206.shtml","importance":"important"},{"id":"em202607063794386525","time":1783298647000,"title":"除了AI还有谁？私募下半年配置方向曝光 这一板块跌至历史底部","text":"【除了AI还有谁？私募下半年配置方向曝光 这一板块跌至历史底部】今年下半年，除了AI还有谁？根据景林资产方面透露的信息，黄金与资源是目前景林组合中主要聚焦的三大方向之一。景林将其视为既承担风险对冲功能，也反映出景林对于全球秩序长期变化的观察。此外，券商中国记者了解到，在不少主观策略私募产品中，配置有色板块也是AI之外的重要方向之一。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794386525.html","importance":""},{"id":"wscn3129059","time":1783298628000,"title":"多部门联合部署开展安全生产“打非治违”工作","text":"国务院安委会办公室、中央政法委、最高人民法院、最高人民检察院、公安部、司法部联合部署开展安全生产“打非治违”工作。通知要求，各地区、各有关部门要结合实际情况，按照“三管三必须”等要求，重点打击安全生产有关资质或条件不满足要求、安全生产弄虚作假，以及恶意违法、强令违章、冒险作业等共性问题。针对矿山、化工、消防、工贸等重点行业领域，要求重点打击煤矿隐瞒工作面、无证开采、重大灾害治理不到位组织生产，未依法取得安全生产许可从事化工和危险化学品生产、超许可范围生产使用经营危险化学品、危险化学品经营企业违法从事生产经营活动，高层民用建筑违规使用易燃可燃外墙外保温材料、人员密集场所违规动火作业、养老机构消防设施缺失损坏、经营性餐饮场所油烟管道安全措施不落实，以及粉尘涉爆企业作业现场积尘严重、擅自拆除、停用监测报警设施设备等突出问题。（新华社）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1635194034671","time":1783298148000,"title":"旺仔牛奶之后，中国旺旺难造百亿单品","text":"旺仔牛奶之后，中国旺旺难造百亿单品","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L151SM4V0519C95F.html","importance":""},{"id":"wscn3129058","time":1783298018000,"title":"中国外汇交易中心（CFETS）：7月3日人民币汇率指数按周涨0.06至102.65。\n","text":"中国外汇交易中心（CFETS）：7月3日人民币汇率指数按周涨0.06至102.65。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607063794375487","time":1783297795000,"title":"价格中枢不断上抬 机构称稀土板块将继续演化估值业绩双升","text":"【价格中枢不断上抬 机构称稀土板块将继续演化估值业绩双升】据行业媒体报道，稀土市场呈现全面上涨态势，受供应紧缩驱动，主流品种价格显著上行。贸易环节反馈易涨难跌，市场惜售情绪浓厚。尽管金属端日内成交清淡，存在价格倒挂，但磁材厂被动接货支撑下，预计短期镨钕系列将维持偏强震荡格局，后市仍有上行空间。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794375487.html","importance":"hot"},{"id":"wscn3129057","time":1783297750000,"title":"中信证券：底部期待黄金板块估值与盈利的双击","text":"中信证券指出，美伊冲突以来的金价和黄金股严重超跌，当前黄金股在PE和资源比价方面均具备极强的安全边际。预计2026年三季度金价运行范围4000—4500美元/盎司，若加息预期交易全面修正，金价有望回归至4500—5000美元/盎司。黄金板块则将受益于盈利预期和估值水平的共振修复。重视黄金板块的全面配置机遇。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607063794375067","time":1783297686000,"title":"供应严重短缺！硬盘一天三个价 存储行业结构性增长或未见顶","text":"【供应严重短缺！硬盘一天三个价 存储行业结构性增长或未见顶】华强北存储市场行情回升，内存条和固态硬盘价格有所上涨，三星、金士顿、闪迪相关产品价格上行。华强北商户称，一个三星990Pro1TB固态硬盘拿货价为1400元，其对外售价1420元至1450元。而澎湃新闻记者走访上海多个数码城，一位组装机商家介绍，硬盘更是“早上一个价，下午、晚上一个价”。一款闪迪1TB的SSD硬盘，可能早上标价820元，当晚就涨到860元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063794375067.html","importance":"hot"},{"id":"wscn3129056","time":1783297623000,"title":"韩国首尔综指日内涨幅扩大至2.9%。\n","text":"韩国首尔综指日内涨幅扩大至2.9%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129055","time":1783297584000,"title":"东方财富策略陈果团队：A股再平衡继续，关注业绩超预期","text":"东方财富策略陈果团队研报指出，随着中报窗口期的到来，认为市场可放下“硅基碳基之争”，以开放的心态，全面考察各行业景气度和重点公司业绩是否超越市场预期。纵观申万二级行业，我们将景气度向上行业分为四类：第一类，兼具高利润体量和高预期增速的半导体、通信设备、化学制品；第二类，利润体量不大但增速预期大幅上修的饲料、能源金属等；第三类，利润体量较大因此资金容量大、增速预期尚可的工业金属、炼化及贸易、证券、城商行、电池、煤炭开采等；第四类，利润体量不大但增速预期相对匹配的偏稳健增长行业，如电网设备、化学制药、其他电源设备、元件、物流、航运港口等。总的来说，我们认为中报以及下半年基本面，能超越市场预期的，并非只有前期最热门的AI上游赛道。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1635325059666","time":1783297416000,"title":"一瓶啤酒动辄百元，超高端的辛巴赫谁在喝？","text":"一瓶啤酒动辄百元，超高端的辛巴赫谁在喝？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1513BLU0519C95F.html","importance":""},{"id":"wscn3129054","time":1783297386000,"title":"中信证券：下半年建议重点配置中国创新药，聚焦三类公司","text":"中信证券研报认为，2026年下半年建议重点配置中国创新药，聚焦三类公司：一是创新药收入占比持续提升、商业化和盈利兑现能力较强的龙头Pharma/Biopharma；二是核心管线具备全球BIC/FIC潜力、已进入全球注册或后期临床阶段、未来数据和BD催化密集的创新平台；三是产品机制差异化明确、具备成长弹性和后续催化剂的成长型biotech。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wal <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
