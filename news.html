title":"特朗普视察新专机，专家担心安全性可能不如现有的“空军一号”","text":"当地时间6月19日下午，美国总统特朗普在马里兰州安德鲁斯联合基地视察了经改装的、由卡塔尔赠送的波音747-8型飞机，并在飞机上签名。这架飞机即将交付，加入“空军一号”专机机队。据美媒报道，由于进度过快，部分专家担心这架新“空军一号”专机的安全性可能不如现有的“空军一号”。（CCTV国际时讯）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606203776900475","time":1781907711000,"title":"美国一空军基地暴发流感 已有超160人感染","text":"【美国一空军基地暴发流感 已有超160人感染】据美国方面6月19日消息，知情人士透露，过去几周内，得克萨斯州拉克兰空军基地已有160多名军人感染流感病毒。空军发言人在一份声明中表示，医疗专业人员和公共卫生官员已采取缓解措施，对有症状的人员进行隔离和治疗，以减少进一步接触，并继续监测情况。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776900475.html","importance":""},{"id":"wscn3122194","time":1781907298000,"title":"特朗普：美伊须60天内达成长期协议，否则将采取进一步行动","text":"6月19日，美国总统特朗普在安德鲁斯联合基地发表讲话时表示，美国和伊朗已签署谅解备忘录，双方将在60天内就长期安排展开谈判。特朗普称，“60天内达成最终协议，否则我们会采取让他们不高兴的行动，但我认为事情不会发展到那一步。”特朗普还称，美伊谅解备忘录的达成已使霍尔木兹海峡恢复通航，“大约700艘船正源源不断驶出”。特朗普还表示与以色列关系良好。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606203776898993","time":1781906961000,"title":"特朗普：美伊须60天内达成长期协议 否则将采取进一步行动","text":"【特朗普：美伊须60天内达成长期协议 否则将采取进一步行动】当地时间6月19日，美国总统特朗普在安德鲁斯联合基地发表讲话时表示，美国和伊朗已签署谅解备忘录，双方将在60天内就长期安排展开谈判。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776898993.html","importance":""},{"id":"em202606203776895884","time":1781906542000,"title":"刚果（金）已确认的埃博拉病例数量上升至933例","text":"刚果（金）已确认的埃博拉病例数量上升至933例。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776895884.html","importance":"hot"},{"id":"xq4720572","time":1781906336000,"title":"刚果（金）已确认的埃博拉病例数量上升至933例。","text":"刚果（金）已确认的埃博拉病例数量上升至933例。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/395693594","importance":"hot"},{"id":"em202606203776890634","time":1781906114000,"title":"A股科技公司收购失败案例增多 专家提醒投资者规避风险","text":"【A股科技公司收购失败案例增多 专家提醒投资者规避风险】自“并购六条”发布以后，中国上市公司掀起并购潮，科技类上市公司在其中扮演重要角色，但随之而来的重组失败数量也在上升。据《中国经营报》记者不完全统计，今年以来，上市公司并购重组失败137例，去年同期107例。其中科技类上市公司并购重组失败28例，去年同期9例。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776890634.html","importance":""},{"id":"em202606203776890223","time":1781905717000,"title":"光通信板块高位震荡 未来或现较强分化特征","text":"【光通信板块高位震荡 未来或现较强分化特征】2026年，A股市场出现了一轮“追光”行动，即对光通信（AI算力）赛道的重仓布局。但《中国经营报》记者注意到，近期光通信板块出现明显波动，不过，光通信板块在经历了一轮回调后，最近几个交易日出现了回暖。国泰基金相关负责人在接受记者采访时指出，光通信板块近期的回流是由于产业趋势持续强劲，且周末（6月14日前后）相关利好发酵。该负责人指出，周末利好消息是美伊停战，美联储加息预期降温，全球风险偏好转变。AI作为科技主线，成为市场关注的成长方向核心。从产业上看，工信部近期出台专项政策，明确支持高速光模块、光电芯片及CPO（共封装光学）技术研发，加快骨干网络升级，为行业发展筑牢政策根基，有效打消了此前市场对技术落地节奏的担忧。与此同时，海外云厂商持续加码算力基建，叠加大额采购订单落地，800G、1.6T高端光模块需求保持旺盛，行业订单饱满、产能紧张的现状，印证了赛道长期高景气度。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776890223.html","importance":"important"},{"id":"wscn3122193","time":1781905097000,"title":"特朗普：Anthropic曾构成国家安全威胁","text":"美国总统特朗普在接受“Axios Show”独家采访时表示，他曾一度将Anthropic视为国家安全威胁，不过他暗示此后双方关系已有所改善。\nAxios的马克·卡普托在采访中问特朗普，是否将Anthropic或其CEO达里奥·阿莫迪视为国家安全威胁。\n“嗯，现在不是，但一周前也许是，”美国总统特朗普表示，在七国集团峰会后，他留下的印象是阿莫迪“友善”且“聪明”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nicywef1028618","time":1781904906000,"title":"特朗普：Anthropic曾构成国家安全威胁","text":" 美国总统特朗普在接受“Axios Show”独家采访时表示，他曾一度将Anthropic视为国家安全威胁，不过他暗示此后双方关系已有所改善。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-20/doc-inicywef1028618.shtml","importance":""},{"id":"em202606203776893165","time":1781904694000,"title":"中方敦促国际社会采取有力人道主义行动","text":"【中方敦促国际社会采取有力人道主义行动】中国常驻联合国副代表孙磊19日在联合国经济及社会理事会2026年人道主义会议一般性辩论环节发言，敦促国际社会团结一致，采取有力人道主义行动。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776893165.html","importance":"hot"},{"id":"sinacomos:nicyweh2360534","time":1781904575000,"title":"美伊核谈尚未开始即因黎巴嫩问题陷入停滞","text":" 由于黎巴嫩南部战事加剧，伊朗推迟了与美国就永久和平协议展开谈判的启动时间。这对于美国总统特朗普旨在 egory":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-20/doc-inicywec4247448.shtml","importance":""},{"id":"em202606203776893088","time":1781903735000,"title":"美国2-0澳大利亚两连胜领跑 巴洛贡造乌龙弗里曼破门","text":"【美国2-0澳大利亚两连胜领跑 巴洛贡造乌龙弗里曼破门】世界杯小组赛D组第2轮，美国对阵澳大利亚的比赛在流明球场展开角逐。上半场，巴洛贡制造了伯吉斯的乌龙球，弗里曼破门扩大领先优势。美国半场2-0领先澳大利亚。下半场双方均无建树，最终美国2-0击败澳大利亚。此役战罢，美国取得两连胜，继续排名小组榜首，已经提前确定小组出线，澳大利亚积3分排名小组第二。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776893088.html","importance":""},{"id":"wscn3122190","time":1781903732000,"title":"富时A50期指连续夜盘收涨0.02%，报15752点。\n","text":"富时A50期指连续夜盘收涨0.02%，报15752点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3122188","time":1781903384000,"title":"受中东和平协议疑虑影响，拉美资产恐录得单周跌幅","text":"周五，由于正值美国公共假日，市场交投清淡，多数拉美资产恐将录得单周跌幅，投资者正在权衡有关美伊临时和平协议的最新进展。\n追踪该地区货币的MSCI指数微涨0.1%，股票基准指数跌0.2%。这两个指数在前一交易日均下跌超过1%，且均面临单周收跌的局面。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606203776892713","time":1781902785000,"title":"英国火车相撞事故已致1人死亡 多人受伤","text":"【英国火车相撞事故已致1人死亡 多人受伤】英国警方19日晚发布声明称，当天下午发生在伦敦以北约60英里（约97公里）处的贝德福德地区的两列火车相撞事故已造成1人死亡、多人受伤。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606203776892713.html","importance":""},{"id":"wscn3122187","time":1781901864000,"title":"诺贝尔获奖者江珀宣布离开DeepMind加入Anthropic","text":"资深研究科学家约翰・江珀（John Jumper）宣布，他将离开谷歌DeepMind，加入人工智能初创企业Anthropic，这是这家科技巨头人工智能研发部门最新一起备受关注的核心人才离职事件。江珀在社交平台X发文称：“历经近九年工作，我决定离开谷歌DeepMind，加盟Anthropic。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3122186","time":1781901637000,"title":"美国务卿与黎总统通话，讨论黎以谈判安排","text":"6月19日，美国国务院发表声明称，美国国务卿鲁比奥当天与黎巴嫩总统约瑟夫·奥恩通话，重申了美国对黎巴嫩政府的支持，并强调必须解除黎巴嫩真主党武装。声明称，双方还讨论了下一轮黎以谈判安排，相关谈判将于6月23日至25日在华盛顿举行。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wa <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var sina = _rawData.filter(function(x){ return x.source === '新浪财经'; }).length;
  var ntes = _rawData.filter(function(x){ return x.source === '网易财经'; }).length;
  var xq = _rawData.filter(function(x){ return x.source === '雪球'; }).length;
  var cls = _rawData.filter(function(x){ return x.source === '财联社'; }).length;
  var wscn = _rawData.filter(function(x){ return x.source === '华尔街见闻'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-sina').textContent = sina;
  document.getElementById('stat-163').textContent = ntes;
  document.getElementById('stat-xq').textContent = xq;
  document.getElementById('stat-cls').textContent = cls;
  document.getElementById('stat-wscn').textContent = wscn;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
})();
</script>
