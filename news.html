ce":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795542027.html","importance":"hot"},{"id":"1632190667828","time":1783367540000,"title":"一个十年加盟老兵的生存样本：向上折腾，平着没用","text":"一个十年加盟老兵的生存样本：向上折腾，平着没用","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L174663J051188EA.html","importance":""},{"id":"wscn3129543","time":1783367452000,"title":"周一（7月6日）纽约尾盘，ICE美元指数涨0.02%，报100.876点，日内交投区间为101.145-100.840点，亚太盘初至北京时间18:06持续上扬，","text":"周一（7月6日）纽约尾盘，ICE美元指数涨0.02%，报100.876点，日内交投区间为101.145-100.840点，亚太盘初至北京时间18:06持续上扬，经过一段时间的高位窄幅震荡之后，从23:00开始回落。\n彭博美元指数跌0.02%，报1218.84点，日内交投区间为1220.46-1218.60点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129542","time":1783366974000,"title":"尽管高盛警告供应反弹加快，铝价依然上涨","text":"尽管高盛集团警告称，中东冶炼厂的供应恢复速度快于预期，铝价仍从近四个月低点反弹。\n伦敦金属交易所（LME）铝价上涨0.8%，收于每公吨3115.50美元。五矿期货有限公司（Minmetals Futures Co.）基本金属研究主管吴坤金表示，市场得到了部分中国资金流入金属股票和期货的支撑，这些资金正押注生产商上半年将交出亮眼的盈利答卷。\n此外，该金属的14日相对强弱指数（RSI）近期进入超卖区域，部分人士认为这表明价格已蓄势准备反弹。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129541","time":1783366841000,"title":"美国CFTC：交易员对日元看跌情绪创2007年以来最高，对美元看涨程度创2015年以来最高","text":"美国商品期货交易委员会（CFTC）：6月30日当周，投机者（期权和期货市场杠杆交易员）所持日元空头头寸增加至大约13.8万手合约，创2007年以来新高。近期，美元兑日元突破162、创1986年以来最高，使得投资者臆测日本官方要到何时才会干预市场，从而提振日元汇率。\n截至6月30日，看涨美元的押注增至近400亿美元，为十多年来最高。最新CFTC数据涵盖资产管理公司、对冲基金和汇市投机者持有的仓位。与此同时，美元6月累计上涨2%，创过去一年最佳月度表现之一。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"1633777011046","time":1783366717000,"title":"谁在定义「超级个体」？","text":"谁在定义「超级个体」？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L173D4UN051188EA.html","importance":""},{"id":"wscn3129539","time":1783366457000,"title":"在美上市新兴市场ETF吸金骤减，韩国ETF资金外流最大","text":"上周，投资者连续第三周涌入投资于新兴市场股票和债券的交易所交易基金（ETF）。彭博汇编数据显示，截至7月2日当周，在美国上市、投资于多个发展中国家以及特 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
