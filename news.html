":""},{"id":"wscn3122194","time":1781907298000,"title":"特朗普：美伊须60天内达成长期协议，否则将采取进一步行动","text":"6月19日，美国总统特朗普在安德鲁斯联合基地发表讲话时表示，美国和伊朗已签署谅解备忘录，双方将在60天内就长期安排展开谈判。特朗普称，“60天内达成最终协议，否则我们会采取让他们不高兴的行动，但我认为事情不会发展到那一步。”特朗普还称，美伊谅解备忘录的达成已使霍尔木兹海峡恢复通航，“大约700艘船正源源不断驶出”。特朗普还表示与以色列关系良好。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122194","importance":"hot"},{"id":"xq4720572","time":1781906336000,"title":"刚果（金）已确认的埃博拉病例数量上升至933例。","text":"刚果（金）已确认的埃博拉病例数量上升至933例。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/395693594","importance":""},{"id":"wscn3122193","time":1781905097000,"title":"特朗普：Anthropic曾构成国家安全威胁","text":"美国总统特朗普在接受“Axios Show”独家采访时表示，他曾一度将Anthropic视为国家安全威胁，不过他暗示此后双方关系已有所改善。\nAxios的马克·卡普托在采访中问特朗普，是否将Anthropic或其CEO达里奥·阿莫迪视为国家安全威胁。\n“嗯，现在不是，但一周前也许是，”美国总统特朗普表示，在七国集团峰会后，他留下的印象是阿莫迪“友善”且“聪明”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122193","importance":"hot"},{"id":"sinacomos:nicywef1028618","time":1781904906000,"title":"特朗普：Anthropic曾构成国家安全威胁","text":" 美国总统特朗普在接受“Axios Show”独家采访时表示，他曾一度将Anthropic视为国家安全威胁，不过他暗示此后双方关系已有所改善。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-20/doc-inicywef1028618.shtml","importance":""},{"id":"sinacomos:nicyweh2360534","time":1781904575000,"title":"美伊核谈尚未开始即因黎巴嫩问题陷入停滞","text":" 由于黎巴嫩南部战事加剧，伊朗推迟了与美国就永久和平协议展开谈判的启动时间。这对于美国总统特朗普旨在结束战争并遏制伊朗核计划的努力而言，可能是一次挫败。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-20/doc-inicyweh2360534.shtml","importance":""},{"id":"wscn3122192","time":1781904488000,"title":"伊拉克石油部发言人表示，伊拉克预计南部油田产量将在未来1-2个月内重新超过300万桶/日。\n","text":"伊拉克石油部发言人表示，伊拉克预计南部油田产量将在未来1-2个月内重新超过300万桶/日。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122192","importance":""},{"id":"xq4720560","time":1781904222000,"title":"【中方敦促国际社会采取有力人道主义行动】中国常驻联合国副代表孙磊19日在联合国经济及 2","importance":""},{"id":"wscn3122188","time":1781903384000,"title":"受中东和平协议疑虑影响，拉美资产恐录得单周跌幅","text":"周五，由于正值美国公共假日，市场交投清淡，多数拉美资产恐将录得单周跌幅，投资者正在权衡有关美伊临时和平协议的最新进展。\n追踪该地区货币的MSCI指数微涨0.1%，股票基准指数跌0.2%。这两个指数在前一交易日均下跌超过1%，且均面临单周收跌的局面。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122188","importance":""},{"id":"wscn3122187","time":1781901864000,"title":"诺贝尔获奖者江珀宣布离开DeepMind加入Anthropic","text":"资深研究科学家约翰・江珀（John Jumper）宣布，他将离开谷歌DeepMind，加入人工智能初创企业Anthropic，这是这家科技巨头人工智能研发部门最新一起备受关注的核心人才离职事件。江珀在社交平台X发文称：“历经近九年工作，我决定离开谷歌DeepMind，加盟Anthropic。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122187","importance":"hot"},{"id":"wscn3122186","time":1781901637000,"title":"美国务卿与黎总统通话，讨论黎以谈判安排","text":"6月19日，美国国务院发表声明称，美国国务卿鲁比奥当天与黎巴嫩总统约瑟夫·奥恩通话，重申了美国对黎巴嫩政府的支持，并强调必须解除黎巴嫩真主党武装。声明称，双方还讨论了下一轮黎以谈判安排，相关谈判将于6月23日至25日在华盛顿举行。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122186","importance":"hot"},{"id":"wscn3122185","time":1781901208000,"title":"伊朗外交部副部长赛义德·哈提卜扎德：伊朗将继续在与阿曼协调并在国际法规则下提供航行服务。在谅解备忘录所规定的60天期限内，伊朗不会收取通行费用，但之后将引入新的","text":"伊朗外交部副部长赛义德·哈提卜扎德：伊朗将继续在与阿曼协调并在国际法规则下提供航行服务。在谅解备忘录所规定的60天期限内，伊朗不会收取通行费用，但之后将引入新的航道管理机制，并提交给地区国家。\n未来要达成的任何协议都必须包括解冻所有伊朗被冻结资金。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122185","importance":""},{"id":"wscn3122184","time":1781901163000,"title":"伊朗副外长：美国必须确保以色列遵守谅解备忘录","text":"当地时间19日，伊朗外交部副部长赛义德·哈提卜扎德在接受采访时表示，美国必须确保以色列遵守美伊之间达成的谅解备忘录条款。伊朗已准备继续推进外交进程，“如果对方展现出同样的认真态度，我们也准备一步一步向前推进。”伊朗寻求各个战线的和平，包括加沙在内。由于黎巴嫩与冲突存在直接关联，因此被纳入该谅解备忘录之中。“只有当以色列结束占领，并遵守国际法，黎巴嫩及整个地区才会有和平与稳定。”（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global/3122184","importance":"hot"},{"id":"wscn3122183","time":1781901112000,"title":"美国国务卿卢比奥计划下周前往中东地区，计划前往科威特、阿联酋、巴林。（Axios）\n","text":"美国国务卿卢比奥计划下周前往中东地区，计划前往科威特、阿联酋、巴林。（Axios）\n","source":"华尔街见闻","category":"fast" <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻', '同花顺':'同花顺' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn', '同花顺':'badge-ths' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'},
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var sina = _rawData.filter(function(x){ return x.source === '新浪财经'; }).length;
  var ntes = _rawData.filter(function(x){ return x.source === '网易财经'; }).length;
  var xq = _rawData.filter(function(x){ return x.source === '雪球'; }).length;
  var cls = _rawData.filter(function(x){ return x.source === '财联社'; }).length;
  var wscn = _rawData.filter(function(x){ return x.source === '华尔街见闻'; }).length;
  var ths = _rawData.filter(function(x){ return x.source === '同花顺'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-sina').textContent = sina;
  document.getElementById('stat-163').textContent = ntes;
  document.getElementById('stat-xq').textContent = xq;
  document.getElementById('stat-cls').textContent = cls;
  document.getElementById('stat-wscn').textContent = wscn;
  document.getElementById('stat-ths').textContent = ths;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
})();
</script>
