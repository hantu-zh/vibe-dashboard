82941885000,"title":"尽管面临压力，美国汽车销量仍保持平稳","text":"自今年初春以来，美国消费者面临着汽油价格大幅上涨、通胀抬头、就业担忧以及对伊朗战争的焦虑。然而，据Omdia Automotive数据显示，今年上半年美国汽车销量同比仅下降了3%。\n通用汽车第二季度销量同比下降4%，但GMC Sierra皮卡和更亲民的车型（如别克Envista）的销量确实有所增加。同城竞争对手斯泰兰蒂斯集团Stellantis NV在Ram皮卡强劲销量的推动下，尽管汽油价格上涨，季度销量仍增长了6%。\n混合动力汽车提振了丰田汽车和现代汽车二季度的销量，这两家车企的销量分别增长了1%和4%。\n现代汽车北美区总裁Randy Parker表示，公司正以“曲速（warp speed）”将混合动力车型引入其佐治亚州工厂，以满足市场需求。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"sinacomos:nifkcsk2717099","time":1782941399000,"title":"美伊多哈谈判结束，聚焦霍尔木兹海峡","text":" 伊朗与美国周三结束了一轮间接谈判，尚无迹象表明双方在实现持久和平方面取得进展。谈判反而聚焦于那些据信两周前本已解决的问题。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-02/doc-inifkcsk2717099.shtml","importance":""},{"id":"wscn3127628","time":1782941189000,"title":"极端高温重压美国电网，纽约电价飙升","text":"随着令人窒息的高温威胁到美国电网并打乱独立日假期的出行计划，从纽约到弗吉尼亚州的电价正在飙升。电价已经处于上涨趋势。截至当地时间下午3:25，纽约市的电价已攀升至每兆瓦时1100美元以上，且预计晚间还将继续走高。在美国最大的电网运营商PJM互联公司（PJM Interconnection LLC）覆盖的区域内，电价已飙升至今年1月东海岸遭遇历史性冬季风暴以来的最高水平。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifkcsa0471188","time":1782940855000,"title":"美国债市：美债小幅下跌 回吐沃什讲话后涨幅","text":" 美债期货在美国午后时段小幅走低，回吐了早前因美联储主席沃什发言引发的涨幅。油价延续跌势，从而遏制了美债盘尾的弱势表现，美债收益率收盘仅小幅上升。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-02/doc-inifkcsa0471188.shtml","importance":""},{"id":"sinacomos:nifkcry3693067","time":1782940739000,"title":"美国拒绝延长北美贸易协定，开启终结倒计时并寻求修改","text":" 特朗普政府周三拒绝延长《美墨加协定》，开启了为期十年的贸易协定终止倒计时。美方希望寻求修改协定，以推动制造业岗位回流美国，并削减美国与北美邻国之间的贸易逆差。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-02/doc-inifkcry3693067.shtml","importance":""},{"id":"em202607023790669679","time":1782940585000,"title":"富时A50期指连续夜盘收涨0.35% 报15300点","text":"富时A50期指连续夜盘收涨0.35%，报15300点。","source":"东方财富","category":"fast","stock":""," 势，收涨0.5%，而墨西哥比索贬值0.4%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607023790667928","time":1782938997000,"title":"苹果筹备全新iPad Pro与重新设计的入门级MacBook Pro 并计划于明年上半年推出基础版M7芯片","text":"苹果筹备全新iPad Pro与重新设计的入门级MacBook Pro，并计划于明年上半年推出基础版M7芯片。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790667928.html","importance":"hot"},{"id":"xq4743879","time":1782938997000,"title":"苹果计划于明年上半年推出基础版M7芯片。","text":"苹果计划于明年上半年推出基础版M7芯片。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/397957523","importance":""},{"id":"em202607023790660270","time":1782938763000,"title":"成本上涨与市场需求双轮驱动 半导体开启年内第二轮涨价","text":"【成本上涨与市场需求双轮驱动 半导体开启年内第二轮涨价】7月起，全球半导体行业迎来新一轮价格调整。近日，芯联集成、斯达半导、扬杰科技、聚辰股份等多家半导体公司向客户发出了涨价函，价格上调幅度为15%至25%。据记者不完全统计，超过20家国内外半导体公司在上半年发布了第一轮涨价函。目前，相关公司均宣布了新一轮涨价通知。细看各家公司的涨价通知函，成本上涨、AI需求爆发是调价的核心诱因。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790660270.html","importance":"hot"},{"id":"em202607023790662329","time":1782938169000,"title":"科技主题表现突出 约七成权益类保险资管产品上半年实现正回报","text":"【科技主题表现突出 约七成权益类保险资管产品上半年实现正回报】2026年上半年，科技板块表现强势，带动A股市场走强。受此推动，约七成权益类保险资管产品实现正投资回报。但在结构性行情演绎下，权益类保险资管产品投资回报呈现分化态势，科技主题产品表现亮眼，而红利类主题产品表现相对黯淡。数据显示，2026年上半年，在有年化回报数据的约180只权益类保险资管产品中，实现正投资回报的超过120只，占比约七成。从年化回报排行榜来看，科技主题产品明显跑赢其他类型。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607023790662329.html","importance":"hot"},{"id":"wscn3127615","time":1782937852000,"title":"Vanguard Group Inc.（领航集团）将充当“特朗普账户”的另类基金合作伙伴。\n该公司股票ETF被选择为“特朗普账户”的投资选项。\n","text":"Vanguard Group Inc.（领航集团）将充当“特朗普账户”的另类基金合作伙伴。\n该公司股票ETF被选择为“特朗普账户”的投资选项。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127614","time":1782937708000,"title":"美国总统特朗普：油价正在下跌。\n船只正离开霍尔木兹海峡。\n","text":"美国总统特朗普：油价正在下跌。\n船只正离开霍尔木兹海峡。\n","source":"华尔街见闻","category":"fast","s <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}

}

function renderSourceTabs() {

    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
