链同步震荡，海外相关赛道估值下行对A股构成传导压力，A股呈现“冲高回落，极致分化”格局。综合本周券商策略研报来看，美联储加息预期反复、科技板块交易拥挤度抬升，以及AI产业面消息扰动共同压制了科技板块风险偏好。在中期维度上，AI产业上行趋势尚未出现实质性拐点，各细分赛道景气度持续兑现，行情延续的基础仍存。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202606293785655289","time":1782686528000,"title":"6月份A股公司密集分红 派现总额近5700亿元","text":"【6月份A股公司密集分红 派现总额近5700亿元】截至6月28日中国证券报记者发稿，Wind数据显示，以除权除息日为基准，6月份已实施和即将实施2025年度分红方案的上市公司超过1700家，累计派发现金红利总额达5690亿元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785655289.html","importance":"hot"},{"id":"wscn3125723","time":1782686474000,"title":"万亿发债潮叠加评级上调，券商大力融资谋转型","text":"今年以来，券商融资节奏持续提速，债券发行规模实现大幅跃升。Choice数据显示，截至6月26日，年内已有61家券商累计发行521只债券，总发行规模超过1.22万亿元，较去年同期的5274.98亿元同比增长超过131%。另外，行业龙头发债体量达到千亿级。与此同时，多家券商大额发债批复密集落地。6月以来，证券行业迎来罕见的债券信用评级集中上调。中金财富、东北证券、长城证券、华安证券、浙商证券等多家券商密集公告评级调整，旗下多款次级债信用等级成功从AA+跃升至AAA，行业总体信用资质实现质的提升。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125722","time":1782685836000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 待定 欧洲央行在辛特拉举行中央银行论坛，至7月1日；北京太空算力大会举办；\n② 07:30 澳洲联储助理主席Kent发表讲话；\n③ 07:50 日本5月零售销售；\n④ 13:00 英国央行首席经济学家Pill发表讲话；\n⑤ 16:30 英国5月央行抵押贷款许可\n⑥ 17:00 欧元区6月经济景气指数，欧元区6月消费者信心指数终值；\n⑦ 22:30 美国6月达拉斯联储商业活动指数\n⑧ 次日00:30 欧洲央行行长拉加德发表讲话；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1639464673917","time":1782685646000,"title":"“美帝”没救成欧洲，美的救了","text":"“美帝”没救成欧洲，美的救了","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0IPS975051188EA.html","importance":""},{"id":"em202606293785652564","time":1782685589000,"title":"三星与SK集团未来十年的总投资或高达2000万亿韩元","text":"【三星与SK集团未来十年的总投资或高达2000万亿韩元】据报道，三星与SK集团将于周一晚些时候在韩国总统府公布投资方案，两家企业未来十年的总投资规模最高或达2000万亿韩元（折合1.3万亿美元）。将重点布局半导体、AI算力数据中心与物理AI领域。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785652564.html","importance":"hot"},{"id":"wscn3125721","time":1782685526000,"title":"据韩媒报道，三星与SK集团未来10年的投资总额或将达到2000万亿韩元。\n","text":"据韩媒报道，三星与SK集团未来10年的投资总额或将达到2000万亿韩元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125720","time":1782685144000,"title":"国际清算银行警告全球经济面临多重压力","text":"总部设于瑞士巴塞尔的国际清算银行当地时间28日发布报告称，当前全球经济增长面临多重压力，包括人工智能热潮或难持续、金融体系存在脆弱性、公共财政紧张以及通胀上行等。报告还说，霍尔木兹海峡的“历史性关闭”引发能源及其他原材料供应危机，对全球经济前景构成新的威胁。尽管地缘政治紧张局势有所缓解且油价大幅下跌，但此次冲击造成的影响可能持续存在。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125713","time":1782684355000,"title":"以总理与防长发表联合声明：以军将继续驻留在黎南部“安全区”","text":"当地时间28日晚，以色列总理内塔尼亚胡与国防部长卡茨发表联合声明称，以色列国防军刚刚摧毁了位于黎巴嫩南部马吉达勒宗村区域的黎巴嫩真主党地下武装基础设施。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606283785624346","time":1782684338000,"title":"6月29日国内四大证券报纸、重要财经媒体头版头条内容精华摘要","text":"【国内四大证券报纸、重要财经媒体头版头条摘要】1、国家能源集团发布116项新一代煤电产业链供需对接清单。2、前5个月规上工业企业利润同比增长18.8%，电子行业贡献率超过四成。3、上涨支撑因素松动，黄金下半年面临“压力测试”。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785624346.html","importance":""},{"id":"wscn3125712","time":1782684200000,"title":"布伦特原油期货周一亚市盘初涨1.9%，至每桶73.39美元；WTI原油期货接近每桶70美元。此前美伊停火协议陷入紧张状态。\n","text":"布伦特原油期货周一亚市盘初涨1.9%，至每桶73.39美元；WTI原油期货接近每桶70美元。此前美伊停火协议陷入紧张状态。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606283785622393","time":1782684019000,"title":"东方财富财经早餐 6月29日周一","text":"【东方财富财经早餐 6月29日周一】1、国家统计局：2026年1—5月份全国规模以上工业企业利润增长18.8%。2、美军称对伊实施打击，伊方缺席28日的美伊技术性谈判。3、外媒：苹果寻求获准从长鑫存储购买内存芯片。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785622393.html","importance":""},{"id":"em202606293785647269","time":1782682743000,"title":"国家能源集团发布116项新一代煤电产业链供需对接清单","text":"【国家能源集团发布116项新一代煤电产业链供需对接清单】6月27日，国家能源集团举办首届新一代煤电现代产业链融通发展共链行动大会，集中发布新一代煤电产业链116项供需对接清单，打通上中下游信息壁垒，破解供需错配难题。20家产业链上下游企业现场签署商务合同、合作协议与共建协议，将“纸面资源”转化为“落地项目”。依托此次签约契机，新一代煤电领域5家全国重点实验室共建协议落地签署，以国家级创新平台为载体，集中力量攻坚煤电前沿关键技术。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785647269.html","importance":"hot"},{"id":"em202606283785618651","time":1782682605000,"title":"银河微电披露资产收购预案 拟全资控股恒泰柯 补齐中高压功率半导体版图","text":"【银河微电披露资产收购预案 拟全资控股恒泰柯 补齐中高压功率半导体版图】停牌半个多月后，国产半导体分立器件厂商银河微电（SH688689，停牌中）拟并购恒泰柯半导体（上海）有限公司（以下简称“恒泰柯”）100%股权的部分细节敲定。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785618651.html","importance":""},{"id":"em202606283785618875","time":1782682539000,"title":"前5个月电子专用材料制造规模以上企业利润同比增长665.4%","text":"【前5个月电子专用材料制造规模以上企业利润同比增长665.4%】6月27日，国家统计局公布今年前5个月规模以上工业企业利润数据。数据显示，1月至5月，规模以上工业企业中，计算机、通信和其他电子设备制造业利润同比增长103.9%，对全部规模以上工业企业利润增长的贡献率达43.1%，是规模以上工业企业利润较快增长的重要支撑。值得注意的是，电子专用材料制造规模以上企业利润同比增长665.4%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785618875.html","importance":""},{"id":"em202606283785607198","time":1782682429000,"title":"直面外卖大战、AI变局、战略失误 王兴给美团摁下“理性”重启键","text":"【直面外卖大战、AI变局、战略失误 王兴给美团摁下“理性”重启键】经历了千亿元补贴大战、市值跌破4000亿港元之后，美团站上了一个新的战略节点。6月26日，美团（03690.HK）年度股东大会在北京召开。过去一年，美团经历了严峻的考验。2025年全年业绩由盈转亏，调整后净亏损186.5亿元，而2024年同期为盈利437.7亿元。亏损背后，外卖、即时零售赛道竞争白热化，美团、阿里、京东三家在此持续展开烧钱补贴大战。此外，美团股价年初至今累计跌幅超过37%，同期恒生指数下跌约9.96%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785607198.html","importance":""},{"id":"em202606283785634382","time":1782682285000,"title":"下游需求大增 储能企业密集签单","text":"【下游需求大增 储能企业密集签单】储能市场景气度持续走高。高工产研锂电研究所发布的数据显示，截至6月28日，今年上半年已有35家储能企业对外披露订单签约数据，累计签约规模约550GWh（吉瓦时）。从月度走势看，1月份至3月份签约体量相对平稳，4月份至6月份订单规模直线拉升，行业呈现供不应求的状态。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785634382.html","importance":""},{"id":"wscn3125717","time":1782682200000,"title":"四川高县5.5级地震致13人受伤，均为轻微伤已送医诊疗","text":"据中国地震台网正式测定：2026年6月29日0时12分，宜宾市高县沙河镇附近（北纬28.50度，东经104.69度）发生5.5级地震，震源深度6千米。地震发生后，宜宾市抗震救灾指挥部启动地震三级应急响应。市级相关部门、县（区）迅速行动，及时开展灾情排查和救灾工作。截至2026年6月29日3时30分，此次地震未造成重大人员伤亡，因灾受伤13人均为轻微伤，已及时送医诊疗，紧急避险转移和安置196人。（“宜宾发布”微信公号）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606283785619679","time":1782681678000,"title":"天孚通信：预计未来几年将持续增加资本性开支 今年下半年开始个别物料供应紧缺矛盾将逐步缓解","text":"【天孚通信：预计未来几年将持续增加资本性开支 今年下半年开始个别物料供应紧缺矛盾将逐步缓解】天孚通信(300394.SZ)发布投资者关系活动记录表公告，公司泰国工厂无源产品线已处于稳定量产并正按客户需求稳步扩产，有源产品线已通过客户审核，预计今年下半年产能利用率会进一步提升。面向CPO领域配套的FAU、ELS外置光源等相关产品已处于稳定交付状态，公司会配合客户进行产能储备和扩产。为满足全球光互连建设对公司光器件的交付增长需求，公司预计未来几年将持续增加资本性开支。在个别物料短缺方面，公司积极与供应商保持沟通，预计今年下半年开始供应紧缺矛盾将逐步缓解。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785619679.html","importance":""},{"id":"em202606283785607955","time":1782681226000,"title":"三条全球最大碳纤维产线同日投产 补齐高端材料短板","text":"【三条全球最大碳纤维产线同日投产 补齐高端材料短板】我国碳纤维产业创新发展再添里程碑。6月28日，中国建材三条世界级高性能碳纤维生产线在中复神鹰连云港基地集中投产，覆盖通用、高强、高模三大主流碳纤维品类。此次三条全球顶级产线集中投产，补齐国内高端碳纤维规模化产能短板，推动行业摆脱同质化规模竞争，向高端化、技术化转型。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785607955.html","importance":""},{"id":"em202606283785629120","time":1782681102000,"title":"热门赛道遭抛售！华尔街重大警告","text":"【热门赛道遭抛售！华尔街重大警告】美股“AI交易”出现裂痕。据美银证券的最新报告，截至6月24日当周，美国股票基金流出85亿美元（约合人民币574亿元），这是投资者三个月来首次从美国股市撤资。其中，科技基金录得93亿美元（约合人民币629亿元）创纪录流出，显示美股“AI交易”正在降温。美银证券警告称，近期超大规模云计算商与芯片股走势严重分化，若科技巨头破位下跌将加速资金洗牌，今夏美股市场或将全面转入避险模式。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785629120.html","importance":""},{"id":"em202606283785612646","time":1782680986000,"title":"19家A股上市公司发布上半年业绩预告 多家公司预计净利同比增长超100%","text":"【19家A股上市公司发布上半年业绩预告 多家公司预计净利同比增长超100%】随着6月接近尾声，A股2026年半年报业绩预告大幕已拉开。数据显示，截至6月28日《证券日报》记者发稿时，已有19家A股上市公司预告上半年业绩，其中，恒逸石化股份有限公司（以下简称“恒逸石化”）、卫星化学股份有限公司（以下简称“卫星化学”）、杭州长川科技股份有限公司（以下简称“长川科技”）、惠州亿纬锂能股份有限公司（以下简称“亿纬锂能”）等上市公司预计上半年归属于上市公司股东的净利润同比增长上限超100%，广东银禧科技股份有限公司（以下简称“银禧科技”）、圣元环保股份有限公司（以下简称“圣元环保”）等上市公司预计上半年归属于上市公司股东的净利润同比增长上限超50%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785612646.html","importance":""},{"id":"em202606283785619071","time":1782680839000,"title":"多只翻倍牛股密集公告！涉英伟达概念、电子布、液冷等热门赛道","text":"【多只翻倍牛股密集公告！涉英伟达概念、电子布、液冷等热门赛道】6月28日晚间，十余家A股公司披露股价异动公告。其中，近期涉英伟达概念、PCB、电子布、玻璃基板、液冷散热等热门概念的大牛股纷纷澄清说明相关业务的开展情况。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785619071.html","importance":""},{"id":"wscn3125714","time":1782679800000,"title":"美官员：美伊计划于30日在卡塔尔首都举行会谈","text":"当地时间6月28日获悉，一位美国高级官员透露，美伊双方已同意停止相互攻击，并计划于6月30日在卡塔尔首都举行会晤，以解决关于霍尔木兹海峡的争端。另一位美国官员表示，美伊双方将“暂时”停止敌对行动，在技术性会谈继续进行的同时，霍尔木兹海峡“船只可以自由通行”。美国官员和另外的知情人士均证实了美伊计划于30日举行会晤。但截至目前，美伊双方以及当前美伊谈判的调解方巴基斯坦和卡塔尔均未作出正式说明。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606283785630047","time":1782679192000,"title":"十大券商策略：本轮AI科技抱团 不会轻易结束！缩圈行情下需做好两手准备","text":"【十大券商策略：本轮AI科技抱团 不会轻易结束！缩圈行情下需做好两手准备】中信证券：依然建议坚持AI+能化的结构；银河证券：市场核心逻辑转向业绩兑现；中信建投：三方面因素将决定三季度行情走势。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785630047.html","importance":""},{"id":"wscn3125715","time":1782678900000,"title":"普京：俄建议乌俄双方均停止打击对方领土纵深目标","text":"当地时间6月28日，俄罗斯总统普京向媒体表示，俄方建议俄乌双方均停止攻击对方领土的纵深目标，否则俄方对乌纵深地区的打击将更具威力，后果将更严重。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125716","time":1782677100000,"title":"伊朗官员：受遭袭事件影响，伊方缺席28日的美伊技术性谈判","text":"当地时间6月28日获悉，一位伊朗官员称，伊朗未参加原定于当天举行的技术性谈判，原因是“近期发生的袭击事件以及未能满足相关条件”。另据美国方面当天消息，有知情人士称，由于美伊两国再次发生冲突，原定于本周在瑞士恢复美伊技术性谈判的计划陷入停滞。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125718","time":1782676500000,"title":"委内瑞拉强震致中国公民8人遇难 1人失联","text":"当地时间6月28日下午获悉，中国驻委内瑞拉大使馆通报说，截至委内瑞拉当地时间28日15时，据不完全统计，已确认有8名中国公民在委内瑞拉6月24日发生的地震中遇难，1名中国公民失联，其他人员身份尚在核实。（央视新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293785645984","time":1782675768000,"title":"伊朗官员：受遭袭事件影响 伊方缺席28日的美伊技术性谈判","text":"【伊朗官员：受遭袭事件影响 伊方缺席28日的美伊技术性谈判】总台记者当地时间6月28日获悉，一位伊朗官员称，伊朗未参加原定于当天举行的技术性谈判，原因是“近期发生的袭击事件以及未能满足相关条件”。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785645984.html","importance":"hot"},{"id":"em202606293785643687","time":1782675431000,"title":"“工业味精”引爆二级市场 公募扫货磷化铟全产业链","text":"【“工业味精”引爆二级市场 公募扫货磷化铟全产业链】作为AI算力光互连最底层且不可替代的半导体基石，磷化铟（InP）板块自二季度以来持续走强，成为机构与游资同步加码的核心赛道，呈现出量价齐升的趋势性行情。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785643687.html","importance":""},{"id":"em202606293785646156","time":1782674801000,"title":"SpaceX上市产生示范效应 国内商业航天全产业链迎快速发展机遇期","text":"【SpaceX上市产生示范效应 国内商业航天全产业链迎快速发展机遇期】美国太空探索技术公司（简称“SpaceX”）正式在纳斯达克证券交易所挂牌后，股价处于波动状态。截至北京时间6月26日7时，其股价已从最高点约225美元回落至约153美元。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785646156.html","importance":""},{"id":"163749774289","time":1782671717000,"title":"OpenAI推迟上市，那“Kimi们”呢？","text":"OpenAI推迟上市，那“Kimi们”呢？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0ICJDMV051188EA.html","importance":""},{"id":"em202606293785640733","time":1782671454000,"title":"上涨支撑因素松动 黄金下半年面临“压力测试”","text":"【上涨支撑因素松动 黄金下半年面临“压力测试”】站在2026年年中，国际、国内金价较1月历史高点已累计回撤近30%，呈现极罕见的高位剧烈调整。展望后市，业内人士表示，黄金的价格走势是该资产与股市、利率、油价之间多重关系博弈的结果，金价的短期预测变得愈发困难。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785640733.html","importance":"hot"},{"id":"em202606293785645594","time":1782670929000,"title":"百度旗下昆仑芯科技计划在香港上市","text":"【百度旗下昆仑芯科技计划在香港上市】百度旗下昆仑芯科技计划在香港上市，知情人士透露，其目标估值为500亿美元，昆仑芯IPO将优先考虑购买其芯片的投资者，投资者必须承诺购买价值为其认购额3至7倍的芯片。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785645594.html","importance":""},{"id":"em202606293785640614","time":1782670552000,"title":"外资机构展望下半年：稳健基本面为风险资产提供支撑","text":"【外资机构展望下半年：稳健基本面为风险资产提供支撑】富达国际认为，尽管全球市场面临高度波动的环境，但基本面仍为风险资产提供支持。随着短期不确定性有所缓解，投资者正重新聚焦支撑资产表现的稳健基本面，而AI资本开支周期仍是推动全球市场增长的重要动力。对于股票资产，富达国际维持积极观点，同时关注自4月以来市场大幅反弹后带来的估值变化。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785640614.html","importance":""},{"id":"wscn3125719","time":1782670320000,"title":"普京称考虑全面禁止柴油出口","text":"当地时间6月28日，俄罗斯总统普京在主持召开国内燃油市场保障会议时表示，需要采取系统性措施以增加燃油供应量并维持经济上合理的价格。普京表示，大型炼油厂产能已满负荷利用，中小型企业的潜力也已调动，此前储备的燃油已投放国内市场。普京说，根据俄能源部提交的报告，目前俄罗斯汽油储备为170万吨，几乎与去年同期持平。他表示，正在考虑全面禁止柴油出口的必要性。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125709","time":1782668739000,"title":"委内瑞拉强震遇难人数升至1450人","text":"当地时间28日，委内瑞拉全国代表大会主席豪尔赫·罗德里格斯宣布，委内瑞拉24日发生的强震造成的死亡人数上升至1450人。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606283785634553","time":1782668700000,"title":"轮胎涨价背后的“温差”与“变局”","text":"【轮胎涨价背后的“温差”与“变局”】6月份以来，韩泰、邓禄普等外资轮胎品牌再度上调产品价格，涨幅普遍在2%至6%。这是自3月份以来，轮胎行业迎来的第三轮集中调价。这轮涨价的原因是什么？会持续多久？相关方面将如何应对挑战？就此，记者近日展开走访调查。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785634553.html","importance":"important"},{"id":"wscn3125707","time":1782668201000,"title":"轻量化AI设备需求激增，分析师：AI眼镜正加速迎来规模化拐点","text":"市场研究机构Counterpoint Research最新报告显示，2026年一季度全球智能头戴设备市场同比增长高达83%。其中，AR（增强现实）眼镜和无显示屏智能眼镜两大品类成为最强引擎，同比增速分别达到136%和210%。行业向更轻薄、更集成AI能力的方向演进。 国泰海通科技资深分析师李轩表示，今年以来，智能眼镜品类保持强劲增长势头，消费者对轻量化AI可穿戴设备的需求持续旺盛。随着市场走向细分，AI眼镜正加速迎来规模化拐点，从而快速拉动整条产业链的投资与重构。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125706","time":1782668014000,"title":"国内首个千站级5G-A超级上行网络落地应用，新一代通信网数万亿元赛道启航","text":"在2026年上海世界移动通信大会（MWC上海）期间，记者走进上海图书馆（简称“上图”），见证国内首个千站级5G-A超级上行商用网络如何落地，体验5G-A大上行网络赋能的沉浸式AI业务，感受科技如何切实改变文化与日常生活。\n当下，移动通信网络的发展正从面向人快速拓展到智能体，并拉动巨大的产业空间。行业数据印证了这一趋势。中国互联网新闻中心数据显示，未来五年，我国将建成50万座5G-A基站，6G有望2030年商用，预计带动上下游总产出约7万亿元，拉动GDP增长1.5个百分点。新一代通信网撬动数万亿元市场。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125704","time":1782667561000,"title":"券商“把脉”下半年可转债市场投资主线，看好科技板块机遇","text":"今年以来，可转债市场交投升温。Wind数据显示，截至6月28日，可转债市场成交额已达9.42万亿元，同比增长25.46%。展望下半年，分析师普遍认为，虽然当前可转债市场估值处于较高水平，不过下半年仍有结构性机会，投资者可关注科技、产业链“出海”等领域的收益弹性，预计景气成长风格仍为投资主线。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125701","time":1782666869000,"title":"机构：证券行业并购整合仍具备较大空间","text":"今年以来，除中金公司、东吴证券两起已进入审核通道的券商并购项目外，行业内的并购动作也在持续落地。4月份，东方证券公告称，正在筹划通过发行A股股份及支付现金的方式收购上海证券100%股权，5月份交易细节正式对外披露，股份发行价格按照定价基准日前120个交易日上市公司A股股份的交易均价10.49元/股确定，各项筹备工作正在稳步推进。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606293785639738","time":1782666826000,"title":"布局万亿新赛道 共织算力“一张网”","text":"【布局万亿新赛道 共织算力“一张网”】需求“上不言顶”,算力“一机难求”,投资“快马加鞭”……面向算力千倍级的增长，我国算力网建设正跑出“加速度”。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293785639738.html","importance":""},{"id":"wscn3125700","time":1782666012000,"title":"中小银行资本补充渠道亟待拓展","text":"梳理国家金融监督管理总局官网公开信息发现，截至6月28日，6月份已有浙江浦江农村商业银行、舟山定海海洋农村商业银行等超20家中小银行变更注册资本事项获批。不同类型银行资本补充渠道畅通度分化明显，这一现象已受到监管层高度关注。当前全行业资本充足率呈下滑态势，搭建多元、可持续的资本补充机制，已成为银行业尤其是中小银行亟待破解的核心课题。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125699","time":1782665050000,"title":"美国和伊朗即将举行的谈判已被取消。（以色列i24NEWS）\n","text":"美国和伊朗即将举行的谈判已被取消。（以色列i24NEWS）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1633567926185","time":1782664700000,"title":"严打蹭热点 让科技股去伪 “（协转）主要还是看买方资质，能向监管证明自己资金实力和未来改善上市公司业绩的能力。而（上市公司）跨界（并购）需要标的质量比较好，上市公司也比较规范才能批。”","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606283785628126.html","importance":"hot"},{"id":"wscn3125696","time":1782660619000,"title":"德国连续三天刷新本国最高气温纪录","text":"根据德国气象局当地时间6月28日发布的初步数据，当天下午4时左右，德国勃兰登堡州的科申气象站测得41.7摄氏度高温。这是德国连续第三天刷新最高气温纪录。此前，德国气象局26日在西部城市萨尔布吕肯测得41.3摄氏度高温，27日在东部默肯-德雷维茨地区测得41.5摄氏度高温。德国气象局预计，气温将从28日晚间开始逐渐下降，并伴有雷暴等恶劣天气。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"163162800685","time":1782660360000,"title":"大疆辟谣全系涨价3%-8%","text":"大疆辟谣全系涨价3%-8%","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0I1P79405199NPP.html","importance":""},{"id":"wscn3125695","time":1782660168000,"title":"克罗地亚全国高温预警","text":"克罗地亚国家水文气象局28日发布了针对4个地区的红色高温预警，并针对该国其他地区发布了橙色高温预警。根据气象预报，一些地区的日间最高气温将达到39摄氏度。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125694","time":1782659982000,"title":"日本媒体人：警惕日本再次成为战争加害国","text":"长期追踪和批评日本军事扩张、日美军事一体化等问题的日本媒体人吉田敏浩28日表示，日美军事同盟长期以来将和平宪法掏空，而日本政府不仅未能纠正这一趋势，反而持续推进军事扩张，这最终或导致日本再次成为战争加害国。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125693","time":1782659795000,"title":"世卫组织：欧洲高温 相关超额死亡已超1300例","text":"世界卫生组织总干事谭德塞28日在社交媒体平台X上表示，自6月21日以来，欧洲已记录到超过1300例与高温 相关的超额死亡。\n超额死亡数指特定地点和特定时期估计的总死亡人数与没有健康危机情况下的估计死亡人数之间的差额。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125692","time":1782659662000,"title":"AI初创公司Firmus携手英伟达在印尼建设数据中心","text":"澳大利亚人工智能（AI）基础设施公司Firmus Technologies Pty Ltd.将作为与美国芯片巨头英伟达公司合作的一部分，在印尼建设其首个数据中心项目。\n该公司表示，通过一项收入分成和信贷支持协议，Firmus能够为客户获取英伟达的基础设施，该协议涵盖了2027-28年期间多达17万个英伟达AI加速芯片，这项合作有望为其在头六年内带来高达300亿美元的承购协议收入。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallst <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
