资也看走眼了？","text":"【有银行股半年跌去30% 险资也看走眼了？】A股上半年收官，科技热潮中板块分化凸显。作为传统“老登股”的代表，银行股表现拉垮，板块累计跌去逾12%，跑输大盘超15个百分点。专家表示，对于打算长期持有的价值投资者，市场情绪导致的下跌并非坏事，反而会更加关注银行股的“性价比”。但考虑到市场资金的科创热情依然高涨，对银行股中短期走势的判断依然较为困难，机构核心注意力仍在基本面和估值上，等待修复时机。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303788625229.html","importance":""},{"id":"em202606303788705091","time":1782865505000,"title":"广州基孔肯雅热、登革热进入流行期 检测费可用医保报销了","text":"【广州基孔肯雅热、登革热进入流行期 检测费可用医保报销了】6月30日，广州医保局宣布，通过优化政策明确将基孔肯雅热、登革热传染病检测费用纳入广州居民医保门诊报销范围。此前，“两热”传染病检测费用未纳入居民医保门诊报销，群众需自费检测。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303788705091.html","importance":"important"},{"id":"em202607013789054078","time":1782865373000,"title":"韩国投资者上半年借道ETF配置中国资产 半导体、沪深300、通信等产品受青睐","text":"【韩国投资者上半年借道ETF配置中国资产 半导体、沪深300、通信等产品受青睐】今年上半年，韩国投资者积极配置中国资产，借道多只ETF进行投资。韩国证券存托结算院数据显示，港股市场方面，Global X中国半导体ETF上半年获净买入金额最多，达4239.46万美元；Global X中国电动车及电池ETF和华夏沪深300指数ETF上半年获净买入金额分别为2942.49万美元和1834.17万美元。A股市场方面，华夏中证5G通信主题ETF上半年获韩国投资者净买入437.64万美元，在所有A股上市ETF中排名第一。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013789054078.html","importance":""},{"id":"em202607013789055056","time":1782865336000,"title":"半年度主动权益业绩冠军吴昊：下半年存储板块景气度将延续","text":"【半年度主动权益业绩冠军吴昊：下半年存储板块景气度将延续】今年上半年的主动权益冠军基为吴昊管理的方正富邦核心优势混合A，该产品的收益达183.67%，打破富国低碳环保此前创下的160.31%的上半年最佳业绩纪录。展望下半年，吴昊认为存储板块的景气度将延续。他分析称，当前存储行业仍处于本轮超级周期的中段而非尾声。2026年价格、盈利、资本开支、长协签订、板块表现都在同步上修，盈利预测上修可以持续。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013789055056.html","importance":""},{"id":"em202606303788514268","time":1782865311000,"title":"半年落地28亿元现金兑付，碧桂园加速信用“回血”","text":"【半年落地28亿元现金兑付，碧桂园加速信用“回血”】碧桂园加速信用“回血”。6月30日，碧桂园迎来境外债务重组生效后首个付息节点，按期足额兑付1434万美元（折合人民币约9751万元）。这是碧桂园重组落地后的第二笔现金履约。今年1月，重组生效首周，碧桂园即完成首笔现金支付3.98亿美元（折合人民币超27亿元）。半年内两笔累计超28亿元的兑付，标志着碧桂园信用正在持续重塑。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303788514268.html"," 崎县报告发生地震，地震未引发海啸威胁，震度为日本气象厅烈度阶级4级（最高7级）。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303788504491","time":1782863040000,"title":"总价4000万起 深圳又一豪宅“日光”","text":"【总价4000万起 深圳又一豪宅“日光”】深圳又一豪宅项目实现开盘当日售罄。记者获悉，6月30日，位于深圳湾超级总部基地的住宅项目安缇雅苑正式开盘，本批次推出的全部72套住宅房源开盘当日售罄，项目再度刷新深圳核心片区顶豪去化速度。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303788504491.html","importance":""},{"id":"1639773413212","time":1782862998000,"title":"美公布6亿美元月球任务计划 推进月球基地建设","text":"美公布6亿美元月球任务计划 推进月球基地建设","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0O317HD0512D3VJ.html","importance":""},{"id":"wscn3127031","time":1782862951000,"title":"据美国商务部长卢特尼克致Anthropic的信函，美国取消对Anthropic公司Fable 5的控制措施。（Wired）\n","text":"据美国商务部长卢特尼克致Anthropic的信函，美国取消对Anthropic公司Fable 5的控制措施。（Wired）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127029","time":1782862869000,"title":"卢特尼克：Anthropic的Fable 5已通过分析并获得批准","text":"美国商务部长卢特尼克在社交平台X上发帖称，在过去的两个星期里，我们与Anthropic密切合作，对Fable 5进行了分析与批准，以确保美国政府内部达成一致。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303788723158","time":1782862860000,"title":"泸州老窖开股东大会 高管称国窖1573经销商库存约7个月","text":"【泸州老窖开股东大会 高管称国窖1573经销商库存约7个月】国窖1573挺价对市场有何影响？泸州老窖高管在最新一场股东会上作出“基本盘稳固”的论调。6月30日，泸州老窖召开2025年度股东会，记者在现场留意到，会议除了合计投票审核了7项议案外，泸州老窖高管还就市场关心的国窖1573挺价、渠道库存以及分红等问题，对外进行披露。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606303788723158.html","importance":"important"},{"id":"em202607013788899431","time":1782862736000,"title":"壳牌将以17亿美元出售美洲湾油田资产","text":"【壳牌将以17亿美元出售美洲湾油田资产】当地时间6月30日，一份声明显示，壳牌旗下子公司ShellOffshoreInc.已同意将其在美洲湾一座石油平台及邻近油田的权益以17亿美元出售给TalosEnergyInc.和RidgewoodEnergy。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607013788899431.html","importance":""},{"id":"wscn3127028","time":1782862722000,"title":"特朗普已听取关于对伊朗战争方案的简报，但选择继续进行谈判。\n特朗普目前将坚持对伊朗进行外交谈判。\n特朗普告诉助手，如果谈判超过8月18日的截止日期，他也觉得可以","text":"特朗普已听取关于对伊朗战争方案的简报，但选择继续进行谈判。\n特朗普目前将坚持对伊朗进行外交谈判。\n特朗普告诉助手，如果谈判超过8月18日的截止日期，他也觉得可以接受。（华尔街日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127027","time":1782862623000,"title":"上半年百城新房销售面积同比下降约12%","text":"中指研究院数据显示，2026年上半年，100城新建商品住宅销售面积同比下降约12%。二季度以来成交量整体趋于平稳，4月份100城新建商品住宅销售面积与去年同期基本持平，5月份、6月份同比分别小幅下降5%、4%。在二手房市场，中指研究院数据显示，上半年重点城市二手住宅成交约76万套，同比增长约6%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127026","time":1782862482000,"title":"美国商务部长卢特尼克：与Anthropic进行了紧密合作，以批准Fable 5。\n","text":"美国商务部长卢特尼克：与Anthropic进行了紧密合作，以批准Fable 5。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127024","time":1782862417000,"title":"上半年百强房企实现销售总额超1.5万亿元","text":"重点房企销售表现出现积极变化。6月30日，中指研究院发布数据显示，今年上半年，百强房企（按全口径销售额排序）实现销售总额15863.6亿元，同比降幅较前5个月收窄1.3个百分点，已连续第四个月收窄。其中，6月份单月，百强房企全口径销售额环比增长11.8%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607013788852790","time":1782862305000,"title":"A股限售股解禁一览：389.75亿元市值限售股今日解禁","text":"【A股限售股解禁一览：389.75亿元市值限售股今日解禁】数据显示，周三（7月1日），共有18家公司限售股解禁，合计解禁量为5.52亿股，按最新收盘价计算，合计解禁市值为389.75亿元。从解禁量来看，荣昌生物、亚虹医药-U、信通电子解禁量居前，解禁股数分别为1.93亿股、1.35亿股、5334.24万股。从解禁市值来看，荣昌生物、翱捷科技-U、中微公司解禁市值居前，解禁市值分别为251.15亿元、61.12亿元、24.47亿元。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607013788852790.html","importance":""},{"id":"1633602290606","time":1782862305000,"title":"深铁“换帅”：黄力平出任董事长，曾表态支持万科","text":"深铁“换帅”：黄力平出任董事长，曾表态支持万科","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0O2BN480519JFL1.html","importance":"hot"},{"id":"wscn3127022","time":1782862242000,"title":"6月份券商金股3只个股涨幅翻倍，7月金股布局更趋多元","text":"A股的6月行情，在科技股狂欢中收官。当月，券商金股中的雅克科技、国瓷材料、国际复材等3股涨幅翻倍。从近期券商陆续披露的7月金股名单来看，人工智能（AI）产业链仍为核心配置方向，但医药、券商板块的关注度也明显升温。科技独大的格局有所松动，机构布局更趋多元。展望7月，机构普遍认为科技板块的中长期价值不改，但短期再平衡的呼声渐起。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607013788835626","time":1782862042000,"title":"证监会：主动加强与各地沟通协作 营造不敢不能不想造假的市场生态","text":"【证监会：主动加强与各地沟通协作 营造不敢不能不想造假的市场生态】吴清表示，证监会将继续主动加强与各地的沟通协作，在源头把关、信息共享、协同执法、风险处置、投资者保护等方面进一步汇聚合力，央地“同下一盘棋”，统筹推进防风险强监管促高质量发展，共同营造“不敢造假、不能造假、不想造假”的市场生态，更好服务地方经济高质量发展，更好服务金融强国建设和中国式现代化大局。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788835626.html","importance":"important"},{"id":"wscn3127020","time":1782862020000,"title":"美国最大电网PJM着手管理数据中心电力需求","text":"周二，PJM互联公司（PJM Interconnection）的成员投票通过了一项计划，旨在获取更多电力以满足日益增长的数据中心需求。这股需求浪潮正威胁到美国最大电网的电力供应。\nPJM的投票成员对十多项关于如何通过所谓的“后备采购”（backstop procurement）流程为数据中心供电的提案进行了非约束性投票。其中一项由数据中心倡导者和主要受监管的公用事业公司提出的计划获得了推进。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3127021","time":1782861931000,"title":"华尔街见闻早餐 | 2026年7月1日","text":"AI热情驱动美股收涨，道指续收新高，标普500、纳指创史上最佳季度之一；日元跌破162、创40年新低。\n美国5月JOLTS职位空缺小幅回升至759万人，高于预期，劳动力需求保持稳定。\n报道称特朗普特使将在多哈与伊朗间接会谈，卡塔尔淡化达成重大突破的可能性。\n官方披露特朗普2025年加密货币业务斩获超10亿美元，重仓美股科技巨头。\n美国最高法院驳回特朗普限制出生公民权的行政令。\n中国央行月末操作“一增一减”：隔夜逆回购翻倍至6000亿，精准熨平跨季资金面。\n中国6月制造业PMI升至50.3重返扩张区间，非制造业商务活动指数继续扩张。\n市值破万亿后，寒武纪提示风险。央视评寒武纪市值破万亿：里程碑前，更需一份清醒定力。\n机器人女友来了！优必选重磅首发，最高售价99万元。\nAnthropic出性价比王牌Claude Sonnet 5，提升智能体能力，直指企业AI自动化市场。\n曝英伟达4芯片Rubin Ultra“发布仅三个月后就遭取消”引热议，SemiAnalysis称“英伟达份额正被侵蚀”。\n提醒：周三将公布中国6月RatingDog制造业PMI、美国6月ADP就业人数变动、美国6月ISM制造业指数。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1639536024126","time":1782861746000,"title":"美股全线收高，芯片股爆发，纳指大涨1.52%，半导体ETF上半年累涨82.13%","text":"美股全线收高，芯片股爆发，纳指大涨1.52%，半导体ETF上半年累涨82.13 2861174000,"title":"微软计划进行新一轮裁员","text":"微软计划进行新一轮裁员，影响数千个岗位。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607013788840254.html","importance":""},{"id":"1632511235079","time":1782861104000,"title":"“大空头”Burry最新持仓：首次做空卡特彼勒，同时做空特斯拉、英伟达和应用材料","text":"“大空头”Burry最新持仓：首次做空卡特彼勒，同时做空特斯拉、英伟达和应用材料","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0O17C8S05198NMR.html","importance":"hot"},{"id":"em202607013788807819","time":1782861060000,"title":"A股已有35家公司预告上半年业绩 预喜比例达74.29% AI、锂电、化工三大板块领衔高增长","text":"【A股已有35家公司预告上半年业绩 预喜比例达74.29% AI、锂电、化工三大板块领衔高增长】随着2026年半年报披露窗口期临近，A股上市公司业绩预告进入密集披露期。数据显示，截至6月30日，A股已有35家公司披露了半年度业绩预告。其中：预增11家，略增12家，扭亏3家，整体预喜比例达74.29%。记者梳理发现，AI产业爆发带动多个细分行业步入业绩收获期。上半年，A股公司盈利延续了“制造升级、周期修复”的结构特征，AI、新能源、化工三大领域的增长逻辑清晰可辨。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788807819.html","importance":""},{"id":"1634592209375","time":1782861057000,"title":"一锡之间，暴涨又暴跌！","text":"一锡之间，暴涨又暴跌！","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0O15KOB0519DKT1.html","importance":"important"},{"id":"cls2413612","time":1782860400000,"title":"【早报】多只A股公司业绩大增；美股存储概念半年涨超3倍；黄金、原油收跌；法国、挪威晋级世界杯16强","text":"①吴清：坚决铲除财务造假滋生的土壤和条件②八部门：推动工业互联网基础设施和算力基础设施同步建设③SK海力士拟订购半导体检测设备，总价最高可达4000亿韩元④美股三大指数齐涨道指新高⑤益生股份上半年净利预增超40倍。","source":"财联社","category":"fast","stock":"","url":"https://www.cls.cn/detail/2413612","importance":""},{"id":"wscn3127015","time":1782860364000,"title":"6月份私募调研近1800次，电子行业热度居前","text":"Wind数据显示，6月份共有842家私募机构参与到A股公司调研活动中，合计调研次数达1797次，涉及373家A股公司。其中，电子等行业A股公司被调研频次居于前列。今年1月份至6月份，私募机构调研次数分别为3619次、1485次、4740次、10117次、3554次、1797次。剔除春节假期所在的2月份，6月份私募机构整体调研节奏明显放缓。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3127014","time":1782860250000,"title":"机构密集调研A股上市公司，人形机器人、半导体材料受追捧","text":"6月份，共有989家A股上市公司迎来机构调研。从调研逻辑看，硬科技赛道凭借清晰的产业升级路径、持续推进的国产替代进程以及充足的中长期成长空间， <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
