450","time":1782772782000,"title":"【王文涛部长会见德国联邦经济和能源部部长赖歇】据商务部网站，6月28日，商务部部长王文涛在布鲁塞尔会见德国联邦经济和能源部部长赖歇，双方就中德、中欧经贸关系坦诚...","text":"【王文涛部长会见德国联邦经济和能源部部长赖歇】据商务部网站，6月28日，商务部部长王文涛在布鲁塞尔会见德国联邦经济和能源部部长赖歇，双方就中德、中欧经贸关系坦诚、深入交换了意见。\n\n王文涛表示，中德互为彼此重要经贸合作伙伴，两国经济深度互嵌，利益深度交融。中国商务部愿同德国经济部共同落实好两国领导人达成的重要共识，通过沟通交流增进理解和互信，进一步挖掘新兴领域合作潜力，推动中德经贸关系向上平衡，实现增量发展。\n\n王文涛表示，中欧经贸关系的本质不是零和博弈，而是互利共赢。在当前形势下，保持中欧经贸关系总体稳定具有全球性意义。中欧贸易投资磋商机制首次会议即将召开，希望德国政府在欧盟内发挥积极和建设性作用，推动欧方秉持理性务实的对华经贸政策立场，并同中方相向而行，通过对话磋商化解矛盾分歧。\n\n赖歇表示，德政府和经济界高度重视对华合作。德方愿同中方建立互信、平衡、可持续的伙伴关系，进一步深化贸易投资、供应链、人工智能等领域合作，实现共同增长。德方期待欧中双方利用贸易投资磋商机制，通过对话妥善解决经贸摩擦。\n\n双方一致同意，重启中德经济合作联委会机制，并就尽早召开联委会下一次会议保持沟通。双方将在联委会框架下成立贸易投资工作组和产业合作工作组，分别以政策沟通和政企对话为工作重点。此外，双方同意立即启动出口管制技术层面磋商，以平衡解决各自关切。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/397482841","importance":"hot"},{"id":"wscn3126340","time":1782772628000,"title":"首次隔夜逆回购操作落地，央行呵护短期流动性","text":"6月29日人民银行开展了3000亿元隔夜逆回购操作。专家表示，隔夜逆回购加强了对短端流动性的精细化管理，也体现了人民银行呵护季末流动性的政策意图。此次操作未披露隔夜逆回购利率。东方金诚首席宏观分析师王青认为，当前隔夜逆回购主要是对7天期逆回购的补充，操作模式有待逐步成熟。未来隔夜逆回购有望常态化操作，利率水平会适时公布。在中信证券首席经济学家明明看来，这意味着，7天期逆回购政策利率定位依然明确。虽然当下隔夜逆回购工具作为短端流动性管理工具创新被投入使用，但7天期逆回购利率作为主要政策利率的定位仍是关键基准。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606303787095766","time":1782772460000,"title":"A股波动分化加剧 券商策略关注景气验证","text":"【A股波动分化加剧 券商策略关注景气验证】经历6月震荡分化、科技板块波动显著加剧后，A股临近半年度收官，市场核心关切正从估值扩张切换至业绩成色验证。多家券商在最新策略中表示，规上工业企业利润这一盈利先行指标的亮眼表现为市场提供了基本面支撑，但结构性拥挤与板块极端分化意味着行情轮动节奏将加快；随着7月中报预告窗口临近，市场逻辑正全面转向业绩兑现。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787095766.html","importance":""},{"id":"wscn3126339","time":1782772385000,"title":"迎接2026年下半场，分化环境下公私募调整配置思路","text":"当前，在不少公私募机构看来，市场驱动力已从单纯的估值修复全面转向业绩兑现。机构纷纷调整针对下半年的战术，试图在科技主线与价值防御之间寻找新的平衡点。一方面，市场关于AI赛道的分歧显现，越来越多资金聚焦涨价持续、景气度高企以及能够兑现业绩的方向；另一方面，“资金再平衡”焦虑升温，前期受科技主线挤压持续下跌，又有业绩支撑的核心资产（如新能源、创新药等）开始活跃，即便是偏左侧的消费板块也有机构逆势布局，等待承接科技板块溢出的资金。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787111516","time":1782772322000,"title":"多哈谈判双方各执一词 美称今日谈 伊朗已否认","text":"【多哈谈判双方各执一词 美称今日谈 伊朗已否认】当地时间29日，伊朗方面表示，未来几天没有与美方开展任何谈判的计划。伊朗本周将派专家代表团前往卡塔尔首都多哈，跟进伊美谅解备忘录相关事项。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787111516.html","importance":""},{"id":"wscn3126338","time":1782772213000,"title":"美国贸易办公室（USTR）：正致力于敲定瑞士贸易协议。\n对瑞士方面取得的进展表示欢迎。\n","text":"美国贸易办公室（USTR）：正致力于敲定瑞士贸易协议。\n对瑞士方面取得的进展表示欢迎。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126337","time":1782772042000,"title":"3家公司告别A股，最后交易日收盘价均不足1元","text":"6月29日晚，3家沪市公司同时披露股票终止上市暨摘牌公告。退市太和（原“*ST太和”）、退市沪科（原“*ST沪科”）股票将于7月3日终止上市并摘牌；退市创兴（原“*ST创兴”）股票将于7月6日终止上市暨摘牌。3家公司均因2025年年报财务指标“不达标”而触及终止上市情形。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"sinacomos:nifcrne1774714","time":1782771931000,"title":"FAA：捷蓝航空航班在接近肯尼迪机场时撞上无人机","text":" 美国联邦航空管理局表示，已就捷蓝航空一趟航班据报在周一接近纽约约翰·肯尼迪国际机场时撞上一架无人机的事件展开调查。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcrne1774714.shtml","importance":"important"},{"id":"wscn3126336","time":1782771889000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 07:30 澳洲联储助理主席肯特讲话，日本5月求才求职比与失业率；\n② 07:50 日本5月工业产出初值；\n③ 时间待定 2026中国智算产业生态发展年会，聚焦GW级Token工厂建设；\n④ 09:30 中国6月官方制造业、非制造业、综合PMI，澳洲联储发布6月份货币政策会议的纪要文件；\n⑤ 14:00 英国一季度GDP终值；\n⑥ 15:40 欧洲央行副行长Vujcic主持一场会议（6月29日至7月1日，欧洲央行在葡萄牙Sintra举办中央银行论坛）；\n⑦ 15:55 德国6月失业人数与失业率；\n⑧ 16:40 欧洲央行执委Elderson主持一场会议；\n⑨ 18:40 欧洲央行执委Schnabel主持一场会议，英国央行副行长Breeden将在该场合谈论人工智能（AI）；\n⑩ 20:00 德国6月CPI初值，欧洲央行执委Cipollone讲话；\n⑪ 20:30 加拿大4月GDP；\n⑫ 21:00 美国4月FHFA房价指数，S&P/CS20座大城市房价指数；\n⑬ 21:30 欧洲央行首席经济学家Philip Lane与OpenAI首席分析师Chatterji对话；\n⑭ 22:00 美国5月JOLTS职位空缺，6月谘商会消费者信心指数；\n⑮ 美股盘后 耐克发布业绩报告；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126335","time":1782771716000,"title":"热点概念炒作频频引发股价异动，A股公司密集提示风险厘清业务边界","text":"6月17日以来，A股已有50多家公司针对AI服务器、光模块、人形机器人、可控核聚变等热点概念炒作发布股价异动公告或风险提示公告，主动回应市场关切、厘清业务边界和提示投资风险。专家表示，投资者须警惕相关公司的“三无”信号，即无核心技术迭代、无规模化订单、无现金流支撑，方能规避概念炒作陷阱。从中长期看，产业估值将逐渐从“叙事驱动”转向“业绩验证”逻辑，真正具备技术壁垒与订单转化能力的企业将获得估值溢价。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787111046","time":1782771512000,"title":"周二你需要知道的隔夜全球要闻","text":"周二你需要知道的隔夜全球要闻：伊朗称未来几天内没有与美方开展任何谈判的计划 纳斯达克综合指数收涨超2%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787111046.html","importance":""},{"id":"em202606303787109963","time":1782771444000,"title":"中央气象台6月30日06时继续发布暴雨蓝色预警","text":"【中央气象台6月30日06时继续发布暴雨蓝色预警】中央气象台6月30日06时继续发布暴雨蓝色预警：预计，6月30日08时至7月1日08时，江苏南部、上海、安徽南部、浙江、江西中北部、湖南中北部、贵州南部、广西中北部和南部沿海、云南中南部，以及山东中西部、河北南部和东部、辽宁西南部、青海中东部、西藏东南部等地部分地区有大到暴雨，其中，安徽南部、江西北部、广西北部等地部分地区有大暴雨(100~220毫米)。上述部分地区伴有短时强降水(最大小时降雨量40~70毫米，局地可超过80毫米)，局地有雷暴大风或冰雹等强对流天气。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787109963.html","importance":"important"},{"id":"em202606303787109564","time":1782771352000,"title":"中欧贸易投资磋商机制联合声明","text":"【中欧贸易投资磋商机制联合声明】2026年6月29日，中华人民共和国商务部部长王文涛与欧盟委员会贸易和经济安全及机构间关系和透明度委员马罗什·谢夫乔维奇在布鲁塞尔举行中欧贸易投资磋商机制首次会议。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787109564.html","importance":"hot"},{"id":"wscn3126332","time":1782771352000,"title":"立讯精密：拟全球发售约3.83亿股H股，发售价不超63.28港元","text":"Luxshare Precision（立讯精密）申请通过香港IPO发行3.83亿股股票。\n发行价指导区间上限为每股63.28港元。\n预计股票将于7月7日定价，将从7月9日开始交易。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nifcmee5081584","time":1782771315000,"title":"6月30日收盘：美股收高科技股领涨，纳指上涨2.07%","text":"北京时间6月30日凌晨，美股周一收高，科技 夫乔维奇共同主持召开中欧贸易投资磋商机制首次会议并在会后发表联合声明。双方围绕中欧经贸重要议题，进行了全面、深入、建设性的讨论，确认正式成立中欧贸易投资磋商机制，下设贸易投资平衡、出口管制、知识产权和世贸组织四大板块，并设立联合监测机制。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifcmeq3647214","time":1782768726000,"title":"美国战略石油储备库存减少550万桶，降至1983年以来最低水平","text":" 据美国能源部数据，美国战略石油储备（SPR）中的原油库存减少了550万桶，降至3.257亿桶，创下自1983年5月以来的最低水平。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcmeq3647214.shtml","importance":""},{"id":"em202606303787102046","time":1782768666000,"title":"世界银行表示：独立评估小组将对气候变化行动计划开展评估","text":"世界银行表示，独立评估小组将对气候变化行动计划开展评估，将继续并完成从“贷款投入目标”向“以贷款成果为核心”的转变，以最大化发展影响。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787102046.html","importance":""},{"id":"sinacomos:nifcrnn3539014","time":1782768546000,"title":"美国股市：逢低买盘推动科技股反弹 纳斯达克100指数上涨逾2%","text":"逢低买盘周一涌入近期遭重挫的科技股，推动美国股市从上周的跌势中反弹。 以科技股为主的纳斯达克100指数周一在纽约收涨2.3%，扭转了上周五的跌势。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcrnn3539014.shtml","importance":"hot"},{"id":"sinacomos:nifcrna4978083","time":1782768273000,"title":"战火未断、航道未闭：霍尔木兹海峡航运流量仍维持高位","text":" 在上周末美伊再度相互发动新袭击之后，关键通道霍尔木兹海峡的航运流量依然保持高位，似乎至少在一定程度上并未受到时断时续的和谈影响。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcrna4978083.shtml","importance":""},{"id":"em202606303787101311","time":1782768054000,"title":"美国3个月期国库券需求降至2024年以来最弱水平","text":"【美国3个月期国库券需求降至2024年以来最弱水平】在美联储货币政策路径存在不确定性、且发行规模增至纪录高位之际，美国财政部周一进行的3个月期国库券拍卖需求趋弱，间接投标人获配比例降至逾一年半以来最低。美国财政部发行了920亿美元3个月期国库券，最高中标利率3.74%，为11月份以来最高；720亿美元6个月期国库券的中标利率为3.84%。3个月期国库券发行中，间接投标人获配比例仅41%，为2024年11月以来最低。在6个月期发行中，间接投标人获配比例56.4%，低于三个月均值63.1%。“本周拍卖规模创纪录新高，可能是拍卖结果疲软的原因之一，不过规模增加幅度并不足以完全解释这一结果，”OxfordEconomics分析师JohnCanavan在报告中写道，“自FOMC决议以来，对美联储加息的预期波动较大，但较一周前下降约15个基点，这也不足以解释今天需求如此疲弱的原因”。","source":"东方财富","cat \n在拉美最大的经济体巴西，博维斯帕股票指数和雷亚尔下跌0.1%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126312","time":1782764719000,"title":"周一（6月29日），美股行业ETF多数收涨，半导体ETF涨3.33%，可选消费ETF、科技行业ETF、网络股指数ETF至少涨2.22%，能源业ETF则收跌0.4","text":"周一（6月29日），美股行业ETF多数收涨，半导体ETF涨3.33%，可选消费ETF、科技行业ETF、网络股指数ETF至少涨2.22%，能源业ETF则收跌0.48%，区域银行ETF跌0.56%，全球航空业ETF跌0.60%。\n标普500指数的11个板块中，电信板块收涨3.11%，可选消费板块涨2.68%，信息技术/科技板块涨1.69%表现第三，能源板块收跌0.62%，房地产板块跌0.73%，原材料板块跌1.86%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787091470","time":1782764149000,"title":"拉加德称欧洲央行6月加息并非“预防性加息”","text":"【拉加德称欧洲央行6月加息并非“预防性加息”】欧洲央行行长拉加德周一表示，该央行本月上调关键利率的决定是基于其预测，而不是为了管理通胀失控风险而采取的预防性行动。拉加德在葡萄牙辛特拉举行的欧洲央行中央银行业务论坛开幕式上说：“有人将我们本月早些时候的加息定性为‘预防性加息’。这种说法并不准确。”拉加德说：“这是一个基于我们眼前所见情况做出的决定。在充满巨大不确定性的环境中，我们之所以能自信地做出这一决定，得益于多年来我们在数据、指标和预测方面的投入。”她还表示，该行对冲击的抵御能力已变得更强，其传导保护工具等工具使其能够防范欧元区个别国家借款成本的意外飙升。她指出，这种韧性也意味着，欧洲央行可以加息以应对通胀，而不必担心紧缩本身会成为金融压力的来源。她补充说：“虽然我们更有可能面临使通胀偏离目标的冲击，但欧洲已建立起的韧性意味着这些冲击对我们经济的影响会更为有限。因此，我们可能更常发现自己处于一个中间地带，介于我们可以忽略的冲击和我们必须强力应对的冲击之间。”","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787091470.html","importance":"important"},{"id":"sinacomos:nifcmen6845807","time":1782764143000,"title":"英国政坛人物志：从党魁落选到首相热门 地方治理明星安迪·伯纳姆","text":"基尔·斯塔默宣布辞去英国首相职务后，安迪·伯纳姆这个名字被推向全世界。这位英国工党成员早前以决定性优势重返议会，成为角逐工党领袖的最热门人选...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcmen6845807.shtml","importance":""},{"id":"sinacomos:nifcmen6846743","time":1782764127000,"title":"欧洲央行行长称欧洲应对经济冲击的韧性正在增强","text":" 欧洲央行行长克里斯蒂娜·拉加德表示，得益于更完善的金融框架以及绿色转型取得进展，面对外部冲击，欧洲不再像以前那样脆弱。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-30/doc-inifcmen6846743.shtml","importance":"important"},{"id":"sinacomos:nifcmen6847202","time":1782764074000,"title":"美国民主党取得罕见胜利 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
