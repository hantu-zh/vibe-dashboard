的消息人士的话称，“伊朗被冻结资金将被用于购买粮食”的说法并不属实，在任何协议中都没有这样的表述。这位消息人士表示，美方之所以提出这类说法，主要是出于美国国内政治因素的考虑。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778513465.html","importance":"hot"},{"id":"sinacomos:nieitre2174462","time":1782169501000,"title":"SpaceX首次发行债券，现金储备突破1000亿美元","text":" 埃隆·马斯克的SpaceX公司首次发行债券，借助上市后的发展势头，这家横跨火箭研发至人工智能领域的企业现金储备已突破 1000 亿美元，同时公司正持续加大各项开支投入。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitre2174462.shtml","importance":"hot"},{"id":"wscn3123072","time":1782169458000,"title":"华尔街见闻早餐 | 2026年6月23日","text":"部分科技巨头拖累标普纳指回落，纳指跌超1%；SpaceX跌逾16%、三连跌；芯片指数涨2%，美光涨近7%，但英伟达跌近1%，谷歌跌超5%；原油盘中转跌，布油盘中涨超2%后一度跌超4%，斯塔默宣布辞职后，英债反弹、英镑转涨。\n中国6月LPR报价出炉：5年期以上3.5%，1年期3%，连续13个月维持不变。\n商务部等三部门发布《利用外资固稳促优行动方案》，支持符合条件的重点外资企业在境内上市融资。\nDeepSeek 2.0时刻？GLM-5.2刷屏华尔街，智谱收涨15%，市值突破万亿港元。\n宁德时代许金梅：今年9月开始交付首批钠离子电池解决方案，2026年底实现GWh级出货量。\n斡旋方发布美伊谈判联合声明：各方达成路线图，力争60天内达成最终协议，建立技术谈判机制及沟通热线，专设“冲突降级小组”；美国60天内暂时放松伊朗石油交易限制；万斯称伊朗同意国际原子能机构核查人员入伊，特朗普：伊朗将同意接受重大武器的核查，确保长期保持“核诚信”；伊朗称谈判未涉核问题，未接受任何新承诺。\n斯塔默宣布辞职，英国首相再换人，十年迎第七任首相，工党将7月启动候选人提名，预计9月前产生新党首。\n前美联储主席格林斯潘去世，享年100岁。\nIPO之后借债，SpaceX首发投资级债券，融资200亿美元押注AI未来。\n报道：美光与Anthropic达成协议，锁定内存长期供应协议⑪目标1nm制程！“马桶大王”TOTO投资800亿日元押注半导体材料。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123071","time":1782169441000,"title":"个别产品年化收益率近140%，银行理财指数化投资受青睐","text":"当前银行理财市场指数化投资热度持续走高。资管服务平台联合智评数据显示，今年以来，挂钩人工智能（AI）算力、存储芯片、量子科技等热门赛道的理财产品收益亮眼，超六成产品年化收益率在同类指数理财中位居前列，个别产品年化收益率逼近140%。受访人士表示，在理财全面净值化转型背景下，指数化产品已成为理财公司突破收益瓶颈的重要路径。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123070","time":1782169377000,"title":"小金属锆供需关系生变，A股相关个股受资金追捧","text":"6月22日，小金属锆概念板块热度攀升，截至当日收盘，该板块三祥新材股份有限公司、广东东方锆业股份有限公司等核心龙头股价悉数涨停，其余多只股票涨幅超过5%。市场消息显示，受海外氧化锆粉体龙头供给收缩等因素影响，国内龙头企业已跟进调价，东方锆业自6月18日起上调氧氯化锆、二氧化锆等产品价格。6月22日，东方锆业证券部相关人士表示，上述涨价内容属实，本轮涨价主要受成本上涨与供需格局变化双重驱动。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nieitqz9861612","time":1782169197000,"title":"6月23日隔夜要闻：SpaceX三天蒸发6000亿美元 油价下挫 美国授权伊朗出售石油 美银德银预计美联储9月加息","text":"市场 6月23日收盘：美股三大股指涨跌不一 SpaceX暴跌16% 6月23日美股成交额前20：SpaceX重挫16% 连跌3天 市值跌回2万亿美元附近 6月23日热门中概股多数下跌...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitqz9861612.shtml","importance":"important"},{"id":"wscn3123069","time":1782169165000,"title":"报道：韩国总统李在明将与三星讨论区域投资计划","text":"据每日经济援引政界及业界未具名消息人士的话报道称，韩国总统李在明将于6月25日会见三星电子执行会长李在镕（Jay Y. Lee），讨论区域投资计划。\n李在明已于6月19日会见了SK集团会长崔泰源。外界猜测，三星和SK海力士可能会在韩国西南部的全罗道地区进行芯片相关的投资。\n三星、SK海力士及其他公司可能会在6月29日举行的总统府会议上宣布区域投资计划。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123068","time":1782169139000,"title":"年内FOF发行规模创历史新高","text":"FOF（基金中基金）市场规模持续扩容。Wind数据显示，截至6月22日，全市场存续公募FOF产品已达615只（仅统计主份额），总规模达3692.07亿元，较五年前（2021年6月22日）的1250.55亿元增长195.24%。仅年内就新成立FOF产品88只，合计发行规模1137.69亿元，不仅超过2025年全年发行水平，也刷新了此前2021年的发行纪录。值得关注的是，与2021年主要由养老目标FOF扩容带动市场增长不同，今年FOF规模增长呈现出更加鲜明的资产配置特征。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778510610","time":1782169072000,"title":"芝商所称：CME Direct断开和连接问题现已解决","text":"芝商所称，CME Direct断开和连接问题现已解决。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778510610.html","importance":"hot"},{"id":"xq4724460","time":1782169006000,"title":"芝商所称，CME Direct断开和连接问题现已解决。","text":"芝商所称，CME Direct断开和连接问题现已解决。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/396053927","importance":"hot"},{"id":"wscn3123067","time":1782168977000,"title":"A股上市银行2025年年度分红已派现超1460亿元","text":"Wind数据显示，截至6月22日，已有16家A股上市银行的2025年年度分红实施完成，包括2家国有大行、3家股份行、4家城商行和7家农商行，现金分红总额达1461.91亿元。此外，兰州银行、青岛银行、苏州银行、厦门银行、沪农商行、浙商银行也将在6月30日之前完成2025年年度分红，上述银行现金分红总额达76.48亿元。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"sinacomos:nieitrf8946668","time":1782168961000,"title":"美国数十年来首次允许伊朗以美元销售石油","text":" 美国为伊朗以美元出售石油扫清了道路，包括向美国买家出售石油。在这一政策逆转之际，美国副总统万斯表示，德黑兰已同意允许核查人员最早于本周返回伊朗。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitrf8946668.shtml","importance":"important"},{"id":"wscn3123066","time":1782168908000,"title":"进攻、防御两手抓，年内红利ETF资金净流入超270亿元","text":"今年以来，权益市场波动加大，行情结构性特征突出。在此背景下，市场资金兼顾收益弹性与组合安全垫，采取“进攻+防御”并行配置思路，成长板块热度不减，红利赛道也迎来持续资金流入。红利指数、红利低波、中证红利等红利指数对应的ETF（交易型开放式指数基金）产品，近一个月合计资金净流入最高突破百亿元。整体来看，年内红利ETF合计资金净流入超270亿元。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123065","time":1782168805000,"title":"6月份以来核心城市楼市延续修复态势","text":"6月份以来，核心城市二手房市场延续修复态势。中指研究院最新数据显示，6月1日至20日，20个重点城市二手住宅成交8.8万套，同比增长10.9%。与此同时，端午假期期间，京沪深等核心城市二手房市场仍保持较高活跃度。不少城市挂牌量较前期高点持续回落，市场供需关系出现边际改善。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606233778509910","time":1782168641000,"title":"伊朗副外长披露伊美谈判后续技术层面磋商机制","text":"【伊朗副外长披露伊美谈判后续技术层面磋商机制】当地时间23日，伊朗外交部副部长、伊方技术谈判代表团团长加里巴巴迪披露了接下来伊朗与美国之间技术层面磋商的安排机制。加里巴巴迪表示，根据瑞士四方会谈达成的共识，接下来的谈判将在高级别委员会的监督下进行，成员包括伊朗议长、伊朗外交部长、美国副总统以及巴基斯坦总理和卡塔尔首相。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778509910.html","importance":"hot"},{"id":"sinacomos:nieitre2164413","time":1782168447000,"title":"美联储官员古尔斯比：通胀过高且正朝错误方向发展","text":"芝加哥联储行长奥斯坦·古尔斯比表示，他仍然担心通胀问题，并质疑推动价格上涨的因素是否都只是暂时性的。 古尔斯比周一表示：“我们面对的通胀远高于目标水平...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitre2164413.shtml","importance":"hot"},{"id":"wscn3123064","time":1782168348000,"title":"伊朗副外长披露伊美谈判后续技术层面磋商机制","text":"当地时间23日，伊朗外交部副部长、伊方技术谈判代表团团长加里巴巴迪披露了接下来伊朗与美国之间技术层面磋商的安排机制。根据瑞士四方会谈达成的共识，接下来的谈判将在高级别委员会的监督下进行，成员包括伊朗议长、伊朗外交部长、美国副总统以及巴基斯坦总理和卡塔尔首相。同时决定设立四个工作组，分别负责：解除制裁、核问题、重建与经济发展、监督与执行。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nieitrf8939958","time":1782168260000,"title":"芝商所CME Direct平台恢复交易 早前出现连接中断情况","text":"相关阅读：芝商所平台“连接中断” 交易受到扰动 据交易员表示，芝商所旗下CME Direct平台在周一因技术故障短暂中断后，目前已恢复交易。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitrf8939958.shtml","importance":"hot"},{"id":"em202606233778478611","time":1782168222000,"title":"硅基之脉 算力光纤需求共振 高纯四氯化硅景气度上行","text":"【硅基之脉 算力光纤需求共振 高纯四氯化硅景气度上行】受算力基建、通信网络升级带动，今年以来，高纯四氯化硅市场需求持续回暖。高纯四氯化硅下游主要应用于光纤预制棒、合成石英玻璃的生产。据了解，受益于全球光纤高景气，高纯四氯化硅同步进入紧缺导致的涨价周期。一位行业知情人士透露，目前市场高纯四氯化硅销售多为长协锁价销售模式，去年以来，长协价格已出现大幅上涨。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778478611.html","importance":"hot"},{"id":"wscn3123063","time":1782168077000,"title":"超1600亿元“红包”本周派发，红利资产配置价值仍获看好","text":"本周将有超过280家上市公司派发2025年年度现金红利，派现总金额超过1600亿元，中国石油、贵州茅台这样的分红“大户”，本周计划派现规模均在350亿元以上。从二级市场表现看，中证红利指数近几个月有所调整，在6月22日盘中还创出年内新低。在业内人士看来，具备稀缺性的红利资产有望在调整后获得保险资金的进一步增配，考虑到外部不确定性风险仍存，建议关注银行、煤炭、交通运输、家电等具有业绩改善预期、分红稳定可持续且具备较强分红能力的红利资产。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123062","time":1782168024000,"title":"算力光纤需求共振，高纯四氯化硅景气度上行","text":"受算力基建、通信网络升级带动，今年以来，高纯四氯化硅市场需求持续回暖。高纯四氯化硅下游主要应用于光纤预制棒、合成石英玻璃的生产。据了解，受益于全球光纤高景气，高纯四氯化硅同步进入紧缺导致的涨价周期。一位行业知情人士透露，目前市场高纯四氯化硅销售多为长协锁价销售模式，去年以来，长协价格已出现大幅上涨。2025年底，光纤用9N级高纯四氯化硅长协成交参考价约2.5万元/吨，今年一季度对应的长协参考价上行至约4.5万元/吨，阶段性价格涨幅约80%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123061","time":1782167907000,"title":"砂中沥金，高端产品吃紧吃香，高纯石英砂身价水涨船高","text":"受AI数据中心及算力网络建设推动，光纤产业链全线“吃紧”，其中高纯石英砂的身价也水涨船高，成了名副其实的 “砂中黄金”。行业数据显示，当前光纤用高纯石英砂主流报价已涨至每吨4.8万元至5.5万元，其中纯度6N级以上的高端产品更是“一砂难求”，由于国产自给率有待提升，行业供需偏紧格局不断加剧。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778505048","time":1782167794000,"title":"前5月新设立外商投资企业同比增长5.3% 5月实际使用外资同比增长5.9%","text":"【前5月新设立外商投资企业同比增长5.3% 5月实际使用外资同比增长5.9%】本报北京6月22日电记者22日从商务部获悉：今年前5月，全国新设立外商投资企业25297家，同比增长5.3%；实际使用外资金额3272.9亿元。5月当月实际使用外资同比增长5.9%。从行业看，前5月，制造业实际使用外资869.7亿元，服务业实际使用外资2341.5亿元。高技术产业实际使用外资1301.4亿元，同比增长19.4%，占全国实际使用外资的39.8%，较去年同期提升9.4个百分点。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778505048.html","importance":""},{"id":"wscn3123060","time":1782167719000,"title":"黑石集团总裁Jon Gray：投资日本（多个）数据中心。（日经新闻）\n","text":"黑石集团总裁Jon Gray：投资日本（多个）数据中心。（日经新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123059","time":1782167639000,"title":"稀有“味精” 供需错配加剧，锗价半年涨逾八成","text":"截至6月18日，锗锭已攀升至25000元/千克，较2025年末涨逾83%。驱动这一轮价格飙升的，主要是AI算力基础设施等领域对光纤的旺盛需求。在光纤制造中，四氯化锗扮演着“味精”般的关键角色。它是光纤预制棒纤芯掺杂的核心原料，主要作用是提高纤芯折射率等，让光纤的传输性能更“能打”。“在光纤预制棒的原材料成本里，锗的占比很低，但由于下游对锗材料的纯度要求高，加上国内锗供给较为集中、材料不可替代性强，相比其他材料，锗的供需矛盾会更为明显。”一家头部光纤预制棒生产商介绍。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123058","time":1782167562000,"title":"芝商所CME Direct平台恢复交易，早前出现连接中断情况","text":"据交易员表示，美国芝商所旗下CME Direct平台在周一因技术故障短暂中断后，目前已恢复交易。“由于第三方网络问题，部分CME Direct客户在中部时间下午1点左右遇到连接中断情况。部分受影响的客户在重新连接时也遇到了延迟。CME Globex未受影响，”芝商所一位代表在电子邮件声明中表示。据交易员表示，此次事件影响了石油、天然气、铜、黄金和白银等交易。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778508021","time":1782167430000,"title":"周二你需要知道的隔夜全球要闻","text":"周二你需要知道的隔夜全球要闻：纳指收跌1.3%，SpaceX重挫16%，近三日市值蒸发逾6000亿美元；美国设定2028年科研级量子计算机突破目标；梅西加冕世界杯历史射手王。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778508021.html","importance":"important"},{"id":"wscn3123056","time":1782167401000,"title":"光棒之渴：个别类型较年初涨价逾五倍，供应紧缺或将延续至2027年","text":"受益于AI算力网络建设带来的巨量光纤光缆需求，作为光纤制造“母体”的光纤预制棒（下称“光棒”）价格较2025年初快速上涨：通用G.652D光棒报价涨幅超过180%；用于数据中心高密度布线的G.657.A2类光棒，每等效芯公里报价则由22元至30元涨到160元，涨幅近550%。多家上市公司表示，本轮光棒价格上涨与供需失衡以及上游原材料涨价传导等因素共同导致，预计紧缺状态将持续到2027年。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123053","time":1782167369000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 08:30 日本6月制造业、服务业、综合PMI初值；\n② 时间待定 “夏季达沃斯论坛”在大连开幕（6月23-25日），字节跳动旗下云与AI服务平台2026火山引擎原动力大会（FORCE）开幕（6月23-34日）；\n③ 13:00 印度6月制造业、服务业、综合PMI初值；\n④ 15:15 法国6月制造业、服务业、综合PMI初值；\n⑤ 15:30 德国6月制造业、服务业、综合PMI初值；\n⑥ 16:00 欧元区6月制造业、服务业、综合PMI初值，欧洲央行管委Kazimir讲话；\n⑦ 16:30 英国6月制造业、服务业、综合PMI初值，欧洲央行首席经济学家Lane在欧洲议会讲话；\n⑧ 21:00 加拿大央行行长Tiff Macklem在法国巴黎讲话；\n⑨ 21:45 美国6月标普全球服务业、制造业、综合PMI初值；\n⑩ 21:55 英国央行货币政策委员会（MPC）成员Alan Taylor，欧洲央行副主席Boris Vujcic在英国伦敦出席2026年货币政策论坛并讲话；\n⑪ 22:00 美国6月里士满联储制造业指数；\n⑫ 次日01:30 英国央行货币政策委员会（MPC）成员Swati Dhingra讲话；\n⑬ 时间待定 明晟公司（MSCI）将公布年度市场分类评审结果，韩国有望进入发达市场观察名单；\n⑭ 美股盘后 联邦快递发布业绩报告；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123055","time":1782167220000,"title":"点心债持续扩容，离岸人民币市场融资加速","text":"工商银行首尔分行、交通银行香港分行等五家银行6月22日共发行规模为27.74亿元点心债。今年以来，点心债市场发行规模超8000亿元，远高于去年同期。专家认为，2026年以来，点心债发行规模持续扩容，首要原因是人民币资产吸引力增强、离岸人民币流动性改善，叠加中美利率分化带来融资成本优势。未来，境内企业“走出去”步伐加快、境外机构对人民币融资需求上升、离岸市场基准利率曲线的建立与完善，都将推动点心债发行规模稳步增长。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123054","time":1782167172000,"title":"券商分类评价考核将启，“功能发挥”成加分关键","text":"从业内获悉，2026年券商分类评价自评材料报送临近截止日期，各家券商须于6月底前完成提交。对券商来说，这是《证券公司分类评价规定》自2025年8月修订实施以来的又一次“大考”。从今年的工作底稿来看，加分项与扣分项均有细化调整，“功能发挥”成为加分关键。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123052","time":1782167058000,"title":"AI飞轮驱动加速，半导体更多领域进入上行周期","text":"存储芯片的供需关系，要到2027年才会有改善迹象；AI带动的需求正在扩散，下半年功率、模拟芯片的供应会持续紧张……展望下半年半导体产业发展趋势，多位业内人士表示，AI给半导体带来的成长动力愈发强劲，并持续辐射到更多的细分领域。随着AI发展提速，半导体产业对于新材料、新技术的需求也在持续增强，超高密度高速互联、玻璃基板封装、碳化硅和金刚石散热等技术加速突破，成为半导体板块的另一条投资主线。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123051","time":1782166886000,"title":"二季度北交所过会企业扫描：业绩真实性与可持续性成问询“标配”","text":"2026年二季度，北交所上市审核保持常态化发行节奏，过会企业数量稳步增长。数据显示，截至6月22日，二季度北交所过会企业达26家，今年以来累计过会企业超过60家。从上市委问询情况来看，经营业绩的真实性与可持续性成为审核问询的核心关注点，收入确认、毛利率变动、客户稳定性等问题被频繁提及。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778480598","time":1782166714000,"title":"券商分类评价考核将启 “功能发挥”成加分关键","text":"【券商分类评价考核将启 “功能发挥”成加分关键】从业内获悉，2026年券商分类评价自评材料报送临近截止日期，各家券商须于6月底前完成提交。对券商来说，这是《证券公司分类评价规定》（下称《规定》）自2025年8月修订实施以来的又一次“大考”。从今年的工作底稿来看，加分项与扣分项均有细化调整，“功能发挥”成为加分关键。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778480598.html","importance":"hot"},{"id":"sinacomos:nieitrf8922876","time":1782166528000,"title":"甲骨文上财年裁员约2.1万 人工智能取代部分工作岗位","text":"甲骨文上财年裁员约2.1万，减员规模大于此前已知水平，其中包括因使用人工智能（AI）而被取消的岗位。 甲骨文周一在年度财务监管申报文件中称：“我们在各项业务中采用和部...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitrf8922876.shtml","importance":"hot"},{"id":"wscn3123050","time":1782166257000,"title":"科技链从“数字”升级为“数智”，第四届链博会折射AI产业重心跃迁","text":"第四届中国国际供应链促进博览会6月22日在北京开幕。本届链博会设置“6链1展区”，共吸引来自85个国家、地区和国际组织的676家企业参展。记者走访多家展位后发现，今年最密集的驻足与快门声，出现在首次亮相的人工智能专区。此外，展商谈及最多的不是AI有多强，而是能在哪些场景中解决什么样的问题，产业链对AI的期待从过去的“炫技”逐步走向“落地”。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nieitre2140384","time":1782166133000,"title":"美国财长贝森特与日本财务大臣片山皋月举行线上会议","text":"日本财务大臣片山皋月与 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
  
  // Auto-refresh news data every 5 minutes
  setInterval(function() {
    console.log('[NEWS] Auto-refreshing data...');
    tryFetch(remoteUrl);
  }, 5 * 60 * 1000);
})();
</script>
