持续，美多地发布空气质量、强风暴、洪水等预警","text":"目前，加拿大有900多处山火仍在燃烧，大量烟雾持续飘向美国东北部和中大西洋地区。在西北风的推动下，一股浓烟带正进入美国中西部和五大湖上游地区，预计当地空气质量将在整个周末维持较差水平。\n美国风暴预测中心已对俄亥俄河谷、东北部和中大西洋部分地区发布三级（最高五级）强对流天气风险预警。95号州际公路沿线的纽约、费城、巴尔的摩和华盛顿特区等主要城市都可能受到影响，匹兹堡、克利夫兰和布法罗也预计将遭遇强雷暴。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607183811719221","time":1784386631000,"title":"机构：霍尔木兹海峡油轮面临“最坏情况”","text":"【机构：霍尔木兹海峡油轮面临“最坏情况”】总部位于希腊雅典的海事风险服务公司Marisks首席执行官Dimitris Maniatis在劳氏情报（Lloyd’s List Intelligence）简报会上表示，航运公司在霍尔木兹海峡面临“最坏情况”。“船员们的担忧程度比以往任何时候都更甚。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607183811719221.html","importance":"hot"},{"id":"wscn3136069","time":1784386610000,"title":"报道：白宫正主导前沿AI模型的访问权限，权力正从科技巨头手中转移","text":"据知情人士透露，美国总统特朗普的政府已采取新举措，通过决定哪些公司和实体有权访问最新的前沿模型，从而加强对未来人工智能（AI）模型发布的控制。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607183811719165","time":1784386128000,"title":"中信建投：随着市场风偏的修复 看好商业航天板块后续表现","text":"【中信建投：随着市场风偏的修复 看好商业航天板块后续表现】中信建投研报表示，从产业进展看，我国可重复使用火箭完成从方案到工程的关键跨越，将为低轨卫星互联网等产业带来供给侧深层变革。未来常态化火箭回收，中国星网GW、垣信千帆星座等大型星座的部署节奏有望飞速提升、建设成本压力有望大幅降低。商业航天催化密集，随着市场风偏的修复，看好商业航天板块后续表现。卫星环节重点关注载荷总体、天线及配套、激光通信终端及配套、太阳翼及能源系统相关，火箭环节重点关注发动机及其3D打印、箭体结构件相关，地面设备环节重点关注民用终端及手机直连相关，运营服务环节重点关注具备稀缺资质的公司。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607183811719165.html","importance":""},{"id":"wscn3136060","time":1784386035000,"title":"业内：随着伊朗加大对船舶的袭击力度，霍尔木兹海峡油轮面临“最坏情况”","text":"总部位于希腊雅典的海事风险服务公司Marisks首席执行官Dimitris Maniatis在劳氏日报情报（Lloyd’s List Intelligence）简报会上表示，航运公司在霍尔木兹海峡面临“最坏情况”。“船员们的担忧程度比以往任何时候都更甚。”“我们看到穿越霍尔木兹海峡的通行量减少，目前船员们的担忧程度比以往任何时候都更甚。没有人愿意移动。”“现在无论向他们承诺什么，他们都不愿意通过该海峡。这不再关乎金钱，也不再关乎任何更高的使命。目前纯粹是恐惧在主导着决策。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"1633346389260","time":1784385943000,"title":"从LV告茉莉奶白到Tiffany起诉艾芙尼：国货品牌被步步挤压？","text":"从LV告茉莉奶白到Tiffany起诉艾芙尼：国货品牌被步步挤压？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L230U2CJ0511UULO.html","importance":""},{"id":"wscn3136059","time":1784385518000,"title":"曦智科技全栈光电算力技术亮相WAIC 2026","text":"2026世界人工智能大会（WAIC）期间，曦智科技推出了基于PACE 2加速卡打造的全球首款光电混合计算一体化计算盒天枢·光立方；PACE 3光芯片已于6月完成流片，适配大模型推理场景。公司还与商汤科技、阶跃星辰、申万宏源、中科天算、东方空间达成战略合作，覆盖多AI应用场景，目标从底层技术到上层方案全链路协同。\n另外，曦智科技光跃LightSphere X分布式OCS全光超节点实现2000卡规模化落地，打造了国内首个国产、商业化的光互连光交换千卡算力集群。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3136058","time":1784385461000,"title":"王毅：赞赏印尼方重申欢迎中资企业赴印尼投资合作","text":"据外交部网站，7月18日，中共中央政治局委员、外交部长王毅在上海会见来华出席世界人工智能大会的印度尼西亚经济统筹部长艾尔朗加。\n王毅强调，在两国元首战略引领下，近年来中印尼命运共同体建设取得积极进展。中印尼作为全球南方和新兴经济体代表，发展目标相近、共同利益广泛、互补优势明显。双方要加强发展战略对接，相向而行，积极互动，排除干扰，保持定力，不断深化各领域互利合作，作全球南方团结互助、联合自强的典范。中方赞赏统筹部长先生重申欢迎中资企业赴印尼投资合作，希望印尼为此提供公平公正营商环境。中印尼合作不针对第三方，也不应受第三方干扰。双方要带头捍卫多边贸易体制，共同反对“脱钩断链”，维护全球产供链安全稳定。中方愿同印尼在国际和地区事务中密切协作，推进具有地区和全球影响力的中印尼命运共同体建设，为两国和人类共同发展作出贡献。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607183811719031","time":1784385441000,"title":"国泰海通郁伟君：AI产业企业资本运作正当时","text":"【国泰海通郁伟君：AI产业企业资本运作正当时】国泰海通业务总监、投资银行业务委员会总裁郁伟君在“智见AI 合创未来”国泰海通人工智能投融资论坛上表示，科技创新成为境内外资本市场共同主线，AI产业企业资本运作正当时。主要基于五大理由：一是科技创新成为境内外资本市场共同主线，展现出强劲的增长动力与配置价值；二是境内外IPO及再融资数量逐年攀升，资本市场融资功能有效发挥；三是全球AI产业风险投资激增，AI产业链企业快速扩容；四是已上市AI明星企业估值表现亮眼；五是未上市企业估值蓄势待发，融资估值理想且未来上市前景可期。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607183811719031.html","importance":""},{"id":"sinacomos:niifxrz0821282","time":1784385012000,"title":"终止、下调评级接连发生，这些中小银行发生了什么？","text":"近日，中小银行信用评级领域接连出现终止与下调：东方金诚因抚顺银行未披露年报且始终未提供评级材料，终止其主体及债项评级；孝感农商行因资产质量恶化...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/jjxw/2026-07-18/doc-iniifxrz0821282.shtml","importance":""},{"id":"wscn3136057","time":1784385007000,"title":"美国纽约强降雨，有望改善世界杯决赛前的烟雾空气质量","text":"预计强降雨将改善美国纽约和华盛顿特区地区的空气质量，此前加拿大野火导致该地区空气质量恶化。周日即将举行世界杯决赛。美国天气预测中心高级预报员布莱恩·赫尔利（Brian Hurley）表示，周日世界杯比赛的空气质量担忧应该会“大幅改善，但不会完全消失”。由于数百起森林大火肆虐且未受控制，未来几周烟雾可能会在中西部、东北部和加拿大南部之间来回飘移。与此同时，美国正经历包括烟雾弥漫、高温和灾难性洪水在内的多重极端天气。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607183811718953","time":1784385005000,"title":"黑石：算力设施规模化建设有望 成为标志性投资主线","text":"【黑石：算力设施规模化建设有望 成为标志性投资主线】黑石在其发布的2026年中投资展望中指出，AI依旧是重塑投资格局的决定性力量。当前，数据中心与发电领域正经历一轮持续多年的资本开支周期。与此同时，AI在实体经济中的应用也为生产率提升奠定了基础。私募市场愈发具备优势，能够填补需求上升与供给受限之间的资金缺口。算力、电力及实体基础设施领域存在的结构性供给短缺，催生了大量优质投资机遇。在这些领域，规模优势与执行能力最为关键。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607183811718953.html","importance":""},{"id":"wscn3136056","time":1784384865000,"title":"德国总理敦促陷入代孕风波的盟友辞职","text":"德国总理弗里德里希·默茨领导的保守派阵营中的一位高级领导人延斯·斯潘（Jens Spahn），因在美国通过代孕生子而面临巨大压力，最终宣布辞职。此前，他曾反对在德国将代孕合法化的努力。默茨敦促斯潘辞职，称“信誉是政治中最重要的资产”，这一决定是“正确且不可避免的”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3136055","time":1784384262000,"title":"聚焦极端天气与城市灾害预警，“华雨GeoAI”大模型在WAIC首发","text":"7月18日，2026年世界人工智能大会暨人工智能全球治理高级别会议（WAIC 2026）重要分论坛——“GeoAI空间人工智能论坛”在华东师范大学空间人工智能学院正式启幕。论坛上，由华东师范大学自主研发的“华雨GeoAI”大模型首次对外发布，标志着地理空间信息技术与人工智能融合创新迈入新阶段。（澎湃）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3136054","time":1784384189000,"title":"据美国官员与中东地区官员透露，土耳其洽谈向阿联酋输送俄罗斯防空系统。\n土方希望，移交俄罗斯S-400反导系统能有助于购买美制F-35战斗机。（华尔街日报）\n","text":"据美国官员与中东地区官员透露，土耳其洽谈向阿联酋输送俄罗斯防空系统。\n土方希望，移交俄罗斯S-400反导系统能有助于购买美制F-35战斗机。（华尔街日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607183811718771","time":1784384124000,"title":"俄外长与阿联酋外长通话 强调美伊必须停火并恢复谈判","text":"【俄外长与阿联酋外长通话 强调美伊必须停火并恢复谈判】据俄罗斯外交部18日消息，俄外长拉夫罗夫与阿联酋副总理兼外长阿卜杜拉当天通话，就美伊持续互袭背景下的波 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
