 去哪投资已成为两难 韩国半导体业面临“美式招商”压力","text":"【“超级项目”被对方盯上 去哪投资已成为两难 韩国半导体业面临“美式招商”压力】观察人士表示，美国现任政府此前一直利用半导体关税威胁来推动企业赴美投资，如今更是公开点名韩国三星电子和SK海力士，意在构建以美国为中心的存储芯片供应链。韩国媒体分析认为，美方此番施压迫使韩企深陷本土扩产与海外布局的两难承压困局。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607133802730246.html","importance":"important"},{"id":"wscn3132474","time":1783899880000,"title":"公募基金二季报披露大幕拉开 多名基金经理提示科技板块高估值风险","text":"近日，包括金信基金、红土创新基金、同泰基金等多家公募陆续披露二季报。值得关注的是，为响应信披新规，部分成立期限较长的公募产品在此次季报中首次披露了7年、10年的长期业绩数据。分析人士指出，这一行业核心变革旨在扭转行业过度聚焦短期业绩怪象，引导市场回归长期投资、价值投资的理念。从目前披露的基金二季报来看，绩优产品多借力于算力板块的布局，实现了净值的大幅增长。但多名基金经理也在行情展望中强调了科技板块的估值风险，并指出在高预期的情况下，未来往往面临低于预期的风险，二级市场行情容易出现大幅波动。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1635154585583","time":1783899867000,"title":"十大券商看后市｜对指数下跌无需过度担忧，局部再平衡或持续","text":"十大券商看后市｜对指数下跌无需过度担忧，局部再平衡或持续","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1MVRTU30514R9P4.html","importance":""},{"id":"wscn3132473","time":1783899853000,"title":"AI算力需求爆发 光纤量价齐升 多家企业启动扩产计划","text":"AI算力需求的爆发式增长，将光纤行业推入了价格上行通道。近日，杭电股份、永鼎股份等上市公司上半年业绩预告纷纷录得大幅增长，行业高景气度持续得到验证。光纤价格的大幅上涨以及行业供需缺口的存在，正推动多家企业启动光棒及光纤扩产计划。7月10日晚，烽火通信和领益智造均发布公告。前者拟定增募资不超过29.13亿元用于光纤智能制造等项目，后者拟参与重整富通嘉善，切入光纤通信赛道。不过，光纤行业扩产潮也引发市场对“周期魔咒”重演的忧虑。多位业内人士表示，新增产能落地仍需翻越多重门槛。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3132472","time":1783899811000,"title":"年内激增超过2000亿元，A股科技类ETF规模突破5400亿元","text":"今年以来，A股行业与主题类ETF持续扩容，科技赛道成为资金布局的核心主线。据统计：截至6月末，聚焦科技的行业和主题ETF规模超过5400亿元，较2025年末大幅提升2087亿元；此外，聚焦科技赛道的主动权益类基金规模占比也显著攀升。尽管半导体等前期热门科技板块近期出现显著波动，但多家公募机构研判，短期情绪扰动不改产业中长期上行趋势，AI商业化落地、半导体自主创新等核心逻辑持续夯实，科技赛道后续仍具备充足的投资空间。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3132471","time":1783899783000,"title":"产能满产+订单充足 多家铝企上半年业绩倍增","text":"今年上半年，在电解铝价格高位运行、成本端氧化铝价格走低的背景下，铝产业链景气度持续攀升。多家上市铝企披露的半年度业绩预告显示，行业盈利普遍大幅提升，其中天山铝业、神火股份、中孚实业、焦作万方等公司上半年业绩同比实现倍增。与此同时，上市铝企正积极向高附加值的铝箔赛道延伸，相关新能源铝箔产能布局提速推进，产业链呈现“上游高景气，中游忙扩产”的态势。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607133802729910","time":1783899767000,"title":"中信建投：南向通额度扩容 资金宽松曲线走陡","text":"【中信建投：南向通额度扩容 资金宽松曲线走陡】中信建投研报称，本周资金价格有所回落，但由于短期内货币政策加码的概率较小，后续资金价格回落空间较为有限。债市供给方面，本周同业存单小幅净发行，其中国有行净发行，股份行、城商行、农商行净偿还；国债、地方政府债净发行，政策性银行债小幅净偿还。利率债方面，本周利率总体下行，收益率曲线走陡。信用债方面，中短期高评级信用债利差小幅压缩，超长期高评级利差小幅走扩。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607133802729910.html","importance":"important"},{"id":"wscn3132470","time":1783899756000,"title":"稀土龙头下调三季度报价 终结七个季度连涨行情","text":"近日，包钢股份、北方稀土双双下调三季度报价，三季度稀土精矿交易价格调整为3.86万元/吨，环比下降0.62%。在此之前，北方稀土、包钢股份稀土精矿交易价格已经连续七个季度调升。业内人士表示，此次微降可在一定程度上缓解中游磁材厂商的原材料成本压力。虽然终结了七连涨，但核心供需格局未变，稀土价格大概率将在高位维持震荡。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nihrhff7423459","time":1783899739000,"title":"日经指数或上涨，投资者权衡AI乐观情绪与中东紧张局势","text":"随着投资者权衡围绕人工智能的乐观情绪与中东紧张局势，日本股市可能上涨。SK海力士在美国的历史性首秀帮助恢复了投资者对AI交易的兴趣。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-13/doc-inihrhff7423459.shtml","importance":""},{"id":"1637292525285","time":1783899727000,"title":"长鑫科技本周来袭！这些公司将成大赢家","text":"长鑫科技本周来袭！这些公司将成大赢家","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1MVNAMM0517BMJU.html","importance":"hot"},{"id":"sinacomos:nihrhfn9085488","time":1783899713000,"title":"长鑫科技，本周来袭！这些公司将成大赢家","text":"本周四，长鑫科技将正式申购，作为国产DRAM龙头，长鑫科技自股改到启动IPO辅导再到上市，其一举一动都备受市场关注。 招股意向书显示...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/hyyj/2026-07-13/doc-inihrhfn9085488.shtml","importance":"hot"},{"id":"em202607133802729817","time":1783899681000,"title":"A股分红派息转增一览：24股今日股权登记","text":"【A ttps://finance.eastmoney.com/a/202607133802723192.html","importance":"important"},{"id":"wscn3132465","time":1783897493000,"title":"立邦涂料据悉将出价86亿美元收购阿克苏诺贝尔的涂料部门。（彭博）\n","text":"立邦涂料据悉将出价86亿美元收购阿克苏诺贝尔的涂料部门。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607133802724539","time":1783897359000,"title":"塔里木油田西气东输供气超4000亿立方米","text":"【塔里木油田西气东输供气超4000亿立方米】据中国石油，位于西气东输主力气源地的塔里木油田累计向西气东输管网供气突破4000亿立方米，为下游近5亿人口生产生活用气提供了保障。目前，每一小时就有超200万立方米来自塔里木油田的天然气直抵我国东部长三角等地区。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202607133802724539.html","importance":"important"},{"id":"163878193797","time":1783897216000,"title":"佳缘跌停又涨停，前南充女首富孽缘未了局","text":"佳缘跌停又涨停，前南充女首富孽缘未了局","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L1G5GMOI0539LXZQ.html","importance":"important"},{"id":"wscn3132464","time":1783897213000,"title":"城投债短端发行约束强化，融资期限结构加速调整","text":"目前，城投债一级市场正出现新的结构性变化。从多位市场人士处获悉，近期监管层对城投类借新还旧主体短期限债务融资工具发行审核口径进一步收紧，相关主体暂时难以发行2年期以下品种，发行期限结构被要求向2年期及以上中长期产品调整。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3132462","time":1783897153000,"title":"合规风暴下的助贷“生死劫” 24%利率红线锁利，“套娃式”获客模式终结","text":"近期，多位业内人士透露，多地针对属地中小银行及持牌消费金融公司出台窗口指导意见，对助贷渠道贷款规模增速以及业务边界提出明确量化指标，同时重申融担类业务占比不得超过25%。此举旨在推动持牌机构回归自营，压实自主风控责任，并降低对外部平台的依赖。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3132461","time":1783897079000,"title":"英国、法国、德国发表联合声明，谴责伊朗在霍尔木兹袭击船只，呼吁恢复停火和谈判。\n","text":"英国、法国、德国发表联合声明，谴责伊朗在霍尔木兹袭击船只，呼吁恢复停火和谈判。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nihqzxm4285608","time":1783896597000,"title":"美伊接连爆发新一轮冲突，亚洲能源股或随油价走强","text":"美伊双方互相发起新一轮打击，且两国就霍尔木兹海峡通航权限发布相互矛盾的表态，受此影响，亚洲能源板块个股或将跟随油价一同上涨。","source":"新浪财经","category":"fast","sto ortance":""},{"id":"wscn3132455","time":1783895494000,"title":"台风“巴威”向北偏东移动 江苏山东及东北仍将受影响","text":"目前，台风“巴威”的强度已减弱为热带风暴级。据中央气象台消息，台风“巴威”的中心今天（13日）6时位于安徽省蚌埠市五河县境内，中心附近最大风力8级（20米/秒）。预计“巴威”将以每小时15公里左右的速度向北偏东方向移动，强度变化不大。预计“巴威”于14日由山东半岛移入黄海北部海面，并逐渐转变为温带气旋。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3132454","time":1783895423000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 待定 OPEC公布月度原油报告；\n② 次日00:30 美联储理事沃勒发表讲话；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nihqzxi7507307","time":1783895414000,"title":"7月13日周末要闻：美军再次对伊朗实施打击 油价上涨 苹果正式起诉OpenAI","text":"上周国际市场回顾 7月11日收盘：科技股推动美股收高，标普指数本周上涨1.2% 7月11日美股成交额前20：Meta创2024年初以来最佳单周表现 7月11日热门中概股涨跌不一...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-13/doc-inihqzxi7507307.shtml","importance":""},{"id":"wscn3132453","time":1783895053000,"title":"巨力索具澄清：公司并非“网系回收”及“航天级特种索具”唯一供应商","text":"巨力索具公告，近期，公司关注到互联网平台、财经自媒体及股吧社区出现关于公司为“国内唯一：网系回收索具的‘独家玩家’”、“中国的网系回收索具，只有巨力索具一家能供”、“根据航天科技集团的认定，巨力索具被认定为‘航天级特种索具唯一供应商’，国内市占率达到100%”、“与航天科技集团签订5年战略合作协议，锁定长十系列、朱雀三号等火箭回收系统订单，金额超20亿元”、“2026年商业航天业务收入预计达3—5亿元”等不实传闻。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3132452","time":1783894912000,"title":"美参议员格雷厄姆因主动脉夹层猝死","text":"据美国媒体报道，围绕猝死的美国共和党参议员林赛·格雷厄姆的死因，其发言人当地时间7月12日下午表示，据法医部门的初步调查结果，格雷厄姆的死因为“动脉粥样硬化性心血管疾病引发主动脉夹层”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3132451","time":1783894819000,"title":"叙利亚人民议会举行过渡时期首次会议 选出议长","text":"叙利亚人民议会12日举行自2024年叙政局剧变以来的首次会议，选举产生议长、两名副议长和一名秘书。在本次会议上，议员们在叙过渡政府总统艾哈迈德·沙拉面前集体宣誓就职，随后投票选举阿卜杜勒·哈米德·阿瓦克为议长。据了解，阿瓦克是宪法宣言起草委员会成员，曾于1998年至2014年在叙司法部担任顾问法官。（央视新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn. <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';

  var h = '';

    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';

    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';

    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
