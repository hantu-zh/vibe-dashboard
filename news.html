"importance":""},{"id":"em202607013788805790","time":1782861483000,"title":"大连推进“减油增化”转型升级 打造五千亿级绿色石化产业集群","text":"【大连推进“减油增化”转型升级 打造五千亿级绿色石化产业集群】日前，大连市“十五五”规划纲要正式发布，其中明确提出，将打造5000亿级绿色石化产业集群。近日记者前往大连市实地采访了解到，石化产业作为大连工业核心支柱、发展底盘与对外开放枢纽，深刻影响着大连经济体量、产业能级及东北亚区域竞争优势。2025年，全市石化产业产值占工业总产值比重近四成。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788805790.html","importance":""},{"id":"em202607013788805269","time":1782861421000,"title":"钼价持续走强达近三年高点 “以钼代钨”助推工业金属提升“含科量”","text":"【钼价持续走强达近三年高点 “以钼代钨”助推工业金属提升“含科量”】近期，头部存储芯片厂商以钼替代传统钨制作存储字线的消息，带动国内钼相关产业板块走强。年内钼铁价格高位运行，于近日吨价达到30万元上方，为近三年首次。记者从行业了解到，当前“钼代钨”技术落地，虽已形成一定市场需求，但供给体量极小且高度集中，对多数相关上市公司业绩拉动有限。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788805269.html","importance":""},{"id":"sinacomos:niffyta1119172","time":1782861394000,"title":"美铝56亿美元收购澳洲矿业巨头South32的大部分铝资产","text":" 澳大利亚矿业巨头 South32 周三表示，已同意将其大部分铝资产出售给美国铝业公司，隐含企业价值高达 56 亿美元。这家多元化矿业公司此举旨在简化其业务。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-01/doc-iniffyta1119172.shtml","importance":""},{"id":"wscn3127019","time":1782861392000,"title":"6月份债券ETF“吸金”合计逾600亿元","text":"6月份，在市场流动性保持合理充裕、债券市场震荡运行的背景下，债券ETF规模、资金净流入和成交活跃度均维持高位，成为场内资金配置固定收益资产的重要工具。Wind数据显示，截至6月30日，全市场55只债券ETF总规模达到8913.77亿元，较年初增长7.52%。6月份，债券ETF合计净流入605.82亿元，较5月份增长144.23%；6月份累计成交额达3.77万亿元，环比增长8.53%，市场交投保持活跃。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607013788806631","time":1782861368000,"title":"上半年一线城市楼市信心修复 政策稳预期仍是主线","text":"【上半年一线城市楼市信心修复 政策稳预期仍是主线】今年上半年，楼市政策暖风频吹，多个城市以更快的响应速度集中打出政策“组合拳”。作为全国楼市的风向标，一线城市的表现打破了往年“金三银四”后热度自然回落的季节性规律，5月和6月的市场继续展现韧性，释放出更多新信号。不过，分化仍是当下一线城市楼市的真实写照。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788806631.html","importance":"important"},{"id":"em202607013788841656","time":1782861350000,"title":"微软计划下周宣布裁 importance":"important"},{"id":"em202607013788807917","time":1782861004000,"title":"出海模式迭代升级 A股公司踏浪新征程","text":"【出海模式迭代升级 A股公司踏浪新征程】在义乌小商品城，无人机、智能陪伴机器人、AI眼镜等出口产品让人目不暇接；在岸桥林立的宁波舟山港梅山港区，巨型货轮日夜穿梭在智慧深水码头，国际货物往来不息……这是中国企业出海的缩影。上海对外经贸大学对2025年我国上市公司的相关统计和研究显示，出海企业海外业务收入占比已达20%左右，利润率也继续上升。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788807917.html","importance":""},{"id":"em202607013788808017","time":1782860946000,"title":"6月IPO迎受理小高峰 未来产业“新生”密集赶考","text":"【6月IPO迎受理小高峰 未来产业“新生”密集赶考】6月，伴随财报更新时间节点来临，拟IPO企业通常会掀起一轮受理小高峰。记者注意到，今年IPO受理企业“画像”呈现两大鲜明特色：一是未来产业“新面孔”纷至沓来，包括人工智能、商业航天、新型储能、脑机接口等未来产业企业明显增多；二是折戟再战的“老面孔”重返考场，包括IPO撤单企业、IPO上会被否企业，纷纷重整旗鼓向新一轮IPO发起冲刺。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788808017.html","importance":"hot"},{"id":"em202607013788809119","time":1782860871000,"title":"从三大维度看新兴产业新动能加速奔涌","text":"【从三大维度看新兴产业新动能加速奔涌】高技术产品订单忙，新兴领域投资加快，科创企业融资热……时至年中，上海证券报记者深入一线调研新兴产业的生产与投融资动向。透过热火朝天的生产车间、扩容提质的投资清单，以及不断向硬科技领域汇聚的金融“活水”，经济新动能跃动的脉络清晰可见。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788809119.html","importance":""},{"id":"sinacomos:niffyta1114838","time":1782860853000,"title":"消息人士：美国将于周二解除对Anthropic公司Fable AI模型的出口管制","text":"据一位知情人士透露，美国商务部预计将于周二解除对Anthropic公司Fable 5人工智能模型的出口管制，此前不到三周，该公司曾因国家安全风险被勒令暂停对其最先进人工智能模型...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-01/doc-iniffyta1114838.shtml","importance":"hot"},{"id":"wscn3127015","time":1782860364000,"title":"6月份私募调研近1800次，电子行业热度居前","text":"Wind数据显示，6月份共有842家私募机构参与到A股公司调研活动中，合计调研次数达1797次，涉及373家A股公司。其中，电子等行业A股公司被调研频次居于前列。今年1月份至6月份，私募机构调研次数分别为3619次、1485次、4740次、10117次、3554次、1797次。剔除春节假期所在的2月份，6月份私募机构整体调研节奏明显放缓。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:niffytk3125194","time":1782860303000,"title":"美国特使与地区领导人就伊朗问题展开积极会谈","text":" 一位美国政府高级官员表示，美国中东问题特使史蒂夫·威特科夫和贾里德·库什纳与地区领导人就伊朗问题进行了非常积极的会谈。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-01/doc-iniffytk3125194.shtml","importance":""},{"id":"wscn3127014","time":1782860250000,"title":"机构密集调研A股上市公司，人形机器人、半导体材料受追捧","text":"6月份，共有989家A股上市公司迎来机构调研。从调研逻辑看，硬科技赛道凭借清晰的产业升级路径、持续推进的国产替代进程以及充足的中长期成长空间，成为当前机构调研和中长期资金布局的主线。受访专家表示，当前公募、私募、外资、券商等各类机构布局风格差异化凸显，但对科技成长赛道的看多共识高度一致。其中，人形机器人、AI硬件、高端半导体材料等前沿细分领域，受益于产业迭代提速、上市公司业绩集中兑现、市场流动性持续改善三重利好共振，成为市场资金重点关注领域。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3127013","time":1782860166000,"title":"加码财富管理，上半年券商投顾逆势增员1627人","text":"今年以来，证券行业人才结构持续优化，在一般证券业务、证券经纪人等传统基础岗位人数持续缩减的同时，作为财富管理转型抓手的投顾队伍逆势扩容。数据显示，截至上半年末，证券行业投顾人员合计8.82万人，较去年末增加1627人。分析师队伍则在总量微降中步入存量优化阶段。各业务条线从业人员版图的重塑，折射出当前券商深化财富管理业务转型、加速研究业务“出海”的发展战略。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3127012","time":1782860117000,"title":"多地发布脑机接口产业专项扶持政策","text":"二季度以来，已有天津市、广东省、安徽省等多地发布了脑机接口产业专项扶持政策，出台本地脑机接口产业总体目标、重点任务、组织保障等举措。各地加码布局脑机接口产业的切入点并不相同。其中，培育企业梯队、开发重点领域产品两项措施广受关注。与此同时，多地增量政策还聚焦金融服务水平的提升，鼓励并支持以多元化资金投入和风险保障体系支撑脑机接口产业的可持续发展。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607013788835565","time":1782859964000,"title":"6月制造业PMI升至50.3% 重返扩张区间","text":"【6月制造业PMI升至50.3% 重返扩张区间】国家统计局6月30日发布数据显示，6月份，制造业采购经理指数（PMI）为50.3%，比上月上升0.3个百分点，重返扩张区间；非制造业商务活动指数和综合PMI产出指数分别为50.2%和50.6%，均比上月上升0.1个百分点，我国经济景气水平有所回升。专家表示，6月份制造业PMI小幅上升，表明经济增长动力增强，经济向好的积极因素增加。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607013788835565.html","importance":"important"},{"id":"em202607013788827694","time":1782859531000,"title":"中企参建的阿联酋首条客运铁路启动试运营","text":"【中企参建的阿联酋首条客运铁路启动试运营】6月30日，由中铁国际、中国中车、中国电建、中国土木等多家中国企业参与承建的阿联酋首条客运铁路——阿提哈德客运铁路启动试运营。","s </script>

<script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
