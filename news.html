t":"在为期四天的美国“独立日”长周末（7月2-5日）假期期间，《小黄人与大怪兽》（Minions & Monsters）以6200万美元的票房成绩登顶美国和加拿大影院票房榜首，不过这一成绩仍不及该七部曲系列中早期作品的表现。2015年上映的《小黄人》以首周末三天1.157亿美元的票房成绩，保持着该系列最强首映纪录。尽管最新一部的票房远不及这一水平，但这并未削弱照明娱乐作为最成功动画电影制作力量之一的整体地位。在流媒体服务竞争日益激烈的背景下，动画电影类型在票房上面临着诸多挑战。\n《玩具总动员5》（Toy Story 5）位列周末票房榜第二，而Angel Studios Inc.的新片《Young Washington》则排名第三。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607073795540379","time":1783379034000,"title":"全球经济分化 AI重塑增长底层逻辑","text":"【全球经济分化 AI重塑增长底层逻辑】步入2026年，世界经济正经历一场深刻的结构性重塑。中东地缘冲突引发的能源供应紧张与价格飙升，令全球经济运行面临严峻考验。与此同时，人工智能（AI）热潮的纵深推进，强势带动半导体等核心领域的投资、生产和贸易活动，为全球经济注入了关键对冲动能。在这两股力量的角力下，今年以来世界经济运行展现出较强的韧性，整体增长形势好于预期，但冷热不均的结构性分化态势也更加明显。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795540379.html","importance":"hot"},{"id":"sinacomos:nifxpie1518690","time":1783379004000,"title":"上半年IPO申报放量升温 科创赛道扩容与从严审核并行","text":"● 本报记者 杨梓岩 2026年上半年的IPO市场，在6月迎来了集中交卷。 Wind数据显示，上半年三大交易所合计新增受理IPO企业242家，同比增长37%。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/marketresearch/2026-07-07/doc-inifxpie1518690.shtml","importance":"hot"},{"id":"sinacomos:nifxpik8401128","time":1783378932000,"title":"A股交易新规落地首日 ST板块成交放量","text":"热门科技股出现明显分化 ● 本报记者 吴玉华 7月6日是交易新规实施的首个交易日，A股三大指数均下跌，深证成指、创业板指均跌逾1%。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/marketresearch/2026-07-07/doc-inifxpik8401128.shtml","importance":"hot"},{"id":"em202607073795571824","time":1783378886000,"title":"法国政府应对高温不力不信任动议未获通过","text":"【法国政府应对高温不力不信任动议未获通过】7日，法国国民议会未通过一项由在野党提出的针对政府应对高温天气不力的不信任动议，由法国总理勒科尔尼领导的政府得以继续执政。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795571824.html","importance":""},{"id":"xq4752042","time":1783378881000,"title":"现货白银向下跌破62美元/盎司，日内下跌0.05%。","text":"现货白银向下跌破62美元/盎司，日内下跌0.05%。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/398731852","importance":""},{"id":"sinacomos:nifxpif8281565","time":1783378876000,"title":"低估值遇上高分红 银行板块估值修复窗口正在打开","text":"● 本报记者 李蕴奇 今年以来，A股银行板块维持“低估值、高分红”特征，截至7月6日收盘，申万银行指数跌超9%，42家上市银行全部“破净”，仅9家银行股价上涨。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/marketresearch/2026-07-07/doc-inifxpif8281565.shtml","importance":"hot"},{"id":"em202607073795571014","time":1783378832000,"title":"国际海事组织：44名海员仍被索马里海盗等扣押","text":"【国际海事组织：44名海员仍被索马里海盗等扣押】国际海事组织秘书长多明格斯7月6日在位于英国伦敦的该组织总部呼吁国际社会采取紧急行动，尽快解救目前仍被索马里海盗和武装分子扣押的44名海员。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795571014.html","importance":""},{"id":"sinacomos:nifxpii1619751","time":1783378784000,"title":"万亿买断式逆回购落地 流动性呵护力度持续提升","text":"● 本报记者 彭扬 7月6日，中国人民银行开展10000亿元3个月期买断式逆回购操作，同步投放70亿元7天期逆回购。据Wind数据，当日有8000亿元买断式逆回购...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-07-07/doc-inifxpii1619751.shtml","importance":"important"},{"id":"wscn3129599","time":1783378611000,"title":"资本市场“应退尽退”生态日趋成熟，年内22家公司已摘牌或锁定退市","text":"7月6日，上海创兴资源开发股份有限公司摘牌退市。至此，今年以来，已有16家公司摘牌退市，退市类型覆盖财务类退市、重大违法强制退市、交易类退市、主动退市等情形。梳理上市公司公告发现，还有6家公司已锁定退市。其中，5家A股公司触及财务类退市指标，将于7月份集中摘牌退市；B股公司瓦房店轴承股份有限公司私有化退市正在流程中。综合来看，年内已摘牌退市和锁定退市公司的数量达到22家。此外，还有多家公司因涉嫌严重财务造假、未按期披露定期报告等原因面临退市风险。（证券日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607073795569790","time":1783378608000,"title":"国际航运信息平台：近期共有108艘船通过霍尔木兹海峡","text":"【国际航运信息平台：近期共有108艘船通过霍尔木兹海峡】全球能源市场当前最关注的问题之一，当属霍尔木兹海峡通航水平究竟恢复到什么程度。据美国方面6日消息，国际航运信息平台“海上交通网站”的最新数据显示，本月3日至5日，共有108艘船只通过了霍尔木兹海峡，通航规模仍远低于冲突前日均138艘的平均水平。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795569790.html","importance":""},{"id":"em202607073795562135","time":1783378602000,"title":"前5月 电力市场交易电量同比增长24.8%","text":"【前5月 电力市场交易电量同比增长24.8%】记者从国家能源局获悉：前5月，全国累计完成电力市场交易电量30573亿千瓦时，同比增长24.8%。5月，全国完成电力市场交易电量6268亿千瓦时，同比增长23.6%。从交易范围看，省内交易电量4906亿千瓦时，同比增长26.9%；跨省跨区交易电量1362亿千瓦时，同比增长12.9%。从交易品种看，中长期交易电量5617亿千瓦时，现货交易电量651亿千瓦时。绿电交易电量311亿千瓦时，同比增长6.1%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795562135.html","importance":""},{"id":"wscn3129598","time":1783378504000,"title":"三星电子将于7月30日发布二季度业绩报告（最终数据）。\n","text":"三星电子将于7月30日发布二季度业绩报告（最终数据）。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifxpif8290599","time":1783378042000,"title":"三星预计第二季度营业利润将增长18倍，超出市场预期","text":"三星电子周二预测，受人工智能驱动的需求持续推高内存芯片价格的影响，其第二季度营业利润将较去年同期激增1810%。 这家全球最大的内存芯片制造商在监管文件中表示...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-07/doc-inifxpif8290599.shtml","importance":"hot"},{"id":"wscn3129596","time":1783377791000,"title":"中报预增公司占比走高，新兴产业助力业绩增长","text":"截至7月6日17时，A股共有72家上市公司对外披露2026年半年度业绩预告，64家预增，预增比例约为88.89%。已披露业绩预告的上市公司整体保持了较好的盈利能力。从发布业绩预告的上市公司所属行业看，生物医药、化工、半导体等行业上市公司大幅预增数量较多。部分公司在业绩预告中表示，通过AI赋能业务转型，提升了运营效率，带动业绩提升。不少上市公司发布业绩预告后，获机构密集调研。机构普遍对上市公司业绩未来的增长点、下半年业绩展望等内容较为关注。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129594","time":1783377736000,"title":"上半年IPO申报放量升温，科创赛道扩容与从严审核并行","text":"2026年上半年的IPO市场，在6月迎来了集中交卷。Wind数据显示，上半年三大交易所合计新增受理IPO企业242家，同比增长37%。其中，仅6月单月就贡献了198家。分板块看，6月受理的198家中，北交所95家、创业板51家、科创板36家、上交所主板8家、深交所主板8家。人工智能、商业航天、脑机接口等新兴产业企业明显增多，成为本轮申报中较为突出的特征。6月最后三个交易日——26日、29日、30日，沪深北交易所合计受理企业达113家，呈现逐日放量之势。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607073795566998","time":1783377647000,"title":"三星电子预计第二季度营业利润同比暴增1810%","text":"【三星电子预计第二季度营业利润同比暴增1810%】三星电子第二季度销售额171.00万亿韩元（约7592.4亿人民币），预估169.23万亿韩元（约7513.8亿人民币）；第二季度营业利润89.40万亿韩元（约3969.36亿人民币），同比增长1810%，预估84.2万亿韩元（约3738.48亿人民币）。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795566998.html","importance":"hot"},{"id":"xq4752033","time":1783377622000,"title":"三星电子第二季度营业利润89.40万亿韩元，预估84.2万亿韩元。","text":"三星电子第二季度营业利润89.40万亿韩元，预估84.2万亿韩元。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/398731226","importance":""},{"id":"wscn3129593","time":1783377622000,"title":"三星二季度运营利润同比激增超1800%，AI需求继续提振存储芯片价格","text":"三星电子二季度销售额初步估算为171万亿韩元，分析师预期169.23万亿韩元。\n二季度营业利润初步估算为89.40万亿韩元（折合584.4亿美元），同比增幅1810%，接受彭博访问的分析师预期84.20万亿韩元、LSEG SmartEstimate预期87.3万亿韩元；上年同期4.7万亿韩元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129592","time":1783377314000,"title":"低估值遇上高分红，银行板块估值修复窗口正在打开","text":"今年以来，A股银行板块维持“低估值、高分红”特征，截至7月6日收盘，申万银行指数跌超9%，42家上市银行全部“破净”，仅9家银行股价上涨。与二级市场走势形成反差的是，银行股分红保持稳健，多家上市银行的动态股息率超过5%。这引发了市场对于银行股配置价值的讨论。业内人士认为，低利率环境下，银行股类固收属性凸显，板块估值修复窗口正在打开。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3129433","time":1783377262000,"title":"高盛：AI投资重心迈向实体产业，未来6年资本开支或达7.6万亿美元","text":"高盛在最新报告中称，人工智能(AI)投资的重心已开始向更广阔的实体经济延伸，算力、电力和数据中心仍在高速建设之际，AI已同步进入制造、能源、物流、国防、生命科学和机器人等现实场景。2026-31年，全球围绕计算、数据中心和电力的AI资本开支将达到约7.6万亿美元，年度投入将从2026年的7650亿美元升至2031年的1.64万亿美元。超大规模云厂商（Hyperscalers）到2030年的AI投资或超过6万亿美元。未来竞争的关键不只是模型或芯片，而是资本结构、能源供给、产业数据、工程能力和部署能力。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3129591","time":1783377229000,"title":"前5月机器人规上企业营收超900亿元","text":"7月6日，2026世界机器人大会新闻发布会召开。工信部装备工业一司副司长郝立顺介绍，今年1至5月，我国机器人规模以上企业营业收入突破900亿元，同比增长26.9%，近五年年均增速超20%，较“十三五”时期年均增速提升约5个百分点。当前，人形机器人逐步从展示性演示转向实用性落地，产业商业化进程持续提速。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"sinacomos:nifxpik8369392","time":1783377170000,"title":"7月7日隔夜要闻：美股收高 黄金下跌 原油跌至五个月低点 微软裁员 博通与苹果延长芯片供应协议至2031年","text":"市场 7月7日收盘：美股周一收高，道指突破53000点创 华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3129588","time":1783376864000,"title":"内存价格一路上涨，硬盘价格水涨船高","text":"在被誉为“中国电子第一街”的深圳华强北，游戏发烧友徐绍安最近准备玩一款3A游戏，计划升级一下电脑，他咨询发现，一套32GB的DDR5内存套装目前已经涨到近4000元，比去年贵了三四倍，于是他决定降低配置，改用24GB配置，等以后价格下降再做升级。 记者调查了解到，除了内存价格一路上涨以外，硬盘价格同样水涨船高，以某款1TB固态硬盘为例，目前已经涨到900多元，不少电脑装机商表示，目前零部件和整机的价格处于高位，导致不少装机客户选择观望。 记者统计发现，跟去年对比，主流型号的存储产品价格涨幅皆超过100%。其中：1TB固态硬盘去年410元，（央视财经）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607073795565784","time":1783376723000,"title":"内存价格一路上涨 硬盘价格水涨船高","text":"【内存价格一路上涨 硬盘价格水涨船高】在被誉为“中国电子第一街”的深圳华强北，游戏发烧友徐绍安最近准备玩一款3A游戏，计划升级一下电脑，他咨询发现，一套32GB的DDR5内存套装目前已经涨到近4000元，比去年贵了三四倍，于是他决定降低配置，改用24GB配置，等以后价格下降再做升级。 记者调查了解到，除了内存价格一路上涨以外，硬盘价格同样水涨船高，以某款1TB固态硬盘为例，目前已经涨到900多元，不少电脑装机商表示，目前零部件和整机的价格处于高位，导致不少装机客户选择观望。 记者统计发现，跟去年对比，主流型号的存储产品价格涨幅皆超过100%。其中：1TB固态硬盘去年410元，现在950元，涨幅132%；16G DDR5内存去年450元，现在1800元，涨幅300%；32G DDR5内存去年900元，现在3800元，涨幅322%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607073795565784.html","importance":"hot"},{"id":"wscn3129587","time":1783376616000,"title":"新版交易规则施行首日，ST板块表现分化","text":"7月6日，沪深北交易所新版交易规则正式施行。其中，最受市场关注的变化之一，是沪深市主板风险警示股票（ST、*ST）涨跌幅限制从5%放宽至10%，与主板其他股票实现统一。新规实施首日，ST板块（包括ST、*ST股）表现分化。截至当日收盘，东财编制的ST板块指数收跌1.31%，ST星农、ST海王、ST瑞茂等个股收获10%涨停。记者注意到，新规落地前，ST板块已经历了一轮“先抑后扬”的走势：板块指数自4月底持续回调，6月29日触及近一年新低，随后开启反弹，最近5个交易日累计涨幅超过5%。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"sinacomos:nifxpif8281068","time":1783376572000,"title":"Rivian拟发行7500万股股票 用于美国能源部贷款相关出资","text":"电动汽车制造商Rivian Automotive拟出售7500万股股票，以筹集资金用于与美国能源部贷款相关的股权出资。 根据Rivian周一向美国证券交易委员会提交的文件...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-07/doc-inifxpif8281068.shtml","importance":""},{"id":"em202607073795564857","time":1783376093000, 搜。针对伦理担忧，优必选方面回应中国基金报记者称，优必选仿生机器人定位是情感陪伴，这是国家提倡和认可的方向，不是男友、女友或者伴侣。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795491979.html","importance":""},{"id":"em202607063795488135","time":1783354800000,"title":"1800亿大牛股中钨高新尾盘跌停 机构多空混战","text":"【1800亿大牛股中钨高新尾盘跌停 机构多空混战】龙虎榜显示，当日多个机构席位展开“多空博弈”，其中三家机构专用席位合计净买入3.45亿元、三家机构专用席位合计净卖出5.35亿元。值得关注的是，当日钨概念股普遍走弱，公司钻针业务所属PCB概念同样承压。但从行业发展来看，有机构认为，中钨高新矿产资源储备丰富，叠加公司在高长径比PCB钻针领域技术优势领先，未来业绩将逐步兑现。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795488135.html","importance":"important"},{"id":"em202607063795487994","time":1783354800000,"title":"关键验证窗口来了！两大存储巨头即将牵动全球市场","text":"【关键验证窗口来了！两大存储巨头即将牵动全球市场】7月7日，三星电子将披露今年第二季度初步业绩；7月10日，SK海力士计划在纳斯达克发行美国存托凭证（ADR），预计募资规模最高达294亿美元。在Meta计划出售多余算力的消息被广泛报道后，全球芯片股迎来剧烈波动，市场对AI产业链巨额投资回报前景产生担忧。在这一背景下，三星电子能否交出超预期的业绩答卷，SK海力士ADR上市后能否获得资金追捧，成为本周市场的两大看点。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795487994.html","importance":""},{"id":"em202607063795512660","time":1783354800000,"title":"美股芯片股强势反弹 一系列重磅事件将陆续登场","text":"【美股芯片股强势反弹 一系列重磅事件将陆续登场】本周最重磅的事件当属美联储6月FOMC会议纪要的公布。这是新任主席凯文·沃什上任后的首份会议纪要，市场高度关注其政策思路的细节。SpaceX将于7月7日美股开盘前正式纳入纳斯达克100指数，从6月12日IPO到纳入核心指数仅15个交易日，创下纳指100创立以来最快纪录。除了上述事件外，本周另一大看点当属SK海力士将于7月10日（周五）正式在纳斯达克挂牌上市，发行美国存托凭证（ADR）。这起募资规模约280亿美元的IPO，有望成为美股史上规模最大的外国公司IPO，仅次于上个月SpaceX创下的857亿美元纪录。本周，美股二季度财报季正式拉开序幕。达美航空将于7月10日盘前公布财报，百事公司将于7月9日盘前率先披露。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795512660.html","importance":"important"},{"id":"em202607063795505954","time":1783354680000,"title":"深交所通报：中公教育相关投资者被暂停交易","text":"【深交所通报：中公教育相关投资者被暂停交易】7月6日晚间，深交所发布关于中公教育股票交易情况的通报。通报称，7月6日，中公教育（002607）股票价格出现异常波动，上市公司已发布交易风险提示公告。深交所密切监控该股交易情况，对影响股票正常交易秩序的异常交易行为，依规对相关投资者采取了暂停交易等监管措施。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607063795505954.html","importance":"hot"},{"id":"em202607063795487650" <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
