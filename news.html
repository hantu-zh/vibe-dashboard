堰高铁十堰东站，线路全长257公里，设计时速350公里。（央视新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606303787340470","time":1782779440000,"title":"中航光电：公司面向算力市场的高速互连、液冷等产品需求饱满","text":"【中航光电：公司面向算力市场的高速互连、液冷等产品需求饱满】中航光电(002179)6月30日在互动平台表示，公司面向算力市场的高速互连、液冷等产品需求饱满，产能利用率处于高位。在产能扩充方面，公司已针对性落地多项增产规划，目前各项扩产工作有序推进。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787340470.html","importance":""},{"id":"em202606293786749461","time":1782779356000,"title":"数十起夹伤事故 暴露电吸门安全隐忧","text":"【数十起夹伤事故 暴露电吸门安全隐忧】近日，山东济南一儿童手指被车门夹手的视频引起了业内对于车门防夹功能，尤其是电吸门防夹功能的议论。早在2005年，传统燃油车已开始普及电吸门这一配置，且大多搭载在百万元级别的豪华车型上，被视为豪华车的标志性配置。到了新能源车时代，电吸门的价格不断下探，售价在15万元级别的新能源车也可以安上电吸门，以此作为汽车宣传的“黑科技”卖点之一。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606293786749461.html","importance":""},{"id":"sinacomos:nifcvuh6726816","time":1782779351000,"title":"英派药业-B获股东施毅增持2万股 每股作价约35.94港元","text":"香港联交所最新数据显示，6月24日，股东施毅增持英派药业-B（07630）2万股，每股作价35.9388港元，总金额约为71.88万港元。增持后最新持股数目约为3955.15万股...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/hkstock/ggscyd/2026-06-30/doc-inifcvuh6726816.shtml","importance":""},{"id":"em202606303787341741","time":1782779310000,"title":"中信证券：新型能源体系规划落地 电源持续重构","text":"【中信证券：新型能源体系规划落地 电源持续重构】中信证券研报指出，新型能源体系规划落地，规划的推进将助推我国实现更优的能源结构，规划明确2030年电力装机将达到54亿千瓦，其中新能源装机比重将超过50%并成为电力装机主体，非化石能源发电量比重达到50%并成为电量主体；助推电力系统形态更新，打造适应电源结构变革的坚强韧性、绿色低碳、智能高效新型能源基础设施体系；助推市场和价格机制更加健全，2030年基本建成全国统一电力市场，为新型能源体系建设提供保障。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606303787341741.html","importance":""},{"id":"sinacomos:nifcvua1695638","time":1782779277000,"title":"置富产业信托遭ESR Asset Management减持60.2万股 每股作价约4.5港元","text":"香港联交所最新数据显示，6月25日，ESR Asset Management （Fortune） Limited减持置富产业信托（00778）60.20万股，每股作价4.504港元，总金额约为271.14万港元。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn portance":""},{"id":"1639244678958","time":1782775356000,"title":"韩国万亿“芯”基建：存储能否建成AI时代“油田”","text":"韩国万亿“芯”基建：存储能否建成AI时代“油田”","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LFEJG10514R9P4.html","importance":""},{"id":"wscn3126351","time":1782774908000,"title":"华尔街见闻早餐 | 2026年6月30日","text":"纳指收涨超2%，道指创新高，谷歌被纳入道指首日涨近5%，SpaceX涨逾7%，芯片指数涨近4%；日元兑美元创近四十年新低、逼近162，原油反弹，美油一度涨近3%。\n美伊据称同意停止互袭，特朗普称美伊将周二在卡塔尔多哈会谈，伊朗否认、称未来几天没有与美谈判计划，双方尚未进入最终协议谈判阶段，强调船只须按“伊朗线路”通过霍尔木兹海峡。\n美最高法院裁定库克暂时留任美联储理事，特朗普称将确保其不影响重大货币政策决定。美最高法重大裁决：扩大总统对联邦独立机构罢免权，但美联储除外。\n白宫经济顾问非农提前剧透？哈塞特：本周就业报告将再次强劲，当前加息的理由并不充分。\n美国将修改美联储青睐通胀指标PCE价格指数统计方法，华尔街：旨在“降低”核心通胀，存在操纵风险。\n韩国宣布国内史上最大规模产业投资计划，五年内DRAM产能翻倍，三星、SK海力士将合计投逾4800万亿韩元、各新建两座芯片厂，投资兼顾HBM、数据中心到人形机器人。\n中国央行首次开展3000亿元隔夜逆回购操作，应对半年末跨季流动性压力。\n中国国常会：加力推进人工智能创新突破，加快关键技术攻关和超大规模智算集群建设。\n中国外交部回应将部分日本实体列入出口管制管控名单：此举旨在坚决遏制日本新型军国主义妄动，不影响中日正常经贸往来。\nDeepSeek V4定档7月中旬，将推出峰谷API定价、价格为平时两倍。\n报道：iPhone 18将大涨价，Pro和Pro Max或涨200美元，标准版18明年春亮相，内存或增至9GB。\n提醒：周二将公布中国6月官方PMI。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202606303787124482","time":1782774788000,"title":"宝济药业：BJ044注射液临床试验申请获得国家药监局批准","text":"【宝济药业：BJ044注射液临床试验申请获得国家药监局批准】6月30日早间，宝济药业在港交所公告，于2026年6月29日，公司自主研发的经由合成生物学开发的BJ044注射液（重组乌司他丁，BJ044）的临床试验申请（IND）获得中华人民共和国国家药品监督管理局批准，获准开展临床试验。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606303787124482.html","importance":""},{"id":"wscn3126350","time":1782774731000,"title":"压缩画饼式销售空间，分红险演示利率上限将调整","text":"7月1日起，全市场在售分红险演示利率上限将由3.9%下调至3.5%。各家保险公司高于3.5%演示利率的产品需要在6月30日前完成变更备案，或报送停售。由于这一利率上限下调关口将至，带有“即将降息”“不容错过”“倒计时”“绝版”“最后上车机会”等字眼的保险营销文案活跃在朋友圈和社交平台。对消费者来说，此次调整会否如保险营销文案所说，需要欲购从速、赶紧上车？演示利率上限的下调，是否意味着消费者实际收益的缩水？记者调研发现，此次调整，并不影响分红险的合同约定利率，所以未必会影响消费者的实际收益，更多是压缩了画饼式销售的空间。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1638874883421","time":1782774683000,"ti mportance":"important"},{"id":"wscn3126346","time":1782773698000,"title":"中国商务部部长王文涛会见德国联邦经济和能源部部长赖歇","text":"6月28日，商务部部长王文涛在布鲁塞尔会见德国联邦经济和能源部部长赖歇，双方就中德、中欧经贸关系坦诚、深入交换了意见。双方一致同意，重启中德经济合作联委会机制，并就尽早召开联委会下一次会议保持沟通。双方将在联委会框架下成立贸易投资工作组和产业合作工作组，分别以政策沟通和政企对话为工作重点。此外，双方同意立即启动出口管制技术层面磋商，以平衡解决各自关切。（中国商务部网站）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3126345","time":1782773581000,"title":"美国总统特朗普：提名Keith E. Sonderling为劳工部长。\n","text":"美国总统特朗普：提名Keith E. Sonderling为劳工部长。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3126344","time":1782773458000,"title":"报道：SpaceX与美国讨论捐赠股票给“特朗普账户”","text":"特朗普政府和SpaceX讨论了向特朗普账户（Trump Accounts）捐赠股票的可能性，特朗普账户是政府支持的儿童储蓄账户。目前还不清楚马斯克是否同意捐赠。（Semafor）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3126342","time":1782773276000,"title":"二级市场收票证，海外融资送方案，半年末银行贷款加速冲刺","text":"临近上半年末的关键节点，银行在贷款业务上加速冲刺。二级市场上，票证转贴现利率快速下行，反映出银行加快收购票证的步伐。为了争夺优质客户，银行协调各种资源，推出特色化、低成本融资方案。为了与大型企业建立合作关系，一些银行的境内分行与境外分行密切联动，为企业提供低成本融资方案。种种举措折射出银行根据市场节奏灵活摆布信贷资产的经营思路。专家认为，面对传统贷款业务的低增速，银行业宜深挖客户需求、发展多项业务，从规模导向转向质量与效率驱动。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1635240396626","time":1782773231000,"title":"存储三巨头在美遭遇集体诉讼，集体诉讼对三巨头股价影响有多大？","text":"存储三巨头在美遭遇集体诉讼，集体诉讼对三巨头股价影响有多大？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0LDBBEA051983MB.html","importance":""},{"id":"wscn3126341","time":1782772961000,"title":"谷歌母公司支持旨在助推太空产业的金融科技公司","text":"谷歌母公司Alphabet Inc.旗下风投部门GV主导了一轮融资，为太空金融科技公司Nebex提供3000万美元的种子资金。Nebex由Axiom Space Inc.前首席执行官Tejpaul Bhatia创立。Nebex将作为一个在线平台，连接美国太空公司、外国政府和投资者，并从平台上达成的任何交易中抽取佣金。该公司的目标是促成足够大规模的交易，使得尽管面临进出口限制、关税和采购规则等障碍，国际业务依然有利可图。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/l <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
