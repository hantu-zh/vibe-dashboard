"text":"来源：华尔街见闻 比特币正在为机构化转型付出代价。散户买盘萎缩、ETF资金持续外流、企业持仓者潜在抛售压力上升，加之AI基础设施投资持续虹吸风险资产资金...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/blockchain/qklhz/2026-06-25/doc-inieqnay1047253.shtml","importance":"important"},{"id":"wscn3124288","time":1782342994000,"title":"多地农商银行启动全员清收行动","text":"近期，多家农商银行集中开展全员清收行动。这既反映出农商银行改善资产质量的需求，也是银行落实监管要求的体现。事实上，各类不良资产处置方式各有适用范围，全员清收方式能够利用银行员工的本地关系网，最适配清收笔数多、单笔金额小的农户信用贷款和个体工商户经营性贷款。在短期突击压降不良贷款规模后，如何建立改善资产质量的长效机制是各家农商银行要着力解决的问题。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nieqnay1045364","time":1782342861000,"title":"美国国家运输安全委员会对特斯拉致命车祸展开调查","text":" 美国国家运输安全委员会（NTSB）周三表示，将对上周发生在德克萨斯州凯蒂市的一辆特斯拉Model 3高速撞入民宅的事故展开调查，该事故导致一名76岁的居民不幸身亡。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-25/doc-inieqnay1045364.shtml","importance":"important"},{"id":"wscn3124287","time":1782342698000,"title":"延期合约保证金比例升至140%，多家银行收紧个人贵金属业务","text":"6月24日，工商银行宣布将于近期停办代理上海黄金交易所个人贵金属竞价交易业务。6月以来，多家银行收紧个人贵金属相关业务，华夏银行、广发银行、中国银行等近10家全国性银行先后发布公告，调整个人贵金属延期合约保证金比例，部分银行将保证金比例上调至140%。业内人士认为，上述保证金比例突破100%意味着个人贵金属延期合约的杠杆水平已实质性归零，投机性资金将逐步退出市场。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1637079584425","time":1782342508000,"title":"持续阴跌，价格巨震！必须认清一个事实","text":"持续阴跌，价格巨震！必须认清一个事实","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08IKNG00519DKT1.html","importance":""},{"id":"1639485979569","time":1782342485000,"title":"美股盘后芯片股狂欢，高通涨超15%，美光科技涨超13%，金银、油价跳水","text":"美股盘后芯片股狂欢，高通涨超15%，美光科技涨超13%，金银、油价跳水","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08IKE2O05199NPP.html","importance":""},{"id":"wscn3124286","time":1782342386000,"title":"据美国USGS：委内瑞拉Moron西南方向16公里发生7.5级地震。\n","text":"据美国USGS：委内瑞拉Moron西南方向16公里发生7.5级地震。\n","source":"华尔街见闻","category":"fas 十年","text":"黄仁勋股东大会放言：本轮AI基建周期长达数十年","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08HR1RU0519DDQ2.html","importance":"hot"},{"id":"wscn3124280","time":1782341534000,"title":"海啸预警中心：海浪可能会冲击到委内瑞拉沿海。\n","text":"海啸预警中心：海浪可能会冲击到委内瑞拉沿海。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124279","time":1782341357000,"title":"阿里巴巴证实：已起诉美国防部","text":"多家外媒23日报道称，阿里巴巴起诉美国国防部，要求将其从“中国军事企业名单”中移除。\n24日，阿里巴巴向记者证实了上述消息。阿里巴巴在声明中表示：“我们已正式对美国国防部提起诉讼，要求将公司从‘中国军事企业名单’中移除。”阿里巴巴强调，公司并非中国军工企业，亦未参与任何“军民融合”战略。将阿里巴巴列入名单的决定毫无事实依据，武断且反复无常。（环球时报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124278","time":1782341192000,"title":"中证报：创新引领结构优化，稳投资政策料持续发力","text":"“六张网”等基础设施建设加快布局、高技术产业投资增势较好……今年以来，投资结构持续优化，发挥了强基础、促转型的重要作用。为进一步推动投资增速回升，专家建议加快政府债券发行使用、增强民间资本参与意愿。展望下半年，在政策、资金的有力支持下，后续基建投资有加速空间，新质生产力相关投资有望维持高增。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124277","time":1782340943000,"title":"据日本媒体25日报道，日本岩手县附近海域当天发生6.9级地震。\n","text":"据日本媒体25日报道，日本岩手县附近海域当天发生6.9级地震。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124276","time":1782340901000,"title":"据日本媒体25日报道，日本岩手县附近海域当天发生6.9级地震。\n","text":"据日本媒体25日报道，日本岩手县附近海域当天发生6.9级地震。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124275","time":1782340843000,"title":"日本本州东岸附近发生6.5级地震。（德国地球科学研究中心GFZ）\n","text":"日本本州东岸附近发生6.5级地震。（德国地球科学研究中心GFZ）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124274","time":1782340762000,"title":"A股公司年度“红包”派发进行时，“双创”板块成现金分红硬核力量","text":"截至6月23日（按派息日计），今年已有2379家上市公司实施了2025年年度现金分红，合计派发现金红利7087.55亿元。其中，工商银行以601.97亿元的分红金额居首，中国移动、农业银行、中国平安紧随其后， olsbee（2027年FOMC票委）讨论塑造货币政策的那些因素；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124268","time":1782339902000,"title":"资金涌入科技成长ETF","text":"在近期的震荡行情中，股票型ETF资金面总体净流出，但半导体、通信等科技成长赛道逆势“吸金”。面对资金涌入，部分绩优基金限购升级，也有基金大手笔分红以控制规模。站在当前时点看，科技成长行情还能否持续？市场风格分化能否收敛？机构间的分歧正在加大。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124267","time":1782339842000,"title":"委内瑞拉发生7级左右地震，美国发布海啸预警","text":"当地时间6月24日17时04分，委内瑞拉北部海岸附近发生7.5级地震。\n根据哥伦比亚地质局发布的最新地震通报，震中位于北纬10.89度、西经67.74度，震源深度小于30公里。目前，相关部门正持续监测地震影响，暂无人员伤亡和财产损失的官方报告。\n当地时间6月24日，美国地质调查局表示，委内瑞拉莫龙地区发生7.1级地震。美国海啸预警系统在地震后发布海啸威胁警报。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1631597227161","time":1782337924000,"title":"涉嫌非法吸收公众存款罪，华恒生物实控人被公安机关刑事拘留","text":"涉嫌非法吸收公众存款罪，华恒生物实控人被公安机关刑事拘留","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08E98DV0519DFFO.html","importance":""},{"id":"1638161496681","time":1782337786000,"title":"美光，业绩、指引炸裂","text":"美光，业绩、指引炸裂","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08E4VAH05198NMR.html","importance":""},{"id":"1635360356754","time":1782337274000,"title":"高通全面进军AI数据中心：Meta签多代CPU大单、微软部署HBC芯片，预计明年贡献数十亿收入","text":"高通全面进军AI数据中心：Meta签多代CPU大单、微软部署HBC芯片，预计明年贡献数十亿收入","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08DLD8C05198NMR.html","importance":""},{"id":"1637975330834","time":1782336947000,"title":"赚1334万、分红1.04亿！陈建军掌舵大亚圣象6年，利润缩水98%","text":"赚1334万、分红1.04亿！陈建军掌舵大亚圣象6年，利润缩水98%","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08DANFT0531MMSF.html","importance":"important"},{"id":"1639978294834","time":1782334463000,"title":"中国公募距离贝莱德还有多远？","text":"中国公募距离贝莱德还有多远？","source":"网易财经","category":"fast <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
