优势产品的“二次首发”，部分产品管理规模近乎翻倍。在政策导向与费率改革的推动下，行业过往“重首发，轻持营”的利益逻辑正在改变，深耕存量的良性行业生态加速形成。所谓“二次首发”，是指基金公司对存量基金进行特殊的持续营销，通过渠道集中资源专项运作，营销力度、客户触达强度远高于分散、常态化的持续营销，资金吸纳与客户留存程度往往更好。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"1635656410965","time":1782687220000,"title":"金价跳水，国际油价拉升！美伊谈判、霍尔木兹海峡，最新消息","text":"金价跳水，国际油价拉升！美伊谈判、霍尔木兹海峡，最新消息","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0IRCTRK0530NLC9.html","importance":""},{"id":"wscn3125725","time":1782686996000,"title":"“买券商等于买一篮子打折科技股”交易逻辑发酵，券商股上演价值重估行情","text":"近期，A股券商板块告别前期沉寂，盘面异动频发，资金关注度持续攀升。盘面最关键的变化在于，打破了过往“券商拉升，科技回调”的存量资金跷跷板效应，证券与硬科技双线共振走强。“买券商等于买一篮子打折科技股”的交易逻辑在市场上快速发酵。长久以来，券商仅以“牛市旗手”的行情弹性被资金关注，如今却凭借投行跟投、股权直投手握大量硬科技企业股权，叠加自身板块估值处于历史低位，科创底色逐步被资金挖掘，一场全新的价值重估行情正在上演。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1632772993565","time":1782686841000,"title":"AWS在中国，等来了AI出海","text":"AWS在中国，等来了AI出海","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0IR0SPD051188EA.html","importance":""},{"id":"wscn3125724","time":1782686552000,"title":"全球科技股同步回调，券商研报：AI主线地位不改但再平衡需求上升","text":"上周全球市场科技产业链同步震荡，海外相关赛道估值下行对A股构成传导压力，A股呈现“冲高回落，极致分化”格局。综合本周券商策略研报来看，美联储加息预期反复、科技板块交易拥挤度抬升，以及AI产业面消息扰动共同压制了科技板块风险偏好。在中期维度上，AI产业上行趋势尚未出现实质性拐点，各细分赛道景气度持续兑现，行情延续的基础仍存。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125723","time":1782686474000,"title":"万亿发债潮叠加评级上调，券商大力融资谋转型","text":"今年以来，券商融资节奏持续提速，债券发行规模实现大幅跃升。Choice数据显示，截至6月26日，年内已有61家券商累计发行521只债券，总发行规模超过1.22万亿元，较去年同期的5274.98亿元同比增长超过131%。另外，行业龙头发债体量达到千亿级。与此同时，多家券商大额发债批复密集落地。6月以来，证券行业迎来罕见的债券信用评级集中上调。中金财富、东北证券、长城证券、华安证券、浙商证券等多家券商密集公告评级调整，旗下多款次级债信用等级成功从AA+跃升至AAA，行业总体信用资质实现质的提升。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125722","time":1782685836000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 待定 欧洲央行在辛特拉举行中央银行论坛，至7月1日；北京太空算力大会举办；\n② 07:30 澳洲联储助理主席Kent发表讲话；\n③ 07:50 日本5月零售销售；\n④ 13:00 英国央行首席经济学家Pill发表讲话；\n⑤ 16:30 英国5月央行抵押贷款许可\n⑥ 17:00 欧元区6月经济景气指数，欧元区6月消费者信心指数终值；\n⑦ 22:30 美国6月达拉斯联储商业活动指数\n⑧ 次日00:30 欧洲央行行长拉加德发表讲话；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125721","time":1782685526000,"title":"据韩媒报道，三星与SK集团未来10年的投资总额或将达到2000万亿韩元。\n","text":"据韩媒报道，三星与SK集团未来10年的投资总额或将达到2000万亿韩元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125720","time":1782685144000,"title":"国际清算银行警告全球经济面临多重压力","text":"总部设于瑞士巴塞尔的国际清算银行当地时间28日发布报告称，当前全球经济增长面临多重压力，包括人工智能热潮或难持续、金融体系存在脆弱性、公共财政紧张以及通胀上行等。报告还说，霍尔木兹海峡的“历史性关闭”引发能源及其他原材料供应危机，对全球经济前景构成新的威胁。尽管地缘政治紧张局势有所缓解且油价大幅下跌，但此次冲击造成的影响可能持续存在。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3125713","time":1782684355000,"title":"以总理与防长发表联合声明：以军将继续驻留在黎南部“安全区”","text":"当地时间28日晚，以色列总理内塔尼亚胡与国防部长卡茨发表联合声明称，以色列国防军刚刚摧毁了位于黎巴嫩南部马吉达勒宗村区域的黎巴嫩真主党地下武装基础设施。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125712","time":1782684200000,"title":"布伦特原油期货周一亚市盘初涨1.9%，至每桶73.39美元；WTI原油期货接近每桶70美元。此前美伊停火协议陷入紧张状态。\n","text":"布伦特原油期货周一亚市盘初涨1.9%，至每桶73.39美元；WTI原油期货接近每桶70美元。此前美伊停火协议陷入紧张状态。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125717","time":1782682200000,"title":"四川高县5.5级地震致13人受伤，均为轻微伤已送医诊疗","text":"据中国地震台网正式测定：2026年6月29日0时12分，宜宾市高县沙河镇附近（北纬28.50度，东经104.69度）发生5.5级地震，震源深度6千米。地震发生后，宜宾市抗震救灾指挥部启动地震三级应急响应。市级相关部门、县（区）迅速行动，及时开展灾情排查和救灾工作。截至2026年6月29日3时30分，此次地震未造成重大人员伤亡，因灾受伤13人均为轻微伤，已及时送医诊疗，紧急避险转移和安置196人。（“宜宾发布”微信公号）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125714","time":1782679800000,"title":"美官员：美伊计划于30日在卡塔尔首都举行会谈","text":"当地时间6月28日获悉，一位美国高级官员透露，美伊双方已同意停止相互攻击，并计划于6月30日在卡塔尔首都举行会晤，以解决关于霍尔木兹海峡的争端。另一位美国官员表示，美伊双方将“暂时”停止敌对行动，在技术性会谈继续进行的同时，霍尔木兹海峡“船只可以自由通行”。美国官员和另外的知情人士均证实了美伊计划于30日举行会晤。但截至目前，美伊双方以及当前美伊谈判的调解方巴基斯坦和卡塔尔均未作出正式说明。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3125715","time":1782678900000,"title":"普京：俄建议乌俄双方均停止打击对方领土纵深目标","text":"当地时间6月28日，俄罗斯总统普京向媒体表示，俄方建议俄乌双方均停止攻击对方领土的纵深目标，否则俄方对乌纵深地区的打击将更具威力，后果将更严重。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125716","time":1782677100000,"title":"伊朗官员：受遭袭事件影响，伊方缺席28日的美伊技术性谈判","text":"当地时间6月28日获悉，一位伊朗官员称，伊朗未参加原定于当天举行的技术性谈判，原因是“近期发生的袭击事件以及未能满足相关条件”。另据美国方面当天消息，有知情人士称，由于美伊两国再次发生冲突，原定于本周在瑞士恢复美伊技术性谈判的计划陷入停滞。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125718","time":1782676500000,"title":"委内瑞拉强震致中国公民8人遇难 1人失联","text":"当地时间6月28日下午获悉，中国驻委内瑞拉大使馆通报说，截至委内瑞拉当地时间28日15时，据不完全统计，已确认有8名中国公民在委内瑞拉6月24日发生的地震中遇难，1名中国公民失联，其他人员身份尚在核实。（央视新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1639947237233","time":1782671717000,"title":"OpenAI推迟上市，那“Kimi们”呢？","text":"OpenAI推迟上市，那“Kimi们”呢？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0ICJDMV051188EA.html","importance":""},{"id":"wscn3125719","time":1782670320000,"title":"普京称考虑全面禁止柴油出口","text":"当地时间6月28日，俄罗斯总统普京在主持召开国内燃油市场保障会议时表示，需要采取系统性措施以增加燃油供应量并维持经济上合理的价格。普京表示，大型炼油厂产能已满负荷利用，中小型企业的潜力也已调动，此前储备的燃油已投放国内市场。普京说，根据俄能源部提交的报告，目前俄罗斯汽油储备为170万吨，几乎与去年同期持平。他表示，正在考虑全面禁止柴油出口的必要性。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3125709","time":1782668739000,"title":"委内瑞拉强震遇难人数升至1450人","text":" </script>

<script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
