t":"截至6月18日，锗锭已攀升至25000元/千克，较2025年末涨逾83%。驱动这一轮价格飙升的，主要是AI算力基础设施等领域对光纤的旺盛需求。在光纤制造中，四氯化锗扮演着“味精”般的关键角色。它是光纤预制棒纤芯掺杂的核心原料，主要作用是提高纤芯折射率等，让光纤的传输性能更“能打”。“在光纤预制棒的原材料成本里，锗的占比很低，但由于下游对锗材料的纯度要求高，加上国内锗供给较为集中、材料不可替代性强，相比其他材料，锗的供需矛盾会更为明显。”一家头部光纤预制棒生产商介绍。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123058","time":1782167562000,"title":"芝商所CME Direct平台恢复交易，早前出现连接中断情况","text":"据交易员表示，美国芝商所旗下CME Direct平台在周一因技术故障短暂中断后，目前已恢复交易。“由于第三方网络问题，部分CME Direct客户在中部时间下午1点左右遇到连接中断情况。部分受影响的客户在重新连接时也遇到了延迟。CME Globex未受影响，”芝商所一位代表在电子邮件声明中表示。据交易员表示，此次事件影响了石油、天然气、铜、黄金和白银等交易。（彭博）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nieitqz9861612","time":1782167462000,"title":"6月23日隔夜要闻：SpaceX三天蒸发6000亿美元 美国授权伊朗出售石油 谷歌大跌 美银德银预计美联储9月加息","text":"市场 6月23日收盘：美股三大股指涨跌不一 SpaceX暴跌16% 6月23日美股成交额前20：SpaceX重挫16% 连跌3天 市值跌回2万亿美元附近 6月23日热门中概股多数下跌...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitqz9861612.shtml","importance":"important"},{"id":"em202606233778508021","time":1782167430000,"title":"周二你需要知道的隔夜全球要闻","text":"周二你需要知道的隔夜全球要闻：纳指收跌1.3%，SpaceX重挫16%，近三日市值蒸发逾6000亿美元；美国设定2028年科研级量子计算机突破目标；梅西加冕世界杯历史射手王。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778508021.html","importance":"important"},{"id":"wscn3123056","time":1782167401000,"title":"光棒之渴：个别类型较年初涨价逾五倍，供应紧缺或将延续至2027年","text":"受益于AI算力网络建设带来的巨量光纤光缆需求，作为光纤制造“母体”的光纤预制棒（下称“光棒”）价格较2025年初快速上涨：通用G.652D光棒报价涨幅超过180%；用于数据中心高密度布线的G.657.A2类光棒，每等效芯公里报价则由22元至30元涨到160元，涨幅近550%。多家上市公司表示，本轮光棒价格上涨与供需失衡以及上游原材料涨价传导等因素共同导致，预计紧缺状态将持续到2027年。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3123053","time":1782167369000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 08:30 日本6月制造业、服务业、综合PMI初值；\n② 时间待定 “夏季达沃斯论坛”在大连开幕（6月23-25日），字节跳动旗下云与AI服务平台2026火山引擎原动力大会（FORCE）开幕（6月23-34日）；\n③ 13:00 印度6月制造业、服务业、综合PMI初值；\n④ 15:15 法国6月制造业、服务业、综合PMI初值；\n⑤ 15:30 德国6月制造业、服务业、综合PMI初值；\n⑥ 16:00 欧元区6月制造业、服务业、综合PMI初值，欧洲央行管委Kazimir讲话；\n⑦ 16:30 英国6月制造业、服务业、综合PMI初值，欧洲央行首席经济学家Lane在欧洲议会讲话；\n⑧ 21:00 加拿大央行行长Tiff Macklem在法国巴黎讲话；\n⑨ 21:45 美国6月标普全球服务业、制造业、综合PMI初值；\n⑩ 21:55 英国央行货币政策委员会（MPC）成员Alan Taylor，欧洲央行副主席Boris Vujcic在英国伦敦出席2026年货币政策论坛并讲话；\n⑪ 22:00 美国6月里士满联储制造业指数；\n⑫ 次日01:30 英国央行货币政策委员会（MPC）成员Swati Dhingra讲话；\n⑬ 时间待定 明晟公司（MSCI）将公布年度市场分类评审结果，韩国有望进入发达市场观察名单；\n⑭ 美股盘后 联邦快递发布业绩报告；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123055","time":1782167220000,"title":"点心债持续扩容，离岸人民币市场融资加速","text":"工商银行首尔分行、交通银行香港分行等五家银行6月22日共发行规模为27.74亿元点心债。今年以来，点心债市场发行规模超8000亿元，远高于去年同期。专家认为，2026年以来，点心债发行规模持续扩容，首要原因是人民币资产吸引力增强、离岸人民币流动性改善，叠加中美利率分化带来融资成本优势。未来，境内企业“走出去”步伐加快、境外机构对人民币融资需求上升、离岸市场基准利率曲线的建立与完善，都将推动点心债发行规模稳步增长。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123054","time":1782167172000,"title":"券商分类评价考核将启，“功能发挥”成加分关键","text":"从业内获悉，2026年券商分类评价自评材料报送临近截止日期，各家券商须于6月底前完成提交。对券商来说，这是《证券公司分类评价规定》自2025年8月修订实施以来的又一次“大考”。从今年的工作底稿来看，加分项与扣分项均有细化调整，“功能发挥”成为加分关键。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123052","time":1782167058000,"title":"AI飞轮驱动加速，半导体更多领域进入上行周期","text":"存储芯片的供需关系，要到2027年才会有改善迹象；AI带动的需求正在扩散，下半年功率、模拟芯片的供应会持续紧张……展望下半年半导体产业发展趋势，多位业内人士表示，AI给半导体带来的成长动力愈发强劲，并持续辐射到更多的细分领域。随着AI发展提速，半导体产业对于新材料、新技术的需求也在持续增强，超高密度高速互联、玻璃基板封装、碳化硅和金刚石散热等技术加速突破，成为半导体板块的另一条投资主线。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3123051","time":1782166886000,"title":"二季度北交所过会企业扫描：业绩真实性与可持续性成问询“标配”","text":"2026年二季度，北交所上市审核保持常态化发行节奏，过会企业数量稳步增长。数据显示，截至6月22日，二季度北交所过会企业达26家，今年以来累计过会企业超过60家。从上市委问询情况来看，经营业绩的真实性与可持续性成为审核问询的核心关注点，收入确认、毛利率变动 2111000,"title":"现货黄金涨约0.9%，亚太早盘一度突破4220美元","text":"周一（6月22日）纽约尾盘，现货黄金涨0.87%，报4192.04美元/盎司，日内整体高位震荡、北京时间09:00涨至4220.72美元刷新日高。\nCOMEX黄金期货跌0.87%，报4209.10美元/盎司，06:00低开至4151.40美元刷新日低，08:00也开启一波显著的回升行情、逼近4240美元但日内整体没能出现转涨。\n现货白银涨0.35%，报65.1285美元/盎司，08:00出现一波显著的拉升行情、09:00刷新日高至67.1472美元。\nCOMEX白银期货涨0.21%，报65.700美元/盎司。\nCOMEX铜期货涨0.94%，报6.4340美元/磅。\n现货铂金涨0.89%，现货钯金涨0.52%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202606233778489539","time":1782162103000,"title":"美光科技盘后延续涨势 现上涨2.4%","text":"美光科技盘后延续涨势，现上涨2.4%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778489539.html","importance":"hot"},{"id":"wscn3123032","time":1782162048000,"title":"美联储主席沃什将于7月14日出席国会作证","text":"根据美国众议院金融服务委员会发布的听证会通知，美联储主席凯文·沃什将于美国东部时间7月14日上午10点（格林尼治标准时间14:00），在国会就FOMC货币政策发表首次证词。\n根据法律规定，美国央行行长每年需在2月和7月两次向国会作证，通常预计沃什将于7月15日出席参议院银行委员会的听证会。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778489780","time":1782161780000,"title":"特斯拉致命车祸引发美国汽车安全监管机构调查","text":"【特斯拉致命车祸引发美国汽车安全监管机构调查】一起涉及特斯拉轿车的致命碰撞事故正接受联邦调查，此前一辆电动汽车在德克萨斯州冲进一栋住宅，导致屋内一名女子身亡。美国国家公路交通安全管理局(NHTSA)周一表示，已对6月19日发生的这起事故展开特别撞车事故调查。该机构在电子邮件声明中确认调查，但未提供更多细节。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778489780.html","importance":"hot"},{"id":"sinacomos:nieitqz9815976","time":1782161769000,"title":"CFTC：资产管理公司美国国债期货净多头增加 对冲基金净空头增加","text":"美国商品期货交易委员会（CFTC）数据显示，截至6月16日当周，资产管理公司总体偏看涨美国国债期货，尤其是在长端显著增加净多头头寸。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitqz9815976.shtml","importance":"hot"},{"id":"sinacomos:nieitre2101366","time":1782161744000,"title":"特斯拉致命车祸引发美国汽车安全监管机构调查","text":" 一起涉及特斯拉轿车的致命碰撞事故正接受联邦调查，此前一辆电动汽车在德克萨斯州冲进一栋住宅，导致屋内一名女子身亡。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-23/doc-inieitre2101366.shtml","importance":"hot"},{"id":"em202606233778488098","time":1782161555000,"title":"纳比勒·法赫米正式被任命为阿盟秘书长","text":"【纳比勒·法赫米正式被任命为阿盟秘书长】在约旦首都安曼举行的阿拉伯国家联盟（阿盟）外长理事会会议正式批准任命埃及前外交部长纳比勒·法赫米为阿盟秘书长，接替任期将于2026年6月30日届满的艾哈迈德·盖特。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778488098.html","importance":""},{"id":"em202606233778487260","time":1782161439000,"title":"伊朗议长：伊美应共同保障黎巴嫩领土完整","text":"【伊朗议长：伊美应共同保障黎巴嫩领土完整】当地时间22日，伊朗谈判代表团团长、伊朗议会议长卡利巴夫表示，在伊美谅解备忘录中，明确强调结束针对伊朗及其盟友的战争。卡利巴夫表示，伊美双方在瑞士谈判中达成结论，伊朗和美国应共同保障黎巴嫩的领土完整。谅解备忘录中已包含对领土完整的保证，应继续推进落实。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778487260.html","importance":"hot"},{"id":"wscn3123030","time":1782161216000,"title":"伊朗议长：伊美应共同保障黎巴嫩领土完整","text":"当地时间22日，伊朗谈判代表团团长、伊朗议会议长卡利巴夫表示，在伊美谅解备忘录中，明确强调结束针对伊朗及其盟友的战争。卡利巴夫表示，伊美双方在瑞士谈判中达成结论，伊朗和美国应共同保障黎巴嫩的领土完整。谅解备忘录中已包含对领土完整的保证，应继续推进落实。为此，双方同意建立协调中心以解决相关问题，从而使黎巴嫩民众能够返回家园，并促使以色列军队从黎巴嫩领土撤出。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606233778486820","time":1782161111000,"title":"美国特朗普签署了行政命令 旨在加速先进量子计算机的研发","text":"【美国特朗普签署了行政命令 旨在加速先进量子计算机的研发】美国特朗普签署了行政命令，旨在加速先进量子计算机的研发。行政命令要求包括能源部在内的联邦机构与私营部门及学术界合作，在2028年前部署一台能够用于科学研究的量子计算机。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778486820.html","importance":""},{"id":"em202606233778486985","time":1782161095000,"title":"CFTC：资产管理公司美国国债期货净多头增加 对冲基金净空头增加","text":"【CFTC：资产管理公司美国国债期货净多头增加 对冲基金净空头增加】美国商品期货交易委员会(CFTC)数据显示，截至6月16日当周，资产管理公司总体偏看涨美国国债期货，尤其是在长端显著增加净多头头寸。另一方面，对冲基金在多个期限的美国国债期货上增加净空头头寸。当周，从10年期国债期货到超长期国债合约，资产管理公司的净多头头寸合计增加2020万美元/DV01，其中大部分净增幅出现在长期国债期货，多头增加约900万美元/DV01对冲基金当周最看空10年期国债期货，净空头头寸增加650万美元/DV01。其长期国债期货净空头头寸增加近400万美元/DV01。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778486985.html","importance":"hot"},{"id":"wscn3123029","time":1782161026000,"title":"特朗普签署两项行政令，推动2028年部署用于科学研究的量子计算机","text":"美国特朗普签署了两项行政命令，旨在加速先进量子计算机的研发，并降低其带来的安全威胁。其中一项行政命令于周一签署，指示包括能源部在内的联邦机构与私营部门及学术界合作，在2028年前部署一台能够用于科学研究的量子计算机。第二项行政命令则要求各政府机构及安全专家为量子系统做准备——这些系统可能比预期更快地突破标准加密体系。其目标是强化政府与私营部门的安全系统，防止先进的量子黑客攻击摧毁关键基础设施。（华尔街日报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3123028","time":1782160893000,"title":"伊朗议长：霍尔木兹海峡将按伊方制定的机制进行管理","text":"伊朗谈判代表团团长、伊朗议会议长卡利巴夫表示，霍尔木兹海峡的管理绝不会回到战前状态。在遵守国际法的前提下，霍尔木兹海峡将按照伊朗制定的机制，由伊朗进行管理。\n卡利巴夫说，在霍尔木兹海峡可能会出现一些问题，因此伊朗和美国同意设立一个协调中心并开通热线，以便在30天期限内，更快速地解决出现的问题。\n卡利巴夫表示，这一通话热线并非用于审批通行许可，相关许可仍有其既定流程。该热线仅用于处理船只出现的问题或突发事件。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202606233778487121","time":1782160850000,"title":"美元指数22日上涨","text":"【美元指数22日上涨】美元指数22日上涨。衡量美元对六种主要货币的美元指数当天上涨0.29%，在汇市尾市收于101.024。截至纽约汇市尾市，1欧元兑换1.1424美元，低于前一交易日的1.1477美元；1英镑兑换1.3244美元，高于前一交易日的1.3234美元。1美元兑换161.42日元，高于前一交易日的161.26日元；1美元兑换0.8091瑞士法郎，高于前一交易日的0.8066瑞士法郎；1美元兑换1.4157加元，低于前一交易日的1.4174加元；1美元兑换9.6212瑞典克朗，高于前一交易日的9.5742瑞典克朗。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606233778487121.html","importance":""},{"id":"wscn3123027","time":1782160748000,"title":"周一（6月22日）纽约尾盘，欧元兑美元跌0.41%，英镑兑美元涨0.10%，美元兑瑞郎涨0.26%。\n商品货币对中，澳元兑美元跌0.20%，纽元兑美元跌0.51","text":"周一（6月22日）纽约尾盘，欧元兑美元跌0.41%，英镑兑美元涨0.10%，美元兑瑞郎涨0.26%。\n商品货币对中，澳元兑美元跌0.20%，纽元兑美元跌0.51%，美元兑加元涨0.07%。\n瑞典克朗兑美元跌0.46%，挪威克朗兑美元大致持平，丹麦克朗兑美元跌0.45%。\n波兰兹罗提兑美元跌0.72%，美元兑匈牙利福林涨0.53%。\n印度卢比兑美元（收）跌0.37%，土耳其里拉兑美元跌0.04%，南非兰特兑美元涨0.24%，墨西哥比索兑美元跌0.20%，巴西雷亚尔兑美元涨0.15%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606233778487058","time":1782160709000,"title":"美联储主席沃什将于7月14日美国东部时间上午（北京时间晚上）10点，在众议院金融服务委员会作证","text":"美联储主席沃什将于7月14日美国东部时间上午（北京时间晚上）10点，在众议院金融服务委员会作证。","source":"东方财富","category":"fast","stock":"","url":"https: <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载新闻数据 ==========
(function loadNewsData() {
  var remoteUrl = 'https://hantu-zh.github.io/vibe-dashboard/news_data.json';
  var localUrl = 'news_data.json';
  
  function tryFetch(url) {
    fetch(url, {cache: 'no-store'})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.items && data.items.length > 0) {
          _rawData = data.items;
          renderAll();
          console.log('[NEWS] Loaded ' + data.items.length + ' items from ' + url);
        } else {
          console.warn('[NEWS] No items from ' + url);
          if (url === remoteUrl) tryFetch(localUrl);
        }
      })
      .catch(function(err) {
        console.warn('[NEWS] Fetch failed from ' + url + ': ' + err);
        if (url === remoteUrl) tryFetch(localUrl);
      });
  }
  
  tryFetch(remoteUrl);
  
  // Auto-refresh news data every 5 minutes
  setInterval(function() {
    console.log('[NEWS] Auto-refreshing data...');
    tryFetch(remoteUrl);
  }, 5 * 60 * 1000);
})();
</script>
