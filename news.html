瞄准未来产业细分赛道。（上海证券报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3128858","time":1783125632000,"title":"特朗普：将接受以公开交易股票形式进行的慈善捐款。\n","text":"特朗普：将接受以公开交易股票形式进行的慈善捐款。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifqmqn3462309","time":1783125623000,"title":"FOF“赛马”","text":"■上证深一度 FOF“赛马” 当数十万亿元到期存款寻找新出路时，一个曾蛰伏于公募版图角落的小众品类——FOF（基金中基金）正迎来一轮爆发式扩容。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/money/fund/jjdt/2026-07-04/doc-inifqmqn3462309.shtml","importance":""},{"id":"em202607043794142615","time":1783125593000,"title":"新华制药抗肺动脉高压1类创新药LXH-1211片I期临床试验启动","text":"【新华制药抗肺动脉高压1类创新药LXH-1211片I期临床试验启动】7月3日，新华制药抗肺动脉高压1类创新药LXH-1211片I期临床试验正式启动。LXH-1211为新华制药与中南大学联合研发的1类创新药，是针对肺动脉高压的临床表现和疾病病理本质（血管重构导致的纤维化）而设计的全新结构化合物。临床前研究显示，LXH-1211具有双重作用机制，既能通过刺激可溶性鸟苷酸环化酶（sGC）产生血管舒张效应，降低肺动脉高压，也能通过抑制AMP-激活蛋白激酶（AMPK）阻止血管重构和纤维化进程。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607043794142615.html","importance":""},{"id":"wscn3128857","time":1783125569000,"title":"蓄力稳增长，三季度专项债发行或加码","text":"企业预警通数据显示，截至7月3日，今年已经发行新增专项债20692亿元，完成全年进度的47%；其中，6月发行5716亿元，为今年以来月度发行高峰。专家认为，当前专项债发行提速态势已明确，后续发行与使用节奏有望加快。综合立体交通、能源水利等领域有望成为专项债资金支持重点，为全年经济稳增长蓄力。（中国证券报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202607033793887918","time":1783125542000,"title":"片方慌了？网友称0元看杨紫琼、刘昊然主演的电影 《抓特务》设10元老年专场 从业者：票房不好不只是票价问题","text":"【片方慌了？网友称0元看杨紫琼、刘昊然主演的电影 《抓特务》设10元老年专场 从业者：票房不好不只是票价问题】“0元看电影”“2.9元一张票”，最近，不少网友晒出自己抢到的电影票截图，影片是杨紫琼、刘昊然主演的《魔方小姐》。有人在社交平台分享，凭影城会员卡2.9元就能进场，没有会员卡也只要5.9元，甚至还有人表示0元、1.9元就买到了电影票，引发一波围观和讨论。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033793887918.html","importance":""},{"id":"wscn3128856","time":1783125477000,"title":"泽连斯基呼吁在乌克兰生产“爱国者”导弹","text":"据德国方面当地时间6月2日消息，乌克兰总统泽连斯基表示可在乌克兰境内进行欧洲本土生产或与合作伙伴共同生产“爱国者”导弹，并承诺在此情况下也可为美国的行动提供支持。据悉，乌克兰军方日益难以抵御大规模空袭，其防空力量主要依赖美制“爱国者”防空系统，但目前该系统面临拦截导弹短缺的问题。俄乌冲突爆发后，美国等西方国家向乌克兰提供了多套“爱国者”防空系统，但乌克兰一直希望获得更多“爱国者”防空系统及拦截导弹。（央视新闻）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"em202607033793878825","time":1783125425000,"title":"楼市半年盘点｜深圳有豪宅超18万元/平方米开盘仍“日光” 机构：上半年一二手住宅成交环比涨超10%","text":"【楼市半年盘点｜深圳有豪宅超18万元/平方米开盘仍“日光” 机构：上半年一二手住宅成交环比涨超10%】7月2日，记者从深圳市住建局处获悉，2026年6月深圳新建商品住宅、二手住宅合计网签8878套，同比增长14.2%。另据乐有家研究中心数据，2026年上半年深圳一二手住宅合计网签47378套，环比上涨10%。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033793878825.html","importance":""},{"id":"sinacomos:nifqmqq0285595","time":1783125409000,"title":"两部门发文  促进电影院多样化经营","text":"两部门发文 促进电影院多样化经营 ◎新华社北京7月3日电 记者3日从国家电影局获悉，国家电影局、市场监管总局日前联合印发《关于促进电影院多样化经营...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-07-04/doc-inifqmqq0285595.shtml","importance":""},{"id":"wscn3128855","time":1783125386000,"title":"SemiAnalysis：在英伟达系统中的内存支出占比到2026年底将超过30%，并在2027年超过40%","text":"专注于半导体与AI基础设施的顶级研究机构SemiAnalysis发文称，内存占Hyperscaler（超大规模数据中心）资本支出的比例引发了大量讨论，尤其是在上周美光科技财报发布后。一些市场参与者对明年这一比例可能有多高感到震惊。\n我们在二月底发布了我们的初步观点，许多客户对我们30%的数字提出质疑：“内存占服务器BOM的比例只有十几个百分点。整体资本支出怎么可能那么高？”\n五月份，在价格上涨速度甚至超出预期之后，我们直接回应：将DRAM、NAND 和HBM结合起来，在英伟达系统中的内存支出占比到2026年底将超过30%，并在2027年超过40%。\n我们预计，未来几个月市场将更充分地理解这一趋势。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifqwek0141017","time":1783125311000,"title":"阿根廷宣布撤销内政部","text":"来源：新华社新华社布宜诺斯艾利斯7月3日电（记者张铎 王钟毅）阿根廷政府2日宣布撤销内政部，将其职能转移至内阁首席部长办公室。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-07-04/doc-inifqwek0141017.shtml","importance":""},{"id":"em202607043794141268","time":1783125300000,"title":"特朗普再谈马斯克：他还是喜欢我","text":"【特朗普再谈马斯克：他还是喜欢我】7月2日，就美国企业家马斯克成为万亿富翁一事，美国总统特朗普在接受采访时表示，他最近没有与马斯克联系过，“不过我给他写了张便条，我说，恭喜你，很棒”。特朗普补充道，“我和埃隆的关系非常好，尽管我们之间曾有点小分歧，不过他百分百支持我。他喜欢我，现在依然喜欢我”。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607043794141268.html","importance":""},{"id":"sinacomos:nifqwee2284371","time":1783125291000,"title":"资本押注可控核聚变赛道 产业链上下游或将提前受益","text":"◎记者 刘一枫 6月底，可控核聚变领域迎三重“利好”：政策层面，国家发展改革委、国家能源局印发《新型能源体系建设“十五五”规划》...","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/roll/2026-07-04/doc-inifqwee2284371.shtml","importance":"important"},{"id":"em202607043794142121","time":1783125214000,"title":"同飞股份与良信股份达成战略合作共识","text":"【同飞股份与良信股份达成战略合作共识】据同飞股份消息，7月2日，良信股份董事长任思龙一行到访同飞股份参观交流。同飞股份总经理张浩雷及管理团队热情接待，双方围绕低压电气、零碳工厂与数字能源体系建设展开深入交流，并正式达成战略合作共识。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607043794142121.html","importance":""},{"id":"em202607033793870393","time":1783125157000,"title":"部分新能源车明年起缴纳车船税 增程车也在其中 纯电乘用车仍不征收！车企：更多是心理和政策导向上的压力","text":"【部分新能源车明年起缴纳车船税 增程车也在其中 纯电乘用车仍不征收！车企：更多是心理和政策导向上的压力】7月3日，财政部、税务总局、工业和信息化部联合发布公告，调整节能汽车、新能源汽车车船税优惠政策。“因为车船税绝对金额不大，相对于车价来说基本可以忽略不计，此次政策变动对有增程汽车的主机厂而言影响程度温和。它更多是心理和政策导向上的压力，促使行业理性看待政策退坡。”一位自主车企的工作人员告诉记者。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033793870393.html","importance":"important"},{"id":"em202607033793901125","time":1783124952000,"title":"操控7组账户趋同交易、隐匿炒股未申报 基金经理被没收违法所得并罚款","text":"【操控7组账户趋同交易、隐匿炒股未申报 基金经理被没收违法所得并罚款】记者获悉，近日深圳证监局公布了一则行政处罚决定书，对前公募基金经理张堃两项证券违法违规行为作出合并处罚决定。根据该行政处罚决定书，张堃担任基金经理期间，控制、使用七名第三方自然人证券账户，利用管理公募产品的未公开信息开展趋同交易，同时涉嫌证券投资未申报。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202607033793901125.html","importance":""},{"id":"sinacomos:nifqwea5505318","time":1783124934000,"title":"明日起 国内航线燃油附加费下调","text":" 记者从国航、东航、南航等多家航司了解到，自2026年7月5日（含）起销售的国内航线客票，燃油附加费将下调。调整后的收费标准为：","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/jjxw/2026-07-04/doc-inifqwea5505318.shtml","importance":"hot"},{"id":"em202607 obal","importance":"hot"},{"id":"wscn3128844","time":1783114188000,"title":"受AI热潮与美联储乐观预期提振，新兴市场资产全线反弹","text":"随着韩国科技蓝筹股反弹，新兴市场股市创下自6月中旬以来的最大单日涨幅；同时，受美国劳动力市场数据弱于预期的影响，新兴市场货币连续第二日走强。\n周五，MSCI新兴市场股票指数上涨2.2%，创6月15日以来最大单日涨幅。韩国芯片制造商SK海力士和三星电子的强劲表现，抵消了台积电股价下跌带来的拖累。韩国综合股价指数（Kospi）大涨5.8%，部分收复了此前两个交易日近10%的跌幅。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3128843","time":1783113707000,"title":"智利中部近海发生5.5级地震","text":"根据德国地学研究中心报告，当地时间7月3日16时43分，智利中部近海海域发生5.5级地震，震源深度10公里。目前暂无人员伤亡及财产损失报告。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128841","time":1783113320000,"title":"富时A50期指连续夜盘收跌0.03%，报14882点。\n","text":"富时A50期指连续夜盘收跌0.03%，报14882点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128840","time":1783112650000,"title":"周五（7月3日）纽约尾盘（周六北京时间04:59），离岸人民币（CNH）兑美元报6.7853元，较周四纽约尾盘涨35点，日内整体交投于6.7901-6.7811","text":"周五（7月3日）纽约尾盘（周六北京时间04:59），离岸人民币（CNH）兑美元报6.7853元，较周四纽约尾盘涨35点，日内整体交投于6.7901-6.7811元区间。\n本周，离岸人民币累计上涨大约190点，涨幅0.29%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128839","time":1783112382000,"title":"英国唐宁街10号发布有关霍尔木兹海峡的联合声明：英国、阿曼、法国致力于确保阿曼水域航行安全。\n英国、法国准备部署范围更广的多国军事任务。\n","text":"英国唐宁街10号发布有关霍尔木兹海峡的联合声明：英国、阿曼、法国致力于确保阿曼水域航行安全。\n英国、法国准备部署范围更广的多国军事任务。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifqrwh2268092","time":1783112153000,"title":"美国最大电网PJM升级紧急措施以避免停电","text":" 美国最大电网运营商PJM周五表示，由于发电机故障、输电线路严重超载，以及持续闷热天气导致空调用电量激增，该电网已处于联邦警报状态下，要求在其服务区域内削减用电。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/world/2026-07-04/doc-inifqrwh2268092.shtml","importance":""},{"id":"wscn3128838","time":1783112145000,"title":"加拿大标普/TSX综合指数收涨0.88%，报35274.84点，投资者看好总理卡尼披露的西 com/live/global","importance":"hot"},{"id":"wscn3128834","time":1783110173000,"title":"欧洲央行行长拉加德：人工智能（AI）是生产力和收益的来源。\n但该技术也构成了“重大风险”。\n大约十年来，我们一直在讨论网络安全风险、黑客攻击、数据盗窃等问题。\n","text":"欧洲央行行长拉加德：人工智能（AI）是生产力和收益的来源。\n但该技术也构成了“重大风险”。\n大约十年来，我们一直在讨论网络安全风险、黑客攻击、数据盗窃等问题。\n但随着AI模型的加速和深化，我们面临的风险要严重得多，因为这一切发生得非常快，而且相应的防御手段以及所需资金仍然没有准备充分。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3128833","time":1783109768000,"title":"美联储：美国上周银行存款19.374万亿美元，之前一周19.304万亿美元。\n","text":"美联储：美国上周银行存款19.374万亿美元，之前一周19.304万亿美元。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128832","time":1783109692000,"title":"欧洲顶级银行家和监管机构警告：AI发展速度已超越现行规则","text":"根据欧洲政策制定者的说法，金融监管正难以跟上人工智能（AI）的快速发展，他们正努力在支持技术应用的同时，将市场诚信与稳定所面临的风险控制在范围内。\n英国金融行为监管局（FCA）首席执行官Nikhil Rathi表示，在技术快速变革的时代，尤其是随着自主AI（agentic AI）发展的加速，传统的规则制定周期已经“行不通了”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3128831","time":1783109222000,"title":"美联储加息预期降温致美元走弱，拉美资产迎来反弹","text":"周五，大多数拉美货币延续涨势，股市表现涨跌互现。此前一天，美国公布的就业数据弱于预期，削弱了市场对美联储近期加息的押注，并在周末前提振了市场风险偏好。\nMSCI拉美股票指数上涨0.6%，区域货币指数微涨0.3%。两者均有望在第三季度的第一周实现小幅上涨。该货币指数此前已录得连续第六个季度上涨，创下自2009年以来的最长连涨纪录。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3128829","time":1783109039000,"title":"周五美元小幅走低，有望创下12周以来的最大单周跌幅。\n瑞士宝盛银行（Swissquote Bank）高级分析师Ipek Ozkardeskaya）表示：“最终将","text":"周五美元小幅走低，有望创下12周以来的最大单周跌幅。\n瑞士宝盛银行（Swissquote Bank）高级分析师Ipek Ozkardeskaya）表示：“最终将由通胀数据来决定这一转变是否会持续……我们可能会看到美元巩固近期的涨幅，未来几天黄金和主要货币的上涨空间有限。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128828","time":1783107876000,"title":"秘鲁全国选举委员会宣布藤森庆子当选总统","text":"秘鲁全国选举委员会3日正式宣布秘鲁2026年总统选举第二轮投票结果，右翼政党人民力量党候选人藤森庆子当选总统，任期到2031年。按计划，藤森庆子将于7月28日宣誓就职。\n秘鲁全国选举委员会主席罗伯托·布尔内奥在当天举行的发布会上宣布，藤森庆子及其竞选搭档在6月7日举行的秘鲁总统选举第二轮投票中胜出。路易斯·加拉雷塔将担任第一副总统，米格尔·托雷斯将担任第二副总统。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128827","time":1783107839000,"title":"格陵兰岛当局：美国仍在施压，但该岛“绝不出售”","text":"格陵兰岛自治政府总理延斯-弗雷德里克·尼尔森3日在法国出席一场公开活动时表示，美国为取得格陵兰岛仍在持续施压，但格陵兰岛“绝不出售”。一年多以来，美国没有放弃取得格陵兰岛的意图，向格陵兰岛施加“严重”“不可接受”的压力，“到今天也没有看到尽头”。他表示，“格陵兰岛不会放弃自决权，我们不会放弃自身价值观，格陵兰岛绝不出售”。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3128826","time":1783107073000,"title":"特朗普前AI顾问：美国不会设立类FDA的AI监管机构","text":"离任的总统人工智能（AI）顾问表示，特朗普政府不会出台一套正式的人工智能许可监管制度；尽管白宫正动用紧急行政权力暂缓多款顶尖大模型的发布。\n上月卸任政府职务的Sriram Krishnan表示：“美国不会设立类似美国食品药品监督管理局（FDA）的人工智能专职监管机构。”“本届政府、总统自上任之初就坚决反对繁琐严苛、官僚化的繁文缛节。我们不会充当行业裁判，人为挑选行业赢家与落败者。”如果设立中心化监管机构，要求企业必须组建法务团队才能对外发布AI模型，只会阻碍人工智能行业的革新进程。“在特朗普总统的任期内，这类监管模式绝对不会落地。”\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128825","time":1783106450000,"title":"洲际交易所（ICE）：6月30日当周，投机者所持ICE布伦特原油净多头头寸减少34,704手合约，至55,634手合约，创逾六个月新低。\n所持罗布斯塔咖啡豆净多","text":"洲际交易所（ICE）：6月30日当周，投机者所持ICE布伦特原油净多头头寸减少34,704手合约，至55,634手合约，创逾六个月新低。\n所持罗布斯塔咖啡豆净多头头寸增至38,588手合约，创逾两年新高。\n所持白糖净多头头寸增至47,763手合约，创逾五个月新高。\n所持伦敦可可净空头头寸减少至7,756手合约，创九个月新低。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128824","time":1783106320000,"title":"法国总统：“戴高乐”号航母将返回母港","text":"法国总统马克龙当地时间7月3日宣布，鉴于地区局势出现积极进展以及相关需求发生变化，法国决定调整其在中东地区的军事部署。\n马克龙表示，法国已在中东部署扫雷力量，包括两艘猎雷舰，并由两艘护卫舰和一架海上巡逻机提供支援。这些力量已做好准备，将与伙伴国家共同推动霍尔木兹海峡全面恢复通航，并保障海上交通安全。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3128822","time":1783105284000,"title":"美国电网运营巨头PJM Interconnection LLC在紧急程序网站上发布消息，宣布启动EEA2（二级能源紧急警报）行动，原因是已无法满足预期的能源需求","text":"美国电网运营巨头PJM Interconnection LLC在紧急程序网站上发布消息，宣布启动EEA2（二级能源紧急警报）行动，原因是已无法满足预期的能源需求。\n该公司表示，正在实施一项运营计划，要求公用事业公司在其服务区域内削减电力需求。该区域覆盖中大西洋地区、南部地区以及华盛顿特区，服务人口达6700万。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"sinacomos:nifqmqn3446450","time":1783104035000,"title":"伊朗总统佩泽希齐扬与俄罗斯就扩大合作进行了会谈","text":" 半官方的伊朗学生通讯社（ISNA）报道，俄罗斯安全会议副主席德米特里·梅德韦杰夫在哈梅内伊葬礼结束后与伊朗总统马苏德·佩泽希齐扬举行会晤。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-07-04/doc-inifqmqn3446450.shtml","importance":""},{"id":"163682576353","time":1783103592000,"title":"开市客全球CEO访华，破局本土化","text":"开市客全球CEO访华，破局本土化","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V8F17C0519DSFT.html","importance":""},{"id":"1639327476287","time":1783100476000,"title":"烧钱换跌势！AI军备竞赛反噬股价，互联网巨头估值逻辑迎来重构","text":"烧钱换跌势！AI军备竞赛反噬股价，互联网巨头估值逻辑迎来重构","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V5G3090519JFL1.html","importance":""},{"id":"1632200694545","time":1783100393000,"title":"今夜，利好来了！暴增超622倍，A股大牛股公告！","text":"今夜，利好来了！暴增超622倍，A股大牛股公告！","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V5DJQI0519JFL1.html","importance":"important"},{"id":"1639236241293","time":1783100183000,"title":"中国巨石一年涨超5倍，张毓强父子坐拥750亿身家","text":"中国巨石一年涨超5倍，张毓强父子坐拥750亿身家","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V575H10519MPBR.html","importance":""},{"id":"1631811438459","time":1783099819000,"title":"月薪3500的“接班公主”：这届厂二代不拼爹，拼谁家库存更惨？","text":"月薪3500的“接班公主”：这届厂二代不拼爹，拼谁家库存更惨？","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V4RV750519E3QB.html","importance":""},{"id":"1637224809876","time":1783099763000,"title":"西安赛格商户坠楼事件：压垮实体店老板的最后一根稻草","text":"西安赛格商户坠楼事件：压垮实体店老板的最后一根稻草","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L0V4Q8840519E3QB.html","importance":""},{"id":"163380294716","time":1783099209000,"title function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();

// ========== 动态加载已禁用 ==========
// 数据已嵌入 HTML，通过 <meta http-equiv="refresh" content="600"> 每10分钟自动刷新
console.log('[NEWS] Using embedded data, auto-refresh via meta tag');
</script>
