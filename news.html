"source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L27VVH1R0519E3QB.html","importance":""},{"id":"wscn3136307","time":1784470420000,"title":"《人工智能发展与安全倡议书》发布：为构建安全、可信、可控的人工智能共同奋斗","text":"7月19日上午，在WAIC 2026世界人工智能大会的“人工智能引领产业变革”思客会上，《人工智能发展与安全倡议书》发布，该倡议旨在呼吁各方凝聚共识、协同行动，为构建安全、可信、可控的人工智能共同奋斗。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"xq4778561","time":1784470405000,"title":"【中信证券：指数行情处于一轮中期行情的休整到新一轮行情的酝酿阶段】中信证券研报指出，当前有如下四个判断：第一，指数行情处于一轮中期行情的休整（以科技板块补跌为特...","text":"【中信证券：指数行情处于一轮中期行情的休整到新一轮行情的酝酿阶段】中信证券研报指出，当前有如下四个判断：第一，指数行情处于一轮中期行情的休整（以科技板块补跌为特征）到新一轮行情的酝酿阶段（需要新的有估值提升空间的板块启动），短期出清已接近尾声。第二，北美AI链短期可能是科技内部的避风港，7月底北美CSP的指引前后可能迎来一波修复，但重新上一个台阶需要新一次的AI模型/产品能力跃升和商业变现空间拓展，关键是打破硬件公司周期股估值框架，实现硬件和应用的新一轮系统级抬升。第三，国产AI链高度依赖催化和趋势资金强度，目前主要催化已陆续兑现，而趋势资金强度在经历剧烈回撤后很难迅速回归，国内目前仍相对健康的融资盘意味着目前不存在筹码出清式的布局点，国产切北美的估值收敛是比较可能的走向。第四，非AI链以轮流修复为特征，从创新药和非银开始，过渡到有色、化工和锂电的工业链条，期间伴随着内需链的政策预期交易。配置上聚焦三个维度的收敛：Al链上游硬件和涨价品种相对下游云服务大厂超额收益的收敛；非AI工业股相对海外对标的公司的折价修复；科技与非科技的收敛。","source":"雪球","category":"fast","stock":"","url":"http://xueqiu.com/5124430882/401029877","importance":"important"},{"id":"wscn3136306","time":1784470356000,"title":"美国能源部长称对伊朗军事行动将持续进行","text":"7月19日获悉，美国能源部长赖特表示，在总统特朗普实现其军事行动目标之前，美国针对伊朗的军事行动将继续进行。\n赖特在采访中表示，特朗普政府的目标是阻止伊朗获得核武器，并削弱其威胁邻国及全球商业活动的能力。“因此，这项任务将持续下去，直到完成使命。”（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"cls2430593","time":1784470302000,"title":"科技调整到位了吗？7月底将迎来关键验证窗口","text":"①本周科技股大幅调整，多家券商研报指出，下跌系内生交易拥挤与外围流动性冲击共振，而非产业趋势证伪；\n②本轮调整幅度已接近甚至超过历史阈值，7月底将迎来关键验证窗口。","source":"财联社","category":"fast","stock":"","url":"https://www.cls.cn/detail/2430593","importance":""},{"id":"sinacomos:niikara8246287","time":1784470243000,"title":"乐道L90达成第6万台交付，极限探险家韩啸成为成为车主","text":"新浪科技讯 7月19日晚间消息，乐道L90正式完成第60000台交付。于湖州蔚来体验中心，知名极限探险家韩啸成为乐道L90第60000台用户，同时...","source":"新浪财经","category":"fast","stock":"","url":"https://financ ":1784464936000,"title":"特斯拉在德国工厂提升产量，来应对需求增长","text":"随着特斯拉确认了今年德国市场需求将更为强劲的预期，公司正计划扩大新市场，并同步提升其位于德国格伦海德（Gruenheide）工厂的产量。\n“对于2026财年，公司预测其产量将较上一年度实现大幅增长，并预计产能利用率也会相应提高，”特斯拉勃兰登堡制造公司在其2025年年度报告中表示。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3136284","time":1784464659000,"title":"波音公司：预计737-7飞机将在“近期”获得认证。\n公司接近完成737-10飞机的测试工作。\n将在2027年向客户们交付777X飞机。\n","text":"波音公司：预计737-7飞机将在“近期”获得认证。\n公司接近完成737-10飞机的测试工作。\n将在2027年向客户们交付777X飞机。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3136283","time":1784464571000,"title":"伊朗外长：部分核争端可能“无法解决”","text":"伊朗外交部长阿巴斯·阿拉格齐（Abbas Araghchi）在周日发布于其官方Telegram频道的一段采访中表示：“在核领域存在一些无法解决的问题，也许即使在当前局势下，这些问题依然无法解决。”\n在被问及伊朗在与美国谈判中的红线（包括暂停核浓缩活动的提议）时，阿拉格齐发表了上述言论。\n他表示，在最近一轮谈判中，伊朗“并未搁置浓缩铀问题”。\n他补充说，伊朗此前已“提前制定好计划”，如果最高领袖成为打击目标，伊朗将封锁霍尔木兹海峡。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3136260","time":1784464312000,"title":"中东股市收盘播报｜卡塔尔股市收盘跌穿1万点整数位心理关口，为去年4月份以来首次","text":"周日（7月18日），卡塔尔证交所指数收跌1.47%，报9954.84点，跌穿3月29日收盘位10060.68点、逼近2025年4月9日收盘位9904.25点、当年4月7日收盘位9766.05点（美国总统特朗普第二任期内宣布全球关税政策以来的最低收盘位）。\n阿曼MSM 30指数收跌1.30%，连续第五个交易日下跌（期间累计下跌3.51%），报7383.29点。\n科威特证交所超级市场价格回报指数收跌0.42%，报9035.64点。\n沙特证交所全股指数收跌0.03%，报10716.82点，低开之后逐步收复失地并一度转涨，4月15日涨至11592.30点以来持续回撤，最近数日持稳于3月4日收盘位10692.69点附近。\n沙特阿美收涨0.60%，报26.84沙特里亚尔。\n在沙特上市的Albilad南方东英MSCI香港中国股票ETF收跌2.74%，报10.66沙特里亚尔，脱离5月20以来最高收盘位10.96里亚尔。\n埃及证交所EGX 30指数收跌0.70%，报52560.10点。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"em202607193811768961","time":1784464168000,"title":"以军称监测到伊朗向约旦亚喀巴方向发射导弹","text":"【以军称监测到伊朗向约旦亚喀巴方向发射导弹】当地时间19日下午，以色列国防军发表声明称，以军监测到伊朗向约旦南部城市亚喀巴方向发射导弹。由于亚喀巴毗邻以色列边境，以军称，此次导弹发射可能波及以色列南部地区。以军表示，以色列南部部分地区可能会拉响防空警报。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/2 <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
