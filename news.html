财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781839135.html","importance":""},{"id":"em202606253781886398","time":1782343409000,"title":"大众集团将埃维能多数股权售予贝恩资本","text":"【大众集团将埃维能多数股权售予贝恩资本】6月25日，大众集团宣布已与贝恩资本签订独家协议，出售其持有的埃维能（Everllence）多数股权——将转让51%的股份。根据与贝恩资本签订的独家协议，大众集团将出售其持有的埃维能51%的股份，并计划在中期内继续作为持股49%的主要股东。此项拟议的杠杆收购交易将为大众集团带来约74亿欧元的收益。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781886398.html","importance":""},{"id":"em202606253781838972","time":1782343409000,"title":"科技股热潮下私募业绩分化 宁泉、半夏回应净值回撤","text":"【科技股热潮下私募业绩分化 宁泉、半夏回应净值回撤】今年以来，A股、港股市场呈现极致分化，以人工智能（AI）、半导体等为代表的科技股走势强劲，消费、地产等传统板块则表现低迷。极致行情下，私募业绩大幅分化，宁泉资产、半夏投资等知名私募近日就业绩承压向投资人致歉。从行业整体情况看，坚守消费、地产等低估值价值的私募大面积跑输，不少老牌主观私募陷入深度回撤。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781838972.html","importance":"hot"},{"id":"em202606253781838895","time":1782343291000,"title":"全球创新药接连失利 临床研发如何跨越“死亡之谷”？","text":"【全球创新药接连失利 临床研发如何跨越“死亡之谷”？】6月22日，辉瑞宣布，其潜在FIC（同类首创）ADC（抗体药物偶联物）药物Sigvotatugvedotin的III期SigVie-002研究未达到主要终点，遭遇研发失利。这也导致其6月23日股价下跌1.44%。不只是辉瑞，近期多款被外界寄予厚望的重磅创新药频频传出III期临床研发失利的消息。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781838895.html","importance":""},{"id":"sinacomos:nieqnaz7826327","time":1782343232000,"title":"贝恩资本或将收购大众旗下船用发动机子公司Everllence","text":" 据知情人士透露，贝恩资本即将收购大众汽车旗下船用发动机部门Everllence的多数股权，击败了包括一家与大众汽车主要股东联手竞购的私募股权公司在内的其他竞购者。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-25/doc-inieqnaz7826327.shtml","importance":""},{"id":"em202606253781837646","time":1782343167000,"title":"四川国资整合产业版图 两大万亿平台“分工换挡”","text":"【四川国资整合产业版图 两大万亿平台“分工换挡”】近两年来，四川国资体系密集推进系列资产置换与专业化整合，一场覆盖交通基建、轨道交通、清洁能源、装备制造的系统性资产重组全面推进。日前，新筑股份重大资产重组方案获深交所受理，四川路桥完成桥梁部件资产收购相关表决，蜀道投资集团有限责任公司与四川发展（控股）有限责任公司两大省级万亿级国资平台业务边界进一步厘清。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781 ","url":"https://finance.eastmoney.com/a/202606253781884410.html","importance":""},{"id":"sinacomos:nieqnay1045364","time":1782342861000,"title":"美国国家运输安全委员会对特斯拉致命车祸展开调查","text":" 美国国家运输安全委员会（NTSB）周三表示，将对上周发生在德克萨斯州凯蒂市的一辆特斯拉Model 3高速撞入民宅的事故展开调查，该事故导致一名76岁的居民不幸身亡。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-25/doc-inieqnay1045364.shtml","importance":"important"},{"id":"em202606253781841365","time":1782342806000,"title":"航运和造船高景气下半年或延续","text":"【航运和造船高景气下半年或延续】受地缘政治冲突影响，霍尔木兹海峡前期通航遇阻，全球能源海运供应链遭受重创。据新华社报道，伊朗常驻联合国日内瓦办事处代表阿里·巴赫雷尼6月23日表示，霍尔木兹海峡已对商船完全开放，为期60天，其间不会收取任何费用。但业内预判，下半年霍尔木兹海峡通航风险未完全消除，航运市场将维持高位震荡，造船高景气周期也将持续拉长。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781841365.html","importance":""},{"id":"em202606253781883425","time":1782342751000,"title":"德琪医药：拟按最高总代价5000万港元购回股份","text":"【德琪医药：拟按最高总代价5000万港元购回股份】6月25日早间，德琪医药在港交所公告，于2026年6月24日，董事会已决议动用股份购回授权，并根据市况不时于公开市场按最高总代价5000万港元购回股份。董事会可根据购回当时的市况及集团的资本管理需要，后续将购回的股份注销或由公司持作库存股份。公司将以其内部资源为建议股份购回提供资金。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606253781883425.html","importance":""},{"id":"em202606253781882933","time":1782342724000,"title":"谷歌再传两名关键AI员工将离职","text":"【谷歌再传两名关键AI员工将离职】谷歌母公司Alphabet股价周三盘中跳水，知情人士称，谷歌的两名顶尖人工智能（AI）研究人员Jonas Adler和Alexander Pritzel正计划离职，转投竞争对手Anthropic。这一消息进一步加剧了外界对这家搜索巨头在AI领域领先地位可能被削弱的担忧。就在上周，Google Gemini联合负责人Noam Shazeer宣布离开Google，加入已向SEC秘密提交IPO申请的OpenAI。2024年诺贝尔化学奖得主、AlphaFold核心领导者John Jumper随后也宣布将离开Google DeepMind加入Anthropic。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606253781882933.html","importance":"important"},{"id":"wscn3124287","time":1782342698000,"title":"延期合约保证金比例升至140%，多家银行收紧个人贵金属业务","text":"6月24日，工商银行宣布将于近期停办代理上海黄金交易所个人贵金属竞价交易业务。6月以来，多家银行收紧个人贵金属相关业务，华夏银行、广发银行、中国银行等近10家全国性银行先后发布公告，调整个人贵金属延期合约保证金比例，部分银行将保证金比例上调至140%。业内人士认为，上述保证金比例突破100%意味着个人贵金属延期合约的杠杆水平已实质性归零，投机性资金将逐步退出市场。（中证报）\n","source": ney.com/a/202606253781882312.html","importance":"important"},{"id":"wscn3124286","time":1782342386000,"title":"据美国USGS：委内瑞拉Moron西南方向16公里发生7.5级地震。\n","text":"据美国USGS：委内瑞拉Moron西南方向16公里发生7.5级地震。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124285","time":1782342324000,"title":"三星电子首尔盘前在NexTrade涨7.8%，SK海力士涨6.7%。\n","text":"三星电子首尔盘前在NexTrade涨7.8%，SK海力士涨6.7%。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606253781878818","time":1782342300000,"title":"微信生态AI持续上新","text":"【微信生态AI持续上新】6月23日，腾讯公关总监张军在社交平台透露，企业微信即将推出名为“大圆”的AIAgent（智能体），目前已进入内测阶段。这是本月第四次传来微信生态AI产品的消息。","source":"东方财富","category":"ann","stock":"","url":"https://finance.eastmoney.com/a/202606253781878818.html","importance":""},{"id":"wscn3124283","time":1782342109000,"title":"公募自购频频命中“绩优基”","text":"在今年科技投资的浪潮中，作为专业投资者，公募机构积极投身其中。凭借对AI主线的重仓把握，一些基金公司自购的部分基金产品获得了丰厚的回报。比如，财通基金今年1月自购的财通成长优选A如果持有至今，回报率或突破140%；另外，融通基金2月成立的发起式新产品融通科技臻选A目前回报率已翻倍，基金公司原始投入的1000万元已实现回本。（中证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124282","time":1782342106000,"title":"黄仁勋股东大会放言：本轮AI基建周期长达数十年","text":"在英伟达2026年度股东大会上，该公司股东批准了全部10名董事会成员提名。\n英伟达CEO黄仁勋在发言时说，“有用的AI时代”已经到来，并释放了对AI基础设施建设将继续的信心。就AI基础设施建设的可持续性，黄仁勋则表示，算力越多，token越多，收入也就越多。这轮建设将以数十年为单位来衡量，涉及电网、互联网等关键基础设施建设。相信这将成为人类历史上规模最大的基础设施建设。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"1634891596566","time":1782342105000,"title":"黄仁勋英伟达股东大会释放重磅信号：AI工厂时代来临，智能体重塑计算格局","text":"黄仁勋英伟达股东大会释放重磅信号：AI工厂时代来临，智能体重塑计算格局","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08I8QIU05198NMR.html","importance":""},{"id":"1639303079815","time":1782341862000,"title":"美光公布“王炸”财报 盘后大涨13%","text":"美光公布“王炸”财报 盘后大涨13%","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08I1DOC05198CJN.html","importance":"hot"},{"id":"sinacomos:nieqnch2549984","time":1782341773000,"title":"日本北部发生6.9级地震 东京有震感","text":"根据日本气象厅，日本岩手县附近发生6.9级地震。 据NHK报道，没有海啸威胁，震源深度50公里。","source":"新浪财经","category":"fast","stock":"","url":"https://finance.sina.com.cn/stock/usstock/c/2026-06-25/doc-inieqnch2549984.shtml","importance":""},{"id":"wscn3124281","time":1782341760000,"title":"迄今最大规模：美国得州一农场确诊4例螺旋蝇病例","text":"6月早些时候，美国境内发现新世界螺旋蝇（New World screwworm）以来，得克萨斯州一处房产上确诊了4例感染病例，这是迄今为止报告的最大规模感染聚集。\n据美国农业部（USDA）称，在与墨西哥接壤的特雷尔县（Terrell County），3头牛和1只山羊被查出感染了螺旋蝇。得州动物健康委员会在周三的一封电子邮件中表示，这些动物均来自同一场所。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"1639388462018","time":1782341653000,"title":"黄仁勋股东大会放言：本轮AI基建周期长达数十年","text":"黄仁勋股东大会放言：本轮AI基建周期长达数十年","source":"网易财经","category":"fast","stock":"","url":"https://www.163.com/dy/article/L08HR1RU0519DDQ2.html","importance":"hot"},{"id":"wscn3124280","time":1782341534000,"title":"海啸预警中心：海浪可能会冲击到委内瑞拉沿海。\n","text":"海啸预警中心：海浪可能会冲击到委内瑞拉沿海。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"wscn3124279","time":1782341357000,"title":"阿里巴巴证实：已起诉美国防部","text":"多家外媒23日报道称，阿里巴巴起诉美国国防部，要求将其从“中国军事企业名单”中移除。\n24日，阿里巴巴向记者证实了上述消息。阿里巴巴在声明中表示：“我们已正式对美国国防部提起诉讼，要求将公司从‘中国军事企业名单’中移除。”阿里巴巴强调，公司并非中国军工企业，亦未参与任何“军民融合”战略。将阿里巴巴列入名单的决定毫无事实依据，武断且反复无常。（环球时报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"hot"},{"id":"wscn3124278","time":1782341192000,"title":"中证报：创新引领结构优化，稳投资政策料持续发力","text":"“六张网”等基础设施建设加快布局、高技术产业投资增势较好……今年以来，投资结构持续优化，发挥了强基础、促转型的重要作用。为进一步推动投资增速回升，专家建议加快政府债券发行使用、增强民间资本参与意愿。展望下半年，在政策、资金的有力支持下，后续基建投资有加速空间，新质生产力相关投资有望维持高增。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124277","time":1782340943000,"title":"据日本媒体25日报道，日本岩手县附近海域当天发生6.9级地震。\n","text 到一些变化：部分7年期、10年期乃至更长期限的固定资产贷款到期后，企业主动选择不再续贷；与此同时，越来越多优质客户将融资主渠道从银行转向债券市场。种种迹象表明，金融“脱媒”趋势愈发明显，资金开始绕开银行等金融中介，直接进行交易。在这种情况下，银行的角色将迎来重塑。未来，银行不再只是“放贷者”，而将转型为“服务中介”，以综合服务能力重新定义自身价值。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":""},{"id":"em202606253781873757","time":1782340131000,"title":"美光公布“王炸”财报：业绩、指引全面开花 盘后股价大涨","text":"【美光公布“王炸”财报：业绩、指引全面开花 盘后股价大涨】美东时间周三盘后，AI存储龙头美光科技公布第三财季（3-5月）财报。财报显示，美光继续受益于人工智能热潮带来的旺盛需求，第三财季营收增长高达346%，毛利率更是高达惊人的84.9%，远超市场预期。","source":"东方财富","category":"fast","stock":"","url":"https://finance.eastmoney.com/a/202606253781873757.html","importance":"hot"},{"id":"wscn3124264","time":1782339932000,"title":"提醒：日内请重点关注（以下均为北京时间）","text":"① 09:30 澳大利亚5月就业报告（含就业人数和失业率）；\n② 时间待定 日本央行审议委员田村直树发表讲话；\n③ 15:00 商务部召开6月第4次例行新闻发布会；\n④ 16:00 欧洲央行发布经济报告；\n⑤ 17:00 欧洲央行管委、法国央行行长Moulin讲话；\n⑥ 18:00 欧洲央行首席经济学家Lane讲话；\n⑦ 20:00 欧洲央行执委Cipollone讲话，法国央行行长Moulin讲话；\n⑧ 20:30 美国5月个人收入、个人消费开支（PCE），5月耐用品订单初值，6月20日当周首次申请失业救济人数；\n⑨ 20:45 美联储理事鲍曼谈论小型银行监督管理；\n⑩ 次日02:00 美国芝加哥联储主席Goolsbee（2027年FOMC票委）参加CNBC一个节目；\n⑪ 次日03:00 墨西哥央行公布利率决议；\n⑫ 次日03:40 美国纽约联储主席（享有FOMC永久投票权、号称美联储三把手）威廉姆斯讲话；\n⑬ 次日06:30 美国芝加哥联储主席Goolsbee（2027年FOMC票委）讨论塑造货币政策的那些因素；\n微信小程序搜索“见闻历”，了解更多。\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124268","time":1782339902000,"title":"资金涌入科技成长ETF","text":"在近期的震荡行情中，股票型ETF资金面总体净流出，但半导体、通信等科技成长赛道逆势“吸金”。面对资金涌入，部分绩优基金限购升级，也有基金大手笔分红以控制规模。站在当前时点看，科技成长行情还能否持续？市场风格分化能否收敛？机构间的分歧正在加大。（上证报）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallstreetcn.com/live/global","importance":"important"},{"id":"wscn3124267","time":1782339842000,"title":"委内瑞拉发生7级左右地震，美国发布海啸预警","text":"当地时间6月24日17时04分，委内瑞拉北部海岸附近发生7.5级地震。\n根据哥伦比亚地质局发布的最新地震通报，震中位于北纬10.89度、西经67.74度，震源深度小于30公里。目前，相关部门正持续监测地震影响，暂无人员伤亡和财产损失的官方报告。\n当地时间6月24日，美国地质调查局表示，委内瑞拉莫龙地区发生7.1级地震。美国海啸预警系统在地震后发布海啸威胁警报。（央视）\n","source":"华尔街见闻","category":"fast","stock":"","url":"https://wallst <script>
function formatTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var s = Math.floor(ts / 1000);
  var now = Math.floor(Date.now() / 1000);
  var diff = now - s;
  var dateStr = d.getFullYear() + '-' + (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0');
  var timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  if (diff < 60) return dateStr + ' ' + timeStr + ' (刚刚)';
  if (diff < 3600) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 60) + '分钟前)';
  if (diff < 86400) return dateStr + ' ' + timeStr + ' (' + Math.floor(diff / 3600) + '小时前)';
  return dateStr + ' ' + timeStr;
}

function catLabel(cat) {
  return {fast:'快讯', ann:'公告', macro:'宏观', industry:'行业'}[cat] || cat || '快讯';
}
function catClass(cat) {
  return 'cat-' + (cat || 'fast');
}
function sourceLabel(s) {
  var m = { '东方财富':'东方财富', '新浪财经':'新浪财经', '网易财经':'网易财经', '雪球':'雪球', '财联社':'财联社', '华尔街见闻':'华尔街见闻' };
  return m[s] || s || '其他';
}
function sourceBadge(s) {
  var m = { '东方财富':'badge-eastmoney', '新浪财经':'badge-sina', '网易财经':'badge-163', '雪球':'badge-xueqiu', '财联社':'badge-cls', '华尔街见闻':'badge-wscn' };
  return m[s] || '';
}

var _activeCat = null;
var _activeTab = 0;
var _activeSource = null;
var _activeSourceIdx = 0;

var _tabs = [
  {label: '全部', sub: null},
  {label: '快讯', sub: 'fast'},
  {label: '公告', sub: 'ann'},
  {label: '宏观', sub: 'macro'},
  {label: '行业', sub: 'industry'}
];

var _sourceTabs = [
  {label: '全部', sub: null},
  {label: '东方', sub: '东方财富'},
  {label: '新浪', sub: '新浪财经'},
  {label: '网易', sub: '网易财经'},
  {label: '雪球', sub: '雪球'},
  {label: '财联社', sub: '财联社'},
  {label: '华尔街', sub: '华尔街见闻'}
];

function countByCat(cat) {
  if (cat === null) return getFilteredData().length;
  return getFilteredData().filter(function(x) { return x.category === cat; }).length;
}

function countBySource(src) {
  if (src === null) return _rawData.length;
  return _rawData.filter(function(x) { return x.source === src; }).length;
}

function getFilteredData() {
  var d = _rawData;
  if (_activeSource !== null) d = d.filter(function(x) { return x.source === _activeSource; });
  return d;
}

function renderSourceTabs() {
  var el = document.getElementById('source-tabs');
  el.innerHTML = '';
  _sourceTabs.forEach(function(t, i) {
    var n = countBySource(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab tab-src' + (i === _activeSourceIdx ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeSourceIdx = i;
      _activeSource = t.sub;
      _activeTab = 0;
      _activeCat = null;
      renderSourceTabs();
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  _tabs.forEach(function(t, i) {
    var n = countByCat(t.sub);
    if (n === 0 && t.sub !== null) return;
    var btn = document.createElement('button');
    btn.className = 'tab' + (i === _activeTab ? ' active' : '');
    btn.innerHTML = t.label + '<span class="count">' + n + '</span>';
    btn.onclick = function() {
      _activeTab = i;
      _activeCat = t.sub;
      renderTabs();
      renderList();
    };
    el.appendChild(btn);
  });
}

function renderList() {
  var el = document.getElementById('news-list');
  var items = getFilteredData();
  items = _activeCat === null ? items : items.filter(function(x) { return x.category === _activeCat; });

  if (items.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emo">📭</div><p>暂无数据</p></div>';
    return;
  }

  var h = '';
  items.forEach(function(item) {
    var ts = formatTs(item.time);
    var cat = item.category || 'fast';
    var source = item.source || '';
    var imp = item.importance || '';
    var title = item.text || item.title || '(无内容)';
    var stock = item.stock || '';
    var srcClass = sourceBadge(source);

    var annBase = 'https://np-cnotice-stock.eastmoney.com/announcement/detail?announcementId=';
    var itemUrl = item.url || '';
    // 华尔街见闻：用ID拼出具体新闻链接
    if (source === '华尔街见闻' && item.id) {
      var wscnId = item.id.replace(/^wscn/, '');
      if (wscnId) itemUrl = 'https://wallstreetcn.com/livenews/' + wscnId;
    }
    if (!itemUrl && cat === 'ann' && stock) {
      var code = stock.split('.')[0];
      itemUrl = annBase + item.id + '&orgId=' + code + '&timestamp=';
    } else if (!itemUrl) {
      itemUrl = 'https://xueqiu.com/7x24';
    }
    h += '<div class="news-item"' + (itemUrl ? ' onclick="window.open(\'' + itemUrl + '\')"' : '') + '>';
    h += '<div class="news-meta">';
    h += '<span class="news-time">' + ts + '</span>';
    h += '<span class="news-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>';
    h += '<span class="news-cat ' + srcClass + '">' + sourceLabel(source) + '</span>';
    h += (imp === 'hot' ? '<span class="imp-hot">🔥</span>' : '') + (imp === 'important' ? '<span class="imp-important">⭐</span>' : '');
    h += '</div>';
    if (itemUrl) {
      h += '<a href="' + itemUrl + '" target="_blank" class="news-title-link" onclick="event.stopPropagation()">' + title + ' <span class="external-icon">↗</span></a>';
    } else {
      h += '<div class="news-title">' + title + '</div>';
    }
    if (stock) h += '<div class="news-stock">📌 ' + stock + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function renderStats() {
  var total = _rawData.length;
  var em = _rawData.filter(function(x){ return x.source === '东方财富'; }).length;
  var hot = _rawData.filter(function(x){ return x.importance === 'hot'; }).length;
  var imp = _rawData.filter(function(x){ return x.importance === 'important'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-em').textContent = em;
  document.getElementById('stat-hot').textContent = hot;
  document.getElementById('stat-imp').textContent = imp;

  var times = _rawData.map(function(x){ return x.time || 0; }).filter(Boolean);
  var latest = times.length ? formatTs(Math.max.apply(null, times)) : '无';
  document.getElementById('last-update').textContent = '最后更新: ' + latest + ' · 共 ' + total + ' 条';
}

function renderAll() {
  renderStats();
  renderSourceTabs();
  renderTabs();
  renderList();
}

renderAll();
